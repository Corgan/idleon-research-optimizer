<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idleon Sailing Calculator</title>
<style>
:root {
  --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f3460; --accent:#e94560;
  --text:#eee; --text1:#eee; --text2:#c0c0d4; --gold:#ffd700; --green:#4caf50;
  --blue:#2196f3; --purple:#bb86fc; --cyan:#4dd0e1; --red:#f44; --orange:#ffa060; --border:#425071;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
h1 { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; background:var(--bg2); border-bottom:2px solid var(--accent); font-size:1.35em; }
h1 span { color:var(--accent); }
h1 a { color:var(--text2); font-size:.62em; text-decoration:none; }
.main { max-width:1500px; margin:0 auto; padding:14px; }
.section { background:var(--bg2); border-radius:8px; padding:14px; margin-bottom:14px; }
.section h2 { margin-bottom:10px; color:var(--accent); font-size:1.08em; border-bottom:1px solid #34405f; padding-bottom:6px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:8px; }
.card { background:var(--bg3); border:1px solid #425071; border-radius:6px; padding:9px 11px; min-height:78px; }
.card-title { color:var(--cyan); font-size:.74em; font-weight:700; }
.card-val { color:var(--gold); font-size:1.35em; font-weight:700; margin:3px 0; font-variant-numeric:tabular-nums; }
.card-sub { color:var(--text2); font-size:.68em; }
.controls { display:flex; flex-wrap:wrap; gap:8px 14px; align-items:flex-end; }
.control { display:flex; flex-direction:column; gap:3px; color:var(--text2); font-size:.72em; }
select,input { min-height:30px; border:1px solid #586482; border-radius:4px; background:#101b35; color:var(--text); padding:4px 7px; }
input[type=number] { width:108px; }
input[type=checkbox] { width:16px; min-height:16px; padding:0; accent-color:var(--accent); }
.check-control { display:flex; align-items:center; gap:7px; color:var(--text2); font-size:.78em; cursor:pointer; }
.segmented { display:flex; border:1px solid #586482; border-radius:4px; overflow:hidden; }
.segmented button,.tabs button { border:0; background:#101b35; color:var(--text2); padding:7px 11px; cursor:pointer; }
.segmented button + button { border-left:1px solid #586482; }
.segmented button.active,.tabs button.active { color:var(--cyan); background:rgba(77,208,225,.15); font-weight:700; }
.tabs { display:flex; flex-wrap:wrap; background:var(--bg2); border-bottom:1px solid #39435f; margin-bottom:12px; }
.tabs button { border-bottom:2px solid transparent; }
.tabs button.active { border-bottom-color:var(--accent); color:var(--accent); }
.table-wrap { overflow:auto; max-height:680px; }
.data-table { width:100%; border-collapse:collapse; font-size:.78em; white-space:nowrap; }
.data-table th { position:sticky; top:0; z-index:1; text-align:left; padding:6px; color:var(--text2); background:var(--bg2); border-bottom:1px solid #46516c; }
.data-table td { padding:5px 6px; border-bottom:1px solid rgba(255,255,255,.05); }
.data-table tr:hover td { background:rgba(255,255,255,.035); }
.data-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.ship-pair-first td:not(.ship-boat-cell) { border-bottom:0; padding-bottom:2px; }
.ship-pair-second td { padding-top:2px; border-bottom:2px solid rgba(255,255,255,.11); }
.ship-boat-cell { vertical-align:middle; color:var(--cyan); font-weight:700; border-right:1px solid rgba(255,255,255,.09); border-bottom:2px solid rgba(255,255,255,.11) !important; }
.ship-group-alt td { background:rgba(255,255,255,.018); }
.ship-group-alt:hover td { background:rgba(255,255,255,.05); }
.best td { background:rgba(76,175,80,.07); }
.badge { display:inline-block; padding:1px 5px; border-radius:3px; font-size:.72em; font-weight:700; }
.badge-green { background:rgba(76,175,80,.2); color:var(--green); }
.badge-gold { background:rgba(255,215,0,.16); color:var(--gold); }
.badge-purple { background:rgba(187,134,252,.18); color:var(--purple); }
.badge-cyan { background:rgba(77,208,225,.16); color:var(--cyan); }
.bar { width:100px; height:7px; border-radius:4px; overflow:hidden; background:#313a52; display:inline-block; vertical-align:middle; }
.bar > i { display:block; height:100%; background:var(--cyan); }
.captain-bonus { display:grid; grid-template-columns:140px 100px 32px 62px; gap:6px; align-items:center; min-width:352px; }
.captain-bonus-name { overflow:hidden; text-overflow:ellipsis; }
.captain-bonus .bar { width:100%; }
.captain-bonus-quality { color:var(--text2); font-size:.76em; text-align:right; font-variant-numeric:tabular-nums; }
.captain-bonus-total { min-width:62px; text-align:right; justify-self:end; font-variant-numeric:tabular-nums; }
.payout-value { color:var(--gold); font-weight:700; }
.payout-detail { display:block; margin-top:1px; color:var(--text2); font-size:.78em; }
.split { display:grid; grid-template-columns:minmax(280px,1fr) minmax(420px,2fr); gap:12px; }
.callout { border-left:3px solid var(--gold); background:rgba(255,215,0,.07); padding:9px 11px; color:var(--text2); font-size:.76em; line-height:1.45; }
details { margin-top:8px; color:var(--text2); font-size:.74em; }
details > summary { cursor:pointer; color:var(--cyan); }
.formula-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:10px; }
.formula { background:#101b35; border:1px solid #3b4765; border-radius:5px; padding:9px; font-size:.72em; line-height:1.55; }
.formula strong { color:var(--cyan); }
.breakdown-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
.breakdown-panel { background:#101b35; border:1px solid #3b4765; border-radius:6px; padding:10px; min-width:0; }
.breakdown-panel h3 { color:var(--cyan); font-size:.92em; margin-bottom:8px; }
.bt-controls { margin-bottom:8px; display:flex; gap:6px; }
.bt-controls .btn-sm { padding:4px 10px; background:var(--bg3); color:var(--text2); border:1px solid var(--border); border-radius:4px; cursor:pointer; font-size:.8em; }
.bt-controls .btn-sm:hover { color:var(--cyan); border-color:var(--cyan); }
.bt-tree { font-size:.78em; }
.bt-row { display:flex; align-items:center; gap:6px; padding:3px 4px; border-bottom:1px solid rgba(255,255,255,.04); min-height:26px; cursor:pointer; }
.bt-row:hover { background:rgba(255,255,255,.07); }
.bt-children { background:rgba(0,0,0,.12); border-left:2px solid rgba(255,255,255,.08); }
.bt-root { font-weight:700; font-size:1.05em; padding-top:6px; padding-bottom:6px; border-bottom:2px solid #444; }
.bt-arrow { cursor:pointer; color:var(--text2); width:14px; text-align:center; user-select:none; flex-shrink:0; }
.bt-arrow:hover { color:var(--cyan); }
.bt-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bt-val { font-weight:600; text-align:right; flex-shrink:0; white-space:nowrap; margin-left:auto; font-variant-numeric:tabular-nums; }
.bt-tag { font-size:.7em; opacity:.7; margin-left:4px; }
.bt-tag.auto { color:var(--accent); }
.bt-tag.manual { color:var(--orange); }
.bt-tooltip { position:fixed; background:#10182d; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:8px 12px; font-size:.82em; max-width:350px; pointer-events:none; z-index:10000; display:none; }
#js-tip { display:none; position:fixed; z-index:9999; max-width:390px; padding:8px 11px; background:#10182d; border:1px solid var(--gold); border-radius:5px; color:var(--text); font-size:.72em; line-height:1.45; white-space:pre-line; pointer-events:none; box-shadow:0 4px 18px #000a; }
.empty { padding:30px; color:var(--text2); text-align:center; }
@media(max-width:850px) { .split,.breakdown-grid { grid-template-columns:1fr; } .main { padding:8px; } h1 { font-size:1.05em; } .captain-bonus { grid-template-columns:132px 84px 32px 58px; min-width:324px; } }
</style>
</head>
<body>
<h1><a href="index.html">Home</a><div>&#9973; <span>Idleon</span> Sailing Calculator</div><a href="https://github.com/Corgan/idleon-research-optimizer">GitHub</a></h1>
<div id="save-area"></div>
<div class="main" id="main-content"><div class="empty">Load a save to calculate sailing routes.</div></div>
<div id="js-tip"></div>
<div class="bt-tooltip" id="bt-tooltip"></div>

<script type="module">
import { saveData } from './js/state.js';
import { initSaveLoader } from './js/ui/save-loader.js';
import { renderBreakdownTree } from './js/ui/dash-breakdowns.js';
import { _bNode } from './js/stats/node-helpers.js';
import {
  CHEST_TIER_NAMES,
  allArtifactsMaxed,
  availableIslandCount,
  boatUpgradeCost,
  boatUpgradeEta,
  boatTargetIsland,
  captainBonus,
  captainLevelTime,
  captainRollQuality,
  chestTierDistribution,
  collectionWindowStats,
  fleetChestPayoutBreakdown,
  islandArtifactOdds,
  maxChestSlots,
  optimizeCaptainAssignment,
  overflowUpgradeChance,
  recommendMinimumTier,
  routeMetrics,
  sailingCurrencyMeta,
  unendingLootSearch,
} from './js/stats/systems/w5/sailing-chests.js';
import {
  captainBonusName,
  islandArtifactCount,
  islandArtifactOffset,
  islandDistance,
} from './js/stats/data/w5/sailing.js';

var rawServerVars = {};
var activeTab = 'fleet';
var goal = 'treasure';
var activeCharIdx = 0;
var selectedBoat = 0;
var selectedCaptain = 0;
var selectedIsland = 0;
var minimumTier = 0;
var collectHours = 8;
var sortLevelsByEta = false;
var fleetCache = new Map();

initSaveLoader({
  target:'#save-area',
  auth:true,
  onLoad:function(_state, raw) {
    rawServerVars = raw && raw.serverVars ? raw.serverVars : {};
    minimumTier = Math.max(0, Math.min(5, Number(saveData.olaData?.[127]) || 0));
    selectedCaptain = Number(saveData.boatsData?.[0]?.[0]) || 0;
    selectedIsland = Math.max(0, boatTargetIsland(0, saveData));
    goal = allArtifactsMaxed(saveData) ? 'treasure' : 'artifact';
    fleetCache.clear();
    render();
  }
});

function esc(s) { return String(s).replace(/[&<>"']/g, function(c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function attr(s) { return esc(s).replace(/\n/g, '&#10;'); }
function fmt(n) {
  n = Number(n) || 0; var a = Math.abs(n);
  if (a >= 1e21) return n.toExponential(2);
  if (a >= 1e18) return (n/1e18).toFixed(2)+'Qi';
  if (a >= 1e15) return (n/1e15).toFixed(2)+'Q';
  if (a >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (a >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (a >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (a >= 1e3) return (n/1e3).toFixed(1)+'K';
  if (a >= 1) return n.toLocaleString(undefined,{maximumFractionDigits:2});
  return a > 0 ? n.toPrecision(3) : '0';
}
function pct(v, digits) { return (100*(Number(v)||0)).toFixed(digits == null ? 2 : digits)+'%'; }
function chance(v) { v=Number(v)||0; if(v<=0)return '—'; if(v>=1)return '100%'; if(v>=.001)return pct(v,3); return '1 in '+fmt(1/v); }
function time(sec) { if(!isFinite(sec))return '—'; if(sec<60)return sec.toFixed(0)+'s'; if(sec<3600)return (sec/60).toFixed(1)+'m'; return (sec/3600).toFixed(2)+'h'; }
function card(title,value,sub) { return '<div class="card"><div class="card-title">'+title+'</div><div class="card-val">'+value+'</div><div class="card-sub">'+sub+'</div></div>'; }
function boatCount() { return Math.min(saveData.boatsData?.length || 0, 1 + (Number(saveData.sailingData?.[2]?.[1]) || 0)); }
function captainCount() { return Math.min(saveData.captainsData?.length || 0, 1 + (Number(saveData.sailingData?.[2]?.[0]) || 0)); }
function islandCount() { return availableIslandCount(saveData); }
function options(extra) { return Object.assign({ activeCharIdx:activeCharIdx, minimumTier:minimumTier,
  serverVars:rawServerVars }, extra || {}); }
function route(boat,island,captain) { return routeMetrics(boat,island,saveData,options({captainIdx:captain})); }
function optimizedFleet(island,mode) {
  var key=[island,mode,activeCharIdx,minimumTier].join(':');
  if(!fleetCache.has(key))fleetCache.set(key,optimizeCaptainAssignment(island,mode,saveData,options()));
  return fleetCache.get(key);
}
function currentFleet(island) {
  var rows=[];
  for(var b=0;b<boatCount();b++)rows.push(route(b,island,Number(saveData.boatsData?.[b]?.[0])));
  return rows;
}
function fleetTotal(rows,key){return rows.reduce(function(sum,row){return sum+(Number(row[key])||0);},0);}
function fleetMetric(rows,mode){return fleetTotal(rows,mode==='artifact'?'artifactFindsPerHour':mode==='chests'?'keptChestsPerHour':'treasurePerHour');}
function clearFleetCache(){fleetCache.clear();}
function captainLabel(idx) {
  var c=saveData.captainsData?.[idx]; if(!c)return 'No captain';
  var parts=[]; for(var s=0;s<2;s++){var t=Number(c[1+s]); if(t>=0)parts.push(captainBonusName(t)+' +'+fmt(captainBonus(idx,t,saveData))+'%');}
  return 'C'+(idx+1)+' Lv'+fmt(c[3])+(parts.length?' · '+parts.join(' / '):'');
}
function islandLabel(i) { return 'Island '+(i+1)+' · '+fmt(islandDistance(i))+' dist'; }
function currentIsland(boat) { var i=boatTargetIsland(boat,saveData); return i>=0?i:Math.max(0,islandCount()-1); }
function metric(r) { return goal==='artifact'?r.artifactFindsPerHour:goal==='chests'?r.keptChestsPerHour:r.treasurePerHour; }
function bestIsland(boat,captain) {
  var best=null; for(var i=0;i<islandCount();i++){var r=route(boat,i,captain); if(!best||metric(r)>metric(best))best=r;} return best;
}
function fleetRoutes() {
  var rows=[]; for(var b=0;b<boatCount();b++){var c=Number(saveData.boatsData[b]?.[0]); rows.push(route(b,currentIsland(b),c));} return rows;
}

function render() {
  var fleet=optimizedFleet(selectedIsland,goal);
  var current=currentFleet(selectedIsland);
  var totalChest=fleet.reduce(function(a,r){return a+r.generatedChestsPerHour;},0);
  var totalKept=fleet.reduce(function(a,r){return a+r.keptChestsPerHour;},0);
  var totalLoot=fleet.reduce(function(a,r){return a+r.treasurePerHour;},0);
  var totalArtifact=fleet.reduce(function(a,r){return a+r.artifactFindsPerHour;},0);
  var capacity=maxChestSlots(saveData,activeCharIdx);
  var pile=collectionWindowStats(fleet,capacity,saveData.sailChestsData?.length||0,saveData,activeCharIdx);
  var rec=aggregateMinTier(fleet,collectHours,pile.targetCount,pile.current);
  var minimum=fleet[0]?.timing.minimumBreakdown||{};
  var minimumTip='Minimum trip formula\n120m / (1 + total % / 100) - Training minutes\n\nSiege Breaker family: +'+fmt(minimum.family)+'%\nShiny breeding pets: +'+fmt(minimum.shiny)+'%\nDavey Jones Returns: +'+fmt(minimum.legend)+'%\nCombined percent: +'+fmt(minimum.totalPercent)+'%\nAfter percent reduction: '+fmt(minimum.beforeGem)+'m\nDavey Jones Training: '+fmt(minimum.gemPurchases)+' purchases × 4m = -'+fmt(minimum.gemMinutes)+'m\nRounded result: '+fmt(minimum.minutes)+'m\nHard floor: '+fmt(minimum.floor)+'m';
  var html='<div class="section"><div class="controls">'+controls()+'</div></div>';
  html+='<div class="section"><div class="card-grid">';
  html+=card('Generated chests/hr',fmt(totalChest),fmt(totalKept)+' kept at tier '+minimumTier+'+');
  html+=card('Expected treasure/hr',fmt(totalLoot),'Full-value loot rolls included');
  html+=card('Artifact finds/hr',fmt(totalArtifact),'Expected successful chest opens');
  html+=card('Ideal collection',isFinite(pile.hoursToFill)?time(pile.hoursToFill*3600):'—',fmt(pile.current)+' / '+fmt(pile.targetCount)+' target slots');
  html+=card('Window recommendation','Tier '+rec.tier+'+',fmt(rec.kept)+' kept in '+collectHours+'h');
  html+=card('Minimum trip',fmt(fleet[0]?.timing.minimumMinutes || 0)+'m','<span data-tip="'+attr(minimumTip)+'">+'+fmt(minimum.totalPercent)+'% combined · Training -'+fmt(minimum.gemMinutes)+'m</span>');
  html+=card('Unending Loot Search',fmt(unendingLootSearch(saveData,activeCharIdx))+'%','Near-full replacement talent');
  html+='</div></div>';
  html+='<div class="tabs">'+tabButton('fleet','Fleet Optimizer')+tabButton('levels','Ship Levels')+tabButton('captains','Captains')+tabButton('odds','Chest Odds')+tabButton('artifacts','Artifacts')+tabButton('formula','Breakdowns')+'</div>';
  html+='<div id="tab-body">'+(activeTab==='fleet'?renderFleet(fleet,current,pile):activeTab==='levels'?renderLevels(fleet):activeTab==='captains'?renderCaptains(fleet):activeTab==='odds'?renderOdds(fleet,capacity,rec):activeTab==='artifacts'?renderArtifacts(fleet):renderFormula(fleet))+'</div>';
  document.getElementById('main-content').innerHTML=html;
  if(activeTab==='formula')renderBreakdownTrees(fleet);
}

function controls() {
  var chars=Math.max(saveData.charNames?.length||0,saveData.lv0AllData?.length||0); var h='';
  h+='<label class="control">Login context<select data-set="char">'; for(var i=0;i<chars;i++)h+='<option value="'+i+'"'+(i===activeCharIdx?' selected':'')+'>'+esc(saveData.charNames?.[i]||('Character '+(i+1)))+'</option>'; h+='</select></label>';
  h+='<label class="control">Fleet destination<select data-set="island">';for(var island=0;island<islandCount();island++)h+='<option value="'+island+'"'+(island===selectedIsland?' selected':'')+'>'+islandLabel(island)+'</option>';h+='</select></label>';
  h+='<label class="control">Minimum chest<select data-set="minTier">'; for(var t=0;t<5;t++)h+='<option value="'+t+'"'+(t===minimumTier?' selected':'')+'>'+CHEST_TIER_NAMES[t]+'+</option>'; h+='</select></label>';
  h+='<label class="control">Collection window<input type="number" min="0.25" step="0.25" value="'+collectHours+'" data-set="hours"></label>';
  h+='<div class="control">Optimize<div class="segmented">'+goalButton('treasure','Loot value')+goalButton('artifact','Artifacts')+goalButton('chests','Chest rate')+'</div></div>';
  return h;
}
function goalButton(key,label){return '<button data-goal="'+key+'" class="'+(goal===key?'active':'')+'">'+label+'</button>';}
function tabButton(key,label){return '<button data-tab="'+key+'" class="'+(activeTab===key?'active':'')+'">'+label+'</button>';}

function renderFleet(fleet) {
  var h='<div class="section"><h2>Current Fleet</h2><div class="table-wrap"><table class="data-table"><thead><tr><th>Boat</th><th>Captain</th><th>Route</th><th class="num">Trip</th><th class="num">Chest/hr</th><th class="num">Base chest</th><th class="num">Treasure/hr</th><th class="num">Artifact/hr</th><th>Best route</th></tr></thead><tbody>';
  fleet.forEach(function(r){var best=bestIsland(r.boatIdx,r.captainIdx); h+='<tr><td>Boat '+(r.boatIdx+1)+'</td><td data-tip="'+attr(captainLabel(r.captainIdx))+'">C'+(r.captainIdx+1)+'</td><td>'+islandLabel(r.islandIdx)+'</td><td class="num">'+time(r.timing.tripSeconds)+(r.timing.capped?' <span class="badge badge-cyan">cap</span>':'')+'</td><td class="num">'+fmt(r.generatedChestsPerHour)+'</td><td class="num">'+fmt(r.loot.value)+'</td><td class="num">'+fmt(r.treasurePerHour)+'</td><td class="num">'+chance(r.artifactFindsPerHour)+'</td><td>'+islandLabel(best.islandIdx)+'</td></tr>';});
  h+='</tbody></table></div></div>';
  h+='<div class="section"><div class="callout"><strong>Fleet rule:</strong> treasure amount per chest does not depend on island. Faster routes produce more chests; once a boat reaches the minimum-trip cap, choose its island by the treasure or artifact you need rather than distance.</div></div>';
  return h;
}

function renderLevels() {
  var groups=[];
  for(var boat=0;boat<boatCount();boat++){
    var boatRows=[];
    ['loot','speed'].forEach(function(stat){
      var upgrade=boatUpgradeCost(boat,stat,saveData);
      var currency=sailingCurrencyMeta(upgrade.type);
      var targetIsland=Math.max(0,currency.islandIdx);
      var targetAvailable=targetIsland<islandCount();
      var targetFleet=targetAvailable?optimizedFleet(targetIsland,'treasure'):[];
      boatRows.push(Object.assign(boatUpgradeEta(boat,stat,targetFleet,saveData),{
        targetIsland:targetIsland,
        targetAvailable:targetAvailable,
      }));
    });
    groups.push({boatIdx:boat,rows:boatRows,lowestEta:Math.min.apply(null,boatRows.map(levelEtaValue))});
  }
  if(sortLevelsByEta)groups.sort(function(a,b){return a.lowestEta-b.lowestEta||a.boatIdx-b.boatIdx;});
  var rows=groups.reduce(function(all,group){return all.concat(group.rows);},[]);
  var ready=rows.filter(function(row){return row.remaining<=0;}).length;
  var fastest=rows.reduce(function(best,row){return row.hours<best.hours?row:best;},{hours:Infinity});
  var fastestText=isFinite(fastest.hours)?'Boat '+(fastest.boatIdx+1)+' '+fastest.stat:'No current resource income';
  var h='<div class="section"><h2>Next Ship Levels</h2><div class="card-grid">';
  h+=card('Upgrades ready',fmt(ready),fmt(rows.length)+' loot and speed upgrades checked');
  h+=card('Fastest next level',isFinite(fastest.hours)?(fastest.hours<=0?'Ready':time(fastest.hours*3600)):'&mdash;',fastestText);
  h+=card('ETA strategy','Per-resource routes','Each fleet targets the required island');
  h+='</div><div class="controls" style="margin-top:10px"><label class="check-control"><input type="checkbox" data-set="sortEta"'+(sortLevelsByEta?' checked':'')+'>Sort boats by lowest ETA</label></div>';
  h+='<div class="table-wrap" style="margin-top:8px"><table class="data-table"><thead><tr><th>Boat</th><th>Upgrade</th><th class="num">Level</th><th>Resource</th><th>Target route</th><th class="num">Cost</th><th class="num">Balance</th><th class="num">Needed</th><th class="num">Fleet/hr</th><th class="num">ETA</th></tr></thead><tbody>';
  groups.forEach(function(group,groupIdx){

function aggregateMinTier(fleet,hours,capacity){var generated=fleet.reduce(function(a,r){return a+r.generatedChestsPerHour;},0);for(var min=0;min<6;min++){var kept=0;fleet.forEach(function(r){var d=chestTierDistribution(r.captainIdx,saveData);var p=0;for(var t=min;t<6;t++)p+=d.tiers[t].probability;kept+=r.generatedChestsPerHour*p*hours;});if(kept<=capacity)return {tier:min,kept:kept,generated:generated*hours,capacity:capacity};}return {tier:5,kept:0,generated:generated*hours,capacity:capacity};}
function aggregateFleetTiers(fleet){
  var generated=fleetTotal(fleet,'generatedChestsPerHour');
  var rows=[];
  for(var tier=0;tier<6;tier++){
    var exactPerHour=0;
    var cumulativePerHour=0;
    var template=null;
    fleet.forEach(function(routeRow){
      var distribution=routeRow.rarity||chestTierDistribution(routeRow.captainIdx,saveData);
      var tierRow=distribution.tiers[tier];
      template=template||tierRow;
      exactPerHour+=routeRow.generatedChestsPerHour*tierRow.probability;
      cumulativePerHour+=routeRow.generatedChestsPerHour*tierRow.cumulative;
    });
    rows.push(Object.assign({},template||{tier:tier,name:CHEST_TIER_NAMES[tier],lootMultiplier:0,artifactMultiplier:0},{
      probability:generated>0?exactPerHour/generated:0,
      cumulative:generated>0?cumulativePerHour/generated:0,
      expectedPerHour:exactPerHour,
    }));
  }
  return {generated:generated,tiers:rows};
}

      _bNode('Sailing Speed Stamps',factors.stamp,null,{fmt:'+'}),
      _bNode('Sailing Statue',factors.statue,null,{fmt:'+'}),
      _bNode('Sailing Meals',factors.meal,null,{fmt:'+'}),
      _bNode('SailSpd Vial',factors.vial,null,{fmt:'+'}),
      _bNode('Rift Skill Bonus',factors.rift,null,{fmt:'+'}),
      _bNode('MSA Bonus 2',factors.msa,null,{fmt:'+'}),
      _bNode('Sailing Speed Star Sign',factors.star,null,{fmt:'+'}),
      _bNode('Vault 62',factors.vault,null,{fmt:'+'})
    ],{fmt:'x',note:'1 + sum / 125'})
  ],{note:'All listed speed factors multiply'});
  var minimumNode=_bNode('Minimum Travel Time',r.timing.minimumMinutes,[
    _bNode('Base Minutes',120),
    _bNode('Percent Reduction Group',1+(minimum.totalPercent||0)/100,[
      _bNode('Siege Breaker Family',minimum.family,null,{fmt:'%'}),
      _bNode('Shiny Breeding Pets',minimum.shiny,null,{fmt:'%'}),
      _bNode('Davey Jones Returns',minimum.legend,null,{fmt:'%'})
    ],{fmt:'x',note:'120 / (1 + sum / 100)'}),
    _bNode('Davey Jones Training',-(minimum.gemMinutes||0),null,{fmt:'+',note:(minimum.gemPurchases||0)+' purchases × -4 minutes'}),
    _bNode('Hard Floor',minimum.floor||15,null,{note:'Minimum cannot go below 15 minutes'})
  ],{note:'round(max(15, 120 / percent group - Training minutes))'});
  return _bNode('Trips per Hour',r.timing.tripsPerHour,[
    _bNode('Trip Time ('+time(r.timing.tripSeconds)+')',r.timing.tripSeconds,null,{note:'3600 × distance / effective speed'}),
    _bNode('Effective Route Speed',r.timing.effectiveSpeed,[rawNode,_bNode('Minimum-Time Speed Cap',cap,[minimumNode],{note:'60 × island distance / minimum travel minutes'})],{note:'min(raw boat speed, minimum-time speed cap)'}),
    _bNode('Island Distance',r.timing.distance)
  ],{fmt:'/hr',note:'3600 / trip seconds'});
}

function buildArtifactTree(r){
  var factors=r.artifactBase.factors;
  var additiveChildren=[
    _bNode('Artifact 3',factors.artifact,null,{fmt:'%'}),
    _bNode('Captain Artifact Find',factors.captain,null,{fmt:'%'}),
    _bNode('Shiny Breeding Pets 21',factors.shiny,null,{fmt:'%'}),
    _bNode('Fractal Island Bonus 3',factors.fractal,null,{fmt:'%'}),
    _bNode('Bribe 34',factors.bribe,null,{fmt:'%'}),
    _bNode('Legendary Captains',factors.legendary,null,{fmt:'%',note:'25% per legendary captain, capped at 30'}),
    _bNode('Arcade 32',factors.arcade32,null,{fmt:'%'}),
    _bNode('Arcade 66',factors.arcade66,null,{fmt:'%'}),
    _bNode('Hole Upgrade 55',factors.hole55,null,{fmt:'%'}),
    _bNode('Farming Sticker 2',factors.sticker,null,{fmt:'%'}),
    _bNode('Research Grid 109',factors.grid109,null,{fmt:'%'}),
    _bNode('Vault 63',factors.vault63,null,{fmt:'%'})
  ];
  var multiplierChildren=[
    _bNode('Additive Sources',Math.max(1,1+r.artifactBase.additive/100),additiveChildren,{fmt:'x',note:'max(1, 1 + sum / 100)'}),
    pctFactorNode('Artifact Find Star Sign',factors.star),
    _bNode('Companion 154',Math.max(1,Math.min(2,1+2*factors.companion154)),null,{fmt:'x'}),
    _bNode('Killroy',Math.max(1,factors.killroy),null,{fmt:'x'}),
    pctFactorNode('Minehead Button 3',factors.minehead),
    pctFactorNode('Research Grid 106',factors.grid106),
    pctFactorNode('6turtle Vial',factors.vial),
    _bNode('Purple Chest Slugs',Math.max(1,Math.pow(1.5,factors.purpleSlugs)),null,{fmt:'x'}),
    pctFactorNode('Sushi 7',factors.sushi),
    pctFactorNode('Summoning Win 3',factors.win),
    _bNode('Davey Jones',factors.davey,null,{fmt:'x'}),
    pctFactorNode('Mainframe 14',factors.lab),
    pctFactorNode('Lore Episode 3',factors.lore),
    pctFactorNode('Pristine Charm 2',factors.pristine),
    pctFactorNode('Voting Bonus 20',factors.vote),
    _bNode('Companion 43',1+factors.companion43,null,{fmt:'x'}),
    pctFactorNode('Monument 1 / 2',factors.monument),
    pctFactorNode('Exotic 45',factors.exotic),
    pctFactorNode('Palette 5',factors.palette),
    _bNode('Spelunking',factors.spelunk,null,{fmt:'x'})
  ];
  var tierChildren=r.tiers.filter(function(tier){return tier.kept;}).map(function(tier){
    return _bNode(tier.name+' Weighted Chance',100*tier.probability*tier.artifactChance,[
      _bNode('Exact Tier Chance',100*tier.probability,null,{fmt:'pct'}),
      _bNode('Artifact Multiplier',tier.artifactMultiplier,null,{fmt:'x'}),
      _bNode('Artifact Chance at Tier',100*tier.artifactChance,null,{fmt:'pct'})
    ],{fmt:'pct',note:'tier probability × artifact chance at this tier'});
  });
  return _bNode('Expected Artifact Finds / Hour',r.artifactFindsPerHour,[
    _bNode('Generated Chests / Hour',r.generatedChestsPerHour,null,{fmt:'/hr'}),
    _bNode('Chance per Generated Chest',100*r.artifactChancePerTrip,tierChildren,{fmt:'pct',note:'Sum of kept tier probability × tier artifact chance'}),
    _bNode('Base Artifact Multiplier',r.artifactBase.value,multiplierChildren,{fmt:'x'})
  ],{fmt:'/hr',note:'generated chests per hour × artifact chance per generated chest'});
}

function buildChestTree(r){
  var expectedPerChest=r.generatedChestsPerHour>0?r.treasurePerHour/r.generatedChestsPerHour:0;
  var tierChildren=r.tiers.map(function(tier){
    var contribution=tier.kept?tier.probability*tier.treasureValue:0;
    return _bNode(tier.name+(tier.kept?'':' (discarded)'),contribution,[
      _bNode('Exact Tier Chance',100*tier.probability,null,{fmt:'pct'}),
      _bNode('Stored Value / Payout',tier.chestValue),
      _bNode('Guaranteed Payouts',tier.rolls,null,{note:'1 + min(4, tier) + Achievement 300'}),
      _bNode('Full Value if Opened',tier.treasureValue)
    ],{note:tier.kept?'tier chance × full opened value':'Filtered tiers contribute zero'});
  });
  return _bNode('Expected Treasure / Hour',r.treasurePerHour,[
    _bNode('Generated Chests / Hour',r.generatedChestsPerHour,null,{fmt:'/hr'}),
    _bNode('Expected Value / Generated Chest',expectedPerChest,tierChildren,{note:'Sum of exact tier chance × stored value × guaranteed payouts'}),
    _bNode('Currency Split / Hour',r.treasurePerHour,[
      _bNode('Gold Bars',r.treasurePerHour*r.treasureShares.gold,null,{note:pct(r.treasureShares.gold,1)+' per payout'}),
      _bNode('Island Primary',r.treasurePerHour*r.treasureShares.primary,null,{note:pct(r.treasureShares.primary,1)+' per payout'}),
      _bNode('Island Rare',r.treasurePerHour*r.treasureShares.rare,null,{note:pct(r.treasureShares.rare,1)+' per payout'})
    ],{note:'Each guaranteed payout independently chooses its currency'})
  ],{fmt:'/hr',note:'generated chests per hour × expected opened value per generated chest'});
}

function renderBreakdownTrees(fleet){
  var selected=breakdownRoute(fleet);
  if(!selected)return;
  renderBreakdownTree(buildLootTree(selected),document.getElementById('breakdown-loot'),{tooltipId:'bt-tooltip'});
  renderBreakdownTree(buildSpeedTree(selected),document.getElementById('breakdown-speed'),{tooltipId:'bt-tooltip'});
  renderBreakdownTree(buildArtifactTree(selected),document.getElementById('breakdown-artifact'),{tooltipId:'bt-tooltip'});
  renderBreakdownTree(buildChestTree(selected),document.getElementById('breakdown-chest'),{tooltipId:'bt-tooltip'});
}

document.addEventListener('click',function(e){var tab=e.target.closest('[data-tab]');if(tab){activeTab=tab.dataset.tab;render();return;}var gb=e.target.closest('[data-goal]');if(gb){goal=gb.dataset.goal;render();}});
document.addEventListener('change',function(e){var key=e.target.dataset.set;if(key==='char')activeCharIdx=Number(e.target.value);else if(key==='minTier')minimumTier=Number(e.target.value);else if(key==='hours')collectHours=Math.max(.25,Number(e.target.value)||.25);else if(key==='sortEta')sortLevelsByEta=e.target.checked;else if(key==='boat'||key==='breakdownBoat')selectedBoat=Number(e.target.value);else if(key==='captain')selectedCaptain=Number(e.target.value);else if(key==='island')selectedIsland=Number(e.target.value);else if(e.target.dataset.override)overrides[e.target.dataset.override]=Number(e.target.value)||0;else return;render();});
(function(){var tip=document.getElementById('js-tip');document.addEventListener('mouseover',function(e){var el=e.target.closest('[data-tip]');if(!el){tip.style.display='none';return;}tip.textContent=el.getAttribute('data-tip');tip.style.display='block';});document.addEventListener('mousemove',function(e){if(tip.style.display!=='block')return;var x=e.clientX+12,y=e.clientY+12;if(x+tip.offsetWidth>innerWidth-8)x=e.clientX-tip.offsetWidth-8;if(y+tip.offsetHeight>innerHeight-8)y=e.clientY-tip.offsetHeight-8;tip.style.left=x+'px';tip.style.top=y+'px';});document.addEventListener('mouseout',function(e){if(e.target.closest('[data-tip]'))tip.style.display='none';});})();
</script>
