<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idleon Sailing Calculator</title>
<style>
:root {
  --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f3460; --accent:#e94560;
  --text:#eee; --text1:#eee; --text2:#c0c0d4; --gold:#ffd700; --green:#4caf50;
  --blue:#2196f3; --purple:#bb86fc; --cyan:#4dd0e1; --red:#f44; --orange:#ffa060; --border:#425071;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
h1 { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; background:var(--bg2); border-bottom:2px solid var(--accent); font-size:1.35em; }
h1 span { color:var(--accent); }
h1 a { color:var(--text2); font-size:.62em; text-decoration:none; }
.main { max-width:1500px; margin:0 auto; padding:14px; }
.section { background:var(--bg2); border-radius:8px; padding:14px; margin-bottom:14px; }
.section h2 { margin-bottom:10px; color:var(--accent); font-size:1.08em; border-bottom:1px solid #34405f; padding-bottom:6px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:8px; }
.card { background:var(--bg3); border:1px solid #425071; border-radius:6px; padding:9px 11px; min-height:78px; }
.card-title { color:var(--cyan); font-size:.74em; font-weight:700; }
.card-val { color:var(--gold); font-size:1.35em; font-weight:700; margin:3px 0; font-variant-numeric:tabular-nums; }
.card-sub { color:var(--text2); font-size:.68em; }
.controls { display:flex; flex-wrap:wrap; gap:8px 14px; align-items:flex-end; }
.control { display:flex; flex-direction:column; gap:3px; color:var(--text2); font-size:.72em; }
select,input { min-height:30px; border:1px solid #586482; border-radius:4px; background:#101b35; color:var(--text); padding:4px 7px; }
input[type=number] { width:108px; }
input[type=checkbox] { width:16px; min-height:16px; padding:0; accent-color:var(--accent); }
.check-control { display:flex; align-items:center; gap:7px; color:var(--text2); font-size:.78em; cursor:pointer; }
.segmented { display:flex; border:1px solid #586482; border-radius:4px; overflow:hidden; }
.segmented button,.tabs button { border:0; background:#101b35; color:var(--text2); padding:7px 11px; cursor:pointer; }
.segmented button + button { border-left:1px solid #586482; }
.segmented button.active,.tabs button.active { color:var(--cyan); background:rgba(77,208,225,.15); font-weight:700; }
.tabs { display:flex; flex-wrap:wrap; background:var(--bg2); border-bottom:1px solid #39435f; margin-bottom:12px; }
.tabs button { border-bottom:2px solid transparent; }
.tabs button.active { border-bottom-color:var(--accent); color:var(--accent); }
.table-wrap { overflow:auto; max-height:680px; }
.data-table { width:100%; border-collapse:collapse; font-size:.78em; white-space:nowrap; }
.data-table th { position:sticky; top:0; z-index:1; text-align:left; padding:6px; color:var(--text2); background:var(--bg2); border-bottom:1px solid #46516c; }
.data-table td { padding:5px 6px; border-bottom:1px solid rgba(255,255,255,.05); }
.data-table tr:hover td { background:rgba(255,255,255,.035); }
.data-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.ship-pair-first td:not(.ship-boat-cell) { border-bottom:0; padding-bottom:2px; }
.ship-pair-second td { padding-top:2px; border-bottom:2px solid rgba(255,255,255,.11); }
.ship-boat-cell { vertical-align:middle; color:var(--cyan); font-weight:700; border-right:1px solid rgba(255,255,255,.09); border-bottom:2px solid rgba(255,255,255,.11) !important; }
.ship-group-alt td { background:rgba(255,255,255,.018); }
.ship-group-alt:hover td { background:rgba(255,255,255,.05); }
.best td { background:rgba(76,175,80,.07); }
.badge { display:inline-block; padding:1px 5px; border-radius:3px; font-size:.72em; font-weight:700; }
.badge-green { background:rgba(76,175,80,.2); color:var(--green); }
.badge-gold { background:rgba(255,215,0,.16); color:var(--gold); }
.badge-purple { background:rgba(187,134,252,.18); color:var(--purple); }
.badge-cyan { background:rgba(77,208,225,.16); color:var(--cyan); }
.bar { width:100px; height:7px; border-radius:4px; overflow:hidden; background:#313a52; display:inline-block; vertical-align:middle; }
.bar > i { display:block; height:100%; background:var(--cyan); }
.captain-bonus { display:grid; grid-template-columns:140px 100px 32px 62px; gap:6px; align-items:center; min-width:352px; }
.captain-bonus-name { overflow:hidden; text-overflow:ellipsis; }
.captain-bonus .bar { width:100%; }
.captain-bonus-quality { color:var(--text2); font-size:.76em; text-align:right; font-variant-numeric:tabular-nums; }
.captain-bonus-total { min-width:62px; text-align:right; justify-self:end; font-variant-numeric:tabular-nums; }
.payout-value { color:var(--gold); font-weight:700; }
.payout-detail { display:block; margin-top:1px; color:var(--text2); font-size:.78em; }
.replacement-matrix th + th,.replacement-matrix td + td { border-left:1px solid rgba(255,255,255,.09); }
.replacement-cell { min-width:62px; text-align:center !important; font-weight:700; }
.replacement-chance { margin-left:4px; color:var(--text2); font-size:.76em; font-weight:600; }
.replacement-next { color:var(--green); background:rgba(76,175,80,.08); }
.replacement-jump { color:var(--gold); background:rgba(255,215,0,.07); }
.replacement-never { color:var(--red); background:rgba(255,68,68,.07); }
.replacement-source-row,.boat-tier-source-row { cursor:pointer; }
.replacement-source-row:hover td,.boat-tier-source-row:hover td { background:rgba(77,208,225,.07); }
.replacement-source-row.expanded td,.boat-tier-source-row.expanded td { border-bottom-color:transparent; }
.boat-tier-detail-row td { background:#101b35; }
.boat-tier-detail-row:hover td { background:#101b35; }
.boat-tier-detail-row .boat-tier-payout-label { padding-left:20px; border-left:3px solid var(--cyan); color:var(--cyan); }
.boat-tier-detail-row .payout-value { font-size:1em; }
.boat-tier-per-payout-row td { background:rgba(77,208,225,.035); border-bottom:1px solid rgba(77,208,225,.16); }
.boat-tier-total-row td { background:rgba(255,215,0,.045); border-top:1px solid rgba(255,215,0,.22); }
.boat-tier-total-row .boat-tier-payout-label { border-left-color:var(--gold); color:var(--gold); }
.boat-tier-detail-last td { border-bottom:2px solid rgba(255,255,255,.14); }
.replacement-arrow { display:inline-block; width:14px; color:var(--text2); }
.replacement-detail-cell { padding:8px 10px 12px !important; background:#101b35 !important; border-bottom:2px solid rgba(255,255,255,.14) !important; }
.replacement-detail-wrap { border-left:3px solid var(--cyan); padding-left:10px; }
.replacement-detail-title { color:var(--cyan); font-weight:700; margin-bottom:7px; }
.replacement-detail-table { background:rgba(0,0,0,.12); }
.replacement-detail-table th,.replacement-detail-table td { position:static; background:transparent; }
.replacement-eligible { color:var(--green); font-weight:700; }
.replacement-ineligible { color:var(--text2); }
.sim-button { min-height:30px; border:1px solid #586482; border-radius:4px; background:var(--bg3); color:var(--text); padding:5px 12px; cursor:pointer; font-weight:700; }
.sim-button:hover { border-color:var(--cyan); color:var(--cyan); }
.sim-button:disabled { cursor:not-allowed; opacity:.45; }
.sim-button-danger { color:var(--red); }
.sim-progress { margin-top:12px; }
.sim-progress-track { height:18px; overflow:hidden; border:1px solid #46516c; border-radius:4px; background:#101b35; }
.sim-progress-fill { height:100%; width:0; background:var(--blue); transition:width .15s; }
.sim-progress-text { margin-top:4px; color:var(--text2); font-size:.75em; text-align:center; font-variant-numeric:tabular-nums; }
.split { display:grid; grid-template-columns:minmax(280px,1fr) minmax(420px,2fr); gap:12px; }
.callout { border-left:3px solid var(--gold); background:rgba(255,215,0,.07); padding:9px 11px; color:var(--text2); font-size:.76em; line-height:1.45; }
details { margin-top:8px; color:var(--text2); font-size:.74em; }
details > summary { cursor:pointer; color:var(--cyan); }
.formula-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:10px; }
.formula { background:#101b35; border:1px solid #3b4765; border-radius:5px; padding:9px; font-size:.72em; line-height:1.55; }
.formula strong { color:var(--cyan); }
.breakdown-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
.breakdown-panel { background:#101b35; border:1px solid #3b4765; border-radius:6px; padding:10px; min-width:0; }
.breakdown-panel h3 { color:var(--cyan); font-size:.92em; margin-bottom:8px; }
.bt-controls { margin-bottom:8px; display:flex; gap:6px; }
.bt-controls .btn-sm { padding:4px 10px; background:var(--bg3); color:var(--text2); border:1px solid var(--border); border-radius:4px; cursor:pointer; font-size:.8em; }
.bt-controls .btn-sm:hover { color:var(--cyan); border-color:var(--cyan); }
.bt-tree { font-size:.78em; }
.bt-row { display:flex; align-items:center; gap:6px; padding:3px 4px; border-bottom:1px solid rgba(255,255,255,.04); min-height:26px; cursor:pointer; }
.bt-row:hover { background:rgba(255,255,255,.07); }
.bt-children { background:rgba(0,0,0,.12); border-left:2px solid rgba(255,255,255,.08); }
.bt-root { font-weight:700; font-size:1.05em; padding-top:6px; padding-bottom:6px; border-bottom:2px solid #444; }
.bt-arrow { cursor:pointer; color:var(--text2); width:14px; text-align:center; user-select:none; flex-shrink:0; }
.bt-arrow:hover { color:var(--cyan); }
.bt-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bt-val { font-weight:600; text-align:right; flex-shrink:0; white-space:nowrap; margin-left:auto; font-variant-numeric:tabular-nums; }
.bt-tag { font-size:.7em; opacity:.7; margin-left:4px; }
.bt-tag.auto { color:var(--accent); }
.bt-tag.manual { color:var(--orange); }
.bt-tooltip { position:fixed; background:#10182d; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:8px 12px; font-size:.82em; max-width:350px; pointer-events:none; z-index:10000; display:none; }
#js-tip { display:none; position:fixed; z-index:9999; max-width:390px; padding:8px 11px; background:#10182d; border:1px solid var(--gold); border-radius:5px; color:var(--text); font-size:.72em; line-height:1.45; white-space:pre-line; pointer-events:none; box-shadow:0 4px 18px #000a; }
.empty { padding:30px; color:var(--text2); text-align:center; }
@media(max-width:850px) { .split,.breakdown-grid { grid-template-columns:1fr; } .main { padding:8px; } h1 { font-size:1.05em; } .captain-bonus { grid-template-columns:132px 84px 32px 58px; min-width:324px; } }
</style>
</head>
<body>
<h1><a href="index.html">Home</a><div>&#9973; <span>Idleon</span> Sailing Calculator</div><a href="https://github.com/Corgan/idleon-research-optimizer">GitHub</a></h1>
<div id="save-area"></div>
<div class="main" id="main-content"><div class="empty">Load a save to calculate sailing routes.</div></div>
<div id="js-tip"></div>
<div class="bt-tooltip" id="bt-tooltip"></div>

<script type="module">
import { saveData } from './js/state.js';
import { initSaveLoader } from './js/ui/save-loader.js';
import { renderBreakdownTree } from './js/ui/dash-breakdowns.js';
import { _bNode } from './js/stats/node-helpers.js';
import {
  CHEST_ARTIFACT_MULTIS,
  CHEST_LOOT_MULTIS,
  CHEST_TIER_NAMES,
  allArtifactsMaxed,
  availableIslandCount,
  boatUpgradeCost,
  boatUpgradeEta,
  boatTargetIsland,
  captainBonus,
  captainLevelTime,
  captainRollQuality,
  chestLootRolls,
  chestReplacementOutcome,
  chestReplacementThreshold,
  chestTierDistribution,
  collectionWindowStats,
  fleetChestPayoutBreakdown,
  islandArtifactOdds,
  maxChestSlots,
  optimizeCaptainAssignment,
  overflowUpgradeChance,
  recommendMinimumTier,
  routeMetrics,
  sailingCurrencyMeta,
  unendingLootSearch,
} from './js/stats/systems/w5/sailing-chests.js';
import {
  captainBonusName,
  islandArtifactCount,
  islandArtifactOffset,
  islandDistance,
} from './js/stats/data/w5/sailing.js';

var rawServerVars = {};
var activeTab = 'fleet';
var goal = 'treasure';
var activeCharIdx = 0;
var selectedBoat = 0;
var selectedIsland = 0;
var minimumTier = 0;
var collectHours = 8;
var sortLevelsByEta = false;
var fleetAssignmentMode = 'optimized';
var fleetCache = new Map();
var simHours = 8;
var simIsland = 0;
var simTrials = 5000;
var simRunning = false;
var simProgress = { done:0, total:0 };
var simResult = null;
var simError = '';
var simWorker = null;

initSaveLoader({
  target:'#save-area',
  auth:true,
  onLoad:function(_state, raw) {
    cancelSailingSimulation(false);
    simResult=null;
    simError='';
    simProgress={done:0,total:0};
    rawServerVars = raw && raw.serverVars ? raw.serverVars : {};
    minimumTier = Math.max(0, Math.min(5, Number(saveData.olaData?.[127]) || 0));
    selectedIsland = Math.max(0, boatTargetIsland(0, saveData));
    simIsland = selectedIsland;
    goal = allArtifactsMaxed(saveData) ? 'treasure' : 'artifact';
    fleetCache.clear();
    render();
  }
});

function esc(s) { return String(s).replace(/[&<>"']/g, function(c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function attr(s) { return esc(s).replace(/\n/g, '&#10;'); }
function fmt(n) {
  n = Number(n) || 0; var a = Math.abs(n);
  if (a >= 1e21) return n.toExponential(2);
  if (a >= 1e18) return (n/1e18).toFixed(2)+'Qi';
  if (a >= 1e15) return (n/1e15).toFixed(2)+'Q';
  if (a >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (a >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (a >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (a >= 1e3) return (n/1e3).toFixed(1)+'K';
  if (a >= 1) return n.toLocaleString(undefined,{maximumFractionDigits:2});
  return a > 0 ? n.toPrecision(3) : '0';
}
function pct(v, digits) { return (100*(Number(v)||0)).toFixed(digits == null ? 2 : digits)+'%'; }
function chance(v) { v=Number(v)||0; if(v<=0)return '—'; if(v>=1)return '100%'; if(v>=.001)return pct(v,3); return '1 in '+fmt(1/v); }
function time(sec) { if(!isFinite(sec))return '—'; if(sec<60)return sec.toFixed(0)+'s'; if(sec<3600)return (sec/60).toFixed(1)+'m'; return (sec/3600).toFixed(2)+'h'; }
function card(title,value,sub) { return '<div class="card"><div class="card-title">'+title+'</div><div class="card-val">'+value+'</div><div class="card-sub">'+sub+'</div></div>'; }
function boatCount() { return Math.min(saveData.boatsData?.length || 0, 1 + (Number(saveData.sailingData?.[2]?.[1]) || 0)); }
function captainCount() { return Math.min(saveData.captainsData?.length || 0, 1 + (Number(saveData.sailingData?.[2]?.[0]) || 0)); }
function islandCount() { return availableIslandCount(saveData); }
function options(extra) { return Object.assign({ activeCharIdx:activeCharIdx, minimumTier:minimumTier,
  serverVars:rawServerVars }, extra || {}); }
function route(boat,island,captain) { return routeMetrics(boat,island,saveData,options({captainIdx:captain})); }
function optimizedFleet(island,mode) {
  var key=[island,mode,activeCharIdx,minimumTier].join(':');
  if(!fleetCache.has(key))fleetCache.set(key,optimizeCaptainAssignment(island,mode,saveData,options()));
  return fleetCache.get(key);
}
function savedFleet(island) {
  var fleet=[];
  for(var boat=0;boat<boatCount();boat++){
    var captainIdx=Math.round(Number(saveData.boatsData?.[boat]?.[0]));
    if(captainIdx>=0&&captainIdx<captainCount())fleet.push(route(boat,island,captainIdx));
  }
  return fleet;
}
function activeFleet(island,mode) {
  return fleetAssignmentMode==='saved'?savedFleet(island):optimizedFleet(island,mode);
}
function fleetTotal(rows,key){return rows.reduce(function(sum,row){return sum+(Number(row[key])||0);},0);}
function captainCode(idx) {
  var value=Math.max(0,Math.floor(Number(idx)||0))+1,code='';
  while(value>0){value--;code=String.fromCharCode(65+value%26)+code;value=Math.floor(value/26);}
  return code;
}
function captainLabel(idx) {
  var c=saveData.captainsData?.[idx]; if(!c)return 'No captain';
  var parts=[]; for(var s=0;s<2;s++){var t=Number(c[1+s]); if(t>=0)parts.push(captainBonusName(t)+' +'+fmt(captainBonus(idx,t,saveData))+'%');}
  return 'Captain '+captainCode(idx)+' · Lv'+fmt(c[3])+(parts.length?' · '+parts.join(' / '):'');
}
function islandLabel(i) { return 'Island '+(i+1)+' · '+fmt(islandDistance(i))+' dist'; }
function metric(r) { return goal==='artifact'?r.artifactFindsPerHour:goal==='chests'?r.keptChestsPerHour:r.treasurePerHour; }
function bestIsland(boat,captain) {
  var best=null; for(var i=0;i<islandCount();i++){var r=route(boat,i,captain); if(!best||metric(r)>metric(best))best=r;} return best;
}
function render() {
  var fleet=activeFleet(selectedIsland,goal);
  var totalChest=fleet.reduce(function(a,r){return a+r.generatedChestsPerHour;},0);
  var totalKept=fleet.reduce(function(a,r){return a+r.keptChestsPerHour;},0);
  var totalLoot=fleet.reduce(function(a,r){return a+r.treasurePerHour;},0);
  var totalArtifact=fleet.reduce(function(a,r){return a+r.artifactFindsPerHour;},0);
  var capacity=maxChestSlots(saveData,activeCharIdx);
  var pile=collectionWindowStats(fleet,capacity,saveData.sailChestsData?.length||0,saveData,activeCharIdx);
  var rec=aggregateMinTier(fleet,collectHours,pile.targetCount,pile.current);
  var minimum=fleet[0]?.timing.minimumBreakdown||{};
  var minimumTip='Minimum trip formula\n120m / (1 + total % / 100) - Training minutes\n\nSiege Breaker family: +'+fmt(minimum.family)+'%\nShiny breeding pets: +'+fmt(minimum.shiny)+'%\nDavey Jones Returns: +'+fmt(minimum.legend)+'%\nCombined percent: +'+fmt(minimum.totalPercent)+'%\nAfter percent reduction: '+fmt(minimum.beforeGem)+'m\nDavey Jones Training: '+fmt(minimum.gemPurchases)+' purchases × 4m = -'+fmt(minimum.gemMinutes)+'m\nRounded result: '+fmt(minimum.minutes)+'m\nHard floor: '+fmt(minimum.floor)+'m';
  var html='<div class="section"><div class="controls">'+controls()+'</div></div>';
  html+='<div class="section"><div class="card-grid">';
  html+=card('Fleet assignment',fleetAssignmentMode==='optimized'?'Optimized':'Current save',fmt(fleet.length)+' active boat/captain pairings');
  html+=card('Generated chests/hr',fmt(totalChest),fmt(totalKept)+' kept at tier '+minimumTier+'+');
  html+=card('Direct treasure/hr',fmt(totalLoot),'Generated kept tiers · near-full upgrades excluded');
  html+=card('Artifact finds/hr',fmt(totalArtifact),'Expected successful chest opens');
  html+=card('Ideal collection',isFinite(pile.hoursToFill)?time(pile.hoursToFill*3600):'—',fmt(pile.current)+' / '+fmt(pile.targetCount)+' target slots');
  html+=card('Window recommendation','Tier '+rec.tier+'+',fmt(rec.kept)+' kept in '+collectHours+'h');
  html+=card('Minimum trip',fmt(fleet[0]?.timing.minimumMinutes || 0)+'m','<span data-tip="'+attr(minimumTip)+'">+'+fmt(minimum.totalPercent)+'% combined · Training -'+fmt(minimum.gemMinutes)+'m</span>');
  html+=card('Unending Loot Search',fmt(unendingLootSearch(saveData,activeCharIdx))+'%','Boat Value included · pile processing excluded');
  html+='</div></div>';
  html+='<div class="tabs">'+tabButton('fleet','Fleet Assignment')+tabButton('levels','Ship Levels')+tabButton('captains','Captains')+tabButton('odds','Chest Odds')+tabButton('simulation','Fleet Simulation')+tabButton('artifacts','Artifacts')+tabButton('formula','Breakdowns')+'</div>';
  html+='<div id="tab-body">'+(activeTab==='fleet'?renderFleet(fleet):activeTab==='levels'?renderLevels(fleet):activeTab==='captains'?renderCaptains(fleet):activeTab==='odds'?renderOdds(fleet,capacity,rec):activeTab==='simulation'?renderSimulationTab():activeTab==='artifacts'?renderArtifacts(fleet):renderFormula(fleet))+'</div>';
  document.getElementById('main-content').innerHTML=html;
  if(activeTab==='formula')renderBreakdownTrees(fleet);
  if(activeTab==='simulation'&&simRunning)updateSimulationProgress();
}

function controls() {
  var chars=Math.max(saveData.charNames?.length||0,saveData.lv0AllData?.length||0); var h='';
  h+='<div class="control">Fleet assignment<div class="segmented"><button data-fleet-assignment="optimized" class="'+(fleetAssignmentMode==='optimized'?'active':'')+'">Optimized</button><button data-fleet-assignment="saved" class="'+(fleetAssignmentMode==='saved'?'active':'')+'">Current save</button></div></div>';
  h+='<label class="control">Login context<select data-set="char">'; for(var i=0;i<chars;i++)h+='<option value="'+i+'"'+(i===activeCharIdx?' selected':'')+'>'+esc(saveData.charNames?.[i]||('Character '+(i+1)))+'</option>'; h+='</select></label>';
  h+='<label class="control">Fleet destination<select data-set="island">';for(var island=0;island<islandCount();island++)h+='<option value="'+island+'"'+(island===selectedIsland?' selected':'')+'>'+islandLabel(island)+'</option>';h+='</select></label>';
  h+='<label class="control">Minimum chest<select data-set="minTier">'; for(var t=0;t<5;t++)h+='<option value="'+t+'"'+(t===minimumTier?' selected':'')+'>'+CHEST_TIER_NAMES[t]+'+</option>'; h+='</select></label>';
  h+='<label class="control">Collection window<input type="number" min="0.25" step="0.25" value="'+collectHours+'" data-set="hours"></label>';

function renderLevels() {
  var groups=[];
  for(var boat=0;boat<boatCount();boat++){
    var boatRows=[];
    ['loot','speed'].forEach(function(stat){
      var upgrade=boatUpgradeCost(boat,stat,saveData);
      var currency=sailingCurrencyMeta(upgrade.type);
      var targetIsland=Math.max(0,currency.islandIdx);
      var targetAvailable=targetIsland<islandCount();
      var targetFleet=targetAvailable?activeFleet(targetIsland,'treasure'):[];
      boatRows.push(Object.assign(boatUpgradeEta(boat,stat,targetFleet,saveData),{
        targetIsland:targetIsland,
        targetAvailable:targetAvailable,
      }));
    });
    groups.push({boatIdx:boat,rows:boatRows,lowestEta:Math.min.apply(null,boatRows.map(levelEtaValue))});
  }
  if(sortLevelsByEta)groups.sort(function(a,b){return a.lowestEta-b.lowestEta||a.boatIdx-b.boatIdx;});
  var rows=groups.reduce(function(all,group){return all.concat(group.rows);},[]);
  var ready=rows.filter(function(row){return row.remaining<=0;}).length;
  var fastest=rows.reduce(function(best,row){return row.hours<best.hours?row:best;},{hours:Infinity});
  var fastestText=isFinite(fastest.hours)?'Boat '+(fastest.boatIdx+1)+' '+fastest.stat:'No current resource income';
  var h='<div class="section"><h2>Next Ship Levels</h2><div class="card-grid">';
  h+=card('Upgrades ready',fmt(ready),fmt(rows.length)+' loot and speed upgrades checked');
  h+=card('Fastest next level',isFinite(fastest.hours)?(fastest.hours<=0?'Ready':time(fastest.hours*3600)):'&mdash;',fastestText);
  h+=card('ETA assignment',fleetAssignmentMode==='optimized'?'Optimized captains':'Current save captains','Each fleet targets the required resource island');
  h+='</div><div class="controls" style="margin-top:10px"><label class="check-control"><input type="checkbox" data-set="sortEta"'+(sortLevelsByEta?' checked':'')+'>Sort boats by lowest ETA</label></div>';
  h+='<div class="table-wrap" style="margin-top:8px"><table class="data-table"><thead><tr><th>Boat</th><th>Upgrade</th><th class="num">Level</th><th>Resource</th><th>Target route</th><th class="num">Cost</th><th class="num">Balance</th><th class="num">Needed</th><th class="num">Fleet/hr</th><th class="num">ETA</th></tr></thead><tbody>';
  groups.forEach(function(group,groupIdx){
    group.rows.forEach(function(row,rowIdx){
      var isFastest=isFinite(fastest.hours)&&row.hours===fastest.hours;
      var status=row.remaining<=0?'<span class="badge badge-green">ready</span>':isFinite(row.hours)?time(row.hours*3600):'&mdash;';
      var target=row.targetAvailable?islandLabel(row.targetIsland):'<span class="badge badge-red">locked</span>';
      var rowClass=(rowIdx===0?'ship-pair-first':'ship-pair-second')+(groupIdx%2?' ship-group-alt':'')+(isFastest?' best':'');
      h+='<tr class="'+rowClass+'">';
      if(rowIdx===0)h+='<td class="ship-boat-cell" rowspan="2">Boat '+(group.boatIdx+1)+'</td>';
      h+='<td>'+(row.stat==='loot'?'Loot value':'Speed')+'</td><td class="num">'+fmt(row.level)+' &rarr; '+fmt(row.level+1)+'</td><td>'+esc(row.currency.name)+'</td><td>'+target+'</td><td class="num">'+fmt(row.cost)+'</td><td class="num">'+fmt(row.balance)+'</td><td class="num">'+fmt(row.remaining)+'</td><td class="num">'+fmt(row.rate)+'</td><td class="num">'+status+'</td></tr>';
    });
  });
  h+='</tbody></table></div><div class="callout" style="margin-top:10px">Each ETA assumes the entire fleet targets the island that provides that upgrade resource, using '+(fleetAssignmentMode==='optimized'?'captains optimized for <strong>direct loot value</strong>':'the <strong>current save\'s captain-to-boat pairings</strong>')+'. Gold Bars use Island 1 because they can drop everywhere and the shortest route maximizes chest generation. Stateful near-full pile gains are excluded.</div></div>';
  return h;
}

function levelEtaValue(row){return row.remaining<=0?0:row.hours;}

function aggregateMinTier(fleet,hours,capacity){var generated=fleet.reduce(function(a,r){return a+r.generatedChestsPerHour;},0);for(var min=0;min<6;min++){var kept=0;fleet.forEach(function(r){var d=chestTierDistribution(r.captainIdx,saveData);var p=0;for(var t=min;t<6;t++)p+=d.tiers[t].probability;kept+=r.generatedChestsPerHour*p*hours;});if(kept<=capacity)return {tier:min,kept:kept,generated:generated*hours,capacity:capacity};}return {tier:5,kept:0,generated:generated*hours,capacity:capacity};}
function aggregateFleetTiers(fleet){
  var generated=fleetTotal(fleet,'generatedChestsPerHour');
  var rows=[];
  for(var tier=0;tier<6;tier++){
    var exactPerHour=0;
    var cumulativePerHour=0;
    var template=null;
    fleet.forEach(function(routeRow){
      var distribution=routeRow.rarity||chestTierDistribution(routeRow.captainIdx,saveData);
      var tierRow=distribution.tiers[tier];
      template=template||tierRow;
      exactPerHour+=routeRow.generatedChestsPerHour*tierRow.probability;
      cumulativePerHour+=routeRow.generatedChestsPerHour*tierRow.cumulative;
    });
    rows.push(Object.assign({},template||{tier:tier,name:CHEST_TIER_NAMES[tier],lootMultiplier:0,artifactMultiplier:0},{
      probability:generated>0?exactPerHour/generated:0,
      cumulative:generated>0?cumulativePerHour/generated:0,
      expectedPerHour:exactPerHour,
    }));
  }
  return {generated:generated,tiers:rows};
}

function compactMatrixChance(value){
  value=Number(value)||0;
  if(value>=.1)return pct(value,1);
  if(value>=.01)return pct(value,2);
  if(value>=.0001)return pct(value,3);
  return value>0?'1/'+fmt(Math.round(1/value)):'0%';
}

function replacementMatrixCell(route,strongest,targetTier){
  var outcome=chestReplacementOutcome(route,strongest,targetTier,saveData,activeCharIdx);
  var threshold=outcome.threshold;
  var required=threshold.requiredTier;
  var gap=required<0?Infinity:required-targetTier;
  var lines=[
    'Boat '+(route.boatIdx+1)+' / Captain '+captainCode(route.captainIdx),
    'Base Boat Value: '+fmt(route.loot.value)+' per payout at Tier 0',
    '',
    'Reference: Boat '+(strongest.boatIdx+1)+' / Captain '+captainCode(strongest.captainIdx)+' '+CHEST_TIER_NAMES[targetTier],
    'Reference value: '+fmt(threshold.referenceValue)+' per payout',
    '',
    'Same-tier ULS path:',
    'Exact '+CHEST_TIER_NAMES[targetTier]+' drop chance: '+pct(outcome.exactSameTierChance,3),
    'Conditional ULS chance: '+(threshold.sameTierEligible?pct(outcome.ulsChance,3):'Not value-eligible'),
    'Compounded: '+pct(outcome.exactSameTierChance,3)+' × '+pct(outcome.ulsChance,3)+' = '+pct(outcome.sameTierUpgradeChance,3),
    '',
    'Natural higher-tier path:'
  ];
  if(required>=0){
    lines.push('Minimum natural replacement: '+CHEST_TIER_NAMES[required]);
    lines.push('Incoming value: '+fmt(threshold.replacementValue)+' per payout');
    lines.push('Value margin: +'+pct(threshold.margin,1));
    lines.push(CHEST_TIER_NAMES[required]+'+ drop chance: '+pct(outcome.naturalReplacementChance,3));
    lines.push('Replacement is deterministic if this target is reached.');
  }else{
    lines.push('Natural replacement: Never');
    lines.push('Maximum Tier 5 value: '+fmt(threshold.maxValue)+' per payout');
    lines.push('Value shortfall: '+pct(threshold.shortfall,1));
  }
  lines.push('');
  lines.push('Total direct change chance: '+pct(outcome.totalChance,3));
  lines.push('Same-tier compounded + natural higher-tier.');
  lines.push('Direct change rate: '+fmt(outcome.totalRatePerHour)+'/hr');
  if(!outcome.active)lines.push('Unending Loot Search is inactive, so near-full processing does not run.');
  lines.push('');
  lines.push('Exact threshold; hypothetical strongest-source chest.');
  lines.push('Chance assumes this banked target is reached in the scan.');
  lines.push('Earlier pile entries and future evolution are not simulated.');
  lines.push('Banked chests do not store their source boat or captain.');
  var cls='replacement-cell '+(outcome.totalChance<=0?'replacement-never':required<0||gap===1?'replacement-next':'replacement-jump');
  var path=required>=0?'T'+required+'+':outcome.sameTierUpgradeChance>0?'ULS':'';
  var content=compactMatrixChance(outcome.totalChance)+(path?' <span class="replacement-chance">'+path+'</span>':'');
  return '<td class="'+cls+'" data-tip="'+attr(lines.join('\n'))+'">'+content+'</td>';
}

function sameTierComparisonCell(incoming,banked,tier){
  var outcome=chestReplacementOutcome(incoming,banked,tier,saveData,activeCharIdx);
  var threshold=outcome.threshold;
  var incomingValue=incoming.loot.value*CHEST_LOOT_MULTIS[tier];
  var bankedValue=banked.loot.value*CHEST_LOOT_MULTIS[tier];
  var lines=[
    'Incoming: Boat '+(incoming.boatIdx+1)+' / Captain '+captainCode(incoming.captainIdx)+' '+CHEST_TIER_NAMES[tier],
    'Incoming value: '+fmt(incomingValue)+' per payout',
    'Banked: Boat '+(banked.boatIdx+1)+' / Captain '+captainCode(banked.captainIdx)+' '+CHEST_TIER_NAMES[tier],
    'Banked value: '+fmt(bankedValue)+' per payout',
    'Value comparison: '+(threshold.sameTierEligible?'eligible ('+pct(incomingValue/bankedValue-1,1)+' margin)':'not eligible ('+pct(1-incomingValue/bankedValue,1)+' short)'),
    '',
    'Exact '+CHEST_TIER_NAMES[tier]+' drop chance: '+pct(outcome.exactSameTierChance,3),
    'Conditional ULS chance: '+(threshold.sameTierEligible?pct(outcome.ulsChance,3):'Not value-eligible'),
    'Compounded: '+pct(outcome.exactSameTierChance,3)+' × '+pct(outcome.ulsChance,3)+' = '+pct(outcome.sameTierUpgradeChance,3),
    '',
    'This cell excludes deterministic higher-tier replacements.',
    'An earlier eligible same-tier match stops the scan even if its roll fails.'
  ];
  return '<td class="num '+(outcome.sameTierUpgradeChance>0?'replacement-eligible':'replacement-ineligible')+'" data-tip="'+attr(lines.join('\n'))+'">'+(outcome.sameTierUpgradeChance>0?compactMatrixChance(outcome.sameTierUpgradeChance):'—')+'</td>';
}

function naturalReplacementComparisonCell(incoming,banked){

  var required=threshold.requiredTier;
  var lines=[
    'Incoming: Boat '+(incoming.boatIdx+1)+' / Captain '+captainCode(incoming.captainIdx),
    'Banked reference: Boat '+(banked.boatIdx+1)+' / Captain '+captainCode(banked.captainIdx)+' Tier 1',
    'Banked value: '+fmt(threshold.referenceValue)+' per payout'
  ];
  if(required>=0){
    lines.push('Minimum natural replacement: '+CHEST_TIER_NAMES[required]);
    lines.push('Incoming value: '+fmt(threshold.replacementValue)+' per payout');
    lines.push('Value margin: +'+pct(threshold.margin,1));
    lines.push(CHEST_TIER_NAMES[required]+'+ drop chance: '+pct(outcome.naturalReplacementChance,3));
    lines.push('Qualifying rate: '+fmt(incoming.generatedChestsPerHour*outcome.naturalReplacementChance)+'/hr');
  }else{

  for(var targetTier=0;targetTier<5;targetTier++)h+='<th class="num" data-tip="Per incoming chest if this banked target is reached: exact same-tier drop chance × conditional ULS chance + qualifying higher-tier chance">Strongest T'+targetTier+'</th>';
  h+='</tr></thead><tbody>';
  rows.forEach(function(route){
    h+='<tr class="replacement-source-row '+(route===strongest?'best':'')+'" data-replacement-boat="'+route.boatIdx+'" aria-expanded="false" role="button" tabindex="0"><td><span class="replacement-arrow">&#9656;</span>Boat '+(route.boatIdx+1)+'</td><td data-tip="'+attr(captainLabel(route.captainIdx))+'">'+captainCode(route.captainIdx)+'</td><td class="num">'+fmt(route.loot.value)+'</td><td class="num">'+pct(route.loot.value/strongest.loot.value,1)+'</td>';

  h+='</tbody></table></div></div>';
  return h;

function renderBoatTierPayoutRows(routeRow,primaryCurrency,rareCurrency){
  var shares=routeRow.treasureShares||{gold:1,primary:0,rare:0};
  var perPayoutValues=[];
  var tierValues=[];
  for(var tier=0;tier<6;tier++){
    perPayoutValues[tier]=routeRow.loot.value*CHEST_LOOT_MULTIS[tier];
    tierValues[tier]=perPayoutValues[tier]*chestLootRolls(tier,saveData);
  }
  var rows=[
    {name:'Value per payout',values:perPayoutValues,perPayout:true},
    {name:'Gold Bars',values:tierValues.map(function(value){return value*shares.gold;})},
    {name:primaryCurrency.name,values:tierValues.map(function(value){return value*shares.primary;})},
    {name:rareCurrency.name,values:tierValues.map(function(value){return value*shares.rare;})},
    {name:'Total value',values:tierValues,total:true},
  ];

function artifactDetail(r){var weighted={};r.tiers.forEach(function(t){if(!t.kept)return;var odds=islandArtifactOdds(r.islandIdx,t.artifactMultiplier,saveData,{serverVars:rawServerVars});odds.artifacts.forEach(function(a){if(!weighted[a.artifactIdx])weighted[a.artifactIdx]=Object.assign({},a,{chance:0});weighted[a.artifactIdx].chance+=t.probability*a.exactChance;});});var list=Object.values(weighted);if(!list.length)return '<div class="empty">No artifacts on this island.</div>';var h='<table class="data-table"><thead><tr><th>Artifact</th><th class="num">Current tier</th><th class="num">Next odds</th><th class="num">Per generated chest</th><th>Status</th></tr></thead><tbody>';list.forEach(function(a){h+='<tr><td>'+esc(a.name)+'</td><td class="num">'+a.currentTier+'</td><td class="num">'+(isFinite(a.denominator)?'1 in '+fmt(a.denominator):'—')+'</td><td class="num">'+chance(a.chance)+'</td><td>'+(a.currentTier>=6?'<span class="badge badge-green">max</span>':a.unlocked?'available':'locked')+'</td></tr>';});return h+'</tbody></table>';}

  var selected=fleet.find(function(routeRow){return routeRow.boatIdx===selectedBoat;});

  return selected;
}

  var assignmentText=fleetAssignmentMode==='optimized'?'optimized '+esc(goal):'current save';
  var h='<div class="section"><h2>Fleet Pile Simulation</h2><div class="controls">';
  h+='<div class="control">Interval presets<div class="segmented">'+simPreset(8)+simPreset(12)+simPreset(24)+simPreset(48)+'</div></div>';
  h+='<label class="control">Hours<input type="number" min="0.25" max="168" step="0.25" value="'+simHours+'" data-set="simHours"'+simDisabled()+'></label>';
  h+='<label class="control">Destination<select data-set="simIsland"'+simDisabled()+'>';for(var island=0;island<islandCount();island++)h+='<option value="'+island+'"'+(island===simIsland?' selected':'')+'>'+islandLabel(island)+'</option>';h+='</select></label>';
  h+='<label class="control">Trials<input type="number" min="100" max="100000" step="100" value="'+simTrials+'" data-set="simTrials"'+simDisabled()+'></label>';
  h+='<button class="sim-button" data-sim-run'+(simRunning?' disabled':'')+'>'+(simRunning?'Running…':'Run simulation')+'</button>';
  h+='<button class="sim-button sim-button-danger" data-sim-cancel'+(simRunning?'':' disabled')+'>Cancel</button>';
  h+='</div><div class="callout" style="margin-top:10px">Runs in a dedicated module worker with fresh RNG on every run. Every trial starts with an empty pile and all boats freshly departed, so the first chest from each boat arrives after one full trip. All active pairings target the selected island and use the <strong>'+assignmentText+' assignment</strong>. The global Tier '+minimumTier+'+ filter applies only before the pile reaches its near-full target, matching game order.</div>';
  if(simRunning){h+='<div class="sim-progress"><div class="sim-progress-track"><div class="sim-progress-fill" id="sim-progress-fill"></div></div><div class="sim-progress-text" id="sim-progress-text"></div></div>';}
  if(simError)h+='<div class="callout" style="border-left-color:var(--red);margin-top:10px;color:var(--red)">'+esc(simError)+'</div>';
  h+='</div>';
  if(simResult)h+=renderSimulationResults(simResult);
  else if(!simRunning&&!simError)h+='<div class="section"><div class="empty">Choose an interval and run the worker simulation.</div></div>';
  return h;
}

function simSummaryLine(summary){return 'P10 '+fmt(summary.p10)+' · P50 '+fmt(summary.median)+' · P90 '+fmt(summary.p90);}

function renderSimulationResults(result){
  var events=result.events;
  var meta=result.meta||{};
  var h='<div class="section"><h2>Simulation Results</h2><div class="card-grid">';
  h+=card('Average final pile',result.pile.count.mean.toFixed(2)+' chests',fmt(result.config.targetCount)+' near-full target');
  h+=card('Final opened value',fmt(result.pile.value.mean),simSummaryLine(result.pile.value));
  h+=card('Average / banked chest',fmt(result.pile.averageValuePerChest),'Total opened value ÷ average chest count');
  h+=card('Retained vs active',pct(result.retainedFraction,1),'Final pile value ÷ collect-everything value');
  h+=card('Generated',fmt(events.generated),fmt(events.accepted)+' accepted before near-full');
  h+=card('Pile improvements',fmt(events.upgrades)+' upgrades',fmt(events.replacements)+' higher-tier replacements');
  h+=card('Discarded / blocked',fmt(events.filterDiscards+events.overflowDiscards+events.blocked),fmt(events.filterDiscards)+' filter · '+fmt(events.overflowDiscards)+' overflow · '+fmt(events.blocked)+' full');
  h+=card('Run context',result.config.hours+'h · '+result.config.trials.toLocaleString()+' trials','Island '+((meta.islandIdx??simIsland)+1)+' · '+esc(meta.assignmentMode==='saved'?'current save':(meta.goal||goal)+' optimized')+' assignment · empty/fresh start');
  h+='</div><div class="callout" style="margin-top:10px">Final pile values include all guaranteed payouts. Currency results simulate each payout independently. P10/P50/P90 describe the spread across trials, not confidence intervals around the mean. Active collection is a comparison baseline that opens every generated chest immediately and therefore has no capacity loss.</div></div>';
  h+=renderSimulationCurrencyTable(result);
  h+=renderSimulationTierTable(result);
  h+=renderSimulationSlotTable(result);
  return h;
}

function renderSimulationCurrencyTable(result){
  var labels={gold:'Gold Bars',primary:'Primary treasure (chest island)',rare:'Rare treasure (chest island)'};
  var h='<div class="section"><h2>Currency Outcome Distribution</h2><div class="table-wrap"><table class="data-table"><thead><tr><th>Currency</th><th class="num">Mean value</th><th class="num">P10</th><th class="num">P50</th><th class="num">P90</th><th class="num">Avg payouts</th></tr></thead><tbody>';
  ['gold','primary','rare'].forEach(function(key){var row=result.currencies[key];h+='<tr><td>'+labels[key]+'</td><td class="num">'+fmt(row.value.mean)+'</td><td class="num">'+fmt(row.value.p10)+'</td><td class="num">'+fmt(row.value.median)+'</td><td class="num">'+fmt(row.value.p90)+'</td><td class="num">'+row.payouts.mean.toFixed(2)+'</td></tr>';});
  return h+'</tbody></table></div></div>';
}

function renderSimulationTierTable(result){
  var total=result.pile.count.mean;
  var h='<div class="section"><h2>Final Pile Tier Composition</h2><div class="table-wrap"><table class="data-table"><thead><tr><th>Tier</th><th class="num">Average count</th><th class="num">Pile share</th><th class="num">Average value / payout</th><th class="num">Average opened value / chest</th><th class="num">Opened value contribution</th></tr></thead><tbody>';
  result.tiers.forEach(function(row){h+='<tr><td><span class="badge '+(row.tier>=4?'badge-purple':row.tier>=2?'badge-gold':'badge-cyan')+'">'+CHEST_TIER_NAMES[row.tier]+'</span></td><td class="num">'+row.averageCount.toFixed(3)+'</td><td class="num">'+pct(total>0?row.averageCount/total:0,1)+'</td><td class="num">'+fmt(row.averageValuePerPayout)+'</td><td class="num">'+fmt(row.averageOpenedValue)+'</td><td class="num">'+fmt(row.openedValueContribution)+'</td></tr>';});
  return h+'</tbody></table></div></div>';
}

function renderSimulationSlotTable(result){
  var h='<div class="section"><h2>Average Banked Chest by Pile Position</h2><div class="table-wrap"><table class="data-table"><thead><tr><th>Position</th><th class="num">Occupied</th><th class="num">Average tier</th><th>Most likely tier</th><th class="num">Value / payout</th><th class="num">Payouts</th><th class="num">Opened value</th><th class="num">Artifact x</th><th class="num">Gold</th><th class="num">Primary</th><th class="num">Rare</th></tr></thead><tbody>';
  result.slots.forEach(function(slot){if(slot.occupancy<=0)return;h+='<tr><td>#'+(slot.index+1)+'</td><td class="num">'+pct(slot.occupancy,1)+'</td><td class="num">'+slot.averageTier.toFixed(2)+'</td><td>'+(slot.mostLikelyTier>=0?CHEST_TIER_NAMES[slot.mostLikelyTier]:'—')+'</td><td class="num">'+fmt(slot.averageValuePerPayout)+'</td><td class="num">'+slot.averagePayouts.toFixed(2)+'</td><td class="num">'+fmt(slot.averageOpenedValue)+'</td><td class="num">'+fmt(slot.averageArtifactMultiplier)+'x</td><td class="num">'+fmt(slot.averageCurrencyValue.gold)+'</td><td class="num">'+fmt(slot.averageCurrencyValue.primary)+'</td><td class="num">'+fmt(slot.averageCurrencyValue.rare)+'</td></tr>';});
  return h+'</tbody></table></div><div class="callout" style="margin-top:10px">Position is game array order: #1 is the next chest opened and the first banked chest scanned by incoming near-full chests. Averages are conditional on occupancy except the currency columns, which are expected contribution per trial.</div></div>';
}

function buildSailingSimulationConfig(){
  var fleet=activeFleet(simIsland,goal);
  var capacity=maxChestSlots(saveData,activeCharIdx);
  return {routes:fleet.map(function(routeRow){return {boatIdx:routeRow.boatIdx,captainIdx:routeRow.captainIdx,tripsPerHour:routeRow.generatedChestsPerHour,lootValue:routeRow.loot.value,artifactMultiplier:routeRow.artifactBase.value,islandIdx:simIsland,tierProbabilities:routeRow.rarity.tiers.map(function(tier){return tier.probability;})};}),hours:simHours,trials:simTrials,capacity:capacity,minimumTier:minimumTier,unendingTalent:unendingLootSearch(saveData,activeCharIdx),lootMultipliers:CHEST_LOOT_MULTIS.slice(),artifactMultipliers:CHEST_ARTIFACT_MULTIS.slice(),upgradeChances:CHEST_TIER_NAMES.map(function(_name,tier){return overflowUpgradeChance(tier,saveData,activeCharIdx);}),payoutsByTier:CHEST_TIER_NAMES.map(function(_name,tier){return chestLootRolls(tier,saveData);}),currencyShares:fleet[0]?.treasureShares||{gold:1,primary:0,rare:0},progressBatch:Math.max(10,Math.round(simTrials/100))};
}

function syncSimulationControls(){
  var hours=document.querySelector('[data-set="simHours"]');if(hours)simHours=Math.max(.25,Math.min(168,Number(hours.value)||8));
  var island=document.querySelector('[data-set="simIsland"]');if(island)simIsland=Math.max(0,Math.min(islandCount()-1,Number(island.value)||0));
  var trials=document.querySelector('[data-set="simTrials"]');if(trials)simTrials=Math.max(100,Math.min(100000,Math.round(Number(trials.value)||5000)));
}

function startSailingSimulation(){
  if(simRunning)return;
  syncSimulationControls();
  var config=buildSailingSimulationConfig();
  if(!config.routes.length){simError='No unlocked boats are available for simulation.';render();return;}
  simRunning=true;simResult=null;simError='';simProgress={done:0,total:simTrials};
  var meta={islandIdx:simIsland,goal:goal,assignmentMode:fleetAssignmentMode,minimumTier:minimumTier};
  var worker;
  try{worker=new Worker('./js/workers/sailing-sim-worker.js',{type:'module'});}
  catch(error){simRunning=false;simError='Unable to start simulation worker: '+(error?.message||String(error));render();return;}
  simWorker=worker;
  worker.onmessage=function(event){
    if(worker!==simWorker)return;
    var message=event.data||{};
    if(message.type==='progress'){simProgress={done:message.done,total:message.total};updateSimulationProgress();return;}
    if(message.type==='done'){worker.terminate();simWorker=null;simRunning=false;simProgress={done:simTrials,total:simTrials};simResult=message.result;simResult.meta=meta;if(activeTab==='simulation')render();return;}
    if(message.type==='error'){worker.terminate();simWorker=null;simRunning=false;simError=message.message||'Simulation failed.';if(activeTab==='simulation')render();}
  };
  worker.onerror=function(event){if(worker!==simWorker)return;worker.terminate();simWorker=null;simRunning=false;simError=event.message||'Simulation worker failed.';if(activeTab==='simulation')render();};
  render();
  worker.postMessage({type:'run',config:config});
}

function cancelSailingSimulation(shouldRender){
  if(simWorker){simWorker.terminate();simWorker=null;}
  var wasRunning=simRunning;
  simRunning=false;
  if(wasRunning)simError='Simulation cancelled.';
  if(shouldRender!==false&&activeTab==='simulation')render();
}

function updateSimulationProgress(){
  var total=Math.max(1,simProgress.total||simTrials);
  var percent=Math.max(0,Math.min(100,100*(simProgress.done||0)/total));
  var bar=document.getElementById('sim-progress-fill');if(bar)bar.style.width=percent.toFixed(1)+'%';
  var text=document.getElementById('sim-progress-text');if(text)text.textContent=(simProgress.done||0).toLocaleString()+' / '+total.toLocaleString()+' trials · '+percent.toFixed(1)+'%';
}

function toggleReplacementRow(row){
  if(!row)return;
  var boatIdx=row.dataset.replacementBoat;
  var detail=document.querySelector('[data-replacement-detail="'+boatIdx+'"]');
  if(!detail)return;
  var open=detail.hidden;
  document.querySelectorAll('.replacement-detail-row').forEach(function(other){other.hidden=true;});
  document.querySelectorAll('.replacement-source-row').forEach(function(other){other.classList.remove('expanded');other.setAttribute('aria-expanded','false');var arrow=other.querySelector('.replacement-arrow');if(arrow)arrow.innerHTML='&#9656;';});
  if(open){detail.hidden=false;row.classList.add('expanded');row.setAttribute('aria-expanded','true');var arrow=row.querySelector('.replacement-arrow');if(arrow)arrow.innerHTML='&#9662;';}
}

function toggleBoatTierRow(row){
  if(!row)return;
  var boatIdx=row.dataset.boatTierValues;
  var details=document.querySelectorAll('[data-boat-tier-detail="'+boatIdx+'"]');
  if(!details.length)return;
  var open=details[0].hidden;
  document.querySelectorAll('.boat-tier-detail-row').forEach(function(other){other.hidden=true;});
  document.querySelectorAll('.boat-tier-source-row').forEach(function(other){other.classList.remove('expanded');other.setAttribute('aria-expanded','false');var arrow=other.querySelector('.replacement-arrow');if(arrow)arrow.innerHTML='&#9656;';});
  if(open){details.forEach(function(detail){detail.hidden=false;});row.classList.add('expanded');row.setAttribute('aria-expanded','true');var arrow=row.querySelector('.replacement-arrow');if(arrow)arrow.innerHTML='&#9662;';}
}

document.addEventListener('click',function(e){var assignment=e.target.closest('[data-fleet-assignment]');if(assignment){if(simRunning)cancelSailingSimulation(false);fleetAssignmentMode=assignment.dataset.fleetAssignment;simResult=null;simError='';render();return;}var boatTierRow=e.target.closest('[data-boat-tier-values]');if(boatTierRow){toggleBoatTierRow(boatTierRow);return;}var replacementRow=e.target.closest('[data-replacement-boat]');if(replacementRow){toggleReplacementRow(replacementRow);return;}var simRun=e.target.closest('[data-sim-run]');if(simRun){startSailingSimulation();return;}var simCancel=e.target.closest('[data-sim-cancel]');if(simCancel){cancelSailingSimulation(true);return;}var preset=e.target.closest('[data-sim-hours]');if(preset){simHours=Number(preset.dataset.simHours);simResult=null;simError='';render();return;}var tab=e.target.closest('[data-tab]');if(tab){activeTab=tab.dataset.tab;render();return;}var gb=e.target.closest('[data-goal]');if(gb){if(simRunning)cancelSailingSimulation(false);goal=gb.dataset.goal;simResult=null;simError='';render();}});
document.addEventListener('keydown',function(e){var boatTierRow=e.target.closest('[data-boat-tier-values]');if(boatTierRow&&(e.key==='Enter'||e.key===' ')){e.preventDefault();toggleBoatTierRow(boatTierRow);return;}var row=e.target.closest('[data-replacement-boat]');if(!row)return;if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleReplacementRow(row);}});
document.addEventListener('change',function(e){var key=e.target.dataset.set;if(key==='char'){if(simRunning)cancelSailingSimulation(false);activeCharIdx=Number(e.target.value);simResult=null;}else if(key==='minTier'){if(simRunning)cancelSailingSimulation(false);minimumTier=Number(e.target.value);simResult=null;}else if(key==='hours')collectHours=Math.max(.25,Number(e.target.value)||.25);else if(key==='sortEta')sortLevelsByEta=e.target.checked;else if(key==='boat'||key==='breakdownBoat')selectedBoat=Number(e.target.value);else if(key==='island')selectedIsland=Number(e.target.value);else if(key==='simHours'){simHours=Math.max(.25,Math.min(168,Number(e.target.value)||8));simResult=null;}else if(key==='simIsland'){simIsland=Number(e.target.value);simResult=null;}else if(key==='simTrials'){simTrials=Math.max(100,Math.min(100000,Math.round(Number(e.target.value)||5000)));simResult=null;}else if(e.target.dataset.override)overrides[e.target.dataset.override]=Number(e.target.value)||0;else return;simError='';render();});
(function(){var tip=document.getElementById('js-tip');document.addEventListener('mouseover',function(e){var el=e.target.closest('[data-tip]');if(!el){tip.style.display='none';return;}tip.textContent=el.getAttribute('data-tip');tip.style.display='block';});document.addEventListener('mousemove',function(e){if(tip.style.display!=='block')return;var x=e.clientX+12,y=e.clientY+12;if(x+tip.offsetWidth>innerWidth-8)x=e.clientX-tip.offsetWidth-8;if(y+tip.offsetHeight>innerHeight-8)y=e.clientY-tip.offsetHeight-8;tip.style.left=x+'px';tip.style.top=y+'px';});document.addEventListener('mouseout',function(e){if(e.target.closest('[data-tip]'))tip.style.display='none';});})();
</script>
</body>
</html>
