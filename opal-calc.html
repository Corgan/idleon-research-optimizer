<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idleon Opal Optimizer</title>
<link rel="stylesheet" href="css/breakdown.css">
<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --accent: #e94560; --text: #eee; --text2: #c0c0d4;
  --gold: #ffd700; --green: #4caf50; --blue: #2196f3;
  --purple: #bb86fc; --cyan: #4dd0e1; --red: #f44;
  --yellow: #ffe066; --orange: #ff9800;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1 { text-align: center; padding: 12px; background: var(--bg2); border-bottom: 2px solid var(--accent); font-size: 1.4em; }
h1 span { color: var(--accent); }

.main { max-width: 1200px; margin: 0 auto; padding: 16px; }
.section { background: var(--bg2); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h2 { margin-bottom: 12px; color: var(--accent); font-size: 1.15em; border-bottom: 1px solid #333; padding-bottom: 6px; }

/* Tabs */
.tabs { display: flex; background: var(--bg2); border-bottom: 1px solid #333; flex-wrap: wrap; }
.tab { padding: 10px 20px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all .2s; font-weight: 600; font-size: .9em; }
.tab:hover { color: var(--text); background: rgba(255,255,255,.05); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Card grid */
.card-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
.card { background: var(--bg3); border-radius: 8px; padding: 10px 12px; border: 1px solid #444; transition: border-color .2s; }
.card.highlight { border-color: var(--gold); box-shadow: 0 0 8px rgba(255,215,0,.15); }
.card .card-title { font-weight: 700; font-size: .85em; color: var(--cyan); margin-bottom: 4px; }
.card .card-val { font-weight: 700; font-size: 1.3em; color: var(--gold); }
.card .card-sub { color: var(--text2); font-size: .75em; margin-top: 2px; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: .82em; }
.data-table th { text-align: left; padding: 6px 8px; color: var(--text2); border-bottom: 1px solid #333; font-weight: 600; position: sticky; top: 0; background: var(--bg2); }
.data-table td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,.04); }
.data-table tr:hover td { background: rgba(255,255,255,.03); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .pos { color: var(--green); }
.data-table .neg { color: var(--red); }

/* Badges */
.badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: .72em; font-weight: 700; }
.badge-green { background: rgba(76,175,80,.2); color: var(--green); }
.badge-gold { background: rgba(255,215,0,.15); color: var(--gold); }

/* Input controls */
.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.controls label { font-weight: 600; font-size: .85em; color: var(--text2); }
.controls select, .controls input[type="number"] {
  padding: 5px 8px; border-radius: 4px; border: 1px solid #444;
  background: var(--bg3); color: var(--text); font-size: .85em;
}
.controls button {
  padding: 6px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: .85em;
}
.controls button:hover { filter: brightness(1.2); }

/* Sim inputs */
.sim-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
.sim-cell { display: flex; flex-direction: column; gap: 2px; background: var(--bg3); border-radius: 6px; padding: 8px; border: 1px solid #444; }
.sim-cell label { font-size: .75em; color: var(--cyan); font-weight: 600; }
.sim-cell input { width: 100%; padding: 4px 6px; border-radius: 3px; border: 1px solid #555; background: #111; color: var(--text); font-size: .9em; text-align: center; }

/* Result highlight */
.result-box { background: var(--bg3); border: 1px solid var(--green); border-radius: 8px; padding: 14px; margin: 12px 0; }
.result-box .big { font-size: 1.4em; font-weight: 700; color: var(--gold); }
.result-box .sub { color: var(--text2); font-size: .82em; margin-top: 4px; }

.n { color: var(--gold); font-weight: 600; }
</style>
</head>
<body>

<h1 style="display:flex;align-items:baseline;"><a href="index.html" style="font-size:.55em;font-weight:400;color:var(--text2);text-decoration:none;margin-right:12px;" title="Home">Home</a><span style="flex:1;">&#x1F48E; <span>Idleon</span> Opal Optimizer</span></h1>

<div id="save-area"></div>

<div class="tabs" id="main-tabs">
  <div class="tab active" data-tab="current">Current State</div>
  <div class="tab" data-tab="optimizer">Optimizer</div>
  <div class="tab" data-tab="simulator">Manual Simulator</div>
</div>

<div class="main" id="main-content">
  <div style="color:var(--text2);text-align:center;padding:60px 0;">Load a save to begin.</div>
</div>

<div class="bt-tooltip" id="bt-tooltip"></div>

<script type="module">
'use strict';

import { saveData } from './js/state.js';
import { initSaveLoader } from './js/ui/save-loader.js';
import { fmtVal } from './js/renderers/format.js';
import { getLOG } from './js/formulas.js';
import { computeMonumentROGbonus, computeCosmoBonus } from './js/stats/systems/w5/hole.js';
import { computeWinBonus } from './js/stats/systems/w6/summoning.js';
import { vaultUpgBonus } from './js/stats/systems/common/vault.js';
import { bonTOT, upgLvs, marbleLvs } from './js/stats/systems/w5/fountain.js';
import { cardLv } from './js/stats/systems/common/cards.js';
import { arcadeBonus } from './js/stats/systems/w2/arcade.js';
import { arcaneUpgBonus } from './js/stats/systems/mc/tesseract.js';
import { computeCompassBonus } from './js/stats/systems/w7/compass.js';
import { legendPTSbonus } from './js/stats/systems/w7/spelunking.js';
import { pristineBon } from './js/stats/systems/w5/pristine.js';
import { companions } from './js/stats/systems/common/companions.js';
import { collectibleBonus } from './js/stats/systems/w5/jar.js';
import { computeExoticBonus } from './js/stats/systems/w6/farming.js';
import { eventShopOwned } from './js/game-helpers.js';
import { GrimoireUpg, Spelunky, StatueInfo, ZenithMarket } from './js/stats/data/game/customlists.js';
import { grimoireUpgBonus } from './js/stats/systems/mc/grimoire.js';
import { holesMeasBase, holesMeasType } from './js/stats/data/w5/hole.js';
import { maxTalentBonus } from './js/stats/systems/common/talent.js';
import { renderBreakdownTree } from './js/ui/dash-breakdowns.js';
import { _bNode } from './js/stats/node-helpers.js';
import { computeMeritocBonusz } from './js/stats/systems/w7/meritoc.js';
import { artifactBase } from './js/stats/data/w5/sailing.js';
import { equipSetBonus } from './js/stats/data/common/equipment.js';

// ========== FORMAT HELPERS ==========
function fmtNum(n) {
  if (n === 0) return '0';
  if (n === Math.floor(n) && Math.abs(n) < 1e3) return String(n);
  return fmtVal(n);
}
function fmtPct(n) { return (n * 100).toFixed(2) + '%'; }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== CONSTANTS ==========
var MAX_VILLAGERS = 5; // Currently 5 villagers in game

// ========== DATA ACCESS HELPERS ==========
function _h(sd, i) { return sd.holesData[i] || []; }

function getVillagerLevel(v) { return Number(_h(saveData, 1)[v]) || 0; }
function getVillagerOpals(v) { return Number(_h(saveData, 3)[v]) || 0; }
function getVillagerStars(v) { return Number(_h(saveData, 23)[v]) || 0; }
function getCosmoLevel(tier, idx) { return Number(_h(saveData, 4 + tier)[idx]) || 0; }

function getUnlockedCount() {
  var count = 0;
  for (var v = 0; v < MAX_VILLAGERS; v++) {
    if (getVillagerLevel(v) >= 1) count++;
  }
  return count;
}

function _cosmoBonus(tier, idx) {
  return computeCosmoBonus(tier, idx, saveData);
}

function getCosSchBlt() {
  var arr = _h(saveData, 13);
  var count = 0;
  for (var i = 0; i < arr.length; i++) {
    if (Number(arr[i]) === 1) count++;
  }
  return count;
}

// Bell bonus: Holes[17][idx] × perLv (private in fountain.js, reimplemented here)
var _BELL_PERLV = [10, 0.5, 10, 0.3, 0.5, 2.0, 0.2];
function bellBonus(idx) {
  var lv = Number(_h(saveData, 17)[idx]) || 0;
  return lv * (_BELL_PERLV[idx] || 0);
}

// Measurement bonus (reimplemented from fountain.js private _measBonus)
function measBonus(idx) {
  var measLv = Number(_h(saveData, 22)[idx]) || 0;
  if (measLv <= 0) return 0;
  var cosmo13 = _cosmoBonus(1, 3);
  var baseStr = String(holesMeasBase(idx) || '0');
  var isTOT = baseStr.includes('TOT');
  var baseNum = parseFloat(baseStr) || 0;
  var measBase;
  if (isTOT) {
    measBase = (1 + cosmo13 / 100) * (baseNum * measLv / (100 + measLv));
  } else {
    measBase = (1 + cosmo13 / 100) * baseNum * measLv;
  }
  return measBase * _measMulti(holesMeasType(idx));
}

function _measMulti(typeIdx) {
  var qty = 0;
  switch (typeIdx) {
    case 0: { var raw = Number(_h(saveData, 11)[28]) || 0; qty = raw > 0 ? getLOG(raw) : 0; break; }
    case 7: { var hi = Number((saveData.tasksGlobalData && saveData.tasksGlobalData[0] && saveData.tasksGlobalData[0][1] || [])[0]) || 0; qty = hi > 0 ? getLOG(hi) / 2 : 0; break; }
    default: qty = 0;
  }
  if (qty < 5) return 1 + 18 * qty / 100;
  return 1 + (18 * qty + 8 * (qty - 5)) / 100;
}

// B_UPG helper: checks if brass building at index is built, returns value
function _bUpg(idx, val) {
  return (Number(_h(saveData, 13)[idx]) || 0) >= 1 ? val : 0;
}

// B_UPG(48, 0) = 10 * Holes[11][26]
function _bUpg48() {
  return 10 * (Number(_h(saveData, 11)[26]) || 0);
}

// HoleozDxp(t): special multiplier per villager
function holeozDxp(t) {
  if (t === 0) {
    var cavernsOwned = Math.min(18, getVillagerLevel(0));
    if (cavernsOwned < 13) {
      return Math.pow(1.5, Number(saveData.olaData && saveData.olaData[355]) || 0);
    }
  }
  if (t === 2) {
    var uLvs = upgLvs(saveData);
    var mLvs = marbleLvs(saveData);
    return 1 + bonTOT(uLvs, mLvs, 0, 14) / 100;
  }
  return 1;
}

// ========== STATUE 28/29 (direct, avoids complex dependency chain) ==========
function _statueBonusGiven(idx) {
  var statueLv = Number(saveData.statueData && saveData.statueData[idx]) || 0;
  if (statueLv <= 0) return 0;
  var basePerLv = Number(StatueInfo[idx] && StatueInfo[idx][3]) || 0;
  var val = statueLv * basePerLv;

  // Gold G2: ×max(1 + (100 + ArtifactBonus(30))/100, 1)
  var statueG = Number(saveData.statueGData && saveData.statueGData[idx]) || 0;
  if (statueG >= 2) {
    var art30rarity = Number(saveData.sailingData && saveData.sailingData[3] && saveData.sailingData[3][30]) || 0;
    var art30val = art30rarity > 0 ? artifactBase(30) * art30rarity : 0;
    val *= Math.max(1, 1 + (100 + art30val) / 100);
  }
  // Gold G3: ×max(1 + (50 + ZenithMarketBonus(0))/100, 1)
  if (statueG >= 3) {
    var zmPerLv = Number(ZenithMarket && ZenithMarket[0] && ZenithMarket[0][4]) || 0;
    var zmLv = Number(saveData.spelunkData && saveData.spelunkData[45] && saveData.spelunkData[45][0]) || 0;
    val *= Math.max(1, 1 + (50 + Math.floor(zmPerLv * zmLv)) / 100);
  }
  // Vault 25 only for idx 0,1,2,6
  if (idx === 0 || idx === 1 || idx === 2 || idx === 6) {
    val *= Math.max(1, 1 + _safe(function() { return vaultUpgBonus(25, saveData); }) / 100);
  }
  // Statue 29 boosts all others: ×max(1 + statue29/100, 1)
  if (idx !== 29) {
    val *= Math.max(1, 1 + _statueBonusGiven(29) / 100);
  }
  // EventShopOwned(19): ×(1 + 0.3 × evShop19)
  var evStr = saveData.cachedEventShopStr || '';
  var evShop19 = _safe(function() { return eventShopOwned(19, evStr); });
  val *= (1 + 0.3 * evShop19);
  // Talent 56 max across all chars: ×max(1 + talent56/100, 1)
  var talent56 = _safe(function() { return maxTalentBonus(56, -1, saveData); });
  val *= Math.max(1, 1 + talent56 / 100);
  // MeritocBonusz(26): ×(1 + meritoc26/100)
  var meritoc26 = _safe(function() { return computeMeritocBonusz(26, saveData); });
  val *= (1 + meritoc26 / 100);
  return val;
}

// ========== LORE EPISODE BONUS (idx=1) ==========
function _loreEpiBon(idx) {
  // Requires unlocked episodes > idx
  var episodes = Number(saveData.spelunkData && saveData.spelunkData[13] && saveData.spelunkData[13][2]) || 0;
  if (episodes <= idx) return 0;
  var tomeScore = saveData.totalTomePoints || 0;
  var dataStr = String(Spelunky && Spelunky[21] && Spelunky[21][idx] || '0|0');
  var parts = dataStr.split('|');
  var baseVal = Number(parts[0]) || 0;
  var threshold = Number(parts[1]) || 0;
  var x = Math.floor(Math.max(0, tomeScore - threshold) / 100);
  if (x <= 0) return 0;
  var decay = Math.pow(x, 0.7) / (25 + Math.pow(x, 0.7));
  // Grimoire 17 + Troll Set multiplier
  var grim17 = _safe(function() { return grimoireUpgBonus(17, GrimoireUpg, saveData); });
  var olaStr = String(saveData.olaData && saveData.olaData[379] || '');
  var trollSet = olaStr.includes('TROLL_SET') ? equipSetBonus('TROLL_SET') : 0;
  var multi = 1 + (grim17 + trollSet) / 100;
  return multi * baseVal * Math.max(0, decay);
}

// ========== BUILD EXTERNAL BONUSES (full formula) ==========
function buildExt() {
  var unlocked = [];
  var numUnlocked = getUnlockedCount();
  for (var v = 0; v < MAX_VILLAGERS; v++) {
    unlocked.push(getVillagerLevel(v) >= 1);
  }

  var starMul = [];
  for (var v = 0; v < MAX_VILLAGERS; v++) {
    starMul.push(1 + getVillagerStars(v));
  }

  // Cosmo bonuses
  var cosmoBonus_1_0 = _cosmoBonus(1, 0); // Opal Enthusiasm: 30 per lv
  var cosmoBonus_1_5 = _cosmoBonus(1, 5); // Equal Spread: 2 per lv
  var cosmoBonus_1_1 = _cosmoBonus(1, 1); // Contented Creator: 1 per lv
  var cosmoBonus_1_2 = _cosmoBonus(1, 2); // Cosmo Enhance: 10 per lv
  var cosSchBlt = getCosSchBlt();

  // === MULTIPLICATIVE CHAIN (constant, doesn't change with opals) ===
  var compass59 = _safe(function() { return computeCompassBonus(59, saveData); });
  var legend12 = _safe(function() { return legendPTSbonus(12, saveData); });
  var pristine21 = _safe(function() { return pristineBon(21, saveData); });
  var comp13 = _safe(function() { return companions(13, saveData); });
  var statue28 = _safe(function() { return _statueBonusGiven(28); });
  var legend29 = _safe(function() { return legendPTSbonus(29, saveData); });
  var jarIndices = [4, 10, 12, 22, 29, 35];
  var jarSum = 0;
  jarIndices.forEach(function(ji) {
    jarSum += _safe(function() { return collectibleBonus(saveData, ji, legend29); });
  });
  var evStr = saveData.cachedEventShopStr || '';
  var evShop6 = _safe(function() { return eventShopOwned(6, evStr); });
  var loreEpi1 = _safe(function() { return _loreEpiBon(1); });
  var bundleU = Number(saveData.bundlesData && saveData.bundlesData.bun_u) || 0;

  var multiChain = Math.max(1,
    (1 + compass59 / 100)
    * (1 + legend12 / 100)
    * (1 + pristine21 / 100)
    * (1 + 2 * comp13)
    * (1 + statue28 / 100)
    * (1 + jarSum / 100)
    * (1 + 25 * evShop6 / 100)
    * (1 + loreEpi1 / 100)
    * (1 + 50 * bundleU / 100)
  );

  // Additional per-villager multipliers (constant)
  var exotic51 = _safe(function() { return computeExoticBonus(51, saveData); });
  var arcade38 = _safe(function() { return arcadeBonus(38, saveData); });
  var grimoire29 = _safe(function() { return grimoireUpgBonus(29, GrimoireUpg, saveData); });
  var arcane32 = _safe(function() { return arcaneUpgBonus(32, saveData); });

  // (100 + B_UPG(0, 25)) — B_UPG(0,25) = 25 if building 0 is built
  var basePlusUpg = 100 + _bUpg(0, 25);

  // Full constant multiplier (excludes opal-dependent and per-villager terms)
  var baseMulti = basePlusUpg * multiChain
    * (1 + exotic51 / 100)
    * (1 + arcade38 / 100)
    * (1 + grimoire29 / 100)
    * (1 + arcane32 / 100);

  // === ADDITIVE PERCENT (constant part, excludes opal enthusiasm) ===
  var monExt = {};
  try {
    var uLvs = upgLvs(saveData);
    var mLvs = marbleLvs(saveData);
    monExt.fountMonument = [
      bonTOT(uLvs, mLvs, 0, 13),
      bonTOT(uLvs, mLvs, 1, 13),
      bonTOT(uLvs, mLvs, 2, 13),
    ];
  } catch(e) { monExt.fountMonument = [0, 0, 0]; }

  var mon03 = _safe(function() { return computeMonumentROGbonus(0, 3, saveData, monExt); });
  var mon13 = _safe(function() { return computeMonumentROGbonus(1, 3, saveData, monExt); });
  var mon23 = _safe(function() { return computeMonumentROGbonus(2, 3, saveData, monExt); });
  var meas7 = measBonus(7);
  var meas0 = measBonus(0);
  var bUpg48 = _bUpg48();
  var cardCaveB = _safe(function() { return Math.min(4 * cardLv('caveB', saveData), 50); });
  var bell1_0 = bellBonus(1);
  var summWin21 = _safe(function() { return computeWinBonus(21, null, saveData); });
  var vaultUpg73 = _safe(function() { return vaultUpgBonus(73, saveData); });

  var additiveBase = mon03 + mon13 + mon23 + meas7
    + cosmoBonus_1_1 * cosSchBlt
    + cosmoBonus_1_2
    + bUpg48
    + cardCaveB
    + bell1_0
    + meas0
    + summWin21
    + vaultUpg73;

  // HoleozDxp per villager
  var holeozArr = [];
  for (var v = 0; v < MAX_VILLAGERS; v++) {
    holeozArr.push(Math.max(1, holeozDxp(v)));
  }

  return {
    unlocked: unlocked,
    numUnlocked: numUnlocked,
    starMul: starMul,
    cosmoBonus_1_0: cosmoBonus_1_0,
    cosmoBonus_1_5: cosmoBonus_1_5,
    additiveBase: additiveBase,
    baseMulti: baseMulti,
    holeozArr: holeozArr,
    // Breakdown for display
    _breakdown: {
      basePlusUpg: basePlusUpg,
      multiChain: multiChain,
      exotic51: exotic51, arcade38: arcade38, grimoire29: grimoire29, arcane32: arcane32,
      mon03: mon03, mon13: mon13, mon23: mon23,
      meas7: meas7, meas0: meas0, bUpg48: bUpg48, cardCaveB: cardCaveB,
      bell1_0: bell1_0, summWin21: summWin21, vaultUpg73: vaultUpg73,
      cosmoBonus_1_1: cosmoBonus_1_1, cosSchBlt: cosSchBlt, cosmoBonus_1_2: cosmoBonus_1_2,
      compass59: compass59, legend12: legend12, pristine21: pristine21,
      comp13: comp13, statue28: statue28, jarSum: jarSum, evShop6: evShop6,
      loreEpi1: loreEpi1, bundleU: bundleU,
    },
  };
}

function _safe(fn) { try { return fn() || 0; } catch(e) { return 0; } }

// ========== EXP RATE FORMULA (full) ==========
function villagerExpRate(t, opals, ext) {
  var opalCount = opals[t];
  if (opalCount <= 0) return 0;

  // Min opals among unlocked villagers
  var minOpals = Infinity;
  for (var i = 0; i < opals.length; i++) {
    if (ext.unlocked[i] && opals[i] < minOpals) minOpals = opals[i];
  }
  if (!isFinite(minOpals)) minOpals = 0;

  var opalEnthusiasm = Math.floor(opalCount / 10) * ext.cosmoBonus_1_0;
  var equalSpread = ext.cosmoBonus_1_5 * Math.floor(minOpals / 5);
  var equalSpreadMul = 1 + equalSpread / 100;

  var addPct = ext.additiveBase + opalEnthusiasm;

  return ext.holeozArr[t] * ext.baseMulti * opalCount * ext.starMul[t]
    * equalSpreadMul * (1 + addPct / 100);
}

// Total EXP across all unlocked villagers
function totalExpRate(opals, ext) {
  var total = 0;
  for (var i = 0; i < opals.length; i++) {
    if (ext.unlocked[i]) total += villagerExpRate(i, opals, ext);
  }
  return total;
}

// ========== OPTIMIZER ==========
function optimizeForTarget(target, totalOpals, ext) {
  // Greedy: try allocating opals to maximize EXP for target villager
  // Strategy: balance between raising minimum (Equal Spread) and stacking on target
  var n = ext.numUnlocked;
  if (n <= 0) return new Array(MAX_VILLAGERS).fill(0);

  var best = null;
  var bestRate = -Infinity;

  // Try different "floor" levels for the minimum
  // Floor = opals per non-target villager (all equal), rest goes to target
  var maxFloor = Math.floor(totalOpals / n);

  for (var floor = 0; floor <= maxFloor; floor++) {
    var opals = new Array(MAX_VILLAGERS).fill(0);
    var spent = 0;
    for (var i = 0; i < MAX_VILLAGERS; i++) {
      if (ext.unlocked[i] && i !== target) {
        opals[i] = floor;
        spent += floor;
      }
    }
    // Give target at least floor (for Equal Spread min calculation)
    // Then give all remaining to target
    opals[target] = totalOpals - spent;
    if (opals[target] < 0) break;

    var rate = villagerExpRate(target, opals, ext);
    if (rate > bestRate) {
      bestRate = rate;
      best = opals.slice();
    }
  }

  return best || new Array(MAX_VILLAGERS).fill(0);
}

function optimizeTotal(totalOpals, ext) {
  // Optimize for maximum total EXP across all villagers
  // With Equal Spread, equal distribution often wins unless star levels differ
  var n = ext.numUnlocked;
  if (n <= 0) return new Array(MAX_VILLAGERS).fill(0);

  var best = null;
  var bestRate = -Infinity;

  // Strategy 1: Equal distribution
  var baseEach = Math.floor(totalOpals / n);
  var remainder = totalOpals - baseEach * n;
  var equalDist = new Array(MAX_VILLAGERS).fill(0);
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (ext.unlocked[i]) {
      equalDist[i] = baseEach + (remainder > 0 ? 1 : 0);
      if (remainder > 0) remainder--;
    }
  }
  var equalRate = totalExpRate(equalDist, ext);
  if (equalRate > bestRate) { bestRate = equalRate; best = equalDist; }

  // Strategy 2: Weight by star level
  var totalStars = 0;
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (ext.unlocked[i]) totalStars += ext.starMul[i];
  }
  if (totalStars > 0) {
    var weightedDist = new Array(MAX_VILLAGERS).fill(0);
    var assigned = 0;
    for (var i = 0; i < MAX_VILLAGERS; i++) {
      if (ext.unlocked[i]) {
        weightedDist[i] = Math.floor(totalOpals * ext.starMul[i] / totalStars);
        assigned += weightedDist[i];
      }
    }
    // Distribute remainder to highest star villagers
    var rem = totalOpals - assigned;
    var sorted = [];
    for (var i = 0; i < MAX_VILLAGERS; i++) {
      if (ext.unlocked[i]) sorted.push(i);
    }
    sorted.sort(function(a, b) { return ext.starMul[b] - ext.starMul[a]; });
    for (var j = 0; j < rem; j++) {
      weightedDist[sorted[j % sorted.length]]++;
    }
    var wRate = totalExpRate(weightedDist, ext);
    if (wRate > bestRate) { bestRate = wRate; best = weightedDist; }
  }

  return best || equalDist;
}

var ext = null;
var currentOpals = [];

function render() {
  ext = buildExt();
  currentOpals = [];
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    currentOpals.push(getVillagerOpals(i));
  }
  renderCurrentTab();
  renderOptimizerTab();
  renderSimulatorTab();
}

function renderCurrentTab() {
  var el = document.getElementById('tab-current');
  if (!el) return;

  var totalOpals = 0;
  for (var i = 0; i < MAX_VILLAGERS; i++) totalOpals += currentOpals[i];
  var minOpals = Infinity;
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (ext.unlocked[i] && currentOpals[i] < minOpals) minOpals = currentOpals[i];
  }
  if (!isFinite(minOpals)) minOpals = 0;

  var totalExp = totalExpRate(currentOpals, ext);

  var html = '<div class="section"><h2>Overview</h2>';
  html += '<div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:12px;">';
  html += '<div class="card"><div class="card-title">Unlocked</div><div class="card-val">' + ext.numUnlocked + '</div></div>';
  html += '<div class="card"><div class="card-title">Total Opals</div><div class="card-val">' + fmtNum(totalOpals) + '</div></div>';
  html += '<div class="card"><div class="card-title">Min Opals</div><div class="card-val">' + fmtNum(minOpals) + '</div></div>';
  html += '<div class="card"><div class="card-title">Equal Spread Bonus</div><div class="card-val">' + (ext.cosmoBonus_1_5 * Math.floor(minOpals / 5)) + '%</div><div class="card-sub">Cosmo Lv ' + getCosmoLevel(1, 5) + '</div></div>';
  html += '<div class="card"><div class="card-title">Opal Enthusiasm</div><div class="card-val">×' + ext.cosmoBonus_1_0 + '</div><div class="card-sub">per 10 opals, Cosmo Lv ' + getCosmoLevel(1, 0) + '</div></div>';
  html += '<div class="card highlight"><div class="card-title">Total EXP/hr</div><div class="card-val">' + fmtNum(totalExp) + '</div></div>';
  html += '</div></div>';

  html += '<div class="section"><h2>Villagers</h2>';
  html += '<table class="data-table"><thead><tr>';
  html += '<th>Villager</th><th class="num">Level</th><th class="num">Stars</th><th class="num">Opals</th><th class="num">EXP/hr</th><th class="num">% of Total</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (!ext.unlocked[i]) continue;
    var rate = villagerExpRate(i, currentOpals, ext);
    var pct = totalExp > 0 ? (rate / totalExp * 100).toFixed(1) : '0.0';
    html += '<tr>';
    html += '<td>Villager ' + i + '</td>';
    html += '<td class="num">' + getVillagerLevel(i) + '</td>';
    html += '<td class="num">★' + getVillagerStars(i) + '</td>';
    html += '<td class="num"><span class="n">' + fmtNum(currentOpals[i]) + '</span></td>';
    html += '<td class="num">' + fmtNum(rate) + '</td>';
    html += '<td class="num">' + pct + '%</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Breakdown tree
  html += '<div class="section"><h2>Formula Breakdown</h2><div id="breakdown-tree"></div></div>';

  el.innerHTML = html;

  // Build and render breakdown tree
  var b = ext._breakdown;
  var totalExp = totalExpRate(currentOpals, ext);
  var addTotal = ext.additiveBase;

  var multiChildren = [
    _bNode('Compass Bonus 59', b.compass59, null, { fmt: '%' }),
    _bNode('Legend PTS 12', b.legend12, null, { fmt: '%' }),
    _bNode('Pristine Charm 21', b.pristine21, null, { fmt: '%' }),
    _bNode('Companion 13', 1 + 2 * b.comp13, null, { fmt: 'x', note: 'flat 2× per companion' }),
    _bNode('Statue 28 (Villager EXP)', b.statue28, null, { fmt: '%', note: 'statueLv × 0.3 × gold × statue29 × talent56 × meritoc26' }),
    _bNode('Jar Collectibles', b.jarSum, null, { fmt: '%', note: 'indices 4, 10, 12, 22, 29, 35' }),
    _bNode('Event Shop 6', 25 * b.evShop6, null, { fmt: '%' }),
    _bNode('Lore Episode 1', b.loreEpi1, null, { fmt: '%', note: 'base × decay(tomeScore) × (1 + grim17 + trollSet)' }),
    _bNode('Bundle bun_u', 50 * b.bundleU, null, { fmt: '%' }),
  ];
  var multiNode = _bNode('Multiplicative Chain', b.multiChain, multiChildren, { fmt: 'x' });

  var outerMultiChildren = [
    _bNode('Base + B_UPG(0,25)', b.basePlusUpg, null, { fmt: 'raw', note: '100 + 25 if building 0 built' }),
    multiNode,
    _bNode('Exotic Bonus 51', 1 + b.exotic51 / 100, null, { fmt: 'x' }),
    _bNode('Arcade Bonus 38', 1 + b.arcade38 / 100, null, { fmt: 'x' }),
    _bNode('Grimoire 29', 1 + b.grimoire29 / 100, null, { fmt: 'x' }),
    _bNode('Arcane 32', 1 + b.arcane32 / 100, null, { fmt: 'x' }),
  ];
  var baseMultiNode = _bNode('Base Multiplier', ext.baseMulti, outerMultiChildren, { fmt: 'x' });

  var addChildren = [
    _bNode('Monument (0,3)', b.mon03, null, { fmt: '%' }),
    _bNode('Monument (1,3)', b.mon13, null, { fmt: '%' }),
    _bNode('Monument (2,3)', b.mon23, null, { fmt: '%' }),
    _bNode('Measurement 7', b.meas7, null, { fmt: '%' }),
    _bNode('Measurement 0', b.meas0, null, { fmt: '%' }),
    _bNode('Contented Creator', b.cosmoBonus_1_1 * b.cosSchBlt, null, { fmt: '%', note: 'cosmo(1,1)=' + b.cosmoBonus_1_1 + ' × schematics=' + b.cosSchBlt }),
    _bNode('Cosmo Enhance', b.cosmoBonus_1_2, null, { fmt: '%' }),
    _bNode('B_UPG(48)', b.bUpg48, null, { fmt: '%', note: '10 × Holes[11][26]' }),
    _bNode('Card caveB', b.cardCaveB, null, { fmt: '%', note: 'min(4 × cardLv, 50)' }),
    _bNode('Bell Bonus (1)', b.bell1_0, null, { fmt: '%' }),
    _bNode('Summoning Win 21', b.summWin21, null, { fmt: '%' }),
    _bNode('Vault Upgrade 73', b.vaultUpg73, null, { fmt: '%' }),
  ];
  var addNode = _bNode('Additive % (constant part)', 1 + addTotal / 100, addChildren, { fmt: 'x', note: '(1 + sum/100) — Opal Enthusiasm per villager adds to sum' });

  var rootChildren = [baseMultiNode, addNode];
  var root = _bNode('Total EXP/hr (all villagers)', totalExp, rootChildren, { fmt: 'raw' });
  renderBreakdownTree(root, document.getElementById('breakdown-tree'), { tooltipId: 'bt-tooltip' });
}

function renderOptimizerTab() {
  var el = document.getElementById('tab-optimizer');
  if (!el) return;

  var totalOpals = 0;
  for (var i = 0; i < MAX_VILLAGERS; i++) totalOpals += currentOpals[i];

  // Build target selector
  var html = '<div class="section"><h2>Optimize Opal Distribution</h2>';
  html += '<div class="controls">';
  html += '<label>Target: <select id="opt-target"><option value="-1">All Villagers (Total EXP)</option>';
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (ext.unlocked[i]) html += '<option value="' + i + '">Villager ' + i + ' (★' + getVillagerStars(i) + ')</option>';
  }
  html += '</select></label>';
  html += '<label>Total Opals: <input type="number" id="opt-total" value="' + totalOpals + '" min="0" style="width:80px;"></label>';
  html += '<button id="opt-run">Optimize</button>';
  html += '</div>';
  html += '<div id="opt-result"></div>';
  html += '</div>';
  el.innerHTML = html;

  document.getElementById('opt-run').addEventListener('click', runOptimizer);
}

function runOptimizer() {
  var target = Number(document.getElementById('opt-target').value);
  var totalOpals = Number(document.getElementById('opt-total').value) || 0;
  var resultEl = document.getElementById('opt-result');

  var optimized;
  if (target === -1) {
    optimized = optimizeTotal(totalOpals, ext);
  } else {
    optimized = optimizeForTarget(target, totalOpals, ext);
  }

  // Compare current vs optimized
  var currentRate, optRate;
  if (target === -1) {
    currentRate = totalExpRate(currentOpals, ext);
    optRate = totalExpRate(optimized, ext);
  } else {
    currentRate = villagerExpRate(target, currentOpals, ext);
    optRate = villagerExpRate(target, optimized, ext);
  }

  var improvement = currentRate > 0 ? ((optRate - currentRate) / currentRate) : 0;

  var html = '<div class="result-box">';
  html += '<div class="big">' + (improvement > 0 ? '+' : '') + (improvement * 100).toFixed(2) + '% improvement</div>';
  html += '<div class="sub">Current: ' + fmtNum(currentRate) + ' → Optimized: ' + fmtNum(optRate) + ' EXP/hr</div>';
  html += '</div>';

  // Distribution table
  html += '<table class="data-table"><thead><tr>';
  html += '<th>Villager</th><th class="num">Stars</th><th class="num">Current Opals</th><th class="num">Optimized</th><th class="num">Change</th><th class="num">Current EXP/hr</th><th class="num">Optimized EXP/hr</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (!ext.unlocked[i]) continue;
    var diff = optimized[i] - currentOpals[i];
    var cls = diff > 0 ? 'pos' : (diff < 0 ? 'neg' : '');
    var curExp = villagerExpRate(i, currentOpals, ext);
    var optExp = villagerExpRate(i, optimized, ext);
    html += '<tr' + (i === target ? ' style="background:rgba(255,215,0,.06);"' : '') + '>';
    html += '<td>Villager ' + i + (i === target ? ' <span class="badge badge-gold">TARGET</span>' : '') + '</td>';
    html += '<td class="num">★' + getVillagerStars(i) + '</td>';
    html += '<td class="num">' + fmtNum(currentOpals[i]) + '</td>';
    html += '<td class="num">' + fmtNum(optimized[i]) + '</td>';
    html += '<td class="num ' + cls + '">' + (diff > 0 ? '+' : '') + fmtNum(diff) + '</td>';
    html += '<td class="num">' + fmtNum(curExp) + '</td>';
    html += '<td class="num">' + fmtNum(optExp) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';

  resultEl.innerHTML = html;
}

function renderSimulatorTab() {
  var el = document.getElementById('tab-simulator');
  if (!el) return;

  var html = '<div class="section"><h2>Manual Opal Simulator</h2>';
  html += '<p style="color:var(--text2);font-size:.82em;margin-bottom:12px;">Edit opal counts to see how EXP changes. Total must stay the same for fair comparison.</p>';
  html += '<div class="sim-grid" id="sim-inputs">';
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (!ext.unlocked[i]) continue;
    html += '<div class="sim-cell">';
    html += '<label>Villager ' + i + ' (★' + getVillagerStars(i) + ')</label>';
    html += '<input type="number" data-v="' + i + '" value="' + currentOpals[i] + '" min="0">';
    html += '</div>';
  }
  html += '</div>';
  html += '<div id="sim-result" style="margin-top:12px;"></div>';
  html += '</div>';
  el.innerHTML = html;

  el.addEventListener('input', function(e) {
    if (e.target.matches('input[data-v]')) recalcSim();
  });
  recalcSim();
}

function recalcSim() {
  var inputs = document.querySelectorAll('#sim-inputs input[data-v]');
  var simOpals = new Array(MAX_VILLAGERS).fill(0);
  var simTotal = 0;
  inputs.forEach(function(inp) {
    var v = Number(inp.dataset.v);
    simOpals[v] = Math.max(0, Number(inp.value) || 0);
    simTotal += simOpals[v];
  });

  var origTotal = 0;
  for (var i = 0; i < MAX_VILLAGERS; i++) origTotal += currentOpals[i];

  var html = '';
  if (simTotal !== origTotal) {
    html += '<div style="color:var(--orange);font-size:.82em;margin-bottom:8px;">⚠ Total opals: ' + simTotal + ' (original: ' + origTotal + ')</div>';
  }

  // Min opals
  var minOpals = Infinity;
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (ext.unlocked[i] && simOpals[i] < minOpals) minOpals = simOpals[i];
  }
  if (!isFinite(minOpals)) minOpals = 0;

  html += '<div style="font-size:.82em;color:var(--text2);margin-bottom:8px;">Min opals: ' + minOpals + ' | Equal Spread bonus: ' + (ext.cosmoBonus_1_5 * Math.floor(minOpals / 5)) + '%</div>';

  html += '<table class="data-table"><thead><tr>';
  html += '<th>Villager</th><th class="num">Opals</th><th class="num">EXP/hr</th><th class="num">vs Current</th>';
  html += '</tr></thead><tbody>';

  var simTotalExp = 0, curTotalExp = 0;
  for (var i = 0; i < MAX_VILLAGERS; i++) {
    if (!ext.unlocked[i]) continue;
    var simRate = villagerExpRate(i, simOpals, ext);
    var curRate = villagerExpRate(i, currentOpals, ext);
    simTotalExp += simRate;
    curTotalExp += curRate;
    var diff = curRate > 0 ? ((simRate - curRate) / curRate * 100) : 0;
    var cls = diff > 0 ? 'pos' : (diff < 0 ? 'neg' : '');
    html += '<tr><td>Villager ' + i + '</td>';
    html += '<td class="num">' + simOpals[i] + '</td>';
    html += '<td class="num">' + fmtNum(simRate) + '</td>';
    html += '<td class="num ' + cls + '">' + (diff > 0 ? '+' : '') + diff.toFixed(1) + '%</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';

  var totalDiff = curTotalExp > 0 ? ((simTotalExp - curTotalExp) / curTotalExp * 100) : 0;
  var cls = totalDiff > 0 ? 'pos' : (totalDiff < 0 ? 'neg' : '');
  html += '<div style="margin-top:8px;font-size:.85em;font-weight:600;">Total EXP/hr: ' + fmtNum(simTotalExp) + ' <span class="' + cls + '">(' + (totalDiff > 0 ? '+' : '') + totalDiff.toFixed(2) + '% vs current)</span></div>';

  document.getElementById('sim-result').innerHTML = html;
}

// ========== TABS ==========
function initTabs() {
  var tabs = document.querySelectorAll('#main-tabs .tab');
  tabs.forEach(function(t) {
    t.addEventListener('click', function() {
      tabs.forEach(function(x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
      var target = document.getElementById('tab-' + t.dataset.tab);
      if (target) target.classList.add('active');
    });
  });
}

// ========== INIT ==========
function init() {
  // Setup main content with tab containers
  var main = document.getElementById('main-content');
  main.innerHTML = '<div id="tab-current" class="tab-content active"></div>'
    + '<div id="tab-optimizer" class="tab-content"></div>'
    + '<div id="tab-simulator" class="tab-content"></div>';

  initTabs();

  initSaveLoader({
    target: '#save-area',
    onLoad: function() { render(); },
    auth: true,
  });
}

init();
</script>
