<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idleon Jar Calculator</title>
<link rel="stylesheet" href="css/breakdown.css">
<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --accent: #e94560; --text: #eee; --text2: #c0c0d4;
  --gold: #ffd700; --green: #4caf50; --blue: #2196f3;
  --purple: #bb86fc; --cyan: #4dd0e1; --red: #f44;
  --yellow: #ffe066; --orange: #ff9800; --pink: #f48fb1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1 { text-align: center; padding: 12px; background: var(--bg2); border-bottom: 2px solid var(--accent); font-size: 1.4em; }
h1 span { color: var(--accent); }



/* Custom tooltip */
#js-tip { display:none; position:fixed; z-index:9999; max-width:360px; padding:8px 12px; background:#1a1a2e; border:1px solid var(--gold); border-radius:6px; color:var(--text); font-size:.72em; line-height:1.5; white-space:pre-line; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.5); }

/* Main layout */
.main { max-width: 1400px; margin: 0 auto; padding: 16px; }
.section { background: var(--bg2); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h2 { margin-bottom: 12px; color: var(--accent); font-size: 1.15em; border-bottom: 1px solid #333; padding-bottom: 6px; }
.section h3 { margin: 12px 0 8px; color: var(--cyan); font-size: 1em; }

/* Cards */
.card-grid { display: grid; gap: 10px; }
.card-grid.cols-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
.card-grid.cols-3 { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.card-grid.cols-4 { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
.card-grid.cols-5 { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
.card { background: var(--bg3); border-radius: 8px; padding: 10px 12px; border: 1px solid #444; }
.card .card-title { font-weight: 700; font-size: .85em; color: var(--cyan); margin-bottom: 2px; }
.card .card-val { font-weight: 700; font-size: 1.5em; color: var(--gold); }
.card .card-sub { color: var(--text2); font-size: .75em; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: .82em; }
.data-table th { text-align: left; padding: 5px 6px; color: var(--text2); border-bottom: 1px solid #333; font-weight: 600; position: sticky; top: 0; background: var(--bg2); }
.data-table td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,.04); }
.data-table tr:hover td { background: rgba(255,255,255,.03); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }

/* Badges */
.badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: .72em; font-weight: 700; }
.badge-green { background: rgba(76,175,80,.2); color: var(--green); }
.badge-gold { background: rgba(255,215,0,.15); color: var(--gold); }
.badge-blue { background: rgba(33,150,243,.15); color: var(--blue); }
.badge-red { background: rgba(255,68,68,.15); color: var(--red); }
.badge-purple { background: rgba(187,134,252,.15); color: var(--purple); }
.badge-cyan { background: rgba(77,208,225,.15); color: var(--cyan); }

/* Main tabs */
.tabs { display: flex; background: var(--bg2); border-bottom: 1px solid #333; flex-wrap: wrap; }
.tab { padding: 10px 20px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all .2s; font-weight: 600; font-size: .9em; }
.tab:hover { color: var(--text); background: rgba(255,255,255,.05); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Inline number */
.n { color: var(--gold); font-weight: 600; }
.n-blue { color: var(--blue); font-weight: 600; }

/* Progress bar */
.bar-outer { height: 10px; border-radius: 5px; background: #333; overflow: hidden; min-width: 80px; }
.bar-fill { height: 100%; border-radius: 5px; }

/* Scroll wrapper for table overflow */
.table-scroll { overflow-x: auto; }

/* Collectible item */
.coll-item { display: inline-flex; flex-direction: column; align-items: center; padding: 8px 10px; background: var(--bg3); border-radius: 6px; border: 1px solid #444; min-width: 100px; font-size: .78em; cursor: default; }
.coll-item .ci-name { font-weight: 700; font-size: .9em; margin-bottom: 2px; text-align: center; }
.coll-item .ci-lv { font-weight: 700; font-size: 1.1em; }
.coll-item .ci-bonus { font-size: .85em; margin-top: 2px; }
.coll-item.unfound { opacity: .35; border-style: dashed; }
.coll-items-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

/* Rupie pill */
.rupie-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: .82em; font-weight: 600; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); }
.rupie-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.rupies-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
</style>
</head>
<body>

<div id="js-tip"></div>

<h1 style="display:flex;align-items:baseline;"><a href="index.html" style="font-size:.55em;font-weight:400;color:var(--text2);text-decoration:none;margin-right:12px;" title="Home">Home</a><span style="flex:1;">&#x1FAD9; <span>Idleon</span> Jar Calculator</span> <a href="https://github.com/Corgan/idleon-research-optimizer" target="_blank" rel="noopener" style="font-size:.45em;font-weight:400;color:var(--text2);text-decoration:none;" title="GitHub">GitHub</a></h1>

<div id="save-area"></div>

<div class="main" id="main-content">
  <div style="color:var(--text2);text-align:center;padding:60px 0;">Load a save to begin.</div>
</div>
<div class="bt-tooltip" id="bt-tooltip"></div>

<script type="module">
'use strict';

import { saveData } from './js/state.js';
import { initSaveLoader } from './js/ui/save-loader.js';
import { fmtVal } from './js/renderers/format.js';
import * as J from './js/stats/systems/w5/jar.js';
import { renderBreakdownTree } from './js/ui/dash-breakdowns.js';
import { _bNode } from './js/stats/node-helpers.js';
import { computeStampBonusOfTypeX } from './js/stats/systems/w1/stamp.js';
import { computeMonumentROGbonus } from './js/stats/systems/w5/hole.js';
import { legendPTSbonus } from './js/stats/systems/w7/spelunking.js';
import { superBitType } from './js/game-helpers.js';
import { computePaletteBonus } from './js/stats/systems/w7/spelunking.js';
import { computeExoticBonus } from './js/stats/systems/w6/farming.js';
import { bonTOT, upgLvs, marbleLvs } from './js/stats/systems/w5/fountain.js';

// ========== FORMATTING ==========
function fmtNum(n) {
  if (n === 0) return '0';
  if (n === Math.floor(n) && Math.abs(n) < 1e3) return String(n);
  return fmtVal(n);
}
function fmtPct(n) { return (n * 100).toFixed(2) + '%'; }
function fmtPct1(n) { return (n * 100).toFixed(1) + '%'; }
function fmtChance(n) {
  if (n <= 0) return '0%';
  if (n >= 1) return '100%';
  var pct = n * 100;
  if (pct >= 0.01) return pct.toFixed(2) + '%';
  return '1 in ' + fmtNum(Math.round(1 / n));
}
function fmtTimeFull(sec) {
  if (!isFinite(sec) || sec <= 0) return '0s';
  var d = Math.floor(sec / 86400);
  var h = Math.floor((sec % 86400) / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = Math.floor(sec % 60);
  var parts = [];
  if (d > 0) parts.push(d + 'd');
  if (h > 0) parts.push(h + 'h');
  if (m > 0) parts.push(m + 'm');
  if (s > 0 || parts.length === 0) parts.push(s + 's');
  return parts.join(' ');
}
function fmtTimeHrs(hrs) {
  return fmtTimeFull(hrs * 3600);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== TOOLTIP ==========
var tipEl;
function _initTip() {
  tipEl = document.getElementById('js-tip');
  document.addEventListener('mousemove', function(e) {
    if (tipEl.style.display === 'block') {
      tipEl.style.left = Math.min(e.clientX + 12, window.innerWidth - tipEl.offsetWidth - 10) + 'px';
      tipEl.style.top = Math.min(e.clientY + 12, window.innerHeight - tipEl.offsetHeight - 10) + 'px';
    }
  });
}

function _card(title, val, sub, tip) {
  return '<div class="card"'
    + (tip ? ' data-tip="' + escHtml(tip) + '"' : '')
    + '><div class="card-title">' + title + '</div>'
    + '<div class="card-val">' + val + '</div>'
    + '<div class="card-sub">' + sub + '</div></div>';
}

function _attachTips(root) {
  (root || document).querySelectorAll('[data-tip]').forEach(function(el) {
    el.addEventListener('mouseenter', function() {
      tipEl.textContent = this.getAttribute('data-tip');
      tipEl.style.display = 'block';
    });
    el.addEventListener('mouseleave', function() { tipEl.style.display = 'none'; });
  });
}

// ========== EXTERNAL BONUS CONTEXT ==========
// Bonuses from other systems. Lamp, measurements 10/12/14 are now auto-computed from save.
function _safe(fn) { try { return fn() || 0; } catch(e) { return 0; } }

function _ext() {
  var S = saveData;
  var _h = function(i) { return S.holesData && S.holesData[i] || []; };
  var _ola = S.olaData || [];
  var _g12 = S.gamingData && S.gamingData[12];
  var u = _safe(function() { return upgLvs(S); }) || [];
  var m = _safe(function() { return marbleLvs(S); }) || [];
  var _fm = [_safe(function(){return bonTOT(u,m,0,13)}), _safe(function(){return bonTOT(u,m,1,13)}), _safe(function(){return bonTOT(u,m,2,13)})];

  var e = {
    legendPts29: _safe(function() { return legendPTSbonus(29, S); }),
    ola355: Number(_ola[355]) || 0,
    monument2_1: _safe(function() { return computeMonumentROGbonus(2, 1, S, { fountMonument: _fm }); }),
    bell4: (Number(_h(17)[4]) || 0) * 0.5,
    cosmo0_3: Math.floor(35 * (Number(_h(4)[3]) || 0)),
    stampCavernRes: _safe(function() { var v = computeStampBonusOfTypeX('CavernRes', S); return typeof v === 'object' ? v.val : v; }),
    cglunko14: (Number(_ola[644]) || 0) * 10,
    fountMonument: _fm,
    bolaia10: _safe(function() { return (Number(_h(26)[10]) || 0) * 25; }),
    paletteBonus2: _safe(function() { return computePaletteBonus(2, S); }),
    exoticBonus52: _safe(function() { return computeExoticBonus(52, S); }),
    spelunk6Len: (S.spelunkData && S.spelunkData[6] && S.spelunkData[6].length) || 0,
    superBit32: _safe(function() { return superBitType(32, _g12); }),
    fountBonTOT2_15: _safe(function() { return bonTOT(u, m, 2, 15); }),
  };
  // Jarptomizer reset: zero all collectible levels
  if (_simReset) {
    var zeros = {};
    for (var i = 0; i < 40; i++) zeros[i] = 0;
    e.collectibleOverrides = zeros;
  }
  return e;
}

var _simReset = false;
var _lastExt = null;

// ========== SAVE LOADING ==========
initSaveLoader({ target: '#save-area', onLoad: _renderAll, auth: true });

if (saveData && saveData.holesData) _renderAll();

// ========== TABS ==========
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('tab')) {
    var tabId = e.target.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-tab') === tabId); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.toggle('active', c.id === 'tab-' + tabId); });
  }
});

// ========== MAIN RENDER ==========
// Persist enchant sim state across re-renders
var _esimState = null;

function _saveEsimState() {
  var s = {};
  var el;
  el = document.getElementById('esim-target'); if (el) s.enchCount = el.value;
  el = document.getElementById('esim-count'); if (el) s.simCount = el.value;
  el = document.getElementById('esim-strategy'); if (el) s.strategy = el.value;
  el = document.getElementById('esim-focus'); if (el) s.focus = el.value;
  var targets = {};
  document.querySelectorAll('.esim-tgt').forEach(function(inp) {
    var v = Number(inp.value) || 0;
    if (v > 0) targets[inp.dataset.cidx] = v;
  });
  s.targets = targets;
  var details = document.querySelector('#tab-enchantsim details');
  if (details) s.detailsOpen = details.open;
  _esimState = s;
}

function _restoreEsimState() {
  if (!_esimState) return;
  var s = _esimState;
  var el;
  el = document.getElementById('esim-target'); if (el && s.enchCount) el.value = s.enchCount;
  el = document.getElementById('esim-count'); if (el && s.simCount) el.value = s.simCount;
  el = document.getElementById('esim-strategy'); if (el && s.strategy) el.value = s.strategy;
  el = document.getElementById('esim-focus'); if (el && s.focus) el.value = s.focus;
  if (s.targets) {
    document.querySelectorAll('.esim-tgt').forEach(function(inp) {
      var v = s.targets[inp.dataset.cidx];
      if (v) inp.value = v;
    });
  }
  var details = document.querySelector('#tab-enchantsim details');
  if (details && s.detailsOpen) details.open = true;
  // Results are preserved via _simResults global
  if (_simResults) {
    var res = document.getElementById('esim-results');
    if (res) res.innerHTML = _renderSimResults(_simResults);
  }
}

// ===== ENCHANT HISTORY SNAPSHOTS =====
var _HISTORY_KEY = 'idleon-enchant-history';

function _loadHistory() {
  try { return JSON.parse(localStorage.getItem(_HISTORY_KEY)) || []; }
  catch (e) { return []; }
}

function _saveSnapshot() {
  var levels = J.collectibleLevels(saveData);
  var total = J.totalEnchantLevels(saveData);
  var spread = [];
  for (var i = 0; i < 40; i++) spread.push(Math.max(0, levels[i] - 1));

  var history = _loadHistory();
  // Don't add duplicate if last snapshot is identical
  if (history.length > 0) {
    var last = history[history.length - 1];
    if (last.total === total && JSON.stringify(last.spread) === JSON.stringify(spread)) return;
  }
  history.push({ ts: Date.now(), total: total, spread: spread });
  // Keep max 200 snapshots
  if (history.length > 200) history = history.slice(-200);
  localStorage.setItem(_HISTORY_KEY, JSON.stringify(history));
}

function _renderAll() {
  _saveEsimState();
  _saveSnapshot();
  _initTip();
  var el = document.getElementById('main-content');
  var ext = _ext();
  _lastExt = ext;
  var html = '';

  // ===== TAB BAR =====
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;">';
  html += '<div class="tabs" style="margin-bottom:0;">';
  html += '<div class="tab active" data-tab="overview">Overview</div>';
  html += '<div class="tab" data-tab="production">Production</div>';
  html += '<div class="tab" data-tab="rupie">Rupie Value</div>';
  html += '<div class="tab" data-tab="chances">Chances</div>';
  html += '<div class="tab" data-tab="collectibles">Collectibles</div>';
  html += '<div class="tab" data-tab="upgrades">Upgrades</div>';
  html += '<div class="tab" data-tab="nexttier">Next Tier</div>';
  html += '<div class="tab" data-tab="enchantsim">Enchant Sim</div>';
  html += '<div class="tab" data-tab="enchanthistory">Enchant History</div>';
  html += '</div>';
  html += '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82em;color:' + (_simReset ? 'var(--gold)' : 'var(--text2)') + ';margin-left:auto;">';
  html += '<input type="checkbox" id="sim-reset-cb"' + (_simReset ? ' checked' : '') + '> Simulate Jarptomizer Reset';
  html += '</label></div>';

  html += _renderOverview(ext);
  html += _renderProduction(ext);
  html += _renderRupieValue(ext);
  html += _renderChances(ext);
  html += _renderCollectibles(ext);
  html += _renderUpgrades(ext);
  html += _renderNextTier(ext);
  html += _renderEnchantSim(ext);
  html += _renderEnchantHistory();

  // Preserve active tab + scroll across re-renders
  var _prevTab = el.querySelector('.tab.active');
  var _prevTabId = _prevTab ? _prevTab.dataset.tab : 'overview';
  var _prevScroll = window.scrollY;

  el.innerHTML = html;

  // Restore active tab
  if (_prevTabId !== 'overview') {
    el.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === _prevTabId); });
    el.querySelectorAll('.tab-content').forEach(function(c) { c.classList.toggle('active', c.id === 'tab-' + _prevTabId); });
  }

  _attachTips(el);
  _attachSimEvents(ext);
  _restoreEsimState();

  // Render rupie value breakdown tree
  var _rvTree = document.getElementById('rv-breakdown-tree');
  if (_rvTree) {
    var _rvExt = _lastExt || {};
    var _rv = J.rupieValue(saveData, _rvExt);
    var _bkd = J.rupieValueBreakdown(saveData, _rvExt);
    var _children = [];
    for (var bi = 0; bi < _bkd.length; bi++) {
      _children.push(_bNode(_bkd[bi][0], _bkd[bi][1], null, { fmt: 'x' }));
    }
    var _root = _bNode('Rupie Value', _rv, _children, { fmt: 'x' });
    renderBreakdownTree(_root, _rvTree, { tooltipId: 'bt-tooltip' });
  }

  // Wire the Jarptomizer reset toggle
  var resetCb = document.getElementById('sim-reset-cb');
  if (resetCb) resetCb.addEventListener('change', function() { _simReset = resetCb.checked; _renderAll(); });

  // Restore scroll position
  window.scrollTo(0, _prevScroll);
}

// ===== OVERVIEW TAB =====
function _renderOverview(ext) {
  var html = '<div id="tab-overview" class="tab-content active">';

  // Top summary cards
  html += '<div class="section"><h2>Jar Overview</h2>';
  html += '<div class="card-grid cols-4">';
  var owned = J.jarTypesOwned(saveData);
  var total = J.totalJarTypes(saveData);
  html += _card('Jar Types', total + ' / 10', owned < 9 ? 'Next: ' + fmtNum(Math.round(J.newJarCost(saveData))) + ' ' + J.RUPIE_NAMES[owned] : 'All owned');
  html += _card('Slots', J.productionSlots(saveData), 'Production slots');
  html += _card('Opals Found', J.opalsFromJars(saveData), 'From jars');
  var found = J.collectiblesFound(saveData);
  var maxColl = J.page2Unlocked(saveData) ? 40 : 16;
  html += _card('Collectibles', found + ' / ' + maxColl, J.totalEnchantLevels(saveData) + ' enchant levels');
  html += '</div>';

  // Rupie balances
  html += '<h3>Rupie Balances</h3>';
  html += '<div class="rupies-row">';
  for (var i = 0; i < 12; i++) {
    var bal = J.rupieBalance(saveData, i);
    if (i < 10 && i >= total && bal <= 0) continue; // hide unearned standard rupies
    html += '<div class="rupie-pill"><span class="rupie-dot" style="background:' + J.RUPIE_COLORS[i] + '"></span>'
          + J.RUPIE_NAMES[i] + ': <span class="n">' + fmtNum(bal) + '</span></div>';
  }
  html += '</div>';

  // Quick stats
  html += '<div class="card-grid cols-4" style="margin-top:12px">';
  html += _card('Rupie Value', fmtNum(J.rupieValue(saveData, ext)) + 'x', 'Per rupie multiplier');
  html += _card('Production/hr', fmtNum(Math.round(J.productionPerHR(saveData, ext))), 'Progress per hour');
  html += _card('Opal Chance', fmtChance(J.opalChance(saveData, ext)), 'Per type-1 jar break');
  html += _card('Enchant Chance', fmtChance(J.enchantChance(saveData, ext)), 'Per type-4 jar break');
  html += '</div>';

  // Doubler & Break All status
  html += '<div class="card-grid cols-3" style="margin-top:12px">';
  var db = J.doublerBonus(saveData);
  html += _card('Gilded Bonus', db > 0 ? '+' + db + '%' : 'None', db > 0 ? 'Applied to next rupie break' : 'Break a Gilded jar to get bonus');
  html += _card('Break All', J.breakAllUnlocked(saveData) ? '<span style="color:var(--green)">Unlocked</span>' : '<span style="color:var(--red)">Locked</span>', 'B_UPG 69');
  var tgt = J.targetedEnchantIdx(saveData);
  html += _card('Targeted Enchant', tgt >= 0 ? J.COLLECTIBLE_DATA[tgt][0] : 'None',
    tgt >= 0 ? fmtPct1(J.targetedEnchantProb(saveData)) + ' chance to target' : 'Click a collectible in-game');
  html += '</div>';

  html += '</div></div>';
  return html;
}

// ===== PRODUCTION TAB =====
function _renderProduction(ext) {
  var html = '<div id="tab-production" class="tab-content">';
  html += '<div class="section"><h2>Production Slots</h2>';

  var slots = J.productionSlots(saveData);
  var prodHr = J.productionPerHR(saveData, ext);

  html += '<div class="card-grid cols-3">';
  html += _card('Production/hr', fmtNum(Math.round(prodHr)), 'All slots share this rate');
  html += _card('Active Slots', slots + ' / 3', '');
  html += _card('Base', '36,000', '/hr before bonuses');
  html += '</div>';

  // Production breakdown
  var bkd = J.productionPerHRBreakdown(saveData, ext);
  if (bkd.length > 1) {
    html += '<h3>Production Multipliers</h3>';
    html += '<table class="data-table"><thead><tr><th>Source</th><th class="num">Value</th></tr></thead><tbody>';
    for (var i = 0; i < bkd.length; i++) {
      html += '<tr><td>' + bkd[i][0] + '</td><td class="num">' + (i === 0 ? fmtNum(bkd[i][1]) : '+' + fmtNum(bkd[i][1]) + '%') + '</td></tr>';
    }
    html += '</tbody></table>';
  }

  // Per-slot details
  html += '<h3>Slot Details</h3>';
  html += '<div class="table-scroll"><table class="data-table"><thead><tr>'
        + '<th>#</th><th>Jar Type</th><th class="num">Req</th>'
        + '<th class="num">Progress</th><th>Fill</th>'
        + '<th class="num">T1</th><th class="num">T2</th><th class="num">T3</th><th class="num">T4</th><th class="num">T5</th><th class="num">T6</th>'
        + '</tr></thead><tbody>';
  for (var s = 0; s < slots; s++) {
    var jt = J.productionSlotType(saveData, s);
    var prog = J.productionSlotProgress(saveData, s);
    var req = J.productionREQ(saveData, jt);
    var pct = Math.min(1, prog / req);
    html += '<tr>';
    html += '<td>' + (s + 1) + '</td>';
    html += '<td>' + J.JAR_TYPE_NAMES[jt] + ' <span class="badge badge-' + (J.JAR_TYPE_CATS[jt] === 'rupie' ? 'gold' : J.JAR_TYPE_CATS[jt] === 'chance' ? 'cyan' : 'purple') + '">' + (J.JAR_TYPE_CATS[jt] === 'gilded' ? 'gilded' : J.JAR_TYPE_CATS[jt]) + '</span></td>';
    html += '<td class="num">' + fmtNum(Math.round(req)) + '</td>';
    html += '<td class="num">' + fmtNum(Math.round(prog)) + '</td>';
    html += '<td><div class="bar-outer" style="width:120px"><div class="bar-fill" style="width:' + (pct * 100) + '%;background:var(--green)"></div></div> ' + fmtPct1(pct) + '</td>';
    for (var t = 0; t < 6; t++) {
      html += '<td class="num">' + fmtTimeHrs(J.timeToTier(saveData, jt, t, ext)) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Tier times for all jar types — lanternable focus
  html += '<h3>Tier Times by Jar Type</h3>';
  html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">Highlighted tier = highest reachable with a 2hr lantern skip. Shows ±2 tiers around it.</p>';

  var total = J.totalJarTypes(saveData);
  var LANTERN_HRS = 2;
  var lanternTiers = [];  // per jar type: internal tier index that's lanternable
  var minTier = Infinity, maxTier = -Infinity;

  for (var jt = 0; jt < total; jt++) {
    var lt = 0;
    for (var t = 0; t < 20; t++) {
      if (J.timeToTier(saveData, jt, t, ext) <= LANTERN_HRS) lt = t;
      else break;
    }
    lanternTiers.push(lt);
    var lo = Math.max(0, lt - 2);
    var hi = lt + 2;
    if (lo < minTier) minTier = lo;
    if (hi > maxTier) maxTier = hi;
  }
  if (minTier === Infinity) { minTier = 0; maxTier = 5; }

  html += '<div class="table-scroll"><table class="data-table"><thead><tr><th>Jar Type</th><th class="num">Req</th>';
  for (var t = minTier; t <= maxTier; t++) html += '<th class="num">T' + (t + 1) + '</th>';
  html += '</tr></thead><tbody>';
  for (var jt = 0; jt < total; jt++) {
    var effReq = J.productionREQ(saveData, jt);
    html += '<tr>';
    html += '<td>' + J.JAR_TYPE_NAMES[jt] + '</td>';
    html += '<td class="num">' + fmtNum(Math.round(effReq)) + '</td>';
    for (var t = minTier; t <= maxTier; t++) {
      var hrs = J.timeToTier(saveData, jt, t, ext);
      var isLantern = (t === lanternTiers[jt]);
      html += '<td class="num"' + (isLantern ? ' style="background:rgba(255,255,255,.07);font-weight:bold"' : '') + '>' + fmtTimeHrs(hrs) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Requirements table for all jar types
  html += '<h3>Production Requirements by Type</h3>';
  html += '<table class="data-table"><thead><tr><th>Type</th><th class="num">Base Req</th><th class="num">Effective Req</th><th class="num">Broken</th><th class="num">B74 Source</th><th class="num">B74 Bonus</th></tr></thead><tbody>';
  var total = J.totalJarTypes(saveData);
  for (var jt = 0; jt < total; jt++) {
    var baseReq = 1000 + 2000 * jt;
    var effReq = J.productionREQ(saveData, jt);
    var ownBroken = J.jarsProducedOfType(saveData, jt);
    var b74src = J.jarsProducedOfType(saveData, Math.max(0, jt - 1));
    var b74srcName = J.JAR_TYPE_NAMES[Math.max(0, jt - 1)];
    html += '<tr>';
    html += '<td>' + J.JAR_TYPE_NAMES[jt] + '</td>';
    html += '<td class="num">' + fmtNum(baseReq) + '</td>';
    html += '<td class="num">' + fmtNum(Math.round(effReq)) + '</td>';
    html += '<td class="num">' + fmtNum(ownBroken) + '</td>';
    html += '<td class="num">' + (J.bupgOwned(saveData, 74) ? fmtNum(b74src) + ' <span style="color:var(--text2);font-size:.8em">(' + b74srcName + ')</span>' : '—') + '</td>';
    html += '<td class="num">' + (J.bupgOwned(saveData, 74) ? fmtPct1(5 * Math.log10(Math.max(1, b74src)) / 100) : '—') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';

  // Lantern yield per jar type
  html += '<h3>Jars per Lantern (2hr skip)</h3>';
  html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">'
    + 'How many jars of each tier a single 2hr lantern produces per slot. '
    + 'Simulates the offline production loop: each tick consumes from highest tier down.</p>';

  var prodPerHr = J.productionPerHR(saveData, ext);
  var lanternProgress = prodPerHr * 2;  // 2 hours of progress
  var total = J.totalJarTypes(saveData);

  // Find max tier across all types for column headers
  var maxTierSeen = 0;
  var yieldData = [];
  for (var jt = 0; jt < total; jt++) {
    var req = J.productionREQ(saveData, jt);
    var counts = {};
    var prog = lanternProgress;
    while (prog >= req) {
      var tier = Math.floor(Math.log10(prog / req));
      counts[tier] = (counts[tier] || 0) + 1;
      prog -= req * Math.pow(10, tier);
      if (tier > maxTierSeen) maxTierSeen = tier;
    }
    yieldData.push({ type: jt, name: J.JAR_TYPE_NAMES[jt], counts: counts, req: req });
  }

  html += '<div class="table-scroll"><table class="data-table"><thead><tr><th>Jar Type</th>';
  for (var t = maxTierSeen; t >= 0; t--) html += '<th class="num">T' + (t + 1) + ' (' + Math.pow(10, t) + '×)</th>';
  html += '<th class="num">Total Jars</th>';
  if (J.bupgOwned(saveData, 74)) html += '<th class="num">B74 Count</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < yieldData.length; i++) {
    var r = yieldData[i];
    html += '<tr><td>' + r.name + '</td>';
    var totalJars = 0, b74total = 0;
    for (var t = maxTierSeen; t >= 0; t--) {
      var c = r.counts[t] || 0;
      totalJars += c;
      b74total += c * Math.pow(10, t);
      html += '<td class="num">' + (c > 0 ? c : '<span style="color:var(--text2)">0</span>') + '</td>';
    }
    html += '<td class="num"><b>' + totalJars + '</b></td>';
    if (J.bupgOwned(saveData, 74)) html += '<td class="num">' + fmtNum(b74total) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  html += '</div></div>';
  return html;
}

// ===== RUPIE VALUE TAB =====
function _renderRupieValue(ext) {
  var html = '<div id="tab-rupie" class="tab-content">';
  html += '<div class="section"><h2>Rupie Value Breakdown</h2>';

  var rv = J.rupieValue(saveData, ext);
  html += '<div class="card-grid cols-3">';
  html += _card('Total Rupie Value', fmtNum(rv) + 'x', 'Applied to every rupie dropped');
  var avgR = J.avgRupiesPerBreak(saveData, ext);
  html += _card('Avg Rupies/Break', avgR.toFixed(2), 'Extra chance: ' + fmtPct1(J.extraRupieChance(saveData, ext)));
  var db = J.doublerBonus(saveData);
  html += _card('Gilded Active', db > 0 ? '+' + db + '%' : 'No', db > 0 ? 'Consumed on next rupie break' : '');
  html += '</div>';

  // Multiplier breakdown tree
  var bkd = J.rupieValueBreakdown(saveData, ext);
  html += '<h3>Multiplier Sources</h3><div id="rv-breakdown-tree"></div>';

  // Rupie value per type per tier
  html += '<h3>Rupie Value by Tier</h3>';
  html += '<div class="table-scroll"><table class="data-table"><thead><tr>';
  for (var t = 0; t < 5; t++) html += '<th class="num">Tier ' + (t+1) + '</th>';
  html += '</tr></thead><tbody><tr>';
  for (var t = 0; t < 5; t++) {
    html += '<td class="num">' + fmtNum(Math.round(rv * Math.pow(10, t))) + '</td>';
  }
  html += '</tr></tbody></table></div>';

  // Extra rupie sources
  html += '<h3>Extra Rupie Chance</h3>';
  html += '<table class="data-table"><thead><tr><th>Source</th><th class="num">Value</th></tr></thead><tbody>';
  if (ext.bell4) html += '<tr><td>Bell 4</td><td class="num">+' + ext.bell4 + '%</td></tr>';
  if (ext.cosmo0_3) html += '<tr><td>Cosmo(0,3)</td><td class="num">+' + ext.cosmo0_3 + '%</td></tr>';
  if (J.bupgOwned(saveData, 64)) html += '<tr><td>B_UPG 64 (+50%)</td><td class="num">+50%</td></tr>';
  html += '<tr style="border-top:2px solid #444"><td><strong>Total</strong></td><td class="num"><strong>' + fmtPct1(J.extraRupieChance(saveData, ext)) + '</strong></td></tr>';
  html += '</tbody></table>';

  // Rupie income per break
  var avgRupies = J.avgRupiesPerBreak(saveData, ext);
  html += '<h3>Rupie Income Per Break</h3>';
  html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">Each break produces ' + avgRupies.toFixed(1) + ' rupies on average (extra chance: ' + fmtPct1(J.extraRupieChance(saveData, ext)) + '). Multi-color jars split evenly across active colors.</p>';

  var rupieJars = [
    { type: 0, name: 'Basic Rupie', thresholds: [
      { need: [1, 1000], colors: [0, 1, 2] },
      { need: [0, 100],  colors: [0, 1] },
      { fallback: true,  colors: [0] },
    ]},
    { type: 3, name: 'Decent Rupie', thresholds: [
      { need: [4, 500000], colors: [3, 4, 5] },
      { need: [3, 10000],  colors: [3, 4] },
      { fallback: true,    colors: [3] },
    ]},
    { type: 5, name: 'White Rupie', thresholds: [{ fallback: true, colors: [10] }] },
    { type: 6, name: 'Elegant Rupie', thresholds: [
      { need: [7, 50000000], colors: [6, 7, 8] },
      { need: [6, 6000000],  colors: [6, 7] },
      { fallback: true,      colors: [6] },
    ]},
    { type: 8, name: 'Dark Rupie', thresholds: [{ fallback: true, colors: [11] }] },
    { type: 9, name: 'Master Rupie', thresholds: [{ fallback: true, colors: [9] }] },
  ];

  html += '<div class="table-scroll"><table class="data-table"><thead><tr><th>Jar Type</th>';
  for (var ti = 0; ti < 6; ti++) html += '<th class="num">Tier ' + (ti+1) + '</th>';
  html += '</tr></thead><tbody>';

  for (var ji = 0; ji < rupieJars.length; ji++) {
    var rj = rupieJars[ji];
    if (rj.type >= J.totalJarTypes(saveData)) continue;
    var activeColors = null;
    for (var ti = 0; ti < rj.thresholds.length; ti++) {
      var th = rj.thresholds[ti];
      if (th.fallback) { activeColors = th.colors; break; }
      var bal = J.rupieBalance(saveData, th.need[0]);
      if (bal >= th.need[1]) { activeColors = th.colors; break; }
    }
    if (!activeColors) activeColors = [rj.type];

    // Total row for this jar type
    html += '<tr style="border-top:1px solid #444"><td><b>' + rj.name + '</b></td>';
    for (var ti = 0; ti < 6; ti++) {
      html += '<td class="num"><b>' + fmtNum(Math.round(avgRupies * rv * Math.pow(10, ti))) + '</b></td>';
    }
    html += '</tr>';

    // Sub-rows per color (for multi-color jars)
    if (activeColors.length > 1) {
      var perColor = avgRupies / activeColors.length;
      for (var ci = 0; ci < activeColors.length; ci++) {
        html += '<tr style="opacity:.8"><td style="padding-left:20px"><span class="rupie-dot" style="background:' + J.RUPIE_COLORS[activeColors[ci]] + ';display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px"></span>' + J.RUPIE_NAMES[activeColors[ci]] + '</td>';
        for (var ti = 0; ti < 6; ti++) {
          html += '<td class="num">' + fmtNum(Math.round(perColor * rv * Math.pow(10, ti))) + '</td>';
        }
        html += '</tr>';
      }
    }
  }
  html += '</tbody></table></div>';

  html += '</div></div>';
  return html;
}

// ===== CHANCES TAB =====
function _renderChances(ext) {
  var html = '<div id="tab-chances" class="tab-content">';
  html += '<div class="section"><h2>Break Chances</h2>';

  html += '<div class="card-grid cols-3">';
  var oc = J.opalChance(saveData, ext);
  html += _card('Opal Chance', fmtChance(oc), 'Per type-1 jar break', 'Opals found: ' + J.opalsFromJars(saveData) + '\nBase: 25% × 0.43^opals\nEach opal reduces chance by 57%');
  var cc = J.collectibleChance(saveData, ext);
  html += _card('Collectible Chance', fmtChance(cc), 'Per type-2 jar break', 'Found: ' + J.collectiblesFound(saveData) + '\nScaling: harder after 16 found');
  var ec = J.enchantChance(saveData, ext);
  html += _card('Enchant Chance', fmtChance(ec), 'Per type-4 jar break', 'Total enchant levels: ' + J.totalEnchantLevels(saveData) + '\nMore enchants = harder to enchant');
  html += '</div>';

  // Tier scaling
  html += '<h3>Chance × Tier (how tier multiplies chances)</h3>';
  html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">Chance jars (types 1, 2, 4) multiply their chance by 10<sup>tier-1</sup>. At high enough tier, the chance exceeds 100% = guaranteed.</p>';
  html += '<div class="table-scroll"><table class="data-table"><thead><tr><th>Chance Type</th><th class="num">Base</th>';
  for (var t = 0; t < 6; t++) html += '<th class="num">Tier ' + (t+1) + '</th>';
  html += '<th class="num">Tier for 100%</th></tr></thead><tbody>';

  var chances = [
    ['Opal (type 1)', oc],
    ['Collectible (type 2)', cc],
    ['Enchant (type 4)', ec],
  ];
  for (var ci = 0; ci < chances.length; ci++) {
    var base = chances[ci][1];
    html += '<tr><td>' + chances[ci][0] + '</td>';
    html += '<td class="num">' + fmtChance(base) + '</td>';
    for (var t = 0; t < 6; t++) {
      var val = base * Math.pow(10, t);
      var color = val >= 1 ? 'var(--green)' : val >= 0.5 ? 'var(--yellow)' : '';
      html += '<td class="num"' + (color ? ' style="color:' + color + '"' : '') + '>'
            + (val >= 1 ? '100%+' : fmtChance(val)) + '</td>';
    }
    // Tier needed for 100%
    var tierFor100 = base > 0 ? Math.ceil(Math.log10(1 / base)) + 1 : '∞';
    html += '<td class="num"><span class="n">' + tierFor100 + '</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Expected time to events
  html += '<h3>Expected Time per Event (Tier 0)</h3>';
  html += '<table class="data-table"><thead><tr><th>Event</th><th class="num">Chance</th><th class="num">Avg Breaks</th><th class="num">Est. Time</th></tr></thead><tbody>';
  var evts = [
    ['Next Opal', 1, oc],
    ['Next Collectible', 2, cc],
    ['Next Enchant', 4, ec],
  ];
  for (var ei = 0; ei < evts.length; ei++) {
    var ch = evts[ei][2];
    var breaks = J.expectedBreaksToEvent(ch);
    var hrs = J.expectedHoursToEvent(saveData, ext, evts[ei][1], ch);
    html += '<tr><td>' + evts[ei][0] + '</td>';
    html += '<td class="num">' + fmtChance(ch) + '</td>';
    html += '<td class="num">' + (isFinite(breaks) ? fmtNum(Math.round(breaks)) : '∞') + '</td>';
    html += '<td class="num">' + (isFinite(hrs) ? fmtTimeHrs(hrs) : '∞') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';

  // Targeted enchant
  var tgt = J.targetedEnchantIdx(saveData);
  if (tgt >= 0) {
    html += '<h3>Targeted Enchant</h3>';
    html += '<div class="card-grid cols-3">';
    html += _card('Target', J.COLLECTIBLE_DATA[tgt][0], '#' + tgt);
    html += _card('Target Chance', fmtPct1(J.targetedEnchantProb(saveData)), '5 / (found+3) = 5/' + (J.collectiblesFound(saveData) + 3));
    html += _card('Combined', fmtPct(ec * J.targetedEnchantProb(saveData)), 'Enchant × Target');
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

// ===== COLLECTIBLES TAB =====
function _renderCollectibles(ext) {
  var html = '<div id="tab-collectibles" class="tab-content">';
  html += '<div class="section"><h2>Collectibles</h2>';
  var lp = ext.legendPts29 || 0;
  var levels = J.collectibleLevels(saveData);
  var found = J.collectiblesFound(saveData);
  var maxIdx = J.page2Unlocked(saveData) ? 40 : 16;

  html += '<div class="card-grid cols-4">';
  html += _card('Found', found + ' / ' + maxIdx, 'Unfound shown as dashed');
  html += _card('Total Enchant Lvs', J.totalEnchantLevels(saveData), 'Sum of (level-1) for all enchanted');
  html += _card('Page 2', J.page2Unlocked(saveData) ? '<span style="color:var(--green)">Unlocked</span>' : '<span style="color:var(--red)">Locked</span>', 'B_UPG 75');
  if (lp > 0) html += _card('Legend PTS 29', '+' + lp + '%', 'Bonus to all collectibles');
  html += '</div>';

  // Group by category
  var byCategory = {};
  for (var i = 0; i < maxIdx; i++) {
    var cat = J.COLLECTIBLE_DATA[i][2];
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(i);
  }

  for (var cat in byCategory) {
    var indices = byCategory[cat];
    var catLabel = J.CATEGORY_LABELS[cat] || cat;
    var catColor = J.CATEGORY_COLORS[cat] || '#888';
    html += '<h3 style="color:' + catColor + '">' + catLabel + '</h3>';
    html += '<div class="coll-items-row">';
    for (var ci = 0; ci < indices.length; ci++) {
      var idx = indices[ci];
      var cd = J.COLLECTIBLE_DATA[idx];
      var lv = levels[idx];
      var enchLv = Math.max(0, lv - 1);
      var bonus = J.collectibleBonus(saveData, idx, lp);
      var tierBorder = enchLv >= 20 ? 'var(--gold)' : enchLv >= 5 ? '#aaa' : enchLv >= 1 ? '#cd7f32' : '#444';
      html += '<div class="coll-item' + (lv === 0 ? ' unfound' : '') + '" style="border-color:' + tierBorder + '"'
            + ' data-tip="#' + idx + ' ' + cd[0] + '\nLevel: ' + lv + (enchLv > 0 ? ' (enchant +' + enchLv + ')' : '') + '\nPer level: ' + cd[1] + cd[3] + '\nTotal bonus: ' + bonus.toFixed(1) + '%">';
      html += '<div class="ci-name" style="color:' + catColor + '">' + cd[0] + '</div>';
      html += '<div class="ci-lv">' + (lv === 0 ? '—' : (enchLv >= 20 ? '+' : '') + lv) + '</div>';
      html += '<div class="ci-bonus">' + (lv === 0 ? 'Not found' : '+' + bonus.toFixed(1) + '%') + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Enchant priority table
  var prio = J.enchantPriority(saveData, ext);
  if (prio.length > 0) {
    html += '<h3>Enchant Priority (sorted by marginal value)</h3>';
    html += '<table class="data-table"><thead><tr><th>#</th><th>Name</th><th>Category</th><th class="num">Level</th><th class="num">Enchant</th><th class="num">Current Bonus</th><th class="num">+1 Enchant</th></tr></thead><tbody>';
    for (var i = 0; i < prio.length; i++) {
      var p = prio[i];
      html += '<tr>';
      html += '<td>' + p.idx + '</td>';
      html += '<td style="color:' + (J.CATEGORY_COLORS[p.category] || '#888') + '">' + p.name + '</td>';
      html += '<td>' + p.categoryLabel + '</td>';
      html += '<td class="num">' + p.level + '</td>';
      html += '<td class="num">' + p.enchantLevels + '</td>';
      html += '<td class="num">' + p.totalBonus.toFixed(1) + '</td>';
      html += '<td class="num"><span class="n">+' + p.marginalValue.toFixed(1) + '</span></td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
  }

  html += '</div></div>';
  return html;
}

// ===== UPGRADES TAB =====
function _renderUpgrades(ext) {
  var html = '<div id="tab-upgrades" class="tab-content">';
  html += '<div class="section"><h2>B_UPG Upgrades</h2>';

  // Group display
  for (var group in J.B_UPG_GROUPS) {
    var indices = J.B_UPG_GROUPS[group];
    html += '<h3>' + group + '</h3>';
    html += '<table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Effect</th><th class="num">Status</th></tr></thead><tbody>';
    for (var i = 0; i < indices.length; i++) {
      var idx = indices[i];
      // Find in B_UPG_DATA
      var upg = null;
      for (var u = 0; u < J.B_UPG_DATA.length; u++) {
        if (J.B_UPG_DATA[u][0] === idx) { upg = J.B_UPG_DATA[u]; break; }
      }
      if (!upg) continue;
      var owned = J.bupgOwned(saveData, idx);
      html += '<tr' + (owned ? '' : ' class="locked" style="opacity:.5"') + '>';
      html += '<td>' + idx + '</td>';
      html += '<td>' + upg[1] + '</td>';
      html += '<td>' + upg[3] + '</td>';
      html += '<td class="num">' + (owned ? '<span class="badge badge-green">Owned</span>' : '<span class="badge badge-red">Locked</span>') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
  }

  // New jar cost
  var ownedTypes = J.jarTypesOwned(saveData);
  if (ownedTypes < 9) {
    html += '<h3>Next Jar Type</h3>';
    html += '<div class="card-grid cols-3">';
    html += _card('Next Type', J.JAR_TYPE_NAMES[owned + 1], 'Type #' + (owned + 1));
    var cost = J.newJarCost(saveData);
    var currType = J.newJarCurrencyType(saveData);
    var bal = J.rupieBalance(saveData, currType);
    html += _card('Cost', fmtNum(Math.round(cost)), J.RUPIE_NAMES[currType] + ' rupies');
    html += _card('Can Afford', J.canAffordNewJar(saveData) ? '<span style="color:var(--green)">Yes</span>' : '<span style="color:var(--red)">No</span>',
      'Balance: ' + fmtNum(bal));
    html += '</div>';
  }

  // Jar cost table for all types
  html += '<h3>Jar Type Costs</h3>';
  html += '<table class="data-table"><thead><tr><th>#</th><th>Type</th><th class="num">Cost</th><th>Currency</th><th class="num">Status</th></tr></thead><tbody>';
  html += '<tr><td>0</td><td>' + J.JAR_TYPE_NAMES[0] + '</td><td class="num">Free</td><td>—</td><td class="num"><span class="badge badge-green">Default</span></td></tr>';
  for (var j = 0; j < 9; j++) {
    var c = 50 * Math.pow(1 + j, 1.5) * Math.pow(4.8, j);
    html += '<tr' + (j < ownedTypes ? '' : ' style="opacity:.5"') + '>';
    html += '<td>' + (j + 1) + '</td>';
    html += '<td>' + J.JAR_TYPE_NAMES[j + 1] + '</td>';
    html += '<td class="num">' + fmtNum(Math.round(c)) + '</td>';
    html += '<td>' + J.RUPIE_NAMES[j] + '</td>';
    html += '<td class="num">' + (j < ownedTypes ? '<span class="badge badge-green">Owned</span>' : j === ownedTypes ? '<span class="badge badge-blue">Next</span>' : '') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';

  // Doubler analysis
  html += '<h3>Gilded Tier Values</h3>';
  html += '<table class="data-table"><thead><tr><th class="num">Tier</th><th class="num">Gilded %</th><th class="num">Multiplier</th></tr></thead><tbody>';
  for (var t = 0; t < 6; t++) {
    html += '<tr><td class="num">' + t + '</td>';
    html += '<td class="num">+' + J.doublerTierValue(t) + '%</td>';
    html += '<td class="num">' + J.doublerMultiplier(t).toFixed(2) + 'x</td></tr>';
  }
  html += '</tbody></table>';

  html += '</div></div>';
  return html;
}

// ===== NEXT TIER TAB =====
function _renderNextTier(ext) {
  var html = '<div id="tab-nexttier" class="tab-content">';
  html += '<div class="section"><h2>Next Pow10 Milestone Ranking</h2>';

  if (!J.bupgOwned(saveData, 74)) {
    html += '<p style="color:var(--text2)">B74 is not owned — this tab ranks jar types by how fast they reach the next power-of-10 in their produced count, which feeds B74\'s bonus to the <em>next</em> jar type.</p>';
    html += '</div></div>';
    return html;
  }

  html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">'
    + 'B74 reduces production REQ for each type by <b>5% × log<sub>10</sub>(prev type produced)</b>. '
    + 'Each pow10 milestone = +5% speed for the next jar type. '
    + 'Higher tier jars count for 10<sup>tier</sup> breaks (tier 1 = 10, tier 2 = 100, etc).</p>';

  var prodPerHr = J.productionPerHR(saveData, ext);
  var total = J.totalJarTypes(saveData);
  var rows = [];

  for (var jt = 0; jt < total; jt++) {
    var count = J.jarsProducedOfType(saveData, jt);
    var logCount = count > 0 ? Math.floor(Math.log10(count)) : -1;
    var nextPow10 = Math.pow(10, logCount + 1);
    var deficit = nextPow10 - count;
    var req = J.productionREQ(saveData, jt);
    var jarsPerHr = prodPerHr / req;  // tier-0 rate per slot
    var hrsAllSlots = deficit / (jarsPerHr * 3);  // assume all 3 slots
    var benefitsType = jt + 1 < total ? J.JAR_TYPE_NAMES[jt + 1] : '—';
    var curBonus = 5 * Math.log10(Math.max(1, count));
    var nextBonus = 5 * (logCount + 2);  // after reaching next pow10

    rows.push({
      type: jt, name: J.JAR_TYPE_NAMES[jt], count: count,
      nextPow10: nextPow10, deficit: deficit,
      hrsAllSlots: hrsAllSlots, benefitsType: benefitsType,
      curBonus: curBonus, nextBonus: nextBonus, req: req
    });
  }

  // Sort by time
  rows.sort(function(a, b) { return a.hrsAllSlots - b.hrsAllSlots; });

  html += '<div class="table-scroll"><table class="data-table"><thead><tr>';
  html += '<th>#</th><th>Jar Type</th><th class="num">Current Count</th>';
  html += '<th class="num">Next Milestone</th><th class="num">Deficit</th>';
  html += '<th class="num">Time (3 slots)</th>';
  html += '<th>Benefits</th>';
  html += '<th class="num">B74 Now→Next</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var isBest = i === 0;
    html += '<tr' + (isBest ? ' style="background:rgba(var(--green-rgb,80,200,120),.12)"' : '') + '>';
    html += '<td>' + (i + 1) + '</td>';
    html += '<td>' + r.name + (isBest ? ' <span class="badge badge-green">Fastest</span>' : '') + '</td>';
    html += '<td class="num">' + fmtNum(r.count) + '</td>';
    html += '<td class="num">' + fmtNum(r.nextPow10) + '</td>';
    html += '<td class="num">' + fmtNum(r.deficit) + '</td>';
    html += '<td class="num">' + fmtTimeHrs(r.hrsAllSlots) + '</td>';
    html += '<td>' + r.benefitsType + '</td>';
    html += '<td class="num">' + r.curBonus.toFixed(1) + '% → ' + r.nextBonus.toFixed(1) + '%</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Insight
  if (rows.length > 0) {
    var best = rows[0];
    html += '<div style="margin-top:12px;padding:10px;border-left:3px solid var(--green);background:rgba(80,200,120,.06)">';
    html += '<b>Recommendation:</b> Produce <b>' + best.name + '</b> to reach ' + fmtNum(best.nextPow10) + ' fastest';
    html += ' (' + fmtNum(best.deficit) + ' more needed, ~' + fmtTimeHrs(best.hrsAllSlots) + ' with all 3 slots).';
    if (best.benefitsType !== '—') html += ' This will speed up <b>' + best.benefitsType + '</b> production by +5%.';
    html += '</div>';
  }

  // === Off-Map Tier Accumulation Chart ===
  html += '<h2 style="margin-top:28px">Off-Map Tier Accumulation</h2>';
  html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">'
    + 'Off-map, the game ticks every 5s but only produces 1 jar per slot per tick. '
    + 'If per-tick progress > REQ, the remainder accumulates until it reaches 10×, 100×, 1000× REQ — producing higher tier jars. '
    + 'When the board is full (120 jars), a 10% chance upgrades a jar +1 tier beyond computed. '
    + 'Max Tier shows computed + the 10% upgrade.</p>';

  var prodPerHr = J.productionPerHR(saveData, ext);
  var perTick5s = prodPerHr * 5 / 3600;
  var totalUnsorted = J.totalJarTypes(saveData);
  var b67mult = 1 + (J.bupgOwned(saveData, 67) ? 30 : 0) / 100;

  // Simulate max tier for a given REQ
  function _simMaxTier(perTick, req) {
    if (perTick <= req) return 0;
    var prog = 0, best = 0;
    for (var t = 0; t < 500; t++) {
      prog += perTick;
      if (prog >= req) {
        var tier = Math.floor(Math.log10(prog / req));
        if (tier > best) best = tier;
        prog -= req * Math.pow(10, tier);
        if (prog < 0) prog = 0;
      }
    }
    return best;
  }

  // Compute REQ for a given B74 prev count
  function _reqForPrevCount(baseReq, prevCount) {
    var b74 = 5 * Math.log10(Math.max(1, prevCount));
    return baseReq / (b67mult * (1 + b74 / 100));
  }

  // Binary search: find min prevCount to reach target tier
  function _prevCountForTier(baseReq, targetTier) {
    var lo = 1, hi = 1e30;
    for (var step = 0; step < 200; step++) {
      var mid = Math.sqrt(lo * hi);  // geometric midpoint for log scale
      var req = _reqForPrevCount(baseReq, mid);
      var tier = _simMaxTier(perTick5s, req);
      if (tier >= targetTier) hi = mid;
      else lo = mid;
      if (hi / lo < 1.01) break;
    }
    return Math.ceil(hi);
  }

  // Binary search: find min prodPerHr to reach target tier with given req
  function _prodForTier(req, targetTier) {
    var lo = 1, hi = 1e15;
    for (var step = 0; step < 100; step++) {
      var mid = (lo + hi) / 2;
      var tick = mid * 5 / 3600;
      if (_simMaxTier(tick, req) >= targetTier) hi = mid;
      else lo = mid;
      if (hi - lo < 1) break;
    }
    return Math.ceil(hi);
  }

  // Simulate ticks-to-next-tier and count frequency at a tier
  function _simTierStats(perTick, req) {
    if (perTick <= req) return { sustained: -1, ticksBetweenMax: Infinity };
    // Sustained tier = floor(log10(perTick/req)) — tier you can produce every tick
    var sustained = Math.floor(Math.log10(perTick / req));
    // Simulate to find time between jars at sustained+1 (the max tier from accumulation)
    var maxTier = _simMaxTier(perTick, req);
    var prog = 0, firstHit = -1, hits = 0;
    for (var t = 0; t < 1000; t++) {
      prog += perTick;
      if (prog >= req) {
        var tier = Math.floor(Math.log10(prog / req));
        if (tier >= maxTier && maxTier > sustained) {
          hits++;
          if (firstHit < 0) firstHit = t + 1;
        }
        prog -= req * Math.pow(10, tier);
        if (prog < 0) prog = 0;
      }
    }
    var avgInterval = hits > 1 ? Math.ceil(1000 / hits) : (firstHit > 0 ? firstHit : Infinity);
    return { sustained: sustained, maxTier: maxTier, ticksBetweenMax: avgInterval, firstHitMax: firstHit };
  }

  // Build rows
  var accRows = [];
  for (var jt = 0; jt < totalUnsorted; jt++) {
    var req = J.productionREQ(saveData, jt);
    var baseReq = 1000 + 2000 * jt;
    var prevCount = J.jarsProducedOfType(saveData, Math.max(0, jt - 1));
    var computedTier = _simMaxTier(perTick5s, req);

    var stats = _simTierStats(perTick5s, req);
    var sustained = stats.sustained;  // tier we CAN sustain (net positive)
    var netSustained = sustained >= 0 ? perTick5s - req * Math.pow(10, sustained) : perTick5s - req;
    var nextTier = sustained + 1;  // tier we CAN'T sustain yet
    var netNext = perTick5s - req * Math.pow(10, nextTier);

    // Time between max-tier jar productions (5s per tick)
    var secsBetween;
    if (perTick5s > req && isFinite(stats.ticksBetweenMax)) {
      secsBetween = stats.ticksBetweenMax * 5;
    } else {
      // Can't accumulate — time to produce one tier-0 jar from progress buildup
      secsBetween = Math.ceil(req / perTick5s) * 5;
    }

    // To SUSTAIN nextTier: need perTick >= REQ * 10^nextTier
    var sustainReqNeeded = perTick5s / Math.pow(10, nextTier);
    var b74multNeeded = baseReq / (sustainReqNeeded * b67mult);
    var b74pctNeeded = (b74multNeeded - 1) * 100;
    var neededB74 = b74pctNeeded > 0 ? Math.pow(10, b74pctNeeded / 5) : 1;

    // Prod path: what prod/hr makes perTick >= REQ * 10^nextTier at current REQ?
    var neededProd = req * Math.pow(10, nextTier) * 3600 / 5;

    accRows.push({
      type: jt, name: J.JAR_TYPE_NAMES[jt],
      req: req, baseReq: baseReq,
      sustained: sustained,
      computedTier: computedTier,
      netSustained: netSustained,
      nextTier: nextTier,
      netNext: netNext,
      secsBetween: secsBetween,
      neededB74: neededB74,
      neededProd: neededProd,
      prevCount: prevCount
    });
  }

  // Summary cards
  html += '<div class="card-grid cols-2">';
  html += _card('Production/hr', fmtNum(Math.round(prodPerHr)), '');
  html += _card('Per 5s Tick', fmtNum(Math.round(perTick5s)), 'progress added per off-map tick');
  html += '</div>';

  html += '<div class="table-scroll"><table class="data-table"><thead><tr>';
  html += '<th>Jar Type</th>';
  html += '<th class="num">REQ</th>';
  html += '<th class="num">Sustained<br>Tier</th>';
  html += '<th class="num">Net/Tick<br>(sustained)</th>';
  html += '<th class="num">Time per<br>Max Jar</th>';
  html += '<th class="num">Next Tier<br>Net/Tick</th>';
  html += '<th class="num">Next via B74</th>';
  html += '<th class="num">Next via Prod</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < accRows.length; i++) {
    var r = accRows[i];
    html += '<tr>';
    html += '<td>' + r.name + '</td>';
    html += '<td class="num">' + fmtNum(Math.round(r.req)) + '</td>';

    // Sustained tier
    if (r.sustained >= 0) {
      html += '<td class="num"><b>T' + (r.sustained + 2) + '</b> (' + Math.pow(10, r.sustained) + '×)';
      if (r.computedTier > r.sustained) html += '<br><span style="font-size:.8em;color:var(--text2)">peaks T' + (r.computedTier + 2) + ' via accum</span>';
      html += '</td>';
    } else {
      html += '<td class="num" style="color:var(--text2)">T1 only</td>';
    }

    // Net/tick at sustained tier (surplus that accumulates to higher tiers)
    html += '<td class="num"' + (r.netSustained > 0 ? ' style="color:var(--green)"' : ' style="color:var(--red)"') + '>';
    html += (r.netSustained > 0 ? '+' : '') + fmtNum(Math.round(r.netSustained)) + '</td>';

    // Time per max-tier jar
    html += '<td class="num">';
    if (!isFinite(r.secsBetween) || r.secsBetween <= 0) html += '—';
    else if (r.secsBetween < 60) html += Math.round(r.secsBetween) + 's';
    else if (r.secsBetween < 3600) html += Math.round(r.secsBetween / 60) + 'm';
    else html += fmtTimeHrs(r.secsBetween / 3600);
    html += '</td>';

    // Next tier net/tick (negative = how much short)
    html += '<td class="num" style="color:var(--red)">';
    html += fmtNum(Math.round(r.netNext));
    html += ' <span style="font-size:.8em">(T' + (r.nextTier + 2) + ')</span></td>';

    // B74 path
    html += '<td class="num">';
    if (r.neededB74 <= r.prevCount) {
      html += '<span style="color:var(--green)">✓ Have ' + fmtNum(r.prevCount) + '</span>';
    } else if (r.neededB74 < 1e20) {
      var b74pow10 = Math.pow(10, Math.ceil(Math.log10(Math.max(2, r.neededB74))));
      html += fmtNum(r.neededB74);
      html += ' <span style="font-size:.8em;color:var(--text2)">(' + J.JAR_TYPE_NAMES[Math.max(0, r.type - 1)] + ')</span>';
      html += '<br><span style="font-size:.8em;color:var(--text2)">pow10: ' + fmtNum(b74pow10) + ' (have ' + fmtNum(r.prevCount) + ')</span>';
    } else {
      html += '<span style="color:var(--text2)">B74 alone can\'t</span>';
    }
    html += '</td>';

    // Prod path
    html += '<td class="num">';
    if (r.neededProd <= Math.round(prodPerHr)) {
      html += '<span style="color:var(--green)">✓ Have ' + fmtNum(Math.round(prodPerHr)) + '</span>';
    } else {
      html += fmtNum(r.neededProd) + '/hr';
      html += '<br><span style="font-size:.8em;color:var(--text2)">need +' + fmtNum(r.neededProd - Math.round(prodPerHr)) + '</span>';
    }
    html += '</td>';

    html += '</tr>';
  }
  html += '</tbody></table></div>';

  html += '</div></div>';
  return html;
}

function _renderEnchantHistory() {
  var html = '<div id="tab-enchanthistory" class="tab-content">';
  html += '<div class="section"><h2>Enchant History</h2>';
  var history = _loadHistory();
  if (history.length < 1) {
    html += '<p style="color:var(--text2)">Snapshots are saved each time your save loads. Load your save to start tracking.</p>';
  } else {
    html += '<p style="font-size:.82em;color:var(--text2);margin-bottom:8px">' + history.length + ' snapshots recorded.</p>';

    // Current spread grid with inline sparkline history
    html += '<h3>Current Spread</h3>';
    var levels = J.collectibleLevels(saveData);
    var maxLv = 0;
    for (var si = 0; si < 40; si++) {
      for (var hi = 0; hi < history.length; hi++) {
        var sp = history[hi].spread;
        if (sp && sp[si] > maxLv) maxLv = sp[si];
      }
    }
    if (maxLv < 1) maxLv = 1;

    html += '<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;">';
    for (var si = 0; si < 40; si++) {
      if (levels[si] < 1) continue;
      var cname = J.COLLECTIBLE_DATA[si] ? J.COLLECTIBLE_DATA[si][0] : 'C' + si;
      var curLv = history.length > 0 && history[history.length - 1].spread ? (history[history.length - 1].spread[si] || 0) : 0;

      // Build sparkline SVG path
      var svgW = 80, svgH = 36;
      var points = [];
      for (var hi = 0; hi < history.length; hi++) {
        var sp = history[hi].spread;
        var lv = sp ? (sp[si] || 0) : 0;
        var x = history.length > 1 ? (hi / (history.length - 1)) * svgW : svgW / 2;
        var y = svgH - (lv / maxLv * svgH);
        points.push(Math.round(x * 10) / 10 + ',' + Math.round(y * 10) / 10);
      }
      var sparkline = points.length > 1 ? '<polyline points="' + points.join(' ') + '" fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-opacity="0.6"/>' : '';

      html += '<div style="background:var(--bg3);border:1px solid #444;border-radius:4px;padding:4px;text-align:center;position:relative;overflow:hidden;min-height:50px;" title="' + cname + ' (+' + curLv + ')">';
      // Sparkline as background
      html += '<svg width="100%" height="100%" viewBox="0 0 ' + svgW + ' ' + svgH + '" preserveAspectRatio="none" style="position:absolute;top:0;left:0;right:0;bottom:0;opacity:0.5;">' + sparkline + '</svg>';
      // Content
      html += '<div style="position:relative;">';
      html += '<div style="font-size:.6em;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + cname + '</div>';
      html += '<div style="font-size:1.1em;font-weight:700;color:var(--cyan)">+' + curLv + '</div>';
      html += '</div></div>';
    }
    html += '</div>';

    // Table of recent snapshots
    html += '<h3>Recent Snapshots</h3>';
    html += '<table class="data-table"><thead><tr><th>Time</th><th class="num">Total Lvs</th><th class="num">\u0394</th></tr></thead><tbody>';
    var recent = history.slice(-20).reverse();
    for (var ri = 0; ri < recent.length; ri++) {
      var snap = recent[ri];
      var prev = ri < recent.length - 1 ? recent[ri + 1] : null;
      var delta = prev ? snap.total - prev.total : 0;
      var deltaColor = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--text2)';
      html += '<tr>';
      html += '<td>' + new Date(snap.ts).toLocaleString() + '</td>';
      html += '<td class="num">' + snap.total + '</td>';
      html += '<td class="num" style="color:' + deltaColor + '">' + (delta > 0 ? '+' : '') + delta + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';

    // Clear button
    html += '<button id="esim-clear-history" style="margin-top:8px;padding:4px 12px;background:#333;color:var(--text2);border:1px solid #555;border-radius:4px;cursor:pointer;font-size:.8em;">Clear History</button>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function _renderSimResults(r) {
  var html = '';
  var stratLabel = r.strategy === 'smart' ? 'Smart Focus' : r.strategy === 'fixed' ? 'Fixed: ' + r.focusName : 'No Focus';
  html += '<h3>' + r.enchCount + ' enchants \u00d7 ' + r.simCount + ' sims — ' + stratLabel + '</h3>';

  if (r.hasTargets && r.allHitPct != null) {
    var allColor = r.allHitPct >= 0.9 ? 'var(--green)' : r.allHitPct >= 0.5 ? 'var(--gold)' : 'var(--red)';
    html += '<div style="margin-bottom:10px;padding:8px 14px;border-left:3px solid ' + allColor + ';background:rgba(255,255,255,.03)">';
    html += '<b>All targets hit:</b> <span style="color:' + allColor + ';font-size:1.2em;font-weight:700">' + (r.allHitPct * 100).toFixed(1) + '%</span>';
    html += '</div>';
  }

  // Keep index order (matches in-game grid)
  var maxAvg = 0;
  for (var si = 0; si < r.spread.length; si++) { if (r.spread[si].avgLv > maxAvg) maxAvg = r.spread[si].avgLv; }

  html += '<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;">';
  for (var si = 0; si < r.spread.length; si++) {
    var s = r.spread[si];
    if (s.avgLv < 0.01 && !s.target) continue;
    var isFocus = (r.strategy === 'fixed' && s.idx === r.focusIdx);
    var barPct = maxAvg > 0 ? Math.max(2, s.avgLv / maxAvg * 100) : 2;
    var hasTarget = s.target > 0;
    var hitColor = hasTarget ? (s.hitPct >= 0.9 ? 'var(--green)' : s.hitPct >= 0.5 ? 'var(--gold)' : 'var(--red)') : null;
    var borderColor = hasTarget ? hitColor : (isFocus ? 'var(--gold)' : '#444');

    html += '<div style="background:var(--bg3);border:1px solid ' + borderColor + ';border-radius:4px;padding:4px;position:relative;overflow:hidden;text-align:center;">';
    html += '<div style="position:absolute;bottom:0;left:0;right:0;height:' + barPct + '%;background:rgba(77,208,225,.08);"></div>';
    html += '<div style="position:relative;">';
    html += '<div style="font-size:.6em;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + s.name + '">' + s.name + '</div>';
    html += '<div style="font-size:1.1em;font-weight:700;color:var(--cyan)">' + s.avgLv.toFixed(1) + '</div>';
    html += '<div style="font-size:.6em;color:var(--text2)">' + s.minLv + '–' + s.maxLv + '</div>';
    if (hasTarget) {
      html += '<div style="font-size:.65em;margin-top:1px;"><span style="color:' + hitColor + ';font-weight:700">' + (s.hitPct * 100).toFixed(0) + '%</span> →' + s.target + '</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

function _attachSimEvents(ext) {
  // Clear history button
  var clrBtn = document.getElementById('esim-clear-history');
  if (clrBtn) clrBtn.addEventListener('click', function() {
    if (confirm('Clear all enchant history snapshots?')) {
      localStorage.removeItem(_HISTORY_KEY);
      _renderAll();
    }
  });
  var btn = document.getElementById('esim-run');
  if (!btn) return;
  btn.addEventListener('click', function() {
    if (_simRunning) return;
    var enchCount = Number(document.getElementById('esim-target').value) || 50;
    var simCount = Math.min(10000, Math.max(100, Number(document.getElementById('esim-count').value) || 2000));
    var strategy = document.getElementById('esim-strategy').value;
    var focusIdx = Number(document.getElementById('esim-focus').value);

    var levels = J.collectibleLevels(saveData);
    var foundList = [];
    for (var i = 0; i < 40; i++) { if (levels[i] >= 1) foundList.push(i); }
    if (foundList.length === 0) { alert('No collectibles found'); return; }
    var focusChance = 5 / (foundList.length + 3);

    // Gather targets
    var targets = {};
    var targetList = [];
    var inputs = document.querySelectorAll('.esim-tgt');
    inputs.forEach(function(inp) {
      var ci = Number(inp.dataset.cidx);
      var tgt = Number(inp.value) || 0;
      if (tgt > 0) { targets[ci] = tgt; targetList.push(ci); }
    });
    var hasTargets = targetList.length > 0;

    _simRunning = true;
    btn.textContent = 'Running...';
    btn.disabled = true;

    setTimeout(function() {
      var spreadSums = new Array(40); for (var i = 0; i < 40; i++) spreadSums[i] = 0;
      var spreadMins = new Array(40); for (var i = 0; i < 40; i++) spreadMins[i] = Infinity;
      var spreadMaxs = new Array(40); for (var i = 0; i < 40; i++) spreadMaxs[i] = 0;
      var allHit = 0;
      var perTarget = {};
      if (hasTargets) { for (var ci in targets) perTarget[ci] = 0; }

      for (var sim = 0; sim < simCount; sim++) {
        var simLevels = new Array(40);
        for (var i = 0; i < 40; i++) simLevels[i] = levels[i] >= 1 ? 1 : 0;

        for (var e = 0; e < enchCount; e++) {
          var curFocus = -1;
          if (strategy === 'smart' && hasTargets) {
            // Check if all targets are met
            var allMet = true;
            var worstRatio = Infinity;
            for (var ti = 0; ti < targetList.length; ti++) {
              var ci = targetList[ti];
              var curLv = Math.max(0, simLevels[ci] - 1);
              if (curLv < targets[ci]) {
                allMet = false;
                var ratio = targets[ci] > 0 ? curLv / targets[ci] : 1;
                if (ratio < worstRatio) { worstRatio = ratio; curFocus = ci; }
              }
            }
            // Once all targets met, fall back to fixed focus dropdown
            if (allMet && focusIdx >= 0) curFocus = focusIdx;
          } else if (strategy === 'fixed') {
            curFocus = focusIdx;
          }

          var target;
          if (curFocus >= 0 && Math.random() < focusChance) {
            target = curFocus;
          } else {
            target = foundList[Math.floor(Math.random() * foundList.length)];
          }
          simLevels[target]++;
        }

        for (var i = 0; i < 40; i++) {
          var enchLv = Math.max(0, simLevels[i] - 1);
          spreadSums[i] += enchLv;
          if (enchLv < spreadMins[i]) spreadMins[i] = enchLv;
          if (enchLv > spreadMaxs[i]) spreadMaxs[i] = enchLv;
        }

        if (hasTargets) {
          var hitAll = true;
          for (var ci in targets) {
            var enchLv = Math.max(0, simLevels[Number(ci)] - 1);
            if (enchLv >= targets[ci]) perTarget[ci]++;
            else hitAll = false;
          }
          if (hitAll) allHit++;
        }
      }

      var spread = [];
      for (var i = 0; i < 40; i++) {
        if (levels[i] < 1) continue;
        var cname = J.COLLECTIBLE_DATA[i] ? J.COLLECTIBLE_DATA[i][0] : 'Collectible ' + i;
        spread.push({
          idx: i, name: cname,
          avgLv: spreadSums[i] / simCount,
          minLv: spreadMins[i] === Infinity ? 0 : spreadMins[i],
          maxLv: spreadMaxs[i],
          target: targets[i] || 0,
          hitPct: perTarget[i] != null ? perTarget[i] / simCount : null,
        });
      }

      _simResults = {
        spread: spread, enchCount: enchCount, simCount: simCount, strategy: strategy,
        focusIdx: strategy !== 'none' ? (strategy === 'smart' ? -2 : focusIdx) : -1,
        focusName: focusIdx >= 0 ? (J.COLLECTIBLE_DATA[focusIdx] ? J.COLLECTIBLE_DATA[focusIdx][0] : '#' + focusIdx) : '',
        hasTargets: hasTargets,
        allHitPct: hasTargets ? allHit / simCount : null,
      };
      _simRunning = false;

      var el = document.getElementById('esim-results');
      if (el) el.innerHTML = _renderSimResults(_simResults);
      var b = document.getElementById('esim-run');
      if (b) { b.textContent = 'Run Simulation'; b.disabled = false; }
    }, 50);
  });
}
