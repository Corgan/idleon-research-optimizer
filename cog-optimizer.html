<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleOn Cog Board Optimizer</title>
<style>
:root {
  --bg: #101020; --bg2: #181830; --bg3: #222244;
  --text: #ddd; --text2: #888; --accent: #66ccff;
  --green: #6f6; --gold: #ffd700; --orange: #ffa060; --purple: #b388ff;
  --red: #f66; --cyan: #5ff; --border: #333;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); }
h1 { text-align: center; color: var(--gold); padding: 18px 0 4px; font-size: 1.5em; }
.subtitle { text-align: center; color: var(--text2); font-size: .85em; margin-bottom: 14px; }
.container { max-width: 960px; margin: 0 auto; padding: 0 12px 40px; }

/* Import */
.import-box { background: var(--bg2); border-radius: 8px; padding: 14px; margin-bottom: 16px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
.import-box summary { cursor: pointer; font-weight: 600; color: var(--accent); }
.import-box textarea { width: 100%; height: 80px; margin-top: 8px; background: var(--bg); color: var(--text); border: none; box-shadow: inset 0 0 0 1px var(--border); border-radius: 4px; font-size: .82em; font-family: monospace; padding: 6px; resize: vertical; }
.import-msg { font-size: .82em; margin-top: 6px; }
.import-msg.ok { color: var(--green); }
.import-msg.err { color: var(--red); }
.top-bar { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
.top-bar .btn { padding: 6px 16px; background: var(--accent); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: .85em; }
.top-bar .btn:hover { filter: brightness(1.2); }

/* Row 1: stat cards */
.stats-row { display: flex; gap: 10px; margin-bottom: 10px; }
.stat-card {
  flex: 1; background: var(--bg2); border-radius: 8px; padding: 12px 10px; text-align: center;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); cursor: pointer; transition: box-shadow .15s;
  user-select: none;
}
.stat-card:hover { box-shadow: inset 0 0 0 1px rgba(102,204,255,.4); }
.stat-card.active { box-shadow: inset 0 0 0 2px var(--accent); }
.stat-card .label { color: var(--text2); font-size: .78em; margin-bottom: 2px; }
.stat-card .val { font-size: 1.35em; font-weight: 800; }
.stat-card .sub { color: var(--text2); font-size: .78em; margin-top: 2px; }

/* Row 2: optimize + grade */
.opt-grade-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.opt-panel {
  grid-column: 1; background: var(--bg2); border-radius: 8px; padding: 10px 14px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  display: flex; flex-direction: column; gap: 5px; justify-content: center; align-items: center;
}
.opt-line { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
.opt-panel label { color: var(--text2); font-size: .78em; }
.opt-panel select {
  padding: 3px 6px; background: var(--bg); color: var(--accent);
  border: none; box-shadow: inset 0 0 0 1px var(--border); border-radius: 4px; font-size: .8em;
}
.grade-card {
  grid-column: 3; background: var(--bg2); border-radius: 8px;
  padding: 12px 10px; text-align: center;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
}
.grade-card .label { color: var(--text2); font-size: .78em; margin-bottom: 2px; }
.grade-card .val { font-size: 1.8em; font-weight: 900; }
.grade-card .sub { color: var(--text2); font-size: .72em; margin-top: 2px; }
.btn-opt {
  padding: 4px 12px; background: linear-gradient(135deg, var(--accent), #4488ff);
  color: #000; border: none; border-radius: 4px; cursor: pointer;
  font-weight: 700; font-size: .78em;
}
.btn-opt:hover { filter: brightness(1.2); }
.btn-opt:disabled { opacity: .5; cursor: not-allowed; filter: none; }
.progress-bar { height: 4px; background: #111; border-radius: 3px; overflow: hidden; display: none; flex: 1; min-width: 60px; }
.progress-bar .fill { height: 100%; background: var(--accent); transition: width .2s; width: 0; }

/* Row 3: steps panel (hidden until optimized) */
.steps-row {
  display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;
}
.steps-controls {
  grid-column: 1; background: var(--bg2); border-radius: 8px;
  padding: 12px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
}
.steps-controls .step-current {
  font-size: .88em; line-height: 1.4; margin-bottom: 8px; min-height: 52px;
}
.steps-controls .step-progress { font-size: .78em; color: var(--text2); margin-bottom: 6px; }
.steps-controls .step-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.steps-list-panel {
  grid-column: 2 / 4; background: var(--bg2); border-radius: 8px; padding: 10px 12px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  overflow: hidden; position: relative;
}
.steps-list-panel h3 { font-size: .85em; color: var(--cyan); margin-bottom: 6px; }
.swap-list { font-size: .82em; max-height: 108px; overflow-y: auto; scroll-behavior: smooth; }
.swap-step {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: .95em;
}
.swap-step:hover { background: rgba(255,255,255,.04); }
.swap-step .step-num { color: var(--text2); font-weight: 700; min-width: 26px; }
.swap-step .arrow { color: var(--accent); font-weight: 700; }

/* Results banner */
.result-banner {
  background: linear-gradient(135deg, #1a2a3a, #1a3a50);
  box-shadow: inset 0 0 0 1px var(--accent); border-radius: 8px;
  padding: 14px; margin-bottom: 10px; display: none;
}
.result-banner h3 { color: var(--gold); margin-bottom: 6px; font-size: 1em; }
.result-row { display: flex; gap: 16px; flex-wrap: wrap; font-size: .9em; }
.result-item { display: flex; gap: 5px; align-items: baseline; }
.result-item .ri-label { color: var(--text2); }
.result-item .ri-val { font-weight: 700; }
.result-item .ri-delta { font-size: .85em; }
.ri-up { color: var(--green); }
.ri-down { color: var(--red); }
.tiny-result-section { width: 100%; margin-top: 4px; border-top: 1px solid #333; padding-top: 4px; }
.ri-tiny-move { font-size: .85em; color: var(--cyan); padding: 1px 0; }
.ri-tiny-bonus { font-size: .85em; color: var(--text); padding: 1px 0; }

/* Main layout: shelf | tiny-L | board | tiny-R */
.board-area {
  display: flex; gap: 8px; align-items: flex-start; margin-bottom: 16px;
}
.shelf-panel {
  width: 170px; flex-shrink: 0;
  background: var(--bg2); border-radius: 8px; padding: 8px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
}
.shelf-panel h3 { color: var(--cyan); font-size: .9em; margin-bottom: 6px; }
.shelf-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
}
.shelf-cell {
  aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center;
  flex-direction: column; font-weight: 700; cursor: pointer; position: relative;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); border: none; font-size: .7em;
  text-shadow: 0 1px 2px rgba(0,0,0,.8); min-height: 48px;
}
.shelf-cell:hover { box-shadow: inset 0 0 0 1px var(--accent); z-index: 2; transform: scale(1.1); }
.shelf-cell.empty { background: #12121e; color: #333; }
.shelf-cell .grade-badge {
  position: absolute; top: 1px; right: 2px;
  font-size: .65em; font-weight: 800;
  background: #000a; border-radius: 3px; padding: 0 3px; line-height: 1.4;
}
.shelf-cell.shelf-highlight { box-shadow: inset 0 0 0 2px var(--purple); }
.shelf-page-bar {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  margin-top: 6px; font-size: .75em;
}
.shelf-page-bar button {
  background: var(--bg3); color: var(--text); border: none; box-shadow: inset 0 0 0 1px var(--border);
  border-radius: 3px; padding: 2px 8px; cursor: pointer; font-size: 1em;
}
.shelf-page-bar button:hover { box-shadow: inset 0 0 0 1px var(--accent); }
.shelf-page-bar button:disabled { opacity: .3; cursor: default; }
.shelf-page-bar .page-num { color: var(--text2); min-width: 50px; text-align: center; }

/* Tiny cog strips */
.tiny-strip {
  display: flex; flex-direction: column; gap: 2px; width: 32px; flex-shrink: 0;
}
.tiny-cell {
  width: 32px; height: 32px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); border: none; font-size: .5em;
  position: relative; text-shadow: 0 1px 1px rgba(0,0,0,.8);
}
.tiny-cell:hover { box-shadow: inset 0 0 0 1px var(--accent); transform: scale(1.15); z-index: 2; }
.tiny-cell.empty { background: #12121e; color: #333; }
.tiny-cell .sc-lbl { font-size: .8em; line-height: 1; }

/* Board grid */
.board-section { background: var(--bg2); border-radius: 8px; padding: 10px; width: max-content;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); }
.board-section h2 { color: var(--cyan); margin-bottom: 6px; font-size: 1em; }
.board-grid {
  display: grid; grid-template-columns: repeat(12, 52px); grid-template-rows: repeat(8, 52px); gap: 1px;
  background: #0c0c18; padding: 3px; border-radius: 6px;
  box-shadow: inset 0 0 0 1px #1a1a2a;
  width: max-content;
}
.cog-cell {
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  font-weight: 700; cursor: pointer;
  position: relative; transition: all .15s;
  border: none;
  text-shadow: 0 1px 2px rgba(0,0,0,.8);
  font-size: .85em; overflow: hidden;
}
.cog-cell:hover { box-shadow: 0 0 0 2px var(--accent); z-index: 2; transform: scale(1.08); }
.cog-cell.empty { background: #12121e; color: #333; }
.cog-cell.cog-cry0 { background: #3d3518; color: #e8c840; } /* Topaz */
.cog-cell.cog-cry1 { background: #4a1818; color: #f05050; } /* Ruby */
.cog-cell.cog-cry2 { background: #381848; color: #c080f0; } /* Amethyst */
.cog-cell.cog-cry3 { background: #481020; color: #d04048; } /* Garnet */
.cog-cell.cog-cry4 { background: #183818; color: #50d860; } /* Emerald */
.cog-cell.cog-cry5 { background: #182848; color: #60a0f0; } /* Bluegem */
.cog-cell.cog-yellow { background: #4a4010; color: #ffd700; }
.cog-cell.cog-excogia { background: #301850; color: #b888ff; }
.cog-cell.excogia-tl::after { content:''; position:absolute; right:-1px; top:20%; height:60%; width:2px; background:#b888ff; z-index:2; }
.cog-cell.excogia-tl::before { content:''; position:absolute; bottom:-1px; left:20%; width:60%; height:2px; background:#b888ff; z-index:2; }
.cog-cell.excogia-tr::before { content:''; position:absolute; bottom:-1px; left:20%; width:60%; height:2px; background:#b888ff; z-index:2; }
.cog-cell.excogia-bl::after { content:''; position:absolute; right:-1px; top:20%; height:60%; width:2px; background:#b888ff; z-index:2; }
.cog-cell.cog-player { background: #1a3a1a; color: #6f6; }
.cog-cell.cog-standard { background: #3a3018; color: #d4a860; }
.cog-cell.changed { box-shadow: 0 0 0 2px var(--gold); }
.cog-cell .cog-pct { font-size: .75em; line-height: 1; }
.cog-cell .cog-type { font-size: .55em; opacity: .7; line-height: 1; margin-top: 1px; }
.cog-cell .cog-dir {
  position: absolute; bottom: 1px; font-size: .6em;
  opacity: .6; letter-spacing: -.5px;
}
.cog-cell .grade-badge {
  position: absolute; top: 1px; right: 2px;
  font-size: .6em; font-weight: 900;
  background: #000a; border-radius: 3px;
  padding: 0 3px; line-height: 1.4;
}
.shelf-cell .grade-badge {
  position: absolute; top: 1px; right: 2px;
  font-size: .65em; font-weight: 800;
  background: #000a; border-radius: 3px;
  padding: 0 3px; line-height: 1.4;
}
.grade-SSS { color: #ff44ff; text-shadow: 0 0 6px #ff44ff88; }
.grade-SS { color: #ff6644; text-shadow: 0 0 4px #ff664488; }
.grade-S { color: var(--gold); }
.grade-A { color: var(--green); }
.grade-B { color: var(--accent); }
.grade-C { color: var(--orange); }
.grade-D { color: var(--red); }

/* Direction highlight on hover */
.cog-cell.dir-highlight { box-shadow: 0 0 0 2px var(--cyan); z-index: 1; }
.cog-cell.dir-source { box-shadow: 0 0 0 2px var(--gold); z-index: 2; }

/* Board analysis highlights — corner triangles */
.cog-cell.cog-weakest::after,
.cog-cell.cog-best::after {
  content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
  border-style: solid; z-index: 3; pointer-events: none;
}
.cog-cell.cog-weakest::after {
  border-width: 14px 14px 0 0;
  border-color: var(--red) transparent transparent transparent;
}
.cog-cell.cog-best::after {
  border-width: 14px 14px 0 0;
  border-color: var(--gold) transparent transparent transparent;
}

/* Insights panel */
.insights-banner {
  background: var(--bg2); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06); display: none;
}
.insights-banner > h3 { color: var(--cyan); font-size: .9em; margin-bottom: 0; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
.insights-banner > h3 .collapse-arrow { display: inline-block; transition: transform .15s; font-size: .7em; }
.insights-banner > h3 .collapse-arrow.open { transform: rotate(90deg); }
.insights-banner.expanded > h3 { margin-bottom: 8px; }
.insights-columns { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
@media (max-width: 700px) { .insights-columns { grid-template-columns: 1fr; } }
.insight-row { display: flex; gap: 14px; flex-wrap: wrap; font-size: .85em; margin-bottom: 6px; }
.insight-item { display: flex; gap: 6px; align-items: baseline; }
.insight-label { color: var(--text2); font-size: .85em; }
.insight-val { font-weight: 700; }
.insight-section { width: 100%; margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; }
.insight-section h4 { color: var(--orange); font-size: .82em; margin-bottom: 4px; font-weight: 600; }
.suggestion-item { font-size: .82em; padding: 3px 0; line-height: 1.4; }
.suggestion-item .sug-slot { color: var(--cyan); font-weight: 600; }
.suggestion-item .sug-gain { color: var(--green); font-weight: 600; }
.suggestion-item .sug-roll { color: var(--purple); }
/* Roll ranges info box */
.roll-ranges-box { border-left: 1px solid #333; padding-left: 14px; font-size: .82em; }
.roll-ranges-box h4 { color: var(--cyan); font-size: .88em; margin: 0 0 6px; font-weight: 600; }
.rr-tier { margin-bottom: 8px; }
.rr-tier-label { color: var(--gold); font-weight: 600; font-size: .85em; margin-bottom: 2px; }
.rr-row { display: flex; justify-content: space-between; color: var(--text2); line-height: 1.5; }
.rr-row .rr-val { color: var(--text); font-weight: 600; }
.rr-next { margin-top: 8px; padding-top: 6px; border-top: 1px solid #333; color: var(--text2); font-size: .8em; line-height: 1.5; }
.rr-next .rr-gain { color: var(--green); font-weight: 600; }

/* Tooltip */
.cog-tooltip {
  position: fixed; background: #1a1a2e; color: var(--text);
  box-shadow: inset 0 0 0 1px var(--border); border: none; border-radius: 6px;
  padding: 10px 14px; font-size: .82em; max-width: 320px;
  pointer-events: none; z-index: 999; display: none;
  line-height: 1.4;
}
.cog-tooltip .tt-name { font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.cog-tooltip .tt-stat { display: flex; justify-content: space-between; gap: 12px; }
.cog-tooltip .tt-stat .lbl { color: var(--text2); }
.cog-tooltip .tt-stat .val { font-weight: 600; }

/* Small cog type colors */
.sc-flaggy { background: #1a3020; color: var(--green); }
.sc-build  { background: #1a2a38; color: var(--cyan); }
.sc-conexp { background: #2a2a10; color: var(--gold); }
</style>
</head>
<body>
<h1>&#x2699; IdleOn Cog Board Optimizer</h1>
<p class="subtitle">Optimize cog placement for Build Speed, Flaggy Rate, or Player XP</p>
<div class="container">

<!-- Import -->
<details class="import-box" open>
  <summary>&#x1F4CB; Import Save JSON</summary>
  <div style="margin-top:8px;">
    <label style="font-size:.85em;color:var(--text2)">Load save (it.json or save.json):</label>
    <input type="file" id="file-input" accept=".json" style="margin-left:6px;">
  </div>
  <textarea id="json-in" placeholder="...or paste your it.json / save.json contents here..."></textarea>
  <div class="top-bar">
    <button class="btn" id="btn-import">Load Pasted JSON</button>
  </div>
  <div id="import-msg" class="import-msg"></div>
</details>

<!-- Row 1: Stat cards -->
<div id="summary-section" style="display:none">
  <div class="stats-row">
    <div class="stat-card" data-stat="build" onclick="toggleStatOverlay('build')">
      <div class="label">Build Speed</div>
      <div class="val" id="stat-build" style="color:var(--cyan)">—</div>
      <div class="sub" id="stat-build-sub"></div>
    </div>
    <div class="stat-card" data-stat="conexp" onclick="toggleStatOverlay('conexp')">
      <div class="label">Con EXP/hr</div>
      <div class="val" id="stat-conexp" style="color:var(--gold)">—</div>
      <div class="sub" id="stat-conexp-sub"></div>
    </div>
    <div class="stat-card" data-stat="flaggy" onclick="toggleStatOverlay('flaggy')">
      <div class="label">Flaggy Rate</div>
      <div class="val" id="stat-flaggy" style="color:var(--green)">—</div>
      <div class="sub" id="stat-flaggy-sub"></div>
    </div>
  </div>

  <!-- Row 2: Optimize + EXP% + Grade -->
  <div class="opt-grade-row">
    <div class="opt-panel">
      <div class="opt-line">
        <button class="btn-opt" id="btn-optimize" onclick="runOptimizer()" disabled>&#x1F680; Optimize</button>
        <button class="btn-opt" id="btn-perfect" onclick="showPerfectBoard()" disabled style="background:linear-gradient(135deg,#b8860b,#8b6914)">&#x1F451; Perfect Board</button>
        <button class="btn-opt" id="btn-reset" onclick="resetBoard()" style="background:linear-gradient(135deg,#666,#444);display:none">&#x21BA; Reset</button>
      </div>
      <div class="opt-line">
        <div class="progress-bar" id="opt-progress"><div class="fill" id="opt-progress-fill"></div></div>
        <div id="opt-status" style="font-size:.75em;color:var(--text2)"></div>
      </div>
    </div>
    <div class="grade-card" style="grid-column:2">
      <div class="label">Player EXP %</div>
      <div class="val" id="stat-exppct" style="color:var(--purple)">—</div>
      <div class="sub" id="stat-exppct-sub"></div>
    </div>
    <div class="grade-card">
      <div class="label">Grade</div>
      <div class="val" id="board-grade" style="color:var(--gold)">—</div>
      <div class="sub" id="board-grade-sub"></div>
    </div>
  </div>

  <!-- Row 3: Steps (hidden until optimize) -->
  <div class="steps-row" id="steps-row">
    <div class="steps-controls">
      <div class="step-progress" id="swap-progress">Step 0 / 0</div>
      <div class="step-current" id="swap-current"></div>
      <div class="step-btns">
        <button class="btn-opt" id="btn-swap-prev" onclick="swapStep(-1)" style="padding:5px 14px;font-size:.82em;background:linear-gradient(135deg,#666,#444)">&#x25C0; Prev</button>
        <button class="btn-opt" id="btn-swap-next" onclick="swapStep(1)" style="padding:5px 14px;font-size:.82em">Next &#x25B6;</button>
        <button class="btn-opt" id="btn-swap-done" onclick="finishMoving()" style="padding:5px 14px;font-size:.82em;background:linear-gradient(135deg,var(--green),#080);display:none">&#x2714; Done</button>
      </div>
    </div>
    <div class="steps-list-panel">
      <h3>Swap List</h3>
      <div class="swap-list" id="swap-list"></div>
    </div>
  </div>

  <!-- Results banner -->
  <div class="result-banner" id="result-banner">
    <h3>&#x2728; Result</h3>
    <div class="result-row" id="result-row"></div>
  </div>

  <!-- Board insights -->
  <div class="insights-banner" id="insights-banner">
    <h3 onclick="toggleInsights()"><span class="collapse-arrow" id="insights-arrow">&#x25B6;</span>&#x1F50D; Board Insights</h3>
    <div class="insights-columns" id="insights-body" style="display:none">
      <div id="insights-content"></div>
      <div class="roll-ranges-box" id="roll-ranges-box"></div>
    </div>
  </div>
</div>

<!-- Main board area -->
<div id="board-container" style="display:none">
  <div class="board-area">
    <!-- Shelf (left) -->
    <div class="shelf-panel" id="shelf-panel">
      <h3>&#x1F4E6; Shelf</h3>
      <div class="shelf-grid" id="shelf-grid"></div>
      <div class="shelf-page-bar">
        <button id="shelf-prev" onclick="shelfPage(-1)">&#x25C0;</button>
        <span class="page-num" id="shelf-page-num">1/1</span>
        <button id="shelf-next" onclick="shelfPage(1)">&#x25B6;</button>
      </div>
    </div>

    <!-- Tiny cogs left -->
    <div class="tiny-strip" id="tiny-left"></div>

    <!-- Board -->
    <div class="board-section" style="flex:1;min-width:0">
      <div class="board-grid" id="board-current"></div>
    </div>

    <!-- Tiny cogs right -->
    <div class="tiny-strip" id="tiny-right"></div>
  </div>

</div>

</div>

<div class="cog-tooltip" id="cog-tooltip"></div>

<script type="module">
'use strict';

import { loadSaveData } from './js/save/loader.js';
import { saveData } from './js/state.js';
import {
  BOARD_SIZE, BOARD_W, BOARD_H,
  COG_MATRICES, DIR_TO_INDEX,
  computeBoardTotals, scoreBoard,
  boardFromSave, extractAllCogs, classifyCog,
  slotToPos, posToSlot, recoverRawPlayerStats,
  optimizeTinyCogs, cogAffectsPlayer, boardGradeContext
} from './js/cogs/cog-board.js';
import { judgeCog, findMaxConLevel, perfectCogStats, cogStatTier, parseSmallCog, judgeSmallCog, clearOddsCache, warmOddsCache } from './js/cogs/cog-judge.js';
import { optimizeAsync } from './js/cogs/cog-optimizer.js';
import { fmtVal } from './js/renderers/format.js';

/* ========== STATE ========== */
var COG_ORDER = null, COG_MAP = null;
var CURRENT_BOARD = null, SAVE_BOARD = null;
var CURRENT_TOTALS = null, SAVE_TOTALS = null;
var ALL_COGS = null, MAX_CON_LV = 100, SAVE_OBJ = null;
var OPT_RESULT = null, IS_OPTIMIZED = false, IS_PERFECT = false;
var SAVE_COG_ORDER_TINY = null, SAVE_TINY_BOARD = null;
var SWAP_STEPS = null, SWAP_INDEX = -1, SWAP_MODE = false;
var SHELF_PAGE = 0, SHELF_PER_PAGE = 15;
var ACTIVE_STAT_OVERLAY = 'conexp';
var CURRENT_INSIGHTS = null;
var FLUO_FLAGGY_MULT = 1; // Fluorescent Flaggies gem shop: 1 + 50*GemItemsPurchased[118]/100
var DAILY_CRYSTAL_ROLLS = 1; // 1 + Math.round(Cog_Lover_level * 2)
var GRID69_TIER_UP_PCT = 0; // Grid node 69 "Adequate Sized, Actually": level * 50% chance for +1 tiny cog tier
function dailyRollsForTier(tier) { return tier >= 4 ? DAILY_CRYSTAL_ROLLS : 50; }
function smallCogEffectiveOneInN(baseLevel) {
  // With grid 69, there's a GRID69_TIER_UP_PCT% chance that a cog rolled at (baseLevel-1) gets bumped to baseLevel.
  // P(exactly level L) without grid69: 0.5^(L+1) for L<9, 0.5^9 for L=9
  // With grid69 tier-up chance p:
  //   P(get L) = (1-p)*P_base(L) + p*P_base(L-1)  [you can reach L by rolling L naturally, or rolling L-1 and getting bumped]
  // For odds display: effective P(>= L) = P_base(>= L) + p * P_base(exactly L-1)
  // Simplified: oneInN for level L accounting for tier-up
  if (baseLevel <= 0) return 1;
  var p = GRID69_TIER_UP_PCT / 100;
  var pBase = Math.pow(0.5, baseLevel); // P(>= baseLevel) without boost
  var pPrev = baseLevel >= 1 ? Math.pow(0.5, baseLevel) : 0; // P(exactly baseLevel-1) = 0.5^baseLevel
  var pEff = pBase + p * pPrev;
  return pEff > 0 ? Math.round(1 / pEff) : 1;
}
function smallCogMinObtainableTier() {
  // At 100% tier-up, tier 0 is impossible (always bumped to 1+)
  return GRID69_TIER_UP_PCT >= 100 ? 1 : 0;
}


/* ========== IMPORT ========== */
function doImport() {
  var txt = document.getElementById('json-in').value.trim();
  if (!txt) return showMsg('Paste save JSON first', true);
  try { loadFromParsed(JSON.parse(txt)); }
  catch (e) { showMsg('Invalid JSON: ' + e.message, true); }
}
document.getElementById('btn-import').addEventListener('click', doImport);

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try { loadFromParsed(JSON.parse(ev.target.result)); }
    catch (err) { showMsg('Failed to parse file: ' + err.message, true); }
  };
  reader.readAsText(file);
});

function loadFromParsed(parsed) {
  try {
    SAVE_OBJ = parsed.data || parsed;
    loadSaveData(parsed);
    COG_ORDER = saveData.cogOrderData;
    COG_MAP = saveData.cogMapData;
    if (!Array.isArray(COG_ORDER) || COG_ORDER.length < 96 || !COG_MAP)
      return showMsg('No cog data (CogO/CogM) found in save', true);
    MAX_CON_LV = findMaxConLevel(SAVE_OBJ, COG_ORDER, COG_MAP);
    clearOddsCache();
    warmOddsCache(MAX_CON_LV);
    CURRENT_BOARD = boardFromSave(COG_ORDER, COG_MAP);
    recoverRawPlayerStats(CURRENT_BOARD);
    SAVE_BOARD = cloneBoard(CURRENT_BOARD);
    ALL_COGS = extractAllCogs(COG_ORDER, COG_MAP, saveData.flagUnlockData);
    // Fluorescent Flaggies gem shop bonus (game: GenINFO[12][2] *= 1 + 50*GemItemsPurchased[118]/100)
    var gip = saveData.gemItemsData || [];
    FLUO_FLAGGY_MULT = 1 + 50 * (Number(gip[118]) || 0) / 100;
    // Daily crystal cog claims: 1 + legendPTSbonus(18) where perPt=2
    var cogLoverLv = Number((saveData.spelunkData && saveData.spelunkData[18] && saveData.spelunkData[18][18]) || 0);
    DAILY_CRYSTAL_ROLLS = 1 + Math.round(cogLoverLv * 2);
    // Grid node 69: "Adequate Sized, Actually" — level * 50% chance for +1 tiny cog tier
    var gridLevels = saveData.gridLevels || [];
    GRID69_TIER_UP_PCT = Math.min((Number(gridLevels[69]) || 0) * 50, 100);
    CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
    SAVE_TOTALS = CURRENT_TOTALS;
    IS_OPTIMIZED = false; IS_PERFECT = false; OPT_RESULT = null; SHELF_PAGE = 0;
    showMsg('Loaded! ' + countFilled(CURRENT_BOARD) + '/96 board cogs, ' +
            ALL_COGS.shelfCogs.length + ' shelf | Max Con Lv: ' + MAX_CON_LV +
            ' | Crystal/day: ' + DAILY_CRYSTAL_ROLLS, false);
    document.getElementById('summary-section').style.display = '';
    document.getElementById('board-container').style.display = '';
    document.getElementById('btn-optimize').disabled = false;
    document.getElementById('btn-perfect').disabled = false;
    renderAll(); hideOptButtons(); hideSwapGuide();
  // Set conexp card active by default
  var cards = document.querySelectorAll('.stat-card');
  cards.forEach(function(c) { c.classList.toggle('active', c.dataset.stat === ACTIVE_STAT_OVERLAY); });
  } catch (e) { showMsg('Error loading save: ' + e.message, true); console.error(e); }
}

function renderAll() {
  renderStats(CURRENT_TOTALS);
  renderBoardJudge();
  renderBoard('board-current', CURRENT_BOARD, null);
  renderInsights();
  renderShelf();
  renderSmallCogs();
}

function countFilled(board) {
  var c = 0; for (var i = 0; i < BOARD_SIZE; i++) if (board[i]) c++; return c;
}

function showMsg(msg, isErr) {
  var el = document.getElementById('import-msg');
  el.textContent = msg;
  el.className = 'import-msg ' + (isErr ? 'err' : 'ok');
}

/* ========== STATS ========== */
function computeTinyCogBonus(type) {
  if (!ALL_COGS || !ALL_COGS.tinyBoard) return 0;
  var total = 0;
  for (var i = 0; i < ALL_COGS.tinyBoard.length; i++) {
    var cog = ALL_COGS.tinyBoard[i];
    if (!cog) continue;
    var sm = parseSmallCog(cog.name);
    if (sm && sm.type === type) total += sm.bonus;
  }
  return total;
}

// Game: GenINFO[12][1] = totalD * (1 + SmallCogBonusTOTAL(2)/100)
function effectivePlayerXpBonus(totalConExp) {
  var tinyCogExp = computeTinyCogBonus(2);
  return totalConExp * (1 + tinyCogExp / 100);
}

function renderStats(totals, baseTotals) {
  document.getElementById('stat-build').textContent = fmtBig(totals.totalBuild);
  document.getElementById('stat-conexp').textContent = fmtBig(totals.playerConExpHr || 0);
  document.getElementById('stat-flaggy').textContent = fmtBig(totals.totalFlaggy * FLUO_FLAGGY_MULT);
  var xpBonus = effectivePlayerXpBonus(totals.totalConExp);
  document.getElementById('stat-exppct').textContent = '+' + fmtPct(xpBonus);
  if (baseTotals) {
    renderDelta('stat-build-sub', baseTotals.totalBuild, totals.totalBuild);
    renderDelta('stat-conexp-sub', baseTotals.playerConExpHr || 0, totals.playerConExpHr || 0);
    renderDelta('stat-flaggy-sub', baseTotals.totalFlaggy * FLUO_FLAGGY_MULT, totals.totalFlaggy * FLUO_FLAGGY_MULT);
    var oldXpBonus = effectivePlayerXpBonus(baseTotals.totalConExp);
    renderDelta('stat-exppct-sub', oldXpBonus, xpBonus, true);
  } else {
    document.getElementById('stat-build-sub').textContent = '';
    document.getElementById('stat-conexp-sub').textContent = '';
    document.getElementById('stat-flaggy-sub').textContent = '';
    document.getElementById('stat-exppct-sub').textContent = '';
  }
}

function renderDelta(id, oldVal, newVal, isPct) {
  var el = document.getElementById(id);
  var delta = newVal - oldVal;
  if (Math.abs(delta) < 0.01) { el.textContent = ''; el.style.color = ''; return; }
  var sign = delta > 0 ? '+' : '';
  el.textContent = sign + (isPct ? fmtPct(delta) : fmtBig(delta));
  el.style.color = delta > 0 ? 'var(--green)' : 'var(--red)';
}

/* ========== BOARD JUDGE ========== */
var GRADE_RANK = { SSS:7, SS:6, S:5, A:4, B:3, C:2, D:1, F:0, '?':-1, '-':-1 };
function renderBoardJudge() {
  var gradeEl = document.getElementById('board-grade');
  var subEl = document.getElementById('board-grade-sub');
  if (!CURRENT_BOARD) { gradeEl.textContent = '\u2014'; subEl.textContent = ''; return; }
  var ctx = boardGradeContext(CURRENT_BOARD);
  var statMode = ACTIVE_STAT_OVERLAY || 'conexp';
  var totalRank = 0, count = 0;
  for (var i = 0; i < BOARD_SIZE; i++) {
    var cog = CURRENT_BOARD[i]; if (!cog) continue;
    var tier = cogStatTier(cog.name); if (tier < 0) continue;
    var ap = cogAffectsPlayer(CURRENT_BOARD, i);
    var j = judgeCog(cog, tier, MAX_CON_LV, { affectsPlayer: ap, totalBaseD: ctx.totalBaseD, totalSurround: ctx.totalSurround, dailyRolls: dailyRollsForTier(tier), statMode: statMode });
    if (j.grade && GRADE_RANK[j.grade] >= 0) { totalRank += GRADE_RANK[j.grade]; count++; }
  }
  if (count === 0) { gradeEl.textContent = '\u2014'; subEl.textContent = 'No gradeable cogs'; return; }
  var avgRank = totalRank / count;
  var grade = avgRank >= 6.5 ? 'SSS' : avgRank >= 5.5 ? 'SS' : avgRank >= 4.5 ? 'S' : avgRank >= 3.5 ? 'A' : avgRank >= 2.5 ? 'B' : avgRank >= 1.5 ? 'C' : 'D';
  gradeEl.className = 'val grade-' + grade;
  gradeEl.textContent = grade;
  subEl.textContent = 'Avg rank ' + avgRank.toFixed(1) + ' (' + count + ' cogs)';
}

/* ========== BOARD INSIGHTS ========== */
function computeBoardInsights(board, goal) {
  if (!board) return null;
  var baseTotals = computeBoardTotals(board);
  var baseScore = scoreBoard(baseTotals, goal, board);
  if (baseScore <= 0) return null;

  var goalSurr = goal === 'build' ? 'e' : goal === 'flaggy' ? 'g' : 'f';
  var goalBase = goal === 'build' ? 'a' : goal === 'flaggy' ? 'c' : 'd';
  var goalSurrLabel = goal === 'build' ? 'Build Surr (e)' : goal === 'flaggy' ? 'Flaggy Surr (g)' : 'ConExp Surr (f)';

  // Compute marginal impact for each movable cog
  var impacts = [];
  for (var i = 0; i < BOARD_SIZE; i++) {
    var cog = board[i];
    if (!cog) continue;
    var cls = classifyCog(cog.name);
    if (cls.type === 'player' || cls.type === 'excogia' || cls.type === 'yellow') continue;
    var saved = board[i];
    board[i] = null;
    var tmpTotals = computeBoardTotals(board);
    var tmpScore = scoreBoard(tmpTotals, goal, board);
    board[i] = saved;
    impacts.push({ slot: i, delta: baseScore - tmpScore, cog: cog, pct: (baseScore - tmpScore) / baseScore * 100 });
  }
  if (impacts.length === 0) return null;

  impacts.sort(function(a, b) { return a.delta - b.delta; });
  var weakest = impacts[0];
  var best = impacts[impacts.length - 1];

  // Roll targets: for the weakest slots, describe what to roll for
  var rollTargets = [];
  var numUp = Math.min(5, impacts.length);
  for (var u = 0; u < numUp; u++) {
    var imp = impacts[u];
    var cog = imp.cog;
    var slot = imp.slot;
    var pos = slotToPos(slot);
    var cls = classifyCog(cog.name);
    var tier = cls.tier >= 0 ? cls.tier : (cls.type === 'crystal' ? 4 : -1);
    var ap = cogAffectsPlayer(board, slot);

    var why = '';
    var roll = '';

    if (tier >= 0 && tier < 3) {
      // Low-tier cog — always suggest upgrading to Ulti
      why = 'T' + tier + ' cog (low tier)';
      if (ap) {
        roll = 'Roll Ulti directional with ' + goalSurrLabel + ' \u2265 15%';
      } else {
        roll = 'Roll any Ulti cog with high ' + goalBase;
      }
    } else if (ap && !cog.h) {
      // Non-directional next to player
      why = 'no direction (player-adjacent)';
      roll = 'Roll Ulti directional hitting player, with ' + goalSurrLabel + ' \u2265 15%';
    } else if (ap && cog.h && !(cog[goalSurr] > 0)) {
      // Has direction but wrong surround type
      why = 'has ' + cog.h + ' direction but no ' + goalSurrLabel;
      roll = 'Roll Ulti ' + cog.h + ' with ' + goalSurrLabel;
    } else if (ap && cog.h && (cog[goalSurr] || 0) < 15) {
      // Has the right surround but too low
      why = goalSurr + ' = ' + (cog[goalSurr]||0) + '% (low)';
      roll = 'Roll Ulti ' + cog.h + ' with ' + goalSurr + ' > ' + (cog[goalSurr]||0) + '%';
    } else if (!cog.h) {
      // Non-directional Ulti not near player
      why = goalBase + ' = ' + fmtBig(cog[goalBase]||0) + ', non-directional';
      roll = 'Roll Ulti with ' + goalBase + ' > ' + fmtBig(cog[goalBase]||0);
    } else {
      // Directional but low base stats
      why = goalBase + ' = ' + fmtBig(cog[goalBase]||0) + ' (low)';
      roll = 'Roll Ulti with ' + goalBase + ' > ' + fmtBig(cog[goalBase]||0);
      if (ap && cog[goalSurr] > 0) roll += ' + ' + goalSurr + ' > ' + (cog[goalSurr]||0) + '%';
    }

    rollTargets.push({ slot: slot, pos: pos, cog: cog, why: why, roll: roll, pct: imp.pct, delta: imp.delta });
  }

  return { weakest: weakest, best: best, impacts: impacts, rollTargets: rollTargets.slice(0, 3), baseScore: baseScore };
}

function toggleInsights() {
  var body = document.getElementById('insights-body');
  var arrow = document.getElementById('insights-arrow');
  var panel = document.getElementById('insights-banner');
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  arrow.classList.toggle('open', !open);
  panel.classList.toggle('expanded', !open);
}

function renderInsights() {
  var panel = document.getElementById('insights-banner');
  var content = document.getElementById('insights-content');
  if (!CURRENT_BOARD) { panel.style.display = 'none'; return; }

  var goal = ACTIVE_STAT_OVERLAY || 'conexp';
  var ins = computeBoardInsights(CURRENT_BOARD, goal);
  CURRENT_INSIGHTS = ins;
  if (!ins) { panel.style.display = 'none'; return; }

  var html = '<div class="insight-row">';

  // Weakest cog
  var wPos = slotToPos(ins.weakest.slot);
  html += '<div class="insight-item"><span class="insight-label">\u274C Weakest:</span> ';
  html += '<span class="insight-val" style="color:var(--red)">' + esc(cogDisplayName(ins.weakest.cog.name)) + '</span>';
  html += ' <span class="insight-label">at (' + wPos.col + ',' + wPos.row + ') \u2014 ';
  if (ins.weakest.delta <= 0) html += 'hurting score by ' + fmtBig(Math.abs(ins.weakest.delta));
  else html += 'contributes ' + ins.weakest.pct.toFixed(2) + '%';
  html += '</span></div>';
  html += '</div>';

  // Best cog
  html += '<div class="insight-row">';
  var bPos = slotToPos(ins.best.slot);
  html += '<div class="insight-item"><span class="insight-label">\u2B50 Strongest:</span> ';
  html += '<span class="insight-val" style="color:var(--gold)">' + esc(cogDisplayName(ins.best.cog.name)) + '</span>';
  html += ' <span class="insight-label">at (' + bPos.col + ',' + bPos.row + ') \u2014 contributes ' + ins.best.pct.toFixed(2) + '%</span></div>';
  html += '</div>';

  // Roll targets
  if (ins.rollTargets.length > 0) {
    html += '<div class="insight-section"><h4>&#x1F3AF; What to Roll For</h4>';
    for (var i = 0; i < ins.rollTargets.length; i++) {
      var rt = ins.rollTargets[i];
      html += '<div class="suggestion-item">';
      html += '<span class="sug-slot">(' + rt.pos.col + ',' + rt.pos.row + ')</span> ';
      html += '<span style="color:var(--text)">' + esc(cogDisplayName(rt.cog.name)) + '</span>';
      html += ' <span class="insight-label">\u2014 ' + rt.why + '</span><br>';
      html += '<span style="margin-left:42px" class="sug-roll">\u2192 ' + rt.roll + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  content.innerHTML = html;
  panel.style.display = 'block';

  // Render roll ranges info box
  renderRollRanges(goal);

  // Apply highlights to board cells
  applyInsightHighlights(ins);
}

function _rollRangeStats(tier, conLv) {
  // Compute min/max for each stat at this tier+conLv
  // rawMag formula from cog-judge
  var rawMag = Math.pow(3, Math.min(3.4, tier)) + 0.25 * Math.pow(conLv / 3 + 0.7, 1.4 + 0.05 * tier);
  var minMult = 0.4, maxMult = 3.0;
  var minRolls = tier < 2 ? 2 : 3;
  var maxRolls = tier < 2 ? 3 : 4;

  // Per-roll value range
  var minV = Math.floor(minMult * rawMag);
  var maxV = Math.floor(maxMult * rawMag);

  // Max per stat = all rolls land on that stat with max multiplier
  // Min per stat = 0 (no rolls may land on it)
  var maxA = Math.round(maxV) * maxRolls;
  var maxC = Math.round(Math.pow(Math.max(maxV, 1), 0.8)) * maxRolls;

  function dConvert(v) { return Math.max(Math.floor(Math.pow(Math.max(v,1), 0.4) + 10 * Math.log(Math.max(v,1)) / 2.30259 - 5), 2); }
  var maxD = dConvert(maxV) * maxRolls;

  // Surround ranges — fixed per tier, NOT con-level dependent
  // T0: 5-10, T1: 8-15, T2: 12-40, T3: 20-65
  // Crystal: 30-40 + 23*(cryLv+1)
  var surrRanges = [
    [5, 10], [8, 15], [12, 40], [20, 65]
  ];
  var minSurr, maxSurr;
  if (tier <= 3) {
    minSurr = surrRanges[tier][0];
    maxSurr = surrRanges[tier][1];
  } else {
    // Crystal tier: depends on crystal upgrade level, show range for max (CogCry4 = emerald)
    minSurr = 30 + 23 * 1;  // CogCry0 upgrade = level 1
    maxSurr = 40 + 23 * 5;  // CogCry4 upgrade = level 5
  }

  return { maxA: maxA, maxC: maxC, maxD: maxD, perRollA: Math.round(maxV), perRollC: Math.round(Math.pow(Math.max(maxV, 1), 0.8)), perRollD: dConvert(maxV), perRollMinA: Math.round(minV), perRollMinC: Math.round(Math.pow(Math.max(minV, 1), 0.8)), perRollMinD: dConvert(minV), maxRolls: maxRolls, minSurr: minSurr, maxSurr: maxSurr, rawMag: rawMag };
}

function renderRollRanges(goal) {
  var box = document.getElementById('roll-ranges-box');
  if (!box) return;

  var conLv = MAX_CON_LV;
  var goalBase = goal === 'build' ? 'a' : goal === 'flaggy' ? 'c' : 'd';
  var goalLabel = goal === 'build' ? 'Build (a)' : goal === 'flaggy' ? 'Flaggy (c)' : 'ConExp (d)';

  var tiers = [
    { tier: 3, name: 'Ulti (T3)' },
    { tier: 4, name: 'Jewelled (T4)' }
  ];

  var html = '<h4>&#x1F3B2; Roll Ranges <span style="color:var(--text2);font-weight:400">(Con Lv ' + conLv + ')</span></h4>';

  // Find con level needed for next increase in a roll stat field
  function _findConForPlus1(tier, field) {
    var cur = _rollRangeStats(tier, conLv);
    var curVal = cur[field];
    for (var test = conLv + 1; test <= conLv + 500; test++) {
      var ts = _rollRangeStats(tier, test);
      if (ts[field] > curVal) return { needed: test, from: curVal, to: ts[field] };
    }
    return { needed: conLv + 500, from: curVal, to: curVal + 1 };
  }

  var maxField = goalBase === 'a' ? 'perRollA' : goalBase === 'c' ? 'perRollC' : 'perRollD';
  var minField = goalBase === 'a' ? 'perRollMinA' : goalBase === 'c' ? 'perRollMinC' : 'perRollMinD';

  for (var t = 0; t < tiers.length; t++) {
    var info = tiers[t];
    var s = _rollRangeStats(info.tier, conLv);

    var maxStat, perRoll, perRollMin;
    if (goalBase === 'a') { maxStat = s.maxA; perRoll = s.perRollA; perRollMin = s.perRollMinA; }
    else if (goalBase === 'c') { maxStat = s.maxC; perRoll = s.perRollC; perRollMin = s.perRollMinC; }
    else { maxStat = s.maxD; perRoll = s.perRollD; perRollMin = s.perRollMinD; }

    var nMax = _findConForPlus1(info.tier, maxField);
    var nMin = _findConForPlus1(info.tier, minField);

    html += '<div class="rr-tier">';
    html += '<div class="rr-tier-label">' + info.name + ' <span style="color:var(--text2);font-weight:400">(' + s.maxRolls + ' rolls)</span></div>';
    html += '<div class="rr-row"><span>Per-roll:</span> <span class="rr-val">' + perRollMin + ' \u2013 ' + perRoll + '</span></div>';
    html += '<div class="rr-row"><span>Total max:</span> <span class="rr-val">' + maxStat.toLocaleString() + ' <span style="color:var(--text2)">(' + perRoll + ' \u00d7 ' + s.maxRolls + ')</span></span></div>';
    html += '<div class="rr-row" style="margin-top:2px"><span>Lv ' + nMin.needed + ' <span style="color:var(--text2);font-weight:400">(+' + (nMin.needed - conLv) + ')</span>:</span> <span class="rr-val">' + nMin.to + ' <span style="color:var(--text2)">min</span></span></div>';
    html += '<div class="rr-row"><span>Lv ' + nMax.needed + ' <span style="color:var(--text2);font-weight:400">(+' + (nMax.needed - conLv) + ')</span>:</span> <span class="rr-val">' + nMax.to + ' <span style="color:var(--text2)">max</span></span></div>';
    html += '</div>';
  }

  // Tiny cog tier-up info
  if (GRID69_TIER_UP_PCT > 0) {
    html += '<div class="rr-next">';
    html += '<div style="margin-bottom:4px"><b>Tiny Cog Tier-Up:</b></div>';
    html += '<div class="rr-row"><span>Grid 69 bonus:</span> <span class="rr-val" style="color:var(--green)">' + GRID69_TIER_UP_PCT + '%</span></div>';
    var minTier = smallCogMinObtainableTier();
    if (minTier > 0) {
      html += '<div class="rr-row"><span style="color:var(--red)">T1' + (minTier > 1 ? '\u2013T' + minTier : '') + ' unobtainable</span></div>';
    }
    html += '</div>';
  }

  box.innerHTML = html;
}

function applyInsightHighlights(ins) {
  var container = document.getElementById('board-current');
  if (!container || !ins) return;
  var cells = container.children;
  for (var i = 0; i < cells.length; i++) {
    cells[i].classList.remove('cog-weakest', 'cog-best');
  }
  if (ins.weakest && cells[ins.weakest.slot]) cells[ins.weakest.slot].classList.add('cog-weakest');
  if (ins.best && cells[ins.best.slot]) cells[ins.best.slot].classList.add('cog-best');
}

/* ========== BOARD RENDERING ========== */
var DIR_SHORT = {
  row: '\u27F7', column: '\u27F0', around: '\u2726', everything: '\u2605',
  adjacent: '\uFF0B', diagonal: '\u2715', left: '\u2190', right: '\u2192',
  up: '\u2191', down: '\u2193', corners: '\u25C7'
};

function makeCogCell(cog, idx, refBoard, extraClass) {
  var cell = document.createElement('div');
  cell.className = extraClass || 'cog-cell';
  cell.dataset.slot = idx;
  if (!cog) { cell.classList.add('empty'); return cell; }

  var cls = classifyCog(cog.name);
  var statMode = ACTIVE_STAT_OVERLAY || 'conexp';
  var baseKey = statMode === 'build' ? 'a' : statMode === 'flaggy' ? 'c' : 'd';
  var surrKey = statMode === 'build' ? 'e' : statMode === 'flaggy' ? 'g' : 'f';
  var pctVal, pctSuffix;
  if (baseKey === 'd') { pctVal = cog.d || 0; pctSuffix = '%'; }
  else { pctVal = cog[baseKey] || 0; pctSuffix = ''; }
  var typeLabel = '';

  if (cls.type === 'crystal') cell.classList.add('cog-cry' + cog.name.replace('CogCry', ''));
  else if (cls.type === 'yellow') cell.classList.add('cog-yellow');
  else if (cls.type === 'excogia') {
    cell.classList.add('cog-excogia');
    var piece = parseInt(cog.name.substring(5)) || 0;
    cell.classList.add(['excogia-tl','excogia-tr','excogia-bl','excogia-br'][piece] || 'excogia-tl');
  }
  else if (cls.type === 'player') {
    cell.classList.add('cog-player');
    var cn = cog.name.replace('Player_', '');
    typeLabel = cn.length > 5 ? cn.substring(0, 5) : cn;
    pctVal = -1;
  } else if (cls.type === 'standard') {
    cell.classList.add('cog-standard');
    typeLabel = 'T' + cls.tier;
  } else if (cls.type === 'small') {
    cell.classList.add('cog-small');
    var sm = parseSmallCog(cog.name);
    if (sm) {
      cell.classList.add(SM_TYPE_CLASSES[sm.type] || '');
      typeLabel = 'T' + (sm.level + 1);
    }
    pctVal = -1;
  } else cell.classList.add('empty');

  if (pctVal >= 0) {
    var ps = document.createElement('div'); ps.className = 'cog-pct';
    ps.textContent = pctSuffix ? pctVal + pctSuffix : fmtBig(pctVal); cell.appendChild(ps);
  }
  if (typeLabel) {
    var lbl = document.createElement('div'); lbl.className = 'cog-type';
    lbl.textContent = typeLabel; cell.appendChild(lbl);
  }

  var tierNum = cogStatTier(cog.name);
  if (tierNum >= 0 && idx >= 0 && idx < BOARD_SIZE && CURRENT_BOARD) {
    var ap = cogAffectsPlayer(CURRENT_BOARD, idx);
    var _ctx = boardGradeContext(CURRENT_BOARD);
    var judgment = judgeCog(cog, tierNum, MAX_CON_LV, { affectsPlayer: ap, totalBaseD: _ctx.totalBaseD, totalSurround: _ctx.totalSurround, dailyRolls: dailyRollsForTier(tierNum), statMode: statMode });
    if (judgment.grade && judgment.grade !== '?' && judgment.grade !== '-') {
      var badge = document.createElement('div');
      badge.className = 'grade-badge grade-' + judgment.grade;
      badge.textContent = judgment.grade; cell.appendChild(badge);
    }
    var surrVal = cog[surrKey] || 0;
    if (ap && surrVal && cog.h) {
      var dirEl = document.createElement('div'); dirEl.className = 'cog-dir';
      dirEl.textContent = '▸' + surrVal + '%'; cell.appendChild(dirEl);
    }
  }

  // Yin/yang cogs: show directional surround if present
  if (tierNum < 0 && idx >= 0 && idx < BOARD_SIZE && cog.h) {
    var yySurr = cog[surrKey] || 0;
    if (yySurr) {
      var dirEl2 = document.createElement('div'); dirEl2.className = 'cog-dir';
      dirEl2.textContent = '▸' + yySurr + '%'; cell.appendChild(dirEl2);
    }
  }

  if (refBoard) {
    var rc = refBoard[idx];
    if ((rc ? rc.name : 'Blank') !== cog.name) cell.classList.add('changed');
  }
  return cell;
}

function renderBoard(containerId, board, refBoard) {
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  for (var i = 0; i < BOARD_SIZE; i++) {
    var cell = makeCogCell(board[i], i, refBoard, 'cog-cell');
    cell.addEventListener('mouseenter', showTooltip);
    cell.addEventListener('mousemove', moveTooltip);
    cell.addEventListener('mouseleave', hideTooltip);
    container.appendChild(cell);
  }
}

/* ========== SHELF (paginated, positional) ========== */
function renderShelf() {
  var grid = document.getElementById('shelf-grid');
  grid.innerHTML = '';
  var slots = ALL_COGS.shelfSlots;
  var totalPages = Math.max(1, Math.ceil(slots.length / SHELF_PER_PAGE));
  if (SHELF_PAGE >= totalPages) SHELF_PAGE = totalPages - 1;
  if (SHELF_PAGE < 0) SHELF_PAGE = 0;
  var start = SHELF_PAGE * SHELF_PER_PAGE;
  var end = Math.min(start + SHELF_PER_PAGE, slots.length);
  for (var i = start; i < end; i++) {
    var cog = slots[i];
    if (cog) {
      var cell = makeCogCell(cog, 1000 + i, null, 'shelf-cell');
      cell.dataset.shelfIdx = i;
      cell.addEventListener('mouseenter', showShelfTooltip);
      cell.addEventListener('mousemove', moveTooltip);
      cell.addEventListener('mouseleave', hideTooltip);
      grid.appendChild(cell);
    } else {
      var empty = document.createElement('div');
      empty.className = 'shelf-cell empty';
      grid.appendChild(empty);
    }
  }
  for (var j = end - start; j < SHELF_PER_PAGE; j++) {
    var empty = document.createElement('div');
    empty.className = 'shelf-cell empty';
    grid.appendChild(empty);
  }
  document.getElementById('shelf-page-num').textContent = (SHELF_PAGE + 1) + '/' + totalPages;
  document.getElementById('shelf-prev').disabled = SHELF_PAGE <= 0;
  document.getElementById('shelf-next').disabled = SHELF_PAGE >= totalPages - 1;
}

window.shelfPage = function(dir) { SHELF_PAGE += dir; renderShelf(); };

function shelfPageForIndex(idx) { return Math.floor(idx / SHELF_PER_PAGE); }

/* ========== SMALL COGS (tiny strips) ========== */
var SM_TYPE_NAMES = ['Flaggy', 'Build', 'ConXP'];
var SM_TYPE_SHORT = ['F', 'B', 'X'];
var SM_TYPE_CLASSES = ['sc-flaggy', 'sc-build', 'sc-conexp'];

function renderSmallCogs() {
  var leftEl = document.getElementById('tiny-left');
  var rightEl = document.getElementById('tiny-right');
  leftEl.innerHTML = ''; rightEl.innerHTML = '';
  for (var t = 0; t < 24; t++) {
    var idx = 228 + t;
    var name = (COG_ORDER && COG_ORDER[idx]) || 'Blank';
    var container = t < 12 ? leftEl : rightEl;
    var cell = document.createElement('div');
    cell.className = 'tiny-cell';
    if (!name || name === 'Blank') { cell.classList.add('empty'); }
    else {
      var parsed = parseSmallCog(name);
      if (parsed) {
        cell.classList.add(SM_TYPE_CLASSES[parsed.type] || '');

}

/* ========== COG DISPLAY NAMES ========== */
var CRY_NAMES = ['Topaz', 'Ruby', 'Amethyst', 'Garnet', 'Emerald', 'Bluegem'];
var TIER_PREFIX = ['Nooby', 'Decent', 'Superb', 'Ulti'];
var VARIANT_NAMES = {
  A0: '', A00: '', A1: 'Average', A2: 'Spur', A3: 'Stacked', A4: 'Deckered',
  B0: 'Double', B1: 'Trips', B2: 'Trabble', B3: 'Quad', B4: 'Penta',
  ad: 'Adjay', di: 'Diggle', le: 'Leff', ri: 'Rite',
  up: 'Uppy', do: 'Downer', cn: 'Sniper', co: 'Collumm', ro: 'Rowow', cr: 'Omni'
};

function cogDisplayName(name) {
  if (!name || name === 'Blank') return 'Empty';
  if (name.indexOf('Player_') === 0) return name.substring(7);
  if (name === 'CogY') return 'Yang Cog';
  if (name.indexOf('CogZA') === 0) return 'Yin Cog';
  if (name.indexOf('CogCry') === 0) {
    var ci = parseInt(name.substring(6)) || 0;
    return (CRY_NAMES[ci] || 'Crystal') + ' Cog';
  }
  var m = name.match(/^Cog(\d)(.+)$/);
  if (m) {
    var tp = TIER_PREFIX[parseInt(m[1])] || 'T' + m[1];
    var suf = m[2];
    var vn = VARIANT_NAMES[suf];
    if (vn === undefined) vn = suf;
    return tp + (vn ? ' ' + vn : '') + ' Cog';
  }
  if (name.indexOf('CogSm') === 0) {
    var sm = parseSmallCog(name);
    if (sm) return SM_TYPE_NAMES[sm.type] + ' Tiny Cog T' + (sm.level + 1);
    return 'Tiny Cog';
  }
  return name;
}

/* ========== TOOLTIP ========== */
var tooltipEl = document.getElementById('cog-tooltip');

function cogTooltipHtml(cog, slot) {
  var cls = classifyCog(cog.name);
  var html = '<div class="tt-name">' + esc(cogDisplayName(cog.name)) + '</div>';
  if (slot >= 0 && slot < BOARD_SIZE) {
    var pos = slotToPos(slot);
    html += '<div class="tt-stat"><span class="lbl">Slot</span><span class="val">(' + pos.col + ', ' + pos.row + ')</span></div>';
  }

  if (cog.c) html += '<div class="tt-stat"><span class="lbl">Flaggy Rate</span><span class="val">' + fmtBig(cog.c) + '</span></div>';
  if (cog.d) html += '<div class="tt-stat"><span class="lbl">Con EXP %</span><span class="val">' + cog.d + '%</span></div>';

    html += '<div style="margin-top:4px;border-top:1px solid #333;padding-top:4px">';

    if (cog.e) html += '<div class="tt-stat"><span class="lbl">Surr Build%</span><span class="val">+' + cog.e + '%</span></div>';
    if (cog.f) html += '<div class="tt-stat"><span class="lbl">Surr ConExp%</span><span class="val">+' + cog.f + '%</span></div>';
    if (cog.g) html += '<div class="tt-stat"><span class="lbl">Surr Flaggy%</span><span class="val">+' + cog.g + '%</span></div>';
    html += '</div>';
  }
  var tierNum = cogStatTier(cog.name);
  if (tierNum >= 0 && slot >= 0 && slot < BOARD_SIZE && CURRENT_BOARD) {
    var statMode = ACTIVE_STAT_OVERLAY || 'conexp';
    var ap = cogAffectsPlayer(CURRENT_BOARD, slot);
    var _ctx2 = boardGradeContext(CURRENT_BOARD);
    var j = judgeCog(cog, tierNum, MAX_CON_LV, { affectsPlayer: ap, totalBaseD: _ctx2.totalBaseD, totalSurround: _ctx2.totalSurround, dailyRolls: dailyRollsForTier(tierNum), statMode: statMode });
    var modeLabel = statMode === 'build' ? 'Build' : statMode === 'flaggy' ? 'Flaggy' : 'ConExp';
    html += '<div style="margin-top:4px;border-top:1px solid #333;padding-top:4px">';
    if (j.grade === '-') {
      html += '<div class="tt-stat"><span class="lbl">Grade</span><span class="val" style="color:var(--text2)">Not rated (shelf)</span></div>';
    } else {
      var gradeLabel = j.gradeOneInN >= 1.5 ? j.grade + ' (1 in ' + fmtBig(Math.round(j.gradeOneInN)) + ')' : j.grade;
      html += '<div class="tt-stat"><span class="lbl">Grade (' + modeLabel + ')</span><span class="val grade-' + j.grade + '">' + gradeLabel + '</span></div>';
      if (tierNum >= 4 && j.expectedDays >= 1) {
        var daysText = j.expectedDays >= 365 ? (j.expectedDays / 365).toFixed(1) + ' yrs' : j.expectedDays >= 30 ? (j.expectedDays / 30).toFixed(1) + ' mo' : Math.round(j.expectedDays) + 'd';
        html += '<div class="tt-stat"><span class="lbl">Avg time</span><span class="val" style="color:var(--text2)">~' + daysText + ' @ ' + dailyRollsForTier(tierNum) + '/day</span></div>';
      }
      if (j.affectsPlayer && j.hasSurround) {
        html += '<div class="tt-stat"><span class="lbl">Basis</span><span class="val" style="color:var(--cyan)">Surround (affects player)</span></div>';
      }
    }
    if (j.odds) {
      var roundedOdds = Math.round(j.odds.oneInN);
      var oddsColor = roundedOdds >= 10000 ? 'var(--gold)' : roundedOdds >= 1000 ? 'var(--green)' : roundedOdds >= 100 ? 'var(--cyan)' : 'var(--text2)';
      var oddsText = j.odds.oneInN < 1.5 ? Math.round(100 / j.odds.oneInN) + '% of rolls' : roundedOdds <= 2 ? '~1 in 2' : '1 in ' + fmtBig(roundedOdds);
      html += '<div class="tt-stat"><span class="lbl">Roll Odds</span><span class="val" style="color:' + oddsColor + '">' + oddsText + '</span></div>';
    }
    html += '<div class="tt-stat"><span class="lbl">ConExp%</span><span class="val">' + (cog.d||0) + ' / ' + j.perfect.perfectD + '</span></div>';
    html += '<div class="tt-stat"><span class="lbl">Build</span><span class="val">' + fmtBig(cog.a||0) + ' / ' + fmtBig(j.perfect.perfectA) + '</span></div>';

    // Marginal impact from insights
    if (CURRENT_INSIGHTS && slot >= 0 && slot < BOARD_SIZE) {
      for (var ii = 0; ii < CURRENT_INSIGHTS.impacts.length; ii++) {

          var impColor = imp.delta <= 0 ? 'var(--red)' : imp.pct < 1 ? 'var(--orange)' : 'var(--text2)';
          var impText = imp.delta <= 0 ? 'Hurts score by ' + fmtBig(Math.abs(imp.delta)) : imp.pct.toFixed(2) + '% of total';
          html += '<div class="tt-stat"><span class="lbl">Impact</span><span class="val" style="color:' + impColor + '">' + impText + '</span></div>';
          break;
        }
      }

    html += '<div class="tt-stat"><span class="lbl">Base EXP/hr</span><span class="val">' + fmtBig(cog.b || 0) + '</span></div>';
    if (slot >= 0 && slot < BOARD_SIZE && CURRENT_TOTALS && CURRENT_TOTALS.perSlot) {
      var ps = CURRENT_TOTALS.perSlot[slot];

      html += '<div class="tt-stat"><span class="lbl">Board ConExp%</span><span class="val">+' + (CURRENT_TOTALS.totalConExp || 0).toFixed(1) + '%</span></div>';
      var effExp = (cog.b || 0) * (1 + (ps.surroundConExp || 0) / 100) * (1 + (CURRENT_TOTALS.totalConExp || 0) / 100);
      html += '<div class="tt-stat"><span class="lbl" style="color:var(--gold)">Effective EXP/hr</span><span class="val" style="color:var(--gold)">' + fmtBig(effExp) + '</span></div>';
    }
    html += '</div>';
  }
  if (cls.type === 'small') {
    var sm = parseSmallCog(cog.name);
    if (sm) {
      var smTypeNames = ['Flaggy Rate', 'Build Speed', 'Con EXP'];
      var smj = judgeSmallCog(sm.type, sm.level);
      var effOneInN = smallCogEffectiveOneInN(sm.level);
      html += '<div style="margin-top:4px;border-top:1px solid #333;padding-top:4px">';
      html += '<div class="tt-stat"><span class="lbl">Type</span><span class="val">' + smTypeNames[sm.type] + '</span></div>';
      html += '<div class="tt-stat"><span class="lbl">Level</span><span class="val">' + sm.level + '</span></div>';
      html += '<div class="tt-stat"><span class="lbl">Bonus</span><span class="val">' + (1 + sm.bonus / 100).toFixed(2) + 'x (+' + fmtBig(sm.bonus) + '%)</span></div>';
      html += '<div class="tt-stat"><span class="lbl">Grade</span><span class="val grade-' + smj.grade + '">' + smj.grade + '</span></div>';
      if (effOneInN > 1) {
        var smOddsColor = effOneInN >= 128 ? 'var(--gold)' : effOneInN >= 32 ? 'var(--green)' : effOneInN >= 8 ? 'var(--cyan)' : 'var(--text2)';
        html += '<div class="tt-stat"><span class="lbl">Roll Odds</span><span class="val" style="color:' + smOddsColor + '">1 in ' + effOneInN + '</span></div>';
      }
      if (GRID69_TIER_UP_PCT > 0) {
        html += '<div class="tt-stat"><span class="lbl">Tier-Up</span><span class="val" style="color:var(--green)">' + GRID69_TIER_UP_PCT + '% (Grid 69)</span></div>';
      }
      html += '</div>';
    }
  }
  return html;
}

function moveTooltip(e) {
