  if (y + h > window.innerHeight - 8) y = e.clientY - h - 8;
  tooltipEl.style.left = x + 'px'; tooltipEl.style.top = y + 'px';
}

function hideTooltip() { tooltipEl.style.display = 'none'; clearDirectionHighlight(); }

/* ========== DIRECTION HIGHLIGHT ========== */
function highlightDirection(slot, cog) {
  clearDirectionHighlight();
  if (!cog || !cog.h) return;
  var se = cog.e || 0, sf = cog.f || 0, sg = cog.g || 0, sj = cog.j || 0;
  if (se === 0 && sf === 0 && sg === 0 && sj === 0) return;
  var pos = slotToPos(slot);
  var targets = [];
  if (cog.h === 'everything') {
    for (var t = 0; t < BOARD_SIZE; t++) if (t !== slot) targets.push(t);
  } else if (cog.h === 'row') {
    for (var col = 0; col < BOARD_W; col++) {
      var t = posToSlot(col, pos.row); if (t !== slot) targets.push(t);
    }
  } else if (cog.h === 'column') {
    for (var row = 0; row < BOARD_H; row++) {
      var t = posToSlot(pos.col, row); if (t !== slot) targets.push(t);
    }
  } else {
    var mIdx = DIR_TO_INDEX[cog.h];
    if (mIdx === undefined) return;
    var offsets = COG_MATRICES[mIdx];
    for (var oi = 0; oi < offsets.length; oi++) {
      var tc = pos.col + offsets[oi][0];
      var tr = pos.row + offsets[oi][1];
      if (tc < 0 || tc >= BOARD_W || tr < 0 || tr >= BOARD_H) continue;
      targets.push(posToSlot(tc, tr));
    }
  }
  var cells = document.querySelectorAll('#board-current .cog-cell');
  cells[slot] && cells[slot].classList.add('dir-source');
  for (var i = 0; i < targets.length; i++) {
    if (cells[targets[i]]) cells[targets[i]].classList.add('dir-highlight');
  }
}

function clearDirectionHighlight() {
  document.querySelectorAll('#board-current .dir-highlight, #board-current .dir-source').forEach(function(c) {
    c.classList.remove('dir-highlight', 'dir-source');
  });
}

/* ========== OPTIMIZER ========== */
window.runOptimizer = function() {
  if (!SAVE_BOARD) return;
  hideSwapGuide();
  var goal = ACTIVE_STAT_OVERLAY || 'conexp';
  var iters = 500000;
  var btn = document.getElementById('btn-optimize');
  var statusEl = document.getElementById('opt-status');
  var progressBar = document.getElementById('opt-progress');
  var progressFill = document.getElementById('opt-progress-fill');
  btn.disabled = true; progressBar.style.display = '';
  statusEl.textContent = 'Optimizing...';
  var t0 = performance.now();
  var tinyResult = optimizeTinyCogs(
    ALL_COGS.tinyBoard, ALL_COGS.tinyLocked, ALL_COGS.shelfSmallCogs, goal, parseSmallCog
  );
  optimizeAsync(SAVE_BOARD, ALL_COGS.shelfCogs, ALL_COGS.playerCogs, goal, {
    iterations: iters,
    onProgress: function(p) {
      progressFill.style.width = (p.iter / iters * 100).toFixed(0) + '%';
      statusEl.textContent = 'Iter ' + p.iter + '/' + iters + ' | Best: ' + fmtBig(p.best);
    }
  }).then(function(result) {
    result.tinyResult = tinyResult;
    var elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    progressFill.style.width = '100%';
    var statusMsg = 'Done in ' + elapsed + 's | ' +
      (result.improvementPct > 0 ? '+' : '') + result.improvementPct.toFixed(2) + '% improvement';
    if (tinyResult.moves.length > 0) statusMsg += ' | ' + tinyResult.moves.length + ' tiny cog move(s)';
    statusEl.textContent = statusMsg;
    btn.disabled = false;
    showResults(result);
  });
};

function cloneBoard(board) {
  var b = new Array(BOARD_SIZE);
  for (var i = 0; i < BOARD_SIZE; i++) b[i] = board[i] ? Object.assign({}, board[i]) : null;
  return b;
}

function hideOptButtons() {
  document.getElementById('btn-reset').style.display = 'none';
}

function hideSwapGuide() {
  document.getElementById('steps-row').style.display = 'none';
  SWAP_MODE = false; SWAP_STEPS = null; SWAP_INDEX = -1;
}

function showResults(result) {
  OPT_RESULT = result; IS_OPTIMIZED = true;
  CURRENT_BOARD = cloneBoard(result.board);
  CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
  var banner = document.getElementById('result-banner');
  banner.style.display = '';
  var resultHtml =
    _resultItem('Build', SAVE_TOTALS.totalBuild, CURRENT_TOTALS.totalBuild) +
    _resultItem('Con EXP/hr', SAVE_TOTALS.playerConExpHr || 0, CURRENT_TOTALS.playerConExpHr || 0) +
    _resultItem('Flaggy', SAVE_TOTALS.totalFlaggy * FLUO_FLAGGY_MULT, CURRENT_TOTALS.totalFlaggy * FLUO_FLAGGY_MULT);
  if (result.tinyResult && result.tinyResult.moves.length > 0) {
    var tr = result.tinyResult;
    var smLabels = ['Flaggy%', 'Build%', 'ConXP%'];
    resultHtml += '<div class="tiny-result-section">';
    resultHtml += '<div class="ri-label" style="color:var(--gold);margin-top:6px">Tiny Cog Changes:</div>';
    for (var ti = 0; ti < tr.moves.length; ti++) {
      resultHtml += '<div class="ri-tiny-move">' + esc(tr.moves[ti].desc) + '</div>';
    }
    for (var si = 0; si < 3; si++) {
      if (tr.bonusAfter[si] !== tr.bonusBefore[si]) {
        var d = tr.bonusAfter[si] - tr.bonusBefore[si];
        resultHtml += '<div class="ri-tiny-bonus">' + smLabels[si] + ': ' +
          (1 + tr.bonusBefore[si] / 100).toFixed(2) + 'x → ' + (1 + tr.bonusAfter[si] / 100).toFixed(2) + 'x' +
          ' <span class="ri-up">(+' + d + '%)</span></div>';
      }
    }
    resultHtml += '</div>';
  }
  document.getElementById('result-row').innerHTML = resultHtml;
  renderBoard('board-current', CURRENT_BOARD, SAVE_BOARD);
  renderStats(CURRENT_TOTALS, SAVE_TOTALS);
  renderBoardJudge();
  renderInsights();
  document.getElementById('btn-reset').style.display = '';
  startMoving();
}

function _resultItem(label, oldVal, newVal, isPct) {
  var delta = newVal - oldVal;
  var sign = delta > 0 ? '+' : '';
  var cls = delta > 0 ? 'ri-up' : delta < 0 ? 'ri-down' : '';
  var fmtV = isPct ? fmtPct : fmtBig;
  renderInsights();
  return '<div class="result-item"><span class="ri-label">' + label + ':</span> ' +
    '<span class="ri-val">' + fmtV(newVal) + '</span> ' +
    (delta !== 0 ? '<span class="ri-delta ' + cls + '">(' + sign + fmtV(delta) + ')</span>' : '') + '</div>';
}

window.resetBoard = function() {
  // Restore tiny cogs if perfect board overrode them
  if (IS_PERFECT && SAVE_COG_ORDER_TINY && COG_ORDER) {
    for (var t = 0; t < 24; t++) COG_ORDER[228 + t] = SAVE_COG_ORDER_TINY[t];
    if (ALL_COGS && SAVE_TINY_BOARD) ALL_COGS.tinyBoard = SAVE_TINY_BOARD;
  }
  IS_PERFECT = false; SAVE_COG_ORDER_TINY = null; SAVE_TINY_BOARD = null;
  CURRENT_BOARD = cloneBoard(SAVE_BOARD);
  CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
  IS_OPTIMIZED = false; OPT_RESULT = null;
  document.getElementById('result-banner').style.display = 'none';
  hideOptButtons(); hideSwapGuide();
  renderBoard('board-current', CURRENT_BOARD, null);
  renderStats(CURRENT_TOTALS);
  renderBoardJudge();
  renderInsights();
  renderSmallCogs();
  document.getElementById('opt-status').textContent = 'Board reset to save state.';
};

window.showPerfectBoard = function() {
  if (!SAVE_BOARD) return showMsg('Load a save first', true);

  var conLv = MAX_CON_LV;
  var goal = ACTIVE_STAT_OVERLAY || 'conexp';
  var goalBase = goal === 'build' ? 'a' : goal === 'flaggy' ? 'c' : 'd';
  var goalSurr = goal === 'build' ? 'e' : goal === 'flaggy' ? 'g' : 'f';
  var goalTinyType = goal === 'build' ? 1 : goal === 'flaggy' ? 0 : 2;

  var perfT3 = perfectCogStats(3, conLv);
  var perfT4 = perfectCogStats(4, conLv);
  var maxSurrT3 = 65;
  var maxSurrCry5 = 40 + 23 * 6;
  var crystalCanSurr = (goalSurr === 'e' || goalSurr === 'f');

  function maxBase(perf) {
    return goalBase === 'a' ? perf.perfectA : goalBase === 'c' ? perf.perfectC : perf.perfectD;
  }
  function makeSurr(key, val) {
    var o = { e: 0, f: 0, g: 0, j: 0 }; o[key] = val; return o;
  }

  // Yang (CogY) surround scales with con level (game code line 82556)
  var yangE = Math.floor(50 + conLv / (conLv + 80) * 120); // build%
  var yangF = Math.floor(50 + conLv / (conLv + 80) * 160); // con%

  // Yin (CogZA) base stats scale with con level (game code line 83740)
  var yinTier = conLv < 15 ? 0 : conLv < 40 ? 1 : conLv < 70 ? 2 : 3;
  var yinBudget = 2.5 * (Math.pow(3, yinTier) + 0.25 * Math.pow(conLv / 3 + 0.7, 1.4 + 0.05 * yinTier)) * (1.5 + 0.5 * yinTier);
  var yinA = Math.floor(yinBudget);              // build speed
  var yinC = Math.floor(Math.pow(yinBudget, 0.8)); // flaggy rate
  var yinD = Math.max(Math.floor(Math.pow(yinBudget, 0.4) + 10 * Math.log10(yinBudget) - 5), 2); // con exp %

  // Count yin (CogZA) and yang (CogY) from board + shelf (slots 0-227)
  var yinCount = 0, yangCount = 0;
  if (COG_ORDER) {
    for (var i = 0; i < 228; i++) {
      var n = COG_ORDER[i] || 'Blank';
      if (n.indexOf('CogZA') === 0) yinCount++;
      else if (n === 'CogY') yangCount++;
    }
  }
  var exBlocks = Math.floor(yinCount / 4);

  // Get save player cog data (take the first one)
  var savePlayerCog = null;
  for (var i = 0; i < BOARD_SIZE; i++) {
    if (SAVE_BOARD[i] && SAVE_BOARD[i].isPlayer) { savePlayerCog = SAVE_BOARD[i]; break; }
  }
  if (!savePlayerCog) return showMsg('No player cog found on board', true);

  // canTarget: does slot S with direction D target slot P?
  function canTarget(fromSlot, dir, targetSlot) {
    if (dir === 'everything') return true;
    var fp = slotToPos(fromSlot), tp = slotToPos(targetSlot);
    if (dir === 'row') return fp.row === tp.row;
    if (dir === 'column') return fp.col === tp.col;
    var mIdx = DIR_TO_INDEX[dir];
    if (mIdx === undefined) return false;
    var offsets = COG_MATRICES[mIdx];
    for (var oi = 0; oi < offsets.length; oi++) {
      if (fp.col + offsets[oi][0] === tp.col && fp.row + offsets[oi][1] === tp.row) return true;
    }
    return false;
  }

  // Find optimal player position: maximize slots that can target it
  // with any useful direction (row, column, up, down, left, right, corners, around)
  var allDirs = ['row', 'column', 'up', 'down', 'left', 'right', 'corners', 'around'];
  var bestPSlot = -1, bestPScore = -1;
  for (var p = 0; p < BOARD_SIZE; p++) {
    var score = 0;
    for (var s = 0; s < BOARD_SIZE; s++) {
      if (s === p) continue;
      for (var di = 0; di < allDirs.length; di++) {
        if (canTarget(s, allDirs[di], p)) { score++; break; }
      }
    }
    if (score > bestPScore) { bestPScore = score; bestPSlot = p; }
  }

  var playerSlot = bestPSlot;

  var board = new Array(BOARD_SIZE);
  var used = {};

  // 1. Place player cog at optimal position
  board[playerSlot] = Object.assign({}, savePlayerCog, { _slot: playerSlot });
  used[playerSlot] = true;

  // 2. Crystal CogCry5 on player's row + column (highest surround: 178%)
  if (crystalCanSurr) {
    for (var i = 0; i < BOARD_SIZE; i++) {
      if (used[i]) continue;
      var onRow = canTarget(i, 'row', playerSlot);
      var onCol = canTarget(i, 'column', playerSlot);
      if (!onRow && !onCol) continue;
      var dir = onRow ? 'row' : 'column';
      var s = makeSurr(goalSurr, maxSurrCry5);
      board[i] = {
        name: 'CogCry5',
        a: goalBase === 'a' ? maxBase(perfT4) : 0, b: 0,
        c: goalBase === 'c' ? maxBase(perfT4) : 0,
        d: goalBase === 'd' ? maxBase(perfT4) : 0,
        e: s.e, f: s.f, g: s.g, j: s.j,
        h: dir, i: 0, l: 0, _slot: i, isPlayer: false,
      };
      used[i] = true;
    }
  }

  // 3. Yang (CogY): direction "around", surround scales with con level
  //    e = build%, f = con% (g is deleted by game recalc — no flaggy surround)
  //    Place where "around" targets player
  var yangCandidates = [];
  for (var i = 0; i < BOARD_SIZE; i++) {
    if (used[i]) continue;
    if (canTarget(i, 'around', playerSlot)) yangCandidates.push(i);
  }
  var yangPlaced = 0;
  for (var yi = 0; yi < yangCount; yi++) {
    var slot = -1;
    if (yi < yangCandidates.length) slot = yangCandidates[yi];
    else { for (var i = 0; i < BOARD_SIZE; i++) { if (!used[i]) { slot = i; break; } } }
    if (slot < 0) break;
    board[slot] = {
      name: 'CogY', a: 0, b: 0, c: 0, d: 0,
      e: yangE, f: yangF, g: 0, j: 0,
      h: 'around', i: 0, l: 0, _slot: slot, isPlayer: false,
    };
    used[slot] = true;
    yangPlaced++;
  }

  // 4. Ulti directionals (up/down/left/right/corners) targeting player
  var ultiDirs = ['up', 'down', 'left', 'right', 'corners'];
  var dirNameMap = { up: 'Cog3up', down: 'Cog3do', left: 'Cog3le', right: 'Cog3ri', corners: 'Cog3cn' };
  // Flaggy: crystals can't do g surround, so ulti also covers row/column
  if (!crystalCanSurr) {
    ultiDirs.push('row', 'column');
    dirNameMap.row = 'Cog3ro'; dirNameMap.column = 'Cog3co';
  }
  for (var i = 0; i < BOARD_SIZE; i++) {
    if (used[i]) continue;
    for (var di = 0; di < ultiDirs.length; di++) {
      if (canTarget(i, ultiDirs[di], playerSlot)) {
        var s = makeSurr(goalSurr, maxSurrT3);
        board[i] = {
          name: dirNameMap[ultiDirs[di]],
          a: goalBase === 'a' ? maxBase(perfT3) : 0, b: 0,
          c: goalBase === 'c' ? maxBase(perfT3) : 0,
          d: goalBase === 'd' ? maxBase(perfT3) : 0,
          e: s.e, f: s.f, g: s.g, j: s.j,
          h: ultiDirs[di], i: 0, l: 0, _slot: i, isPlayer: false,
        };
        used[i] = true;
        break;
      }
    }
  }

  // 5. Yin (excogia) — direction "everything" + base stats scale with con level.
  //    Place 2×2 blocks in remaining free slots.
  var exPieceNames = ['CogZA00', 'CogZA01', 'CogZA02', 'CogZA03'];
  for (var bi = 0; bi < exBlocks; bi++) {
    var placed = false;
    for (var r = 0; r < BOARD_H - 1 && !placed; r++) {
      for (var c = 0; c < BOARD_W - 1 && !placed; c++) {
        var s0 = posToSlot(c, r), s1 = posToSlot(c + 1, r);
        var s2 = posToSlot(c, r + 1), s3 = posToSlot(c + 1, r + 1);
        if (used[s0] || used[s1] || used[s2] || used[s3]) continue;
        var slots = [s0, s1, s2, s3];
        for (var ei = 0; ei < 4; ei++) {
          board[slots[ei]] = {
            name: exPieceNames[ei], a: yinA, b: 0, c: yinC, d: yinD,
            e: 1.25, f: 20, g: 0, j: 0,
            h: 'everything', i: 0, l: 1, _slot: slots[ei], isPlayer: false,
          };
          used[slots[ei]] = true;
        }
        placed = true;
      }
    }
  }

  // 6. Fill remaining with non-directional CogCry5, max base stats
  for (var i = 0; i < BOARD_SIZE; i++) {
    if (used[i]) continue;
    board[i] = {
      name: 'CogCry5',
      a: goalBase === 'a' ? maxBase(perfT4) : 0, b: 0,
      c: goalBase === 'c' ? maxBase(perfT4) : 0,
      d: goalBase === 'd' ? maxBase(perfT4) : 0,
      e: 0, f: 0, g: 0, j: 0,
      h: null, i: 0, l: 0, _slot: i, isPlayer: false,
    };
  }

  // Save original tiny cog state
  SAVE_COG_ORDER_TINY = [];
  for (var t = 0; t < 24; t++) SAVE_COG_ORDER_TINY[t] = (COG_ORDER && COG_ORDER[228 + t]) || 'Blank';
  if (ALL_COGS) SAVE_TINY_BOARD = ALL_COGS.tinyBoard;

  // All 24 tiny cogs → T10 (level 9) of goal type
  var tinyChar = goalTinyType === 0 ? '_' : goalTinyType === 1 ? 'a' : 'b';
  var perfTiny = [];
  for (var t = 0; t < 24; t++) {
    var tinyName = 'CogSm' + tinyChar + '9';
    if (COG_ORDER) COG_ORDER[228 + t] = tinyName;
    perfTiny.push({ name: tinyName, _slot: 228 + t });
  }
  if (ALL_COGS) ALL_COGS.tinyBoard = perfTiny;

  IS_PERFECT = true;
  CURRENT_BOARD = board;
  CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
  renderBoard('board-current', CURRENT_BOARD, null);
  renderStats(CURRENT_TOTALS, SAVE_TOTALS);
  renderBoardJudge();
  renderInsights();
  renderSmallCogs();
  document.getElementById('btn-reset').style.display = '';
  var goalName = goal === 'build' ? 'Build Speed' : goal === 'flaggy' ? 'Flaggy Rate' : 'ConExp';
  var pPos = slotToPos(playerSlot);
  document.getElementById('opt-status').textContent =
    'Perfect ' + goalName + ' — player at (' + pPos.col + ',' + pPos.row + '), ' +
    exBlocks + ' excogia, ' + yangPlaced + ' yang, CogCry5 row/col, Ulti dirs, T10 tiny.';
};

/* ========== SWAP GUIDE ========== */
window.startMoving = function() {
  var hasBoardSwaps = OPT_RESULT && OPT_RESULT.swaps && OPT_RESULT.swaps.length > 0;
  var hasTinyMoves = OPT_RESULT && OPT_RESULT.tinyResult && OPT_RESULT.tinyResult.moves.length > 0;
  if (!OPT_RESULT || (!hasBoardSwaps && !hasTinyMoves)) {
    document.getElementById('opt-status').textContent = 'No swaps needed.'; return;
  }
  // Build unified step list: tiny moves first, then board swaps
  var allSteps = [];
  if (hasTinyMoves) {
    var tm = OPT_RESULT.tinyResult.moves;
    for (var i = 0; i < tm.length; i++) {
      allSteps.push({ isTiny: true, desc: tm[i].desc, slot: tm[i].slot });
    }
  }
  if (hasBoardSwaps) {
    for (var i = 0; i < OPT_RESULT.swaps.length; i++) {
      allSteps.push(OPT_RESULT.swaps[i]);
    }
  }
  SWAP_MODE = true; SWAP_STEPS = allSteps; SWAP_INDEX = 0;
  document.getElementById('steps-row').style.display = 'grid';
  CURRENT_BOARD = cloneBoard(SAVE_BOARD);
  renderSwapList(); renderSwapStep();
};

window.swapStep = function(dir) {
  if (!SWAP_STEPS) return;
  SWAP_INDEX = Math.max(0, Math.min(SWAP_STEPS.length, SWAP_INDEX + dir));
  renderSwapStep();
};

window.finishMoving = function() {
  SWAP_MODE = false;
  CURRENT_BOARD = cloneBoard(OPT_RESULT.board);
  CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
  hideSwapGuide();
  renderBoard('board-current', CURRENT_BOARD, SAVE_BOARD);
  renderBoardJudge();
  document.getElementById('opt-status').textContent = 'All swaps applied!';
};

function renderSwapStep() {
  var progress = document.getElementById('swap-progress');
  var current = document.getElementById('swap-current');
  var prevBtn = document.getElementById('btn-swap-prev');
  var nextBtn = document.getElementById('btn-swap-next');
  var doneBtn = document.getElementById('btn-swap-done');
  var total = SWAP_STEPS.length;
  progress.textContent = 'Step ' + (SWAP_INDEX + 1) + ' / ' + total;
  prevBtn.disabled = SWAP_INDEX <= 0;

  if (SWAP_INDEX >= total) {
    current.innerHTML = '<span style="color:var(--green);font-weight:700">All swaps complete!</span>';
    nextBtn.style.display = 'none'; doneBtn.style.display = '';
    CURRENT_BOARD = cloneBoard(OPT_RESULT.board);
    CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
    renderBoard('board-current', CURRENT_BOARD, SAVE_BOARD);
    renderStats(CURRENT_TOTALS, SAVE_TOTALS);
    renderBoardJudge();
    highlightSwapCells(-1, -1); clearShelfHighlight(); clearTinyHighlight();
    return;
  }
  nextBtn.style.display = ''; doneBtn.style.display = 'none';

  var s = SWAP_STEPS[SWAP_INDEX];

  // Handle tiny cog steps (no board changes)
  if (s.isTiny) {
    current.innerHTML =
      '<span style="font-weight:700;color:var(--gold)">Step ' + (SWAP_INDEX + 1) + ':</span> ' +
      '<span style="color:var(--cyan)">\u2699 ' + esc(s.desc) + '</span>';
    highlightSwapCells(-1, -1); clearShelfHighlight();
    highlightTinySlot(s.slot);
    updateSwapListHighlight();
    return;
  }

  // Board swap step
  CURRENT_BOARD = cloneBoard(SAVE_BOARD);
  applySwapsUpTo(SWAP_INDEX);
  CURRENT_TOTALS = computeBoardTotals(CURRENT_BOARD);
  var posStr = '(' + s.col + ',' + s.row + ')';
  var fromShelf = s.srcSlot < 0;
  var srcStr;
  if (fromShelf) {
    var shelfIdx = findShelfCogIndex(s.to);
    srcStr = 'shelf' + (shelfIdx >= 0 ? ' (pg ' + (shelfPageForIndex(shelfIdx) + 1) + ')' : '');
    if (shelfIdx >= 0) { SHELF_PAGE = shelfPageForIndex(shelfIdx); renderShelf(); highlightShelfCog(shelfIdx); }
  } else {
    srcStr = '(' + (s.srcSlot % BOARD_W) + ',' + Math.floor(s.srcSlot / BOARD_W) + ')';
    clearShelfHighlight();
  }
  clearTinyHighlight();

  current.innerHTML =
    '<span style="font-weight:700;color:var(--gold)">Step ' + (SWAP_INDEX + 1) + ':</span> ' +
    'Place <span style="color:var(--green);font-weight:600">' + esc(cogDisplayName(s.to)) + '</span> ' +
    'at <span style="color:var(--accent)">' + posStr + '</span>' +
    (s.from !== 'Blank' ? ' (replacing <span style="color:var(--red)">' + esc(cogDisplayName(s.from)) + '</span>)' : '') +
    ' \u2014 from <span style="color:' + (fromShelf ? 'var(--purple)' : 'var(--accent)') + '">' + srcStr + '</span>';

  var boardBefore = cloneBoard(SAVE_BOARD);
  applySwapsUpTo(SWAP_INDEX - 1, boardBefore);
  renderBoard('board-current', boardBefore, null);
  highlightSwapCells(s.slot, s.srcSlot);
  renderStats(CURRENT_TOTALS, SAVE_TOTALS);
  renderBoardJudge();
  updateSwapListHighlight();
}

function findShelfCogIndex(cogName) {
  for (var i = 0; i < ALL_COGS.shelfSlots.length; i++)
    if (ALL_COGS.shelfSlots[i] && ALL_COGS.shelfSlots[i].name === cogName) return i;
  return -1;
}

function highlightShelfCog(idx) {
  clearShelfHighlight();
  var cells = document.querySelectorAll('#shelf-grid .shelf-cell');
  var localIdx = idx - SHELF_PAGE * SHELF_PER_PAGE;
  if (localIdx >= 0 && localIdx < cells.length) cells[localIdx].classList.add('shelf-highlight');
}

function clearShelfHighlight() {
  document.querySelectorAll('#shelf-grid .shelf-highlight').forEach(function(el) { el.classList.remove('shelf-highlight'); });
}

function applySwapsUpTo(idx, board) {
  if (!board) board = CURRENT_BOARD;
  for (var i = 0; i <= idx && i < SWAP_STEPS.length; i++) {
    var s = SWAP_STEPS[i];
    if (s.isTiny) continue; // tiny cog steps don't affect the main board
    // Find the cog to place: from the optimized board's target slot
    var newCog = OPT_RESULT.board[s.slot];
    var displaced = board[s.slot];
    board[s.slot] = newCog ? Object.assign({}, newCog) : null;
    // If the cog came from another board slot, put the displaced cog there
    if (s.srcSlot >= 0) {
      board[s.srcSlot] = displaced ? Object.assign({}, displaced) : null;
    }
  }
}

function highlightSwapCells(destSlot, srcSlot) {
  var cells = document.querySelectorAll('#board-current .cog-cell');
  cells.forEach(function(c) { c.style.outline = ''; c.style.outlineOffset = ''; });
  if (destSlot >= 0 && destSlot < cells.length) {
    cells[destSlot].style.outline = '2px solid var(--green)'; cells[destSlot].style.outlineOffset = '-1px';
  }
  if (srcSlot >= 0 && srcSlot < cells.length) {
    cells[srcSlot].style.outline = '2px solid var(--gold)'; cells[srcSlot].style.outlineOffset = '-1px';
  }
}

function highlightTinySlot(slot) {
  clearTinyHighlight();
  if (slot === undefined || slot < 228) return;
  var t = slot - 228;
  var container = t < 12 ? document.getElementById('tiny-left') : document.getElementById('tiny-right');
  var idx = t < 12 ? t : t - 12;
  var cells = container.children;
  if (idx >= 0 && idx < cells.length) {
    cells[idx].style.outline = '2px solid var(--green)';
    cells[idx].style.outlineOffset = '-1px';
    cells[idx].style.transform = 'scale(1.15)';
    cells[idx].style.zIndex = '2';
  }
}

function clearTinyHighlight() {
  var allTiny = document.querySelectorAll('.tiny-cell');
  allTiny.forEach(function(c) { c.style.outline = ''; c.style.outlineOffset = ''; c.style.transform = ''; c.style.zIndex = ''; });
}

function updateSwapListHighlight() {
  var steps = document.querySelectorAll('#swap-list .swap-step');
  steps.forEach(function(el, i) {
    el.style.opacity = i < SWAP_INDEX ? '0.4' : i === SWAP_INDEX ? '1' : '0.7';
    el.style.textDecoration = i < SWAP_INDEX ? 'line-through' : '';
    el.style.background = i === SWAP_INDEX ? 'rgba(102,204,255,.1)' : '';
  });
  if (steps[SWAP_INDEX]) steps[SWAP_INDEX].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function renderSwapList() {
  var list = document.getElementById('swap-list'); list.innerHTML = '';
  for (var i = 0; i < SWAP_STEPS.length; i++) {
    var s = SWAP_STEPS[i];
    var step = document.createElement('div'); step.className = 'swap-step';
    step.dataset.idx = i; step.style.cursor = 'pointer';
    step.addEventListener('click', function(ev) { SWAP_INDEX = parseInt(ev.currentTarget.dataset.idx); renderSwapStep(); });

    if (s.isTiny) {
      step.innerHTML = '<span class="step-num">#' + (i + 1) + '</span>' +
        '<span style="color:var(--cyan)">\u2699 ' + esc(s.desc) + '</span>';
    } else {
      var posStr = '(' + s.col + ',' + s.row + ')';
      var fromShelf = s.srcSlot < 0;
      var srcStr = fromShelf ? 'shelf' : '(' + (s.srcSlot % BOARD_W) + ',' + Math.floor(s.srcSlot / BOARD_W) + ')';
      step.innerHTML =
        '<span class="step-num">#' + (i + 1) + '</span>' +
        '<span style="color:var(--red)">' + esc(cogDisplayName(s.from)) + '</span>' +
        '<span class="arrow">\u2192</span>' +
        '<span style="color:var(--green)">' + esc(cogDisplayName(s.to)) + '</span>' +
        '<span style="color:var(--text2)">at ' + posStr + '</span>' +
        '<span style="color:' + (fromShelf ? 'var(--purple)' : 'var(--text2)') + '"> from ' + srcStr + '</span>';
    }
    list.appendChild(step);
  }
}

/* ========== FORMATTING ========== */
// Matches IdleOn's _customBlock_NotateNumber "Big" mode exactly.
function fmtBig(n) {
  if (n === 0 || n == null) return '0';
  var v = Math.abs(n);
  var s = n < 0 ? '-' : '';
  if (v < 100)  return Number.isInteger(n) ? String(n) : n.toFixed(2);
  if (v < 1e3)  return s + Math.floor(v);
  if (v < 1e4)  return s + Math.ceil(v / 10) / 100 + 'K';
  if (v < 1e5)  return s + Math.ceil(v / 100) / 10 + 'K';
  if (v < 1e6)  return s + Math.ceil(v / 1e3) + 'K';
  if (v < 1e7)  return s + Math.ceil(v / 1e4) / 100 + 'M';
  if (v < 1e8)  return s + Math.ceil(v / 1e5) / 10 + 'M';
  if (v < 1e10) return s + Math.ceil(v / 1e6) + 'M';
  if (v < 1e13) return s + Math.ceil(v / 1e9) + 'B';
  if (v < 1e16) return s + Math.ceil(v / 1e12) + 'T';
  if (v < 1e19) return s + Math.ceil(v / 1e15) + 'Q';
  if (v < 1e22) return s + Math.ceil(v / 1e18) + 'QQ';
  if (v < 1e24) return s + Math.ceil(v / 1e21) + 'QQQ';
  return s + v.toExponential(2);
}

function fmtPct(n) {
  if (n === 0 || n === undefined) return '0%';
  var abs = Math.abs(n);
  if (abs >= 1e6) return fmtBig(n) + '%';
  if (abs >= 1e5) return Math.ceil(abs / 1e3) + 'K%';
  if (abs >= 1e4) return Math.ceil(abs / 100) / 10 + 'K%';
  if (abs >= 100) return Math.round(n).toLocaleString() + '%';
  if (abs >= 10) return n.toFixed(0) + '%';
  return n.toFixed(1) + '%';
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

/* ========== STAT MODE ========== */
window.toggleStatOverlay = function(stat) {
  if (ACTIVE_STAT_OVERLAY === stat) return;
  ACTIVE_STAT_OVERLAY = stat;
  var cards = document.querySelectorAll('.stat-card');
  cards.forEach(function(c) {
    c.classList.toggle('active', c.dataset.stat === stat);
  });
  renderBoardJudge();
  renderBoard('board-current', CURRENT_BOARD, IS_OPTIMIZED ? SAVE_BOARD : null);
  renderInsights();
  renderShelf();
};
