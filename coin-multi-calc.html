<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleOn Coin Multiplier Calculator</title>
<link rel="stylesheet" href="css/breakdown.css">
<style>
/* Page-specific */
.dr-card { background: var(--bg2); border-radius: 10px; padding: 18px; margin-bottom: 18px; text-align: center; }
.dr-total { font-size: 2.6em; font-weight: 800; color: var(--gold); }
.dr-sub { color: var(--text2); font-size: .85em; margin-top: 4px; }
</style>
</head>
<body>
<h1>&#x1F4B0; IdleOn Coin Multiplier Calculator</h1>
<p class="subtitle">MonsterCash formula breakdown. Select character to see per-char multiplier.</p>
<div class="container">

<!-- Import -->
<details class="import-box" open>
  <summary>&#x1F4CB; Import Save JSON</summary>
  <textarea id="json-in" placeholder="Paste your it.json or save.json contents here..."></textarea>
  <div class="top-bar">
    <button class="btn" onclick="doImport()">Load Save</button>
    <select id="char-sel" onchange="switchChar(+this.value)" disabled>
      <option value="-1">-- load save first --</option>
    </select>
    <label style="margin-left:12px;font-size:.85em;color:var(--text2)">Overkill Tier
      <input id="overkill-tier" type="number" min="0" max="50" value="0"
             style="width:50px;margin-left:4px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px"
             onchange="setOverkillTier(+this.value)"
             title="0 = auto-compute from damage calc">
    </label>
  </div>
  <div id="import-msg" class="import-msg"></div>
</details>

<!-- Total -->
<div class="dr-card">
  <div class="dr-sub">Total Coin Multiplier (MonsterCash)</div>
  <div class="dr-total" id="dr-total">1.00x</div>
  <div class="dr-sub" id="dr-sub"></div>
  <div class="dr-sub" id="dr-damage" style="margin-top:4px;font-size:.85em;color:var(--text2)"></div>
  <div class="dr-sub" id="dr-multikill" style="margin-top:2px;font-size:.85em;color:var(--text2)"></div>
</div>

<!-- Breakdown tree -->
<div class="tree">
  <h2>Formula Breakdown (20 multiplicative groups)</h2>
  <div id="tree"></div>
</div>

</div>
<div class="bt-tooltip" id="bt-tooltip"></div>
<script type="module">
'use strict';

import { saveData } from './js/state.js';
import { toRenderNode, buildTree } from './js/stats/tree-builder.js';
import { getCatalog } from './js/stats/registry.js';
import coinMultiDesc from './js/stats/defs/coin-multi.js';
import { renderBreakdownTree } from './js/ui/dash-breakdowns.js';
import { fmtVal, fmtMonsterCash } from './js/renderers/format.js';
import { computeOverkillTier } from './js/stats/systems/common/overkill.js';
import damageDesc from './js/stats/defs/damage.js';
import killPerKillDesc from './js/stats/defs/kill-per-kill.js';
import { doImport as _doImport } from './js/ui/save-import.js';

var SAVE_RAW = null;
var CHARS = [];
var CUR_CHAR = 0;
var OVERKILL_TIER = 0; // 0 = auto-compute

function recalc() {
  if (!SAVE_RAW) return;

  var okTier = OVERKILL_TIER;
  var okInfo = null;
  var dmgResult = null;
  try {
    dmgResult = buildTree(damageDesc, getCatalog(), { charIdx: CUR_CHAR, saveData: saveData });
  } catch(e) {}
  if (okTier <= 0) {
    try {
      var maxDmg = dmgResult ? dmgResult.val : 0;
      okInfo = computeOverkillTier(CUR_CHAR, { saveData: saveData }, { maxDmg: maxDmg });
      okTier = okInfo.tier;
    } catch(e) { okTier = 1; }
  }

  var ctx = { charIdx: CUR_CHAR, saveData: saveData, overkillTier: okTier };
  var result;
  try {
    result = buildTree(coinMultiDesc, getCatalog(), ctx);
  } catch (err) {
    document.getElementById('dr-total').textContent = 'Error';
    document.getElementById('dr-sub').textContent = err.message;
    console.error(err);
    return;
  }

  document.getElementById('dr-total').textContent = fmtMonsterCash(result.val || 0) + 'x';
  var subText = 'Character: ' + (CHARS[CUR_CHAR] || CUR_CHAR);
  if (okInfo) subText += ' | OverkillTier: ' + okInfo.tier + ' (auto, map ' + okInfo.mapIdx + ')';
  else subText += ' | OverkillTier: ' + okTier + ' (manual)';
  document.getElementById('dr-sub').textContent = subText;

  // Damage range display
  var dmgEl = document.getElementById('dr-damage');
  if (dmgEl) {
    if (dmgResult && dmgResult.val) {
      var maxD = dmgResult.val;
      var mastery = 0;
      var minD = 0;
      if (dmgResult.children) {
        for (var ch of dmgResult.children) {
          if (ch.name === 'Min Damage') minD = ch.val;
          if (ch.name && ch.name.indexOf('Mastery') === 0) mastery = ch.val;
        }
      }
      dmgEl.textContent = 'Damage: ' + fmtVal(minD) + ' – ' + fmtVal(maxD)
        + ' (mastery: ' + (mastery * 100).toFixed(1) + '%)';
    } else {
      dmgEl.textContent = '';
    }
  }

  // Multikill display
  var mkEl = document.getElementById('dr-multikill');
  if (mkEl) {
    try {
      var mkCtx = { charIdx: CUR_CHAR, saveData: saveData, mapIdx: okInfo ? okInfo.mapIdx : undefined };
      var mkResult = buildTree(killPerKillDesc, getCatalog(), mkCtx);
      var mkVal = mkResult.val || 1;
      var monHP = okInfo ? okInfo.monsterHP : 0;
      mkEl.textContent = 'Multikill: ' + fmtVal(mkVal) + ' kills/kill'
        + (monHP > 0 ? ' | Monster HP: ' + fmtVal(monHP) : '');
    } catch(e) {
      mkEl.textContent = '';
    }
  }

  var renderRoot = toRenderNode({
    name: 'Coin Multiplier',
    val: result.val,
    children: result.children,
    fmt: 'x',
  });
  renderBreakdownTree(renderRoot, document.getElementById('tree'), { tooltipId: 'bt-tooltip' });
}

function doImport() {
  _doImport({
    textareaId: 'json-in',
    charSelId: 'char-sel',
    msgId: 'import-msg',
    onLoaded: function(raw, chars) {
      SAVE_RAW = raw;
      CHARS = chars;
      CUR_CHAR = 0;
      recalc();
    },
  });
}

function switchChar(idx) { CUR_CHAR = idx; recalc(); }
function setOverkillTier(t) { OVERKILL_TIER = Math.max(0, Math.min(50, t || 0)); recalc(); }

window.doImport = doImport;
window.switchChar = switchChar;
window.setOverkillTier = setOverkillTier;
</script>
</body>
</html>
