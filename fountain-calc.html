<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idleon Fountain Calculator</title>
<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --accent: #e94560; --text: #eee; --text2: #c0c0d4;
  --gold: #ffd700; --green: #4caf50; --blue: #2196f3;
  --purple: #bb86fc; --cyan: #4dd0e1; --red: #f44;
  --yellow: #ffe066; --w-green: #a5d6a7; --w-black: #90a4ae;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1 { text-align: center; padding: 12px; background: var(--bg2); border-bottom: 2px solid var(--accent); font-size: 1.4em; }
h1 span { color: var(--accent); }

/* Save import */
#save-area { padding: 16px; display: flex; gap: 12px; align-items: center; background: var(--bg2); border-bottom: 1px solid #333; flex-wrap: wrap; }
#save-area label { font-weight: 600; }
#save-area input[type="file"] { color: var(--text2); }
.btn { padding: 6px 16px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: .85em; }
.btn:hover { filter: brightness(1.2); }
.btn-sm { padding: 4px 10px; font-size: .8em; }
#import-msg { font-size: .82em; margin-left: 8px; }
#import-msg.ok { color: var(--green); }
#import-msg.err { color: var(--red); }
#json-paste-wrap { display: none; padding: 0 16px 12px; background: var(--bg2); gap: 8px; align-items: flex-start; }
#json-paste { flex: 1; min-width: 0; background: #111; border: 1px solid #444; border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: .8em; font-family: monospace; resize: vertical; }

/* Custom tooltip */
#js-tip { display:none; position:fixed; z-index:9999; max-width:360px; padding:8px 12px; background:#1a1a2e; border:1px solid var(--gold); border-radius:6px; color:var(--text); font-size:.72em; line-height:1.5; white-space:pre-line; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.5); }

/* Main layout */
.main { max-width: 1400px; margin: 0 auto; padding: 16px; }
.section { background: var(--bg2); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h2 { margin-bottom: 12px; color: var(--accent); font-size: 1.15em; border-bottom: 1px solid #333; padding-bottom: 6px; }
.section h3 { margin: 12px 0 8px; color: var(--cyan); font-size: 1em; }

/* Cards */
.card-grid { display: grid; gap: 10px; }
.card-grid.cols-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
.card-grid.cols-3 { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.card-grid.cols-4 { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
.card-grid.cols-5 { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
.card { background: var(--bg3); border-radius: 8px; padding: 10px 12px; border: 1px solid #444; }
.card .card-title { font-weight: 700; font-size: .85em; color: var(--cyan); margin-bottom: 2px; }
.card .card-val { font-weight: 700; font-size: 1.5em; color: var(--gold); }
.card .card-sub { color: var(--text2); font-size: .75em; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: .82em; }
.data-table th { text-align: left; padding: 5px 6px; color: var(--text2); border-bottom: 1px solid #333; font-weight: 600; position: sticky; top: 0; background: var(--bg2); }
.data-table td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,.04); }
.sim-block-start td { border-top: 2px solid #444; }
.sim-block-cont td { border-bottom: none; }
.data-table tr:hover td { background: rgba(255,255,255,.03); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .locked { opacity: .4; }

/* Water type tabs */
.water-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.water-tab { padding: 6px 18px; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: 700; font-size: .85em; border: 1px solid #444; border-bottom: none; background: var(--bg3); color: var(--text2); transition: background .15s, color .15s; }
.water-tab:hover { background: var(--bg); }
.water-tab.active { color: #000; }
.water-tab[data-w="0"].active { background: var(--blue); }
.water-tab[data-w="1"].active { background: var(--yellow); }
.water-tab[data-w="2"].active { background: var(--w-green); }

/* Water panel */
.water-panel { display: none; }
.water-panel.active { display: block; }

/* Bars */
.bar-outer { height: 10px; border-radius: 5px; background: #333; overflow: hidden; min-width: 80px; }
.bar-fill { height: 100%; border-radius: 5px; }
.bar-fill.yellow { background: var(--yellow); }
.bar-fill.green { background: var(--w-green); }
.bar-fill.black { background: var(--w-black); }

/* Badges */
.badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: .72em; font-weight: 700; }
.badge-green { background: rgba(76,175,80,.2); color: var(--green); }
.badge-gold { background: rgba(255,215,0,.15); color: var(--gold); }
.badge-blue { background: rgba(33,150,243,.15); color: var(--blue); }
.badge-red { background: rgba(255,68,68,.15); color: var(--red); }

/* Planner */
.planner-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.planner-controls label { font-size: .85em; color: var(--text2); }
.planner-controls select { background: var(--bg3); color: var(--text); border: 1px solid #555; border-radius: 4px; padding: 4px 8px; font-size: .85em; }
.planner-controls input[type="checkbox"] { accent-color: var(--accent); }
.eff-bar { display: inline-block; height: 8px; border-radius: 4px; background: var(--accent); vertical-align: middle; }
.rank-num { font-weight: 700; color: var(--gold); font-size: 1.1em; min-width: 24px; display: inline-block; text-align: center; }
.data-table .best td { background: rgba(76,175,80,.08); }

/* Currency row */
.curr-row { display: grid; grid-template-columns: 140px 1fr 100px 100px; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.06); align-items: center; font-size: .85em; }
.curr-name { font-weight: 700; }
.curr-base, .curr-total { text-align: right; font-variant-numeric: tabular-nums; }

/* Marble column */
.marble-col { text-align: center; font-size: .72em; color: var(--purple); }

/* Inline number */
.n { color: var(--gold); font-weight: 600; }
.n-blue { color: var(--blue); font-weight: 600; }

/* Scroll wrapper for table overflow */
.table-scroll { overflow-x: auto; }

/* Main tabs */
.tabs { display: flex; background: var(--bg2); border-bottom: 1px solid #333; }
.tab { padding: 10px 20px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all .2s; font-weight: 600; font-size: .9em; }
.tab:hover { color: var(--text); background: rgba(255,255,255,.05); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Coin stacks horizontal */
.coin-stack { display: inline-flex; flex-direction: column; align-items: center; padding: 8px 10px; background: var(--bg3); border-radius: 6px; border: 1px solid #444; min-width: 70px; font-size: .78em; }
.coin-stack .cs-slot { color: var(--text2); margin-bottom: 2px; }
.coin-stack .cs-count { font-weight: 700; font-size: 1.2em; color: var(--text); }
.coin-stack .cs-types { color: var(--cyan); margin-top: 2px; }
.coin-stack .cs-royal { color: var(--gold); font-weight: 700; }
.coin-stack .cs-val { color: var(--gold); font-size: .9em; margin-top: 2px; }
.coin-stacks-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

/* Breakdown tree */
.bt-controls { margin-bottom: 8px; display: flex; gap: 6px; }
.bt-controls .btn-sm { padding: 4px 10px; background: var(--bg3); color: var(--text2); border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: .8em; }
.bt-controls .btn-sm:hover { color: var(--cyan); border-color: var(--cyan); }
.bt-tree { font-size: .85em; }
.bt-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,.04); min-height: 26px; cursor: pointer; }
.bt-row:hover { background: rgba(255,255,255,.07); }
.bt-children { background: rgba(0,0,0,.12); border-left: 2px solid rgba(255,255,255,.08); }
.bt-root { font-weight: 700; font-size: 1.05em; padding-top: 6px; padding-bottom: 6px; border-bottom: 2px solid #444; }
.bt-arrow { cursor: pointer; color: var(--text2); font-size: 1em; width: 14px; text-align: center; user-select: none; flex-shrink: 0; }
.bt-arrow:hover { color: var(--cyan); }
.bt-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bt-val { font-weight: 600; text-align: right; flex-shrink: 0; white-space: nowrap; margin-left: auto; font-variant-numeric: tabular-nums; }
.sub-val { font-size: .8em; color: var(--text2); }
.stat-table { width: 100%; border-collapse: collapse; font-size: .85em; }
.stat-table th, .stat-table td { padding: 5px 8px; text-align: right; border-bottom: 1px solid rgba(255,255,255,.08); }
.stat-table th:first-child, .stat-table td:first-child { text-align: left; }
.stat-table th { color: var(--text2); font-weight: 600; border-bottom: 2px solid #444; }
.stat-table tfoot td { border-top: 2px solid #444; }
</style>
</head>
<body>

<div id="js-tip"></div>

<h1>&#x26F2; <span>Idleon</span> Fountain Calculator</h1>

<div id="save-area">
  <label>Load save:</label>
  <input type="file" id="file-input" accept=".json">
  <span style="color:var(--text2);margin:0 4px;">or</span>
  <button class="btn btn-sm" id="paste-btn">Paste JSON</button>
  <span id="import-msg"></span>
  <label id="green-water-toggle" style="display:none;margin-left:16px;font-size:.82em;cursor:pointer;color:var(--text2);" title="Enable placeholder Green Water upgrades (not yet active in-game)">
    <input type="checkbox" id="green-water-cb" style="accent-color:#a5d6a7;"> Green Water <span style="color:#a5d6a7;font-size:.85em;">(preview)</span>
  </label>
</div>
<div id="json-paste-wrap">
  <textarea id="json-paste" rows="3" placeholder="Paste it.json or save.json contents here..."></textarea>
  <button class="btn" id="paste-load-btn">Load</button>
</div>

<div class="main" id="main-content">
  <div style="color:var(--text2);text-align:center;padding:60px 0;">Load a save to begin.</div>
</div>

<script type="module">
'use strict';

import { saveData } from './js/state.js';
import { loadSaveData } from './js/save/loader.js';
import { fmtVal } from './js/renderers/format.js';
import * as F from './js/stats/systems/w5/fountain.js';

// ========== FORMATTING ==========
function fmtNum(n) {
  if (n === 0) return '0';
  if (n === Math.floor(n) && Math.abs(n) < 1e3) return String(n);
  return fmtVal(n);
}

var CURR_SHORT = ['Bronze', 'Silver', 'Gold', 'Dollar', 'Credit', 'T-Bill', 'Moolah', 'Shilling', 'Greane'];
function fmtCost(amount, typeIdx) {
  return fmtNum(amount) + ' <span style="color:var(--text2);font-size:.8em">' + (CURR_SHORT[typeIdx] || '?') + '</span>';
}

function fmtPct(n) { return (n * 100).toFixed(1) + '%'; }
function fmtTimeFull(sec) {
  if (!isFinite(sec) || sec <= 0) return '0s';
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = Math.floor(sec % 60);
  var ms = Math.round((sec % 1) * 1000);
  var parts = [];
  if (h > 0) parts.push(h + 'h');
  if (m > 0) parts.push(m + 'm');
  if (s > 0 || (parts.length === 0 && ms === 0)) parts.push(s + 's');
  if (ms > 0) parts.push(ms + 'ms');
  return parts.join(' ');
}
function fmtTime(sec) {
  if (sec < 60) return sec.toFixed(0) + 's';
  if (sec < 3600) return (sec / 60).toFixed(1) + 'm';
  return (sec / 3600).toFixed(2) + 'h';
}

// ========== SAVE LOADING ==========
document.getElementById('green-water-cb').addEventListener('change', function() {
  F.setWatersImplemented(this.checked ? 3 : 2);
  if (saveData && saveData.holesData) _renderAll();
});

function _loadRaw(raw) {
  var msg = document.getElementById('import-msg');
  try {
    loadSaveData(raw);
    msg.className = 'ok';
    msg.textContent = '\u2713 Save loaded.';
    document.getElementById('green-water-toggle').style.display = '';
    _renderAll();
  } catch (err) {
    msg.className = 'err';
    msg.textContent = '\u2717 ' + err.message;
    console.error(err);
  }
}

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    try { _loadRaw(JSON.parse(reader.result)); }
    catch (err) {
      var m = document.getElementById('import-msg');
      m.className = 'err'; m.textContent = '\u2717 ' + err.message;
    }
  };
  reader.readAsText(file);
});

document.getElementById('paste-btn').addEventListener('click', function() {
  var wrap = document.getElementById('json-paste-wrap');
  wrap.style.display = wrap.style.display === 'flex' ? 'none' : 'flex';
});

document.getElementById('paste-load-btn').addEventListener('click', function() {
  try {
    _loadRaw(JSON.parse(document.getElementById('json-paste').value));
    document.getElementById('json-paste-wrap').style.display = 'none';
  } catch (err) {
    var m = document.getElementById('import-msg');
    m.className = 'err'; m.textContent = '\u2717 ' + err.message;
  }
});

// ========== TOOLTIP ==========
(function() {
  var tip = document.getElementById('js-tip');
  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('[data-tip]');
    if (!el) { tip.style.display = 'none'; return; }
    tip.textContent = el.getAttribute('data-tip');
    tip.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e) {
    if (tip.style.display === 'none') return;
    var x = e.clientX + 14, y = e.clientY + 14;
    if (x + 360 > window.innerWidth) x = e.clientX - 370;
    if (y + 120 > window.innerHeight) y = e.clientY - 120;
    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  });
  document.addEventListener('mouseout', function(e) {
    if (e.target.closest('[data-tip]')) tip.style.display = 'none';
  });
})();

// ========== RENDERING ==========
var _activeWater = 0;
var _plannerGoal = 'currency';
var _plannerAffordable = false;
var _plannerNormalize = false;
var _optimizerGoal = 'currency';
var _optimizerMaxSteps = 50;
var _optimizerAffordable = true;
var _optimizerNormalize = false;
var _mPlannerGoal = 'currency';
var _mPlannerAffordable = false;
var _mOptimizerGoal = 'currency';
var _mOptimizerMaxSteps = 50;
var _mOptimizerAffordable = true;
var _plannerPerHr = false;
var _optimizerPerHr = false;
var _simTimeLimit = 24; // hours


// Render the planner table
function _renderPlanner(uLvs, mLvs, desired) {
  var el = document.getElementById('planner-table');
  if (!el) return;
  var goal = _plannerGoal;
  var baseline = F.measureGoal(saveData, goal, uLvs, mLvs, desired);
  var baseFillTime = F.barFillTime(saveData, uLvs, mLvs) / F.activeSpeedMulti(uLvs, mLvs);
  var baseMarbleFill = F.marbleBarFillTime() / F.activeSpeedMulti(uLvs, mLvs);
  var _numUnlocked = 0;
  for (var _t = 0; _t < 9; _t++) if (F.currencyUnlocked(uLvs, mLvs, _t)) _numUnlocked++;
  var _fillsPerHr = 3600 / baseFillTime;
  // Per-currency optimal earn rates: collect only full royal stacks.
  // Crowns accumulate on all spaces (including full). No MBG.
  var _pRc = F.royalChance(uLvs, mLvs);
  var _pRm = F.royalMulti(uLvs, mLvs);
  var _pSizeBon = F._sizeMatterBonus(saveData);
  var _pMaxStack = F.maxStackSize(saveData, uLvs, mLvs);
  var _pFullStackMul = 1 + _pMaxStack * _pSizeBon / 100;
  var _pRoyalDuringFill = 1 - Math.pow(1 - _pRc, _pMaxStack);
  var _pWaitFills = _pRoyalDuringFill < 1 ? (1 - _pRoyalDuringFill) / _pRc : 0;
  var _pFillsPerStack = _pMaxStack + _pWaitFills;
  var _earnPerHr = [];
  for (var _et = 0; _et < 9; _et++) {
    var _cv = F.currencyTotalValue(saveData, uLvs, mLvs, _et, _et);
    _earnPerHr[_et] = (_fillsPerHr / _pFillsPerStack) * _pMaxStack * _cv * _pRm * _pFullStackMul;
  }

  var _isOptimal = (goal === 'optimal');
  var _baseStacks = _isOptimal ? F.optimalStacksPerHr(saveData, uLvs, mLvs) : 0;
  var _baseStackVal = _isOptimal ? F.optimalStackValue(saveData, uLvs, mLvs, desired) : 0;

  var candidates = [];
  for (var w = 0; w < F.WATERS_IMPLEMENTED; w++) {
    for (var u = 0; u < 20; u++) {
      if (!F.upgUnlocked(uLvs, w, u)) continue;
      var lv = uLvs[w][u] || 0;
      var cost = F.upgCost(w, u, lv);
      var d = F.UPG_DATA[w][u];
      var opalType = d[3];

      var avail = F.fountCurrencyAvail(saveData, opalType);
      var canAfford = avail >= cost;
      if (_plannerAffordable && !canAfford) continue;

      var simLvs = F.cloneUpgLvs(uLvs);
      simLvs[w][u] = lv + 1;
      var newVal = F.measureGoal(saveData, goal, simLvs, mLvs, desired);
      var delta = newVal - baseline;
      if (delta <= 0) continue;

      var pctGain = baseline > 0 ? (delta / baseline) * 100 : 0;
      var efficiency;
      if (_plannerPerHr) {
        var hrsToEarn = _earnPerHr[opalType] > 0 ? cost / _earnPerHr[opalType] : Infinity;
        efficiency = hrsToEarn > 0 && hrsToEarn < Infinity ? pctGain / hrsToEarn : 0;
      } else {
        var normCost = cost;
        if (_plannerNormalize) {
          var cv = F.currencyTotalValue(saveData, uLvs, mLvs, opalType, desired);
          normCost = cost * cv;
        }
        efficiency = normCost > 0 ? pctGain / normCost : 0;
      }

      var fillDiff = null, marbleFillDiff = null;
      if (goal === 'fill') {
        var newFill = F.barFillTime(saveData, simLvs, mLvs) / F.activeSpeedMulti(simLvs, mLvs);
        fillDiff = baseFillTime - newFill;
        var newMFill = F.marbleBarFillTime() / F.activeSpeedMulti(simLvs, mLvs);
        marbleFillDiff = baseMarbleFill - newMFill;
      }

      var speedPct = 0, valPct = 0;
      if (_isOptimal) {
        var _newStacks = F.optimalStacksPerHr(saveData, simLvs, mLvs);
        var _newStackVal = F.optimalStackValue(saveData, simLvs, mLvs, desired);
        speedPct = _baseStacks > 0 ? (_newStacks / _baseStacks - 1) * 100 : 0;
        valPct = _baseStackVal > 0 ? (_newStackVal / _baseStackVal - 1) * 100 : 0;
      }

      // TTA calculation
      var _avail = F.fountCurrencyAvail(saveData, opalType);
      var _currRemaining = Math.max(0, cost - _avail);
      var _currTtaSec = _currRemaining <= 0 ? 0 : (_earnPerHr[opalType] > 0 ? (_currRemaining / _earnPerHr[opalType]) * 3600 : Infinity);

      candidates.push({
        w: w, u: u, name: d[0], lv: lv,
        cost: cost, opalType: opalType,
        canAfford: canAfford,
        delta: delta, pctGain: pctGain,
        efficiency: efficiency,
        newVal: newVal,
        fillDiff: fillDiff, marbleFillDiff: marbleFillDiff,
        currTta: _currTtaSec,
        speedPct: speedPct, valPct: valPct,
      });
    }
  }

  candidates.sort(function(a, b) { return b.efficiency - a.efficiency; });

  if (candidates.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);padding:16px;">No upgrades affect this goal, or none are affordable.</div>';
    return;
  }

  var maxEff = candidates[0].efficiency;

  var isFill = (goal === 'fill');
  var html = '<table class="data-table"><thead><tr>';
  html += '<th>#</th><th>Water</th><th>Upgrade</th><th class="num">Lv</th>';
  html += '<th class="num">Cost</th><th class="num">Currency TTA</th><th class="num">Gain</th>';
  html += '<th class="num">% Gain</th>';
  if (isFill) html += '<th class="num">Coin \u0394</th><th class="num">Marble \u0394</th>';
  if (_isOptimal) html += '<th class="num" title="Fill speed change (stacks/hr)">Speed \u0394</th><th class="num" title="Stack value change (currency × royal × stack bonus)">Value \u0394</th>';
  html += '<th>Efficiency</th><th>Affordable</th>';
  html += '</tr></thead><tbody>';

  var limit = Math.min(candidates.length, 30);
  for (var i = 0; i < limit; i++) {
    var c = candidates[i];
    var barW = maxEff > 0 ? Math.max(2, (c.efficiency / maxEff) * 120) : 2;
    var rowCls = i === 0 ? ' class="best"' : '';
    html += '<tr' + rowCls + '>';
    html += '<td><span class="rank-num">' + (i + 1) + '</span></td>';
    html += '<td><span style="color:' + F.WATER_COLORS[c.w] + '">' + F.WATER_NAMES[c.w] + '</span></td>';
    html += '<td>' + c.name + '</td>';
    html += '<td class="num">' + c.lv + ' \u2192 ' + (c.lv + 1) + '</td>';
    html += '<td class="num">' + fmtCost(c.cost, c.opalType) + '</td>';
    html += '<td class="num">' + (c.currTta <= 0 ? '<span class="badge badge-green">Now</span>' : (isFinite(c.currTta) ? fmtTimeFull(c.currTta) : '\u221e')) + '</td>';
    html += '<td class="num">+' + fmtNum(c.delta) + '</td>';
    html += '<td class="num">+' + c.pctGain.toFixed(3) + '%</td>';
    if (isFill) {
      html += '<td class="num" style="color:var(--green)">-' + fmtTimeFull(c.fillDiff) + '</td>';
      html += '<td class="num" style="color:var(--green)">' + (c.marbleFillDiff > 0.0005 ? '-' + fmtTimeFull(c.marbleFillDiff) : '-') + '</td>';
    }
    if (_isOptimal) {
      html += '<td class="num" style="color:' + (c.speedPct > 0 ? 'var(--green)' : c.speedPct < 0 ? '#e57373' : 'var(--text2)') + '">' + (c.speedPct >= 0 ? '+' : '') + c.speedPct.toFixed(3) + '%</td>';
      html += '<td class="num" style="color:' + (c.valPct > 0 ? 'var(--green)' : c.valPct < 0 ? '#e57373' : 'var(--text2)') + '">' + (c.valPct >= 0 ? '+' : '') + c.valPct.toFixed(3) + '%</td>';
    }

    html += '<td>' + (c.canAfford ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-red">No</span>') + '</td>';
    html += '</tr>';
  }
  var _pColCount = 10 + (isFill ? 2 : 0) + (_isOptimal ? 2 : 0);
  if (candidates.length > limit) {
    html += '<tr><td colspan="' + _pColCount + '" style="color:var(--text2);text-align:center;">\u2026 and ' + (candidates.length - limit) + ' more</td></tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

var _btId = 0;
function _btFmtVal(v, fmt) {
  if (fmt === 'x') return '\u00d7' + (Math.abs(v) >= 1e4 ? fmtNum(v) : parseFloat(v.toFixed(4)));
  if (fmt === 'pct') return parseFloat(v.toFixed(1)) + '%';
  if (fmt === '+%') return '+' + parseFloat(v.toFixed(2)) + '%';
  if (fmt === '+') return '+' + (Math.abs(v) >= 1e4 ? fmtNum(v) : parseFloat(v.toFixed(2)));
  return Math.abs(v) >= 1e4 ? fmtNum(v) : parseFloat(v.toFixed(4));
}
function _btValColor(fmt) {
  if (fmt === 'pct' || fmt === '+') return 'var(--green)';
  if (fmt === '+%') return 'var(--purple)';
  if (fmt === 'x') return 'var(--cyan)';
  return 'var(--text)';
}
function _btBuildHtml(node, depth) {
  var id = 'bt' + (_btId++) + '-';
  var has = node.children && node.children.length > 0;
  var pad = depth * 18;
  var open = depth <= 1;
  var arrow = has ? '<span class="bt-arrow" data-id="' + id + '">' + (open ? '\u25be' : '\u25b8') + '</span>'
    : '<span style="display:inline-block;width:14px;"></span>';
  var cls = 'bt-row' + (depth === 0 ? ' bt-root' : '');
  var h = '<div class="' + cls + '" style="padding-left:' + pad + 'px;">';
  h += arrow;
  h += '<span class="bt-label">' + node.label + '</span>';
  h += '<span class="bt-val" style="color:' + _btValColor(node.fmt) + '">' + _btFmtVal(node.val, node.fmt) + '</span>';
  h += '</div>';
  if (has) {
    h += '<div class="bt-children" id="' + id + '" style="' + (open ? '' : 'display:none;') + '">';
    for (var ci = 0; ci < node.children.length; ci++) h += _btBuildHtml(node.children[ci], depth + 1);
    h += '</div>';
  }
  return h;
}
function _renderBreakdown(root, container) {
  var h = '<div class="bt-controls"><button class="btn btn-sm bt-expand-all">Expand All</button>'
    + '<button class="btn btn-sm bt-collapse-all">Collapse All</button></div>';
  h += '<div class="bt-tree">' + _btBuildHtml(root, 0) + '</div>';
  container.innerHTML = h;
  container.onclick = function(e) {
    if (e.target.closest('.bt-controls')) return;
    var row = e.target.closest('.bt-row');
    if (!row) return;
    var arrow = row.querySelector('.bt-arrow');
    if (!arrow) return;
    var ch = document.getElementById(arrow.dataset.id);
    if (!ch) return;
    var open = ch.style.display !== 'none';
    ch.style.display = open ? 'none' : '';
    arrow.textContent = open ? '\u25b8' : '\u25be';
  };
  var ea = container.querySelector('.bt-expand-all');
  var ca = container.querySelector('.bt-collapse-all');
  if (ea) ea.onclick = function(e) {
    e.stopPropagation();
    container.querySelectorAll('.bt-children').forEach(function(el) { el.style.display = ''; });
    container.querySelectorAll('.bt-arrow').forEach(function(el) { el.textContent = '\u25be'; });
  };
  if (ca) ca.onclick = function(e) {
    e.stopPropagation();
    container.querySelectorAll('.bt-children').forEach(function(el) { el.style.display = 'none'; });
    container.querySelectorAll('.bt-arrow').forEach(function(el) { el.textContent = '\u25b8'; });
  };
}

var _ccUpgradesData = [];  // set by _renderAll
var _ccGoal = 'currency';  // for efficiency mode
var _ccNormalize = false;
var _ccEfficiency = false;
var _ccLineColors = [
  '#64b5f6','#ffe066','#a5d6a7','#ef9a9a','#ce93d8','#80cbc4',
  '#ffcc80','#90caf9','#f48fb1','#b9f6ca','#fff59d','#80deea',
  '#bcaaa4','#b0bec5','#c5e1a5','#e6ee9c','#81d4fa','#ea80fc',
  '#ff8a65','#4dd0e1','#aed581','#dce775','#4fc3f7','#ba68c8',
  '#ff7043','#26c6da','#9ccc65','#d4e157','#29b6f6','#ab47bc',
  '#ff5722','#00bcd4','#8bc34a','#cddc39','#03a9f4','#9c27b0',
  '#e64a19','#0097a7','#689f38','#afb42b','#0288d1','#7b1fa2',
];

// Upgrade categories for checkbox grouping
var _CC_CATEGORIES = [
  { key: 'value', label: 'Currency Value', upgs: [[0,0],[0,1],[1,0],[1,1],[2,0],[2,1],[1,9],[1,11],[1,12],[0,19],[1,19]] },

];

var _ccLastSeries = [];  // cached for tooltip
var _ccPad = { l: 70, r: 20, t: 20, b: 40 };
var _ccSteps = 50;

function _drawCostCurve() {
  var canvas = document.getElementById('cost-curve-canvas');
  if (!canvas) return;
  var checks = document.querySelectorAll('.cc-check');
  var selected = [];
  checks.forEach(function(ch) {
    if (ch.checked) selected.push(Number(ch.dataset.ccidx));
  });
  if (selected.length === 0 || _ccUpgradesData.length === 0) {
    var ctx0 = canvas.getContext('2d');
    var dpr0 = window.devicePixelRatio || 1;
    var rect0 = canvas.getBoundingClientRect();
    canvas.width = rect0.width * dpr0;
    canvas.height = rect0.height * dpr0;
    ctx0.scale(dpr0, dpr0);
    ctx0.clearRect(0, 0, rect0.width, rect0.height);
    ctx0.fillStyle = '#888';
    ctx0.font = '14px sans-serif';
    ctx0.textAlign = 'center';
    ctx0.fillText('Select upgrades to display', rect0.width / 2, rect0.height / 2);
    _ccLastSeries = [];
    return;
  }

  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var W = rect.width, H = rect.height;
  var pad = _ccPad;
  var plotW = W - pad.l - pad.r, plotH = H - pad.t - pad.b;
  var steps = _ccSteps;

  // Compute series data
  var series = [];
  for (var si = 0; si < selected.length; si++) {
    var upg = _ccUpgradesData[selected[si]];
    var pts = [], rawVals = [];
    for (var s = 0; s <= steps; s++) {
      var cost = F.upgCost(upg.w, upg.u, upg.lv + s);
      var val;
      if (_ccEfficiency) {
        // Efficiency: pctGain / cost for goal at this level
        var simBase = F.cloneUpgLvs(upg._uLvs);
        simBase[upg.w][upg.u] = upg.lv + s;
        var baseVal = F.measureGoal(saveData, _ccGoal, simBase, upg._mLvs, upg._desired);
        var simNext = F.cloneUpgLvs(simBase);
        simNext[upg.w][upg.u] = upg.lv + s + 1;
        var nextVal = F.measureGoal(saveData, _ccGoal, simNext, upg._mLvs, upg._desired);
        var delta = nextVal - baseVal;
        var pctGain = baseVal > 0 ? (delta / baseVal) * 100 : 0;
        if (_ccNormalize) {
          var cv = F.currencyTotalValue(saveData, upg._uLvs, upg._mLvs, upg.costType, upg._desired);
          cost = cost * cv;
        }
        val = cost > 0 ? pctGain / cost : 0;
        rawVals.push(val);
        pts.push(val > 0 ? Math.log10(val) : -30);
      } else {
        if (_ccNormalize) {
          var cv = F.currencyTotalValue(saveData, upg._uLvs, upg._mLvs, upg.costType, upg._desired);
          cost = cost * cv;
        }
        rawVals.push(cost);
        pts.push(Math.log10(Math.max(1, cost)));
      }
    }
    series.push({
      pts: pts, rawVals: rawVals,
      name: upg.name, color: _ccLineColors[selected[si] % _ccLineColors.length],
      upg: upg, idx: selected[si]
    });
  }
  _ccLastSeries = series;

  // Find Y range
  var yMin = Infinity, yMax = -Infinity;
  for (var i = 0; i < series.length; i++) {
    for (var j = 0; j <= steps; j++) {
      var v = series[i].pts[j];
      if (v > -29 && v < yMin) yMin = v;
      if (v > yMax) yMax = v;
    }
  }
  if (!isFinite(yMin)) yMin = 0;
  if (!isFinite(yMax)) yMax = 1;
  if (yMax - yMin < 1) { yMin -= 0.5; yMax += 0.5; }
  var yPad = (yMax - yMin) * 0.05;
  yMin -= yPad; yMax += yPad;

  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  var yTicks = 6;
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'right';
  for (var yi = 0; yi <= yTicks; yi++) {
    var yv = yMin + (yMax - yMin) * yi / yTicks;
    var py = pad.t + plotH - (yv - yMin) / (yMax - yMin) * plotH;
    ctx.beginPath(); ctx.moveTo(pad.l, py); ctx.lineTo(pad.l + plotW, py); ctx.stroke();
    var pow = Math.round(yv * 10) / 10;
    ctx.fillText('1e' + pow.toFixed(1), pad.l - 6, py + 4);
  }
  ctx.textAlign = 'center';
  var xTicks = 5;
  for (var xi = 0; xi <= xTicks; xi++) {
    var xLv = Math.round(steps * xi / xTicks);
    var px = pad.l + (xLv / steps) * plotW;
    ctx.beginPath(); ctx.moveTo(px, pad.t); ctx.lineTo(px, pad.t + plotH); ctx.stroke();
    ctx.fillText('+' + xLv, px, pad.t + plotH + 16);
  }
  var xLabel = _ccEfficiency ? 'Levels from current (' + _ccGoal + ' efficiency)' : 'Levels from current';
  ctx.fillText(xLabel, pad.l + plotW / 2, pad.t + plotH + 34);

  // Draw lines
  ctx.lineWidth = 2;
  for (var li = 0; li < series.length; li++) {
    ctx.strokeStyle = series[li].color;
    ctx.beginPath();
    var started = false;
    for (var lj = 0; lj <= steps; lj++) {
      if (series[li].pts[lj] <= -29) { started = false; continue; }
      var lx = pad.l + (lj / steps) * plotW;
      var ly = pad.t + plotH - (series[li].pts[lj] - yMin) / (yMax - yMin) * plotH;
      if (!started) { ctx.moveTo(lx, ly); started = true; } else ctx.lineTo(lx, ly);
    }
    ctx.stroke();
  }

  // Legend
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  var legX = pad.l + 10, legY = pad.t + 14;
  for (var lg = 0; lg < series.length; lg++) {
    ctx.fillStyle = series[lg].color;
    ctx.fillRect(legX, legY + lg * 16 - 8, 12, 3);
    ctx.fillText(series[lg].name, legX + 16, legY + lg * 16);
  }
}

function _ccShowTooltip(e) {
  var canvas = document.getElementById('cost-curve-canvas');
  var tip = document.getElementById('cc-tooltip');
  if (!canvas || !tip || _ccLastSeries.length === 0) { if (tip) tip.style.display = 'none'; return; }
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var W = rect.width, H = rect.height;
  var pad = _ccPad;
  var plotW = W - pad.l - pad.r, plotH = H - pad.t - pad.b;
  var steps = _ccSteps;
  // Map mouse X to step
  var frac = (mx - pad.l) / plotW;
  if (frac < 0 || frac > 1) { tip.style.display = 'none'; return; }
  var step = Math.round(frac * steps);
  if (step < 0) step = 0; if (step > steps) step = steps;

  // Build tooltip content
  var lines = ['<b>+' + step + ' levels</b>'];
  for (var i = 0; i < _ccLastSeries.length; i++) {
    var s = _ccLastSeries[i];
    var upg = s.upg;
    var lv = upg.lv + step;
    var rawCost = F.upgCost(upg.w, upg.u, lv);
    var label = _ccEfficiency ? 'Eff' : 'Cost';
    var valStr;
    if (_ccEfficiency) {
      var rv = s.rawVals[step];
      valStr = rv === 0 ? '0' : rv.toExponential(2);
    } else {
      valStr = fmtCost(rawCost, upg.costType);
    }
    lines.push('<span style="color:' + s.color + '">\u25CF</span> ' + s.name
      + ' <span style="color:var(--text2)">(Lv ' + lv + ')</span> — '
      + label + ': ' + valStr);
  }
  tip.innerHTML = lines.join('<br>');
  tip.style.display = 'block';
  // Position tooltip
  var tipX = mx + 16, tipY = my - 10;
  if (tipX + 260 > rect.width) tipX = mx - 260;
  if (tipY < 0) tipY = 4;
  tip.style.left = tipX + 'px';
  tip.style.top = tipY + 'px';
}

  var tip = document.getElementById('cc-tooltip');
  if (tip) tip.style.display = 'none';

// ========== MULTI-UPGRADE OPTIMIZER ==========
function _renderOptimizer(uLvs, mLvs, desired) {
  var el = document.getElementById('optimizer-table');
  if (!el) return;
  var goal = _optimizerGoal;
  var maxSteps = _optimizerMaxSteps;

  var simLvs = F.cloneUpgLvs(uLvs);
  var budgets = {};
  for (var w = 0; w < F.WATERS_IMPLEMENTED; w++) {
    for (var u = 0; u < 20; u++) {
      var oType = F.UPG_DATA[w][u][3];
      if (!(oType in budgets)) budgets[oType] = F.fountCurrencyAvail(saveData, oType);
    }
  }

  var baseline = F.measureGoal(saveData, goal, simLvs, mLvs, desired);
  var steps = [];
  var bought = {};

  var _baseFillTime = F.barFillTime(saveData, uLvs, mLvs) / F.activeSpeedMulti(uLvs, mLvs);
  var _fillsPerHr = 3600 / _baseFillTime;
  var _oRc = F.royalChance(uLvs, mLvs);
  var _oRm = F.royalMulti(uLvs, mLvs);
  var _oSizeBon = F._sizeMatterBonus(saveData);
  var _oMaxStack = F.maxStackSize(saveData, uLvs, mLvs);
  var _oFullStackMul = 1 + _oMaxStack * _oSizeBon / 100;
  var _oRoyalDuringFill = 1 - Math.pow(1 - _oRc, _oMaxStack);
  var _oWaitFills = _oRoyalDuringFill < 1 ? (1 - _oRoyalDuringFill) / _oRc : 0;
  var _oFillsPerStack = _oMaxStack + _oWaitFills;
  var _earnPerHr = [];
  for (var _et = 0; _et < 9; _et++) {
    var _cv = F.currencyTotalValue(saveData, uLvs, mLvs, _et, _et);
    _earnPerHr[_et] = (_fillsPerHr / _oFillsPerStack) * _oMaxStack * _cv * _oRm * _oFullStackMul;
  }

  for (var step = 0; step < maxSteps; step++) {
    var bestEff = -1, bestW = -1, bestU = -1, bestCost = 0, bestDelta = 0, bestPct = 0;

    for (var w = 0; w < F.WATERS_IMPLEMENTED; w++) {
      for (var u = 0; u < 20; u++) {
        if (!F.upgUnlocked(simLvs, w, u)) continue;
        var lv = simLvs[w][u] || 0;
        var cost = F.upgCost(w, u, lv);
        var oType = F.UPG_DATA[w][u][3];
        if (_optimizerAffordable && (budgets[oType] || 0) < cost) continue;

        var tryLvs = F.cloneUpgLvs(simLvs);
        tryLvs[w][u] = lv + 1;
        var newVal = F.measureGoal(saveData, goal, tryLvs, mLvs, desired);
        var delta = newVal - baseline;
        if (delta <= 0) continue;
        var pctGain = baseline > 0 ? delta / baseline * 100 : 0;
        var eff;
        if (_optimizerPerHr) {
          var hrsToEarn = _earnPerHr[oType] > 0 ? cost / _earnPerHr[oType] : Infinity;
          eff = hrsToEarn > 0 && hrsToEarn < Infinity ? pctGain / hrsToEarn : 0;
        } else {
          var normCost = cost;
          if (_optimizerNormalize) {
            var cv = F.currencyTotalValue(saveData, simLvs, mLvs, oType, F.desiredCurrency(saveData));
            normCost = cost * cv;
          }
          eff = normCost > 0 ? pctGain / normCost : 0;
        }
        if (eff > bestEff) {
          bestEff = eff; bestW = w; bestU = u;
          bestCost = cost; bestDelta = delta; bestPct = pctGain;
        }
      }
    }

    if (bestW < 0) break;

    var oType = F.UPG_DATA[bestW][bestU][3];
    if (_optimizerAffordable) budgets[oType] -= bestCost;
    simLvs[bestW][bestU] = (simLvs[bestW][bestU] || 0) + 1;
    baseline = baseline + bestDelta;

    var key = bestW + ',' + bestU;
    bought[key] = (bought[key] || 0) + 1;

    steps.push({
      w: bestW, u: bestU, name: F.UPG_DATA[bestW][bestU][0],
      newLv: simLvs[bestW][bestU],
      cost: bestCost, opalType: oType,
      delta: bestDelta, pctGain: bestPct,
      cumVal: baseline,
      coinFill: goal === 'fill' ? F.barFillTime(saveData, simLvs, mLvs) / F.activeSpeedMulti(simLvs, mLvs) : null,
      marbleFill: goal === 'fill' ? F.marbleBarFillTime() / F.activeSpeedMulti(simLvs, mLvs) : null,
    });
  }

  if (steps.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);padding:16px;">No affordable upgrades affect this goal.</div>';
    return;
  }

  var groups = {};
  var groupOrder = [];
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var key = s.w + ',' + s.u;
    if (!groups[key]) {
      groups[key] = { w: s.w, u: s.u, name: s.name, count: 0, totalCost: 0, opalType: s.opalType, startLv: s.newLv - 1, endLv: s.newLv, coinFill: s.coinFill, marbleFill: s.marbleFill };
      groupOrder.push(key);
    }
    groups[key].count++;
    groups[key].totalCost += s.cost;
    groups[key].endLv = s.newLv;
    groups[key].coinFill = s.coinFill;
    groups[key].marbleFill = s.marbleFill;
  }

  var startVal = F.measureGoal(saveData, goal, uLvs, mLvs, desired);
  var endVal = baseline;
  var totalGainPct = startVal > 0 ? (endVal - startVal) / startVal * 100 : 0;

  var _oIsOptimal = (goal === 'optimal');

  var html = '<div style="margin-bottom:10px;font-size:.85em;">';
  html += '<span class="n">' + steps.length + '</span> upgrades purchased \u2022 ';
  html += 'Value: <span class="n">' + fmtNum(startVal) + '</span> \u2192 <span class="n">' + fmtNum(endVal) + '</span>';
  html += ' (<span class="n">+' + totalGainPct.toFixed(1) + '%</span>)';
  if (goal === 'fill') {
    var startFill = F.barFillTime(saveData, uLvs, mLvs) / F.activeSpeedMulti(uLvs, mLvs);
    var endFill = F.barFillTime(saveData, simLvs, mLvs) / F.activeSpeedMulti(simLvs, mLvs);
    html += ' \u2022 Fill: <span class="n">' + fmtTimeFull(startFill) + '</span> \u2192 <span class="n">' + fmtTimeFull(endFill) + '</span>';
  }
  if (_oIsOptimal) {
    var _oStartStacks = F.optimalStacksPerHr(saveData, uLvs, mLvs);
    var _oEndStacks = F.optimalStacksPerHr(saveData, simLvs, mLvs);
    var _oStartSV = F.optimalStackValue(saveData, uLvs, mLvs, desired);
    var _oEndSV = F.optimalStackValue(saveData, simLvs, mLvs, desired);
    var _oSpeedPct = _oStartStacks > 0 ? (_oEndStacks / _oStartStacks - 1) * 100 : 0;
    var _oValPct = _oStartSV > 0 ? (_oEndSV / _oStartSV - 1) * 100 : 0;
    html += ' \u2022 Speed: <span class="n">+' + _oSpeedPct.toFixed(1) + '%</span>';
    html += ' \u2022 Value: <span class="n">+' + _oValPct.toFixed(1) + '%</span>';
  }
  html += '</div>';

  html += '<table class="data-table"><thead><tr>';
  html += '<th>Water</th><th>Upgrade</th><th class="num">Levels</th>';
  html += '<th class="num">From</th><th class="num">To</th><th class="num">Total Cost</th>';
  html += '<th class="num">Currency TTA</th>';
  if (goal === 'fill') html += '<th class="num">Coin Fill</th><th class="num">Marble Fill</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < groupOrder.length; i++) {
    var g = groups[groupOrder[i]];
    html += '<tr>';
    html += '<td><span style="color:' + F.WATER_COLORS[g.w] + '">' + F.WATER_NAMES[g.w] + '</span></td>';
    html += '<td>' + g.name + '</td>';
    html += '<td class="num">' + g.count + '</td>';
    html += '<td class="num">' + (g.startLv) + '</td>';
    html += '<td class="num"><b>' + g.endLv + '</b></td>';
    html += '<td class="num">' + fmtCost(g.totalCost, g.opalType) + '</td>';
    var _oCurrAvail = F.fountCurrencyAvail(saveData, g.opalType);
    var _oCurrRem = Math.max(0, g.totalCost - _oCurrAvail);
    var _oCurrTta = _oCurrRem <= 0 ? 0 : (_earnPerHr[g.opalType] > 0 ? (_oCurrRem / _earnPerHr[g.opalType]) * 3600 : Infinity);
    html += '<td class="num">' + (_oCurrTta <= 0 ? '<span class="badge badge-green">Now</span>' : (isFinite(_oCurrTta) ? fmtTimeFull(_oCurrTta) : '\u221e')) + '</td>';
    if (goal === 'fill') {
      html += '<td class="num">' + fmtTimeFull(g.coinFill) + '</td>';
      html += '<td class="num">' + fmtTimeFull(g.marbleFill) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  if (_optimizerAffordable) {
    html += '<div style="margin-top:8px;font-size:.78em;color:var(--text2);">Remaining: ';
    var bKeys = Object.keys(budgets).sort();
    var parts = [];
    for (var i = 0; i < bKeys.length; i++) {
      parts.push((CURR_SHORT[bKeys[i]] || ('Type ' + bKeys[i])) + ': ' + fmtNum(budgets[bKeys[i]]));
    }
    html += parts.join(' \u2022 ') + '</div>';
  }

  el.innerHTML = html;
}

// ========== MARBLE PLANNER ==========
function _renderMarblePlanner(uLvs, mLvs, desired) {
  var el = document.getElementById('mplanner-table');
  if (!el) return;
  var goal = _mPlannerGoal;
  var baseline = F.measureGoal(saveData, goal, uLvs, mLvs, desired);
  var marbleAvail = F.marbleCurrency(saveData);
  var baseFillTime = F.barFillTime(saveData, uLvs, mLvs) / F.activeSpeedMulti(uLvs, mLvs);
  var baseMarbleFill = F.marbleBarFillTime() / F.activeSpeedMulti(uLvs, mLvs);
  var _marblePerHour = F.marblePerFill(saveData, uLvs, mLvs) * 3600 / baseMarbleFill;
  var _mIsOptimal = (goal === 'optimal');
  var _mBaseStacks = _mIsOptimal ? F.optimalStacksPerHr(saveData, uLvs, mLvs) : 0;
  var _mBaseStackVal = _mIsOptimal ? F.optimalStackValue(saveData, uLvs, mLvs, desired) : 0;

  var candidates = [];
  for (var w = 0; w < F.WATERS_IMPLEMENTED; w++) {
    for (var u = 0; u < 20; u++) {
      var upgLv = uLvs[w][u] || 0;
      if (upgLv <= 0) continue;  // can only marble upgrades you own
      if (!F.canMarble(w, u)) continue;  // upgrade cannot be marbled
      var mLv = mLvs[w][u] || 0;
      var cost = F.marbleCost(u, mLv);
      var canAfford = marbleAvail >= cost;
      if (_mPlannerAffordable && !canAfford) continue;

      var simMLvs = F.cloneMarbleLvs(mLvs);
      simMLvs[w][u] = mLv + 1;
      var newVal = F.measureGoal(saveData, goal, uLvs, simMLvs, desired);
      var delta = newVal - baseline;
      if (delta <= 0) continue;

      var pctGain = baseline > 0 ? (delta / baseline) * 100 : 0;
      var efficiency = cost > 0 ? pctGain / cost : 0;
      var fillDiff = null, marbleFillDiff = null;
      if (goal === 'fill') {
        var newFill = F.barFillTime(saveData, uLvs, simMLvs) / F.activeSpeedMulti(uLvs, simMLvs);
        fillDiff = baseFillTime - newFill;
        var newMFill = F.marbleBarFillTime() / F.activeSpeedMulti(uLvs, simMLvs);
        marbleFillDiff = baseMarbleFill - newMFill;
      }

      var mSpeedPct = 0, mValPct = 0;
      if (_mIsOptimal) {
        var _mnStacks = F.optimalStacksPerHr(saveData, uLvs, simMLvs);
        var _mnStackVal = F.optimalStackValue(saveData, uLvs, simMLvs, desired);
        mSpeedPct = _mBaseStacks > 0 ? (_mnStacks / _mBaseStacks - 1) * 100 : 0;
        mValPct = _mBaseStackVal > 0 ? (_mnStackVal / _mBaseStackVal - 1) * 100 : 0;
      }

      var ttaSec = _marblePerHour > 0 ? (cost / _marblePerHour) * 3600 : Infinity;

      candidates.push({
        w: w, u: u, name: F.UPG_DATA[w][u][0], mLv: mLv,
        cost: cost, canAfford: canAfford,
        delta: delta, pctGain: pctGain,
        efficiency: efficiency, fillDiff: fillDiff, marbleFillDiff: marbleFillDiff,
        tta: ttaSec, speedPct: mSpeedPct, valPct: mValPct,
      });
    }
  }

  candidates.sort(function(a, b) { return b.efficiency - a.efficiency; });

  if (candidates.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);padding:16px;">No marble upgrades affect this goal, or none are affordable.</div>';
    return;
  }

  var isFill = (goal === 'fill');
  var maxEff = candidates[0].efficiency;
  var html = '<table class="data-table"><thead><tr>';
  html += '<th>#</th><th>Water</th><th>Upgrade</th><th class="num">Marble Lv</th>';
  html += '<th class="num">Cost</th><th class="num">Time to Afford</th><th class="num">Gain</th>';
  html += '<th class="num">% Gain</th>';
  if (isFill) html += '<th class="num">Coin \u0394</th><th class="num">Marble \u0394</th>';
  if (_mIsOptimal) html += '<th class="num" title="Fill speed change (stacks/hr)">Speed \u0394</th><th class="num" title="Stack value change (currency \u00d7 royal \u00d7 stack bonus)">Value \u0394</th>';
  html += '<th>Efficiency</th><th>Affordable</th>';
  html += '</tr></thead><tbody>';

  var limit = Math.min(candidates.length, 30);
  for (var i = 0; i < limit; i++) {
    var c = candidates[i];
    var barW = maxEff > 0 ? Math.max(2, (c.efficiency / maxEff) * 120) : 2;
    var rowCls = i === 0 ? ' class="best"' : '';
    html += '<tr' + rowCls + '>';
    html += '<td><span class="rank-num">' + (i + 1) + '</span></td>';
    html += '<td><span style="color:' + F.WATER_COLORS[c.w] + '">' + F.WATER_NAMES[c.w] + '</span></td>';
    html += '<td>' + c.name + '</td>';
    html += '<td class="num">' + c.mLv + ' \u2192 ' + (c.mLv + 1) + '</td>';
    html += '<td class="num">' + fmtNum(c.cost) + ' marble</td>';
    html += '<td class="num">' + (c.tta < Infinity ? fmtTime(c.tta) : '-') + '</td>';
    html += '<td class="num">+' + fmtNum(c.delta) + '</td>';
    html += '<td class="num">+' + c.pctGain.toFixed(3) + '%</td>';
    if (isFill) {
      html += '<td class="num" style="color:var(--green)">-' + fmtTimeFull(c.fillDiff) + '</td>';
      html += '<td class="num" style="color:var(--green)">' + (c.marbleFillDiff > 0.0005 ? '-' + fmtTimeFull(c.marbleFillDiff) : '-') + '</td>';
    }
    if (_mIsOptimal) {
      html += '<td class="num" style="color:' + (c.speedPct > 0 ? 'var(--green)' : c.speedPct < 0 ? '#e57373' : 'var(--text2)') + '">' + (c.speedPct >= 0 ? '+' : '') + c.speedPct.toFixed(3) + '%</td>';
      html += '<td class="num" style="color:' + (c.valPct > 0 ? 'var(--green)' : c.valPct < 0 ? '#e57373' : 'var(--text2)') + '">' + (c.valPct >= 0 ? '+' : '') + c.valPct.toFixed(3) + '%</td>';
    }
    html += '<td><span class="eff-bar" style="width:' + barW + 'px"></span></td>';
    html += '<td>' + (c.canAfford ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-red">No</span>') + '</td>';
    html += '</tr>';
  }
  var _mpColCount = 10 + (isFill ? 2 : 0) + (_mIsOptimal ? 2 : 0);
  if (candidates.length > limit) {
    html += '<tr><td colspan="' + _mpColCount + '" style="color:var(--text2);text-align:center;">\u2026 and ' + (candidates.length - limit) + ' more</td></tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ========== MARBLE OPTIMIZER ==========
function _renderMarbleOptimizer(uLvs, mLvs, desired) {
  var el = document.getElementById('moptimizer-table');
  if (!el) return;
  var goal = _mOptimizerGoal;
  var maxSteps = _mOptimizerMaxSteps;

  var simMLvs = F.cloneMarbleLvs(mLvs);
  var budget = F.marbleCurrency(saveData);

  var baseline = F.measureGoal(saveData, goal, uLvs, simMLvs, desired);
  var steps = [];
  var _baseMarbleFill = F.marbleBarFillTime() / F.activeSpeedMulti(uLvs, mLvs);
  var _marblePerHour = F.marblePerFill(saveData, uLvs, mLvs) * 3600 / _baseMarbleFill;

  for (var step = 0; step < maxSteps; step++) {
    var bestEff = -1, bestW = -1, bestU = -1, bestCost = 0, bestDelta = 0, bestPct = 0;

    for (var w = 0; w < F.WATERS_IMPLEMENTED; w++) {
      for (var u = 0; u < 20; u++) {
        var upgLv = uLvs[w][u] || 0;
        if (upgLv <= 0) continue;
        if (!F.canMarble(w, u)) continue;
        var mLv = simMLvs[w][u] || 0;
        var cost = F.marbleCost(u, mLv);
        if (_mOptimizerAffordable && budget < cost) continue;

        var tryMLvs = F.cloneMarbleLvs(simMLvs);
        tryMLvs[w][u] = mLv + 1;
        var newVal = F.measureGoal(saveData, goal, uLvs, tryMLvs, desired);
        var delta = newVal - baseline;
        if (delta <= 0) continue;
        var pctGain = baseline > 0 ? delta / baseline * 100 : 0;
        var eff = cost > 0 ? pctGain / cost : 0;
        if (eff > bestEff) {
          bestEff = eff; bestW = w; bestU = u;
          bestCost = cost; bestDelta = delta; bestPct = pctGain;
        }
      }
    }

    if (bestW < 0) break;

    if (_mOptimizerAffordable) budget -= bestCost;
    simMLvs[bestW][bestU] = (simMLvs[bestW][bestU] || 0) + 1;
    baseline = baseline + bestDelta;

    steps.push({
      w: bestW, u: bestU, name: F.UPG_DATA[bestW][bestU][0],
      newMLv: simMLvs[bestW][bestU],
      cost: bestCost,
      delta: bestDelta, pctGain: bestPct,
      cumVal: baseline,
      coinFill: goal === 'fill' ? F.barFillTime(saveData, uLvs, simMLvs) / F.activeSpeedMulti(uLvs, simMLvs) : null,
      marbleFill: goal === 'fill' ? F.marbleBarFillTime() / F.activeSpeedMulti(uLvs, simMLvs) : null,
    });
  }

  if (steps.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);padding:16px;">No affordable marble upgrades affect this goal.</div>';
    return;
  }

  var groups = {};
  var groupOrder = [];
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var key = s.w + ',' + s.u;
    if (!groups[key]) {
      groups[key] = { w: s.w, u: s.u, name: s.name, count: 0, totalCost: 0, startLv: s.newMLv - 1, endLv: s.newMLv, coinFill: s.coinFill, marbleFill: s.marbleFill };
      groupOrder.push(key);
    }
    groups[key].count++;
    groups[key].totalCost += s.cost;
    groups[key].endLv = s.newMLv;
    groups[key].coinFill = s.coinFill;
    groups[key].marbleFill = s.marbleFill;
  }

  var startVal = F.measureGoal(saveData, goal, uLvs, mLvs, desired);
  var endVal = baseline;
  var totalGainPct = startVal > 0 ? (endVal - startVal) / startVal * 100 : 0;

  var _moIsOptimal = (goal === 'optimal');

  var html = '<div style="margin-bottom:10px;font-size:.85em;">';
  html += '<span class="n">' + steps.length + '</span> marble upgrades \u2022 ';
  html += 'Value: <span class="n">' + fmtNum(startVal) + '</span> \u2192 <span class="n">' + fmtNum(endVal) + '</span>';
  html += ' (<span class="n">+' + totalGainPct.toFixed(1) + '%</span>)';
  if (goal === 'fill') {
    var startFill = F.barFillTime(saveData, uLvs, mLvs) / F.activeSpeedMulti(uLvs, mLvs);
    var endFill = F.barFillTime(saveData, uLvs, simMLvs) / F.activeSpeedMulti(uLvs, simMLvs);
    html += ' \u2022 Fill: <span class="n">' + fmtTimeFull(startFill) + '</span> \u2192 <span class="n">' + fmtTimeFull(endFill) + '</span>';
  }
  if (_moIsOptimal) {
    var _moStartStacks = F.optimalStacksPerHr(saveData, uLvs, mLvs);
    var _moEndStacks = F.optimalStacksPerHr(saveData, uLvs, simMLvs);
    var _moStartSV = F.optimalStackValue(saveData, uLvs, mLvs, desired);
    var _moEndSV = F.optimalStackValue(saveData, uLvs, simMLvs, desired);
    var _moSpeedPct = _moStartStacks > 0 ? (_moEndStacks / _moStartStacks - 1) * 100 : 0;
    var _moValPct = _moStartSV > 0 ? (_moEndSV / _moStartSV - 1) * 100 : 0;
    html += ' \u2022 Speed: <span class="n">+' + _moSpeedPct.toFixed(1) + '%</span>';
    html += ' \u2022 Value: <span class="n">+' + _moValPct.toFixed(1) + '%</span>';
  }
  html += '</div>';

  html += '<table class="data-table"><thead><tr>';
  html += '<th>Water</th><th>Upgrade</th><th class="num">Levels</th>';
  html += '<th class="num">From</th><th class="num">To</th><th class="num">Total Cost</th>';
  html += '<th class="num">Time to Afford</th>';
  if (goal === 'fill') html += '<th class="num">Coin Fill</th><th class="num">Marble Fill</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < groupOrder.length; i++) {
    var g = groups[groupOrder[i]];
    var ttaSec = _marblePerHour > 0 ? (g.totalCost / _marblePerHour) * 3600 : Infinity;
    html += '<tr>';
    html += '<td><span style="color:' + F.WATER_COLORS[g.w] + '">' + F.WATER_NAMES[g.w] + '</span></td>';
    html += '<td>' + g.name + '</td>';
    html += '<td class="num">' + g.count + '</td>';
    html += '<td class="num">' + g.startLv + '</td>';
    html += '<td class="num"><b>' + g.endLv + '</b></td>';
    html += '<td class="num">' + fmtNum(g.totalCost) + ' marble</td>';
    html += '<td class="num">' + (ttaSec < Infinity ? fmtTime(ttaSec) : '-') + '</td>';
    if (goal === 'fill') {
      html += '<td class="num">' + fmtTimeFull(g.coinFill) + '</td>';
      html += '<td class="num">' + fmtTimeFull(g.marbleFill) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  if (_mOptimizerAffordable) {
    html += '<div style="margin-top:8px;font-size:.78em;color:var(--text2);">Remaining: ' + fmtNum(budget) + ' marble</div>';
  }

  el.innerHTML = html;
}

// ========== FOUNTAIN SIM ==========
var _simWorker = null;

function _renderSim(uLvs, mLvs, desired) {
  var el = document.getElementById('sim-output');
  if (!el) return;

  el.innerHTML = '<div style="padding:16px;color:var(--text2);">Running sim\u2026 <span id="sim-pct">0</span>%<br><div style="width:300px;height:8px;background:var(--bg2);border-radius:4px;margin-top:6px;"><div id="sim-bar" style="width:0%;height:100%;background:var(--green);border-radius:4px;transition:width .1s;"></div></div></div>';

  // Kill previous worker
  if (_simWorker) { _simWorker.terminate(); _simWorker = null; }

  // Gather currencies
  var currencies = [];
  for (var t = 0; t < 9; t++) currencies[t] = F.fountCurrencyAvail(saveData, t);

  _simWorker = new Worker('./js/fountain-sim-worker.js', { type: 'module' });
  _simWorker.postMessage({
    saveData: saveData,
    uLvs: uLvs,
    mLvs: mLvs,
    desired: desired,
    timeLimit: _simTimeLimit,
    marbleBarSec: F.marbleBarProgress(saveData),
    currencies: currencies,
    marbles: F.marbleCurrency(saveData),
  });

  _simWorker.onmessage = function(e) {
    var msg = e.data;
    if (msg.type === 'progress') {
      var pctEl = document.getElementById('sim-pct');
      var barEl = document.getElementById('sim-bar');
      if (pctEl) pctEl.textContent = msg.pct;
      if (barEl) barEl.style.width = msg.pct + '%';
    } else if (msg.type === 'done') {
      _renderSimResult(el, msg.result);
      _simWorker.terminate();
      _simWorker = null;
    } else if (msg.type === 'error') {
      el.innerHTML = '<div style="color:#e57373;padding:16px;">\u2717 Sim error: ' + _escAttr(msg.message) + '</div>';
      _simWorker.terminate();
      _simWorker = null;
    }
  };

  _simWorker.onerror = function(err) {
    el.innerHTML = '<div style="color:#e57373;padding:16px;">\u2717 Worker error: ' + _escAttr(err.message || err) + '</div>';
    _simWorker.terminate();
    _simWorker = null;
  };
}

function _renderSimResult(el, r) {
  var events = r.events;
  var mRateStart = r.startMarbleRate;
  var mRateEnd = r.endMarbleRate;
  var bcrStart = r.startBaseCurr;
  var bcrEnd = r.endBaseCurr;
  var mRatePct = mRateStart > 0 ? ((mRateEnd / mRateStart) - 1) * 100 : 0;
  var bcrPct = bcrStart > 0 ? ((bcrEnd / bcrStart) - 1) * 100 : 0;

  // Build tooltip showing per-currency rates
  function _currTip(currRates) {
    if (!currRates) return '';
    var lines = [];
    for (var t = 0; t < 9; t++) {
      if (currRates[t] > 0) lines.push(CURR_SHORT[t] + ': ' + fmtNum(currRates[t]) + '/hr');
    }
    return _escAttr(lines.join('\n'));
  }

  var html = '';

  // Summary
  html += '<div style="margin-bottom:12px;">';
  html += '<div class="card-grid cols-4" style="margin-bottom:8px;">';
  html += _card('Sim Duration', fmtTimeFull(r.clockSec), fmtTimeFull(_simTimeLimit * 3600) + ' limit');
  html += _card('Steps', r.stepCount, events.length + ' events');
  html += _card('Marble /hr', fmtNum(mRateEnd), fmtNum(mRateStart) + ' \u2192 ' + fmtNum(mRateEnd) + ' (' + (mRatePct >= 0 ? '+' : '') + mRatePct.toFixed(1) + '%)');
  html += '<div class="card" title="' + _currTip(r.endCurrRates) + '"><div class="card-title">Base Currency /hr</div>'
    + '<div class="card-val">' + fmtNum(bcrEnd) + '</div>'
    + '<div class="card-sub">' + fmtNum(bcrStart) + ' \u2192 ' + fmtNum(bcrEnd) + ' (' + (bcrPct >= 0 ? '+' : '') + bcrPct.toFixed(1) + '%)</div></div>';
  html += '</div>';

  // Final balances
  html += '<div style="font-size:.78em;color:var(--text2);">Final: ';
  var parts = [];
  for (var t = 0; t < 9; t++) {
    if (r.currencies[t] > 0) parts.push(CURR_SHORT[t] + ': ' + fmtNum(r.currencies[t]));
  }
  parts.push('Marble: ' + fmtNum(r.marbles));
  html += parts.join(' \u2022 ');
  html += '</div></div>';

  // Timeline table
  html += '<table class="data-table"><thead><tr>';
  html += '<th class="num">Time</th>';
  html += '<th>Event</th>';
  html += '<th>Details</th>';
  html += '<th class="num">Marble /hr</th>';
  html += '<th class="num">Base Currency /hr</th>';
  html += '</tr></thead><tbody>';

  // Collapse same-time same-upgrade buys (even if interleaved); merge claims;
  // hide marble-fill events (marble accrues passively in background)
  var grouped = [];
  for (var i = 0; i < events.length; i++) {
    var ev = events[i];
    if (ev.type === 'marble-fill') continue; // hide fills

    // Look for an existing group at the same time with the same upgrade
    var found = null;
    if (ev.type === 'buy-upgrade' || ev.type === 'buy-marble') {
      for (var j = grouped.length - 1; j >= 0; j--) {
        if (grouped[j].time !== ev.time) break; // past this time block
        if (grouped[j].type === ev.type && grouped[j].w === ev.w && grouped[j].u === ev.u) {
          found = grouped[j];
          break;
        }
      }
    }

    if (found) {
      // Merge into existing group
      found.endLv = ev.type === 'buy-marble' ? ev.newMLv || ev.newLv : ev.newLv;
      found.totalCost += ev.cost;
      found.count++;
      found.marbleRate = ev.marbleRate;
      found.baseCurrRate = ev.baseCurrRate;
      found.currRates = ev.currRates;
    } else {
      var g = {};
      for (var k in ev) g[k] = ev[k];
      g.startLv = ev.type === 'buy-marble' ? ((ev.newMLv || ev.newLv) - 1) : (ev.newLv - 1);
      g.endLv = ev.type === 'buy-marble' ? (ev.newMLv || ev.newLv) : ev.newLv;
      g.totalCost = ev.cost || 0;
      g.count = 1;
      grouped.push(g);
    }
  }

  // Merge claim events into following buy at the same time
  var merged = [];
  for (var i = 0; i < grouped.length; i++) {
    var ev = grouped[i];
    if (ev.type === 'claim') {
      // Find next event at same time that's a buy
      var next = i + 1 < grouped.length ? grouped[i + 1] : null;
      if (next && next.time === ev.time && (next.type === 'buy-upgrade' || next.type === 'buy-marble')) {
        next.claimAmount = (next.claimAmount || 0) + ev.amount;
        next.claimType = ev.currType;
        next.claimDuration = (next.claimDuration || 0) + ev.duration;
        continue; // skip the claim row — info is on the buy row
      }
      // Standalone claim (end of sim, no buy follows) — keep it but show as earn
      merged.push(ev);
    } else {
      merged.push(ev);
    }
  }

  var lastTime = -1;
  // Time formatter without milliseconds for cleaner sim view
  function fmtTimeNoMs(sec) {
    if (!isFinite(sec) || sec <= 0) return '0s';
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = Math.floor(sec % 60);
    var parts = [];
    if (h > 0) parts.push(h + 'h');
    if (m > 0) parts.push(m + 'm');
    if (s > 0 || parts.length === 0) parts.push(s + 's');
    return parts.join(' ');
  }
  for (var i = 0; i < merged.length; i++) {
    var ev = merged[i];
    var isNewTimeBlock = (ev.time !== lastTime);
    lastTime = ev.time;

    html += '<tr' + (isNewTimeBlock && i > 0 ? ' class="sim-block-start"' : ' class="sim-block-cont"') + '>';
    // Only show time on first row of a time block
    html += '<td class="num" style="white-space:nowrap;' + (!isNewTimeBlock ? 'color:transparent;font-size:0;' : '') + '">' + fmtTimeNoMs(ev.time) + '</td>';

    // Claim info suffix for merged buys
    var claimSuffix = '';
    if (ev.claimAmount > 0) {
      claimSuffix = ' <span style="color:#4fc3f7;font-size:.8em;">\u2b06 ' + fmtNum(ev.claimAmount) + ' ' + CURR_SHORT[ev.claimType] + ' (' + fmtTimeNoMs(ev.claimDuration) + ')</span>';
    }

    switch (ev.type) {
      case 'buy-upgrade':
        html += '<td><span style="color:var(--green);">\u2191 Upgrade</span></td>';
        if (ev.count > 1) {
          html += '<td><span style="color:' + F.WATER_COLORS[ev.w] + '">' + F.WATER_NAMES[ev.w] + '</span> ' + ev.name + ' Lv ' + ev.startLv + ' \u2192 ' + ev.endLv + ' <span style="color:var(--text2);font-size:.8em;">(\u00d7' + ev.count + ', ' + fmtCost(ev.totalCost, ev.costType) + ')</span>' + claimSuffix + '</td>';
        } else {
          html += '<td><span style="color:' + F.WATER_COLORS[ev.w] + '">' + F.WATER_NAMES[ev.w] + '</span> ' + ev.name + ' \u2192 Lv ' + ev.endLv + ' <span style="color:var(--text2);font-size:.8em;">(' + fmtCost(ev.totalCost, ev.costType) + ')</span>' + claimSuffix + '</td>';
        }
        break;
      case 'buy-marble':
        html += '<td><span style="color:#ab47bc;">\u26ab Marble</span></td>';
        if (ev.count > 1) {
          html += '<td><span style="color:' + F.WATER_COLORS[ev.w] + '">' + F.WATER_NAMES[ev.w] + '</span> ' + ev.name + ' M' + ev.startLv + ' \u2192 M' + ev.endLv + ' <span style="color:var(--text2);font-size:.8em;">(\u00d7' + ev.count + ', ' + fmtNum(ev.totalCost) + ' marble)</span></td>';
        } else {
          html += '<td><span style="color:' + F.WATER_COLORS[ev.w] + '">' + F.WATER_NAMES[ev.w] + '</span> ' + ev.name + ' \u2192 M' + ev.endLv + ' <span style="color:var(--text2);font-size:.8em;">(' + fmtNum(ev.totalCost) + ' marble)</span></td>';
        }
        break;
      case 'switch':
        html += '<td><span style="color:#ffa726;">\u21c4 Switch</span></td>';
        html += '<td>Desire \u2192 ' + CURR_SHORT[ev.newDesired] + '</td>';
        break;
      case 'claim':
        html += '<td><span style="color:#4fc3f7;">\u2b06 Earned</span></td>';
        html += '<td>+' + fmtNum(ev.amount) + ' ' + CURR_SHORT[ev.currType] + ' <span style="color:var(--text2);font-size:.8em;">(' + fmtTimeNoMs(ev.duration) + ')</span></td>';
        break;
      default:
        html += '<td>' + ev.type + '</td><td></td>';
    }

    html += '<td class="num">' + fmtNum(ev.marbleRate) + '</td>';
    html += '<td class="num" title="' + _currTip(ev.currRates) + '">' + fmtNum(ev.baseCurrRate) + '</td>';
    html += '</tr>';
  }

  if (merged.length === 0) {
    html += '<tr><td colspan="5" style="color:var(--text2);text-align:center;">No events &mdash; nothing to buy or no beneficial upgrades found.</td></tr>';
  }

  html += '</tbody></table>';
  el.innerHTML = html;
}

function _card(title, val, sub, tip) {
  return '<div class="card"' + (tip ? ' title="' + _escAttr(tip) + '"' : '') + '><div class="card-title">' + title + '</div>'
    + '<div class="card-val">' + val + '</div>'
    + (sub ? '<div class="card-sub">' + sub + '</div>' : '')
    + '</div>';
}

function _escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function _upgBreakpoint(w, u, bon, lv, saveData, uLvs, mLvs) {
  var hints = [];
  // W0U10 Extra Space: cap 16
  if (w === 0 && u === 10) {
    var cur = F.spacesOwned(uLvs, mLvs);
    if (cur >= 16) hints.push(['Capped', 'Spaces maxed at 16']);
    else hints.push(['Near cap', cur + '/16 spaces']);
  }
  // W0U11 Taller Stacks: cap 50
  if (w === 0 && u === 11) {
    var cur = F.maxStackSize(saveData, uLvs, mLvs);
    if (cur >= 50) hints.push(['Capped', 'Stack size maxed at 50']);
    else hints.push(['Near cap', cur + '/50 stack']);
  }
  // W0U12 Water Bender: min(4, 4*b) soft cap
  if (w === 0 && u === 12) {
    if (bon >= 1) hints.push(['Soft cap', '4x term maxed. Extra levels give +' + F.UPG_DATA[w][u][6]/100 + '/lv only']);
  }
  // Currency type caps at 9 types
  if (w === 0 && u === 0) {
    var wo = F.watersOwned(uLvs, mLvs);
    if (wo >= F.WATERS_IMPLEMENTED) hints.push(['Max water', wo + '/' + F.WATERS_IMPLEMENTED + ' waters']);
  }
  if (!hints.length) return '';
  var h = hints[0];
  var color = h[0] === 'Capped' ? 'badge-red' : 'badge-gold';
  return ' <span class="badge ' + color + '" title="' + _escAttr(h[1]) + '">' + h[0] + '</span>';
}

function _truncate(s, n) {
  return s.length > n ? s.slice(0, n) + '\u2026' : s;
}
</script>
