<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idleon Sneaking Optimizer</title>
<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --accent: #e94560; --text: #eee; --text2: #c0c0d4;
  --gold: #ffd700; --green: #4caf50; --blue: #2196f3;
  --purple: #bb86fc; --cyan: #4dd0e1; --red: #f44;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1 { text-align: center; padding: 12px; background: var(--bg2); border-bottom: 2px solid var(--accent); font-size: 1.4em; }
h1 span { color: var(--accent); }

/* Save import */
#save-area { padding: 16px; display: flex; gap: 12px; align-items: center; background: var(--bg2); border-bottom: 1px solid #333; flex-wrap: wrap; }
#save-area label { font-weight: 600; }
#save-area input[type="file"] { color: var(--text2); }
.btn { padding: 6px 16px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: .85em; }
.btn:hover { filter: brightness(1.2); }
.btn-sm { padding: 4px 10px; font-size: .8em; }
#import-msg { font-size: .82em; margin-left: 8px; }
#import-msg.ok { color: var(--green); }
#import-msg.err { color: var(--red); }
#json-paste-wrap { display: none; padding: 0 16px 12px; background: var(--bg2); gap: 8px; align-items: flex-start; }
#json-paste { flex: 1; min-width: 0; background: #111; border: 1px solid #444; border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: .8em; font-family: monospace; resize: vertical; }

/* Custom tooltip */
#js-tip { display:none; position:fixed; z-index:9999; max-width:360px; padding:8px 12px; background:#1a1a2e; border:1px solid var(--gold); border-radius:6px; color:var(--text); font-size:.72em; line-height:1.5; white-space:pre-line; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.5); }

/* Main layout */
.main { max-width: 1400px; margin: 0 auto; padding: 16px; }
.section { background: var(--bg2); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h2 { margin-bottom: 12px; color: var(--accent); font-size: 1.15em; border-bottom: 1px solid #333; padding-bottom: 6px; }
.section h3 { margin: 12px 0 8px; color: var(--cyan); font-size: 1em; }

/* Cards */
.card-grid { display: grid; gap: 10px; }
.card-grid.cols-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
.card-grid.cols-3 { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.card-grid.cols-4 { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
.card-grid.cols-5 { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
.card { background: var(--bg3); border-radius: 8px; padding: 10px 12px; border: 1px solid #444; }
.card .card-title { font-weight: 700; font-size: .85em; color: var(--cyan); margin-bottom: 2px; }
.card .card-val { font-weight: 700; font-size: 1.5em; color: var(--gold); }
.card .card-sub { color: var(--text2); font-size: .75em; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: .82em; }
.data-table th { text-align: left; padding: 5px 6px; color: var(--text2); border-bottom: 1px solid #333; font-weight: 600; position: sticky; top: 0; background: var(--bg2); }
.data-table td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,.04); }
.data-table tr:hover td { background: rgba(255,255,255,.03); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }

/* Detection bar */
.det-bar { height: 6px; border-radius: 3px; background: #333; overflow: hidden; min-width: 50px; display: inline-block; width: 50px; vertical-align: middle; }
.det-fill { height: 100%; border-radius: 3px; }
.det-fill.safe { background: var(--green); }
.det-fill.warn { background: orange; }
.det-fill.danger { background: var(--red); }

/* Twin row */
.twin-row { display: grid; grid-template-columns: 140px 1fr; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); align-items: start; }
.twin-row:last-child { border-bottom: none; }
.twin-name { font-weight: 700; color: var(--gold); font-size: .9em; }
.twin-name .floor-badge { color: var(--blue); font-weight: 600; font-size: .8em; }
.twin-stats { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: .82em; }
.twin-stats .lbl { color: var(--text2); }
.twin-stats .val { font-weight: 600; }
.twin-charm { font-size: .78em; color: var(--cyan); }

/* Badges */
.badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: .72em; font-weight: 700; }
.badge-green { background: rgba(76,175,80,.2); color: var(--green); }
.badge-gold { background: rgba(255,215,0,.15); color: var(--gold); }
.badge-blue { background: rgba(33,150,243,.15); color: var(--blue); }

/* Mastery table */
.mastery-tbl { width: 100%; border-collapse: collapse; font-size: .78em; }
.mastery-tbl th { padding: 4px 6px; color: var(--text2); border-bottom: 2px solid #444; font-weight: 600; text-align: right; white-space: nowrap; position: sticky; top: 0; background: var(--bg2); z-index: 2; }
.mastery-tbl th.left { text-align: left; }
.mastery-tbl td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,.04); text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.mastery-tbl td.left { text-align: left; }
.mastery-tbl tr:hover td { background: rgba(255,255,255,.03); }
.mastery-tbl .col-floor { text-align: center; font-weight: 700; color: var(--gold); }
.mastery-tbl .col-flowers { color: var(--text2); }
.mastery-tbl .col-funeral { color: var(--purple); font-weight: 600; }
.mastery-tbl .col-det { font-weight: 600; }
.mastery-tbl .col-jade { color: var(--gold); }
.mastery-tbl .col-flhr { color: var(--purple); }
.mastery-tbl .col-door { color: var(--text); }
.mastery-tbl .col-0pct { color: var(--text2); position: relative; cursor: help; }
.mastery-tbl .col-0pct .tt { display: none; position: fixed; background: #1a1a2e; border: 1px solid #666; border-radius: 4px; padding: 4px 8px; white-space: nowrap; z-index: 100; font-size: .95em; line-height: 1.6; pointer-events: none; text-align: left; }
.mastery-tbl .col-0pct:hover .tt { display: block; }
.mastery-tbl .mg-sep { border-left: 2px solid #555; }
.mastery-tbl .mcur { background: rgba(233,69,96,.04); }
.mastery-tbl thead th.mcur { background: var(--bg2); border-bottom-color: var(--accent); }
.mg-detail { display: none; }
.mg-detail.open { display: table-row; }
.mg-detail td { padding: 0; background: var(--bg3); }
.mg-detail .data-table th { padding: 2px 4px; }
.mg-detail .data-table td { padding: 1px 4px; }

/* Charm pills */
.charm-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.charm-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid #444; border-radius: 14px; padding: 3px 10px 3px 8px; font-size: .78em; white-space: nowrap; }
.charm-pill.gold { border-color: var(--gold); background: rgba(255,215,0,.06); }
.charm-pill .cp-name { font-weight: 600; }
.charm-pill .cp-lv { color: var(--gold); font-size: .9em; }
.charm-pill .cp-stat { color: var(--cyan); font-size: .9em; }
.charm-pill .cp-type { color: var(--text2); font-size: .85em; }
.charm-pill .cp-best { color: var(--green); font-weight: 700; font-size: .8em; margin-left: 2px; }

/* Shared slot size */
:root { --slot-size: 52px; }
/* Inventory grid */
.inv-grid { display: grid; grid-template-columns: repeat(13, var(--slot-size)); gap: 3px; justify-content: center; }
.inv-slot { background: #1a1510; border: 2px solid transparent; border-radius: 3px; width: var(--slot-size); height: var(--slot-size); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px 1px; min-width: 0; position: relative; cursor: default; }
.inv-slot.gold { background: rgba(255,215,0,.08); }
.inv-slot.best { border-color: var(--green) !important; }
.inv-slot.empty { background: #1a1510; border-color: #3a3028; }
.inv-slot .is-name { font-size: .45em; font-weight: 600; color: var(--text2); text-align: center; line-height: 1.05; overflow: hidden; max-height: 2em; word-break: break-word; }
.inv-slot .is-lv { font-size: .58em; color: #7f7; font-weight: 700; position: absolute; top: 1px; left: 2px; text-shadow: 1px 1px 0 #000; }
.inv-slot .is-best { position: absolute; top: 1px; right: 2px; font-size: .45em; color: var(--green); font-weight: 700; }
.inv-slot:hover .is-tip { display: block; }
.inv-slot .is-tip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid #666; border-radius: 4px; padding: 3px 6px; white-space: nowrap; z-index: 20; font-size: .68em; pointer-events: none; text-align: center; line-height: 1.4; }
.inv-section { background: #1c1810; border: none; padding: 8px !important; flex: 1.3; min-width: 0; }
.inv-section .loadout-title { border-bottom-color: #5a4a38; color: var(--gold); }

/* Side-by-side wrapper */
.sneak-top { display: flex; gap: 8px; align-items: flex-start; }
@media (max-width: 700px) { .sneak-top { flex-direction: column; } .inv-grid { grid-template-columns: repeat(13, var(--slot-size)); } }

/* Loadout section */
.loadout-section { background: #141828; border: 2px solid #3a4a7a; padding: 8px !important; flex: 0.7; min-width: 0; }
.loadout-title { text-align: center; color: var(--gold); font-size: .85em; letter-spacing: 2px; border-bottom: 1px solid #5a4a38; padding-bottom: 3px; margin-bottom: 4px; }
.loadout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
.loadout-card { display: flex; flex-direction: column; background: #2a2218; border: 1px solid #5a4a38; border-radius: 3px; padding: 3px 4px; gap: 3px; }
.lo-info { display: flex; gap: 6px; align-items: center; }
.lo-name { font-weight: 700; color: var(--text); font-size: .62em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lo-lv { font-size: .52em; color: var(--cyan); font-weight: 600; }
.lo-floor { font-size: .48em; color: var(--text2); }
.lo-stats { font-size: .46em; color: var(--text2); display: flex; gap: 6px; margin-left: auto; }
.lo-stats span { white-space: nowrap; }
.lo-equip { display: flex; gap: 2px; }
.lo-slot { border: 1px solid #5a4a38; border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1px; position: relative; width: var(--slot-size); height: var(--slot-size); flex-shrink: 0; }
.lo-slot.gold { border-color: var(--gold); }
.lo-slot.empty { opacity: .3; border-style: dashed; background: #1a1510; }
.lo-slot-lv { font-size: .5em; color: #fff; font-weight: 700; position: absolute; top: 0; left: 2px; text-shadow: 1px 1px 0 #000; }
.lo-slot-name { font-size: .42em; color: var(--text2); text-align: center; line-height: 1.05; word-break: break-word; overflow: hidden; max-height: 2em; margin-top: 2px; }
.lo-slot-label { font-size: .42em; color: #555; font-style: italic; }
/* Symbol level border + background colors */
.sym-lv1 { border-color: #8B6914 !important; background: rgba(139,105,20,.15) !important; }
.sym-lv2 { border-color: #9a9a9a !important; background: rgba(154,154,154,.12) !important; }
.sym-lv3 { border-color: #d4a017 !important; background: rgba(212,160,23,.12) !important; }
.sym-lv4 { border-color: #4a90d9 !important; background: rgba(74,144,217,.12) !important; }
.sym-lv5 { border-color: #b060d0 !important; background: rgba(176,96,208,.12) !important; }
.sym-lv6 { border-color: #c0c8d0 !important; background: rgba(192,200,208,.12) !important; }
.sym-lv7 { border-color: #3ddc84 !important; background: rgba(61,220,132,.12) !important; }
.sym-lv1, .sym-lv2, .sym-lv3, .sym-lv4, .sym-lv5, .sym-lv6, .sym-lv7 { border-width: 2px; }
.sym-dots { display: flex; gap: 2px; justify-content: center; position: absolute; bottom: 1px; left: 0; right: 0; line-height: 1; }
.sym-dots .sd { width: 3px; height: 3px; border-radius: 50%; display: inline-block; }
.inv-slot .sym-dots .sd { width: 2px; height: 2px; }
.inv-slot .sym-dots { bottom: 0; gap: 1px; }
@media (max-width: 600px) { .loadout-grid { grid-template-columns: 1fr; } }
@keyframes dotPulse { 0%,20% { opacity:.2; } 50% { opacity:1; } 100% { opacity:.2; } }
.loading-dots { animation: dotPulse 1.4s infinite; }
</style>
</head>
<body>
<div id="js-tip"></div>

<h1>&#x1F977; <span>Idleon</span> Sneaking Optimizer</h1>

<div id="save-area">
  <label>Load save:</label>
  <input type="file" id="file-input" accept=".json">
  <span style="color:var(--text2);margin:0 4px;">or</span>
  <button class="btn btn-sm" id="paste-btn">Paste JSON</button>
  <span id="import-msg"></span>
</div>
<div id="json-paste-wrap">
  <textarea id="json-paste" rows="3" placeholder="Paste it.json or save.json contents here..."></textarea>
  <button class="btn" id="paste-load-btn">Load</button>
</div>

<div class="main" id="main-content">
  <div style="color:var(--text2);text-align:center;padding:60px 0;">Load a save to begin.</div>
</div>

<script type="module">
'use strict';

import { saveData } from './js/state.js';
import { loadSaveData } from './js/save/loader.js';
import { NjEQ } from './js/stats/data/game/custommaps.js';
import {
  NK_COUNT, FLOOR_COUNT,
  nkName, nkBonus,
  floorDetectionBase, floorJadeBase, floorExpMult, doorHP,
  detectionChance, actionSpeed, koDuration, doorDamage,
  stealthValue,
  parseTwinData, parseTwinEquip,
  fmtJade,
  charmStat, charmBonusType, charmDisplayName, isGoldCharm, equipInfo,
  funeralStealthBonus, nkBonusFull,
  stealthForDetection, maxCharmDropLevel, maxDropLevel,
  parseInventoryCharms, bestInventoryBonuses,
  flowerRate, floorDropTable, CHARM_BONUS_TYPES,
  itemFindChance, doorEffectiveHP,
  allyStealthMulti, simStealth,
} from './js/stats/systems/w6/sneaking-math.js';
import { computeCoreStealth, computeCoreStealthDetailed, computeTwinStealth, findBestActiveChar, getTwinAllyContributions, computeActionSpeed, computeNK11Extras } from './js/stats/systems/w6/sneaking-stealth.js';
import { bubbleValByKey } from './js/stats/systems/w2/alchemy.js';
import { emporiumBonus } from './js/game-helpers.js';

// ===== SAVE LOADING =====
function _loadRaw(raw) {
  var msg = document.getElementById('import-msg');
  try {
    loadSaveData(raw);
    _invalidateGridCache();
    msg.className = 'ok';
    msg.textContent = '\u2713 Save loaded.';
    _renderAll();
  } catch (err) {
    msg.className = 'err';
    msg.textContent = '\u2717 ' + err.message;
    console.error(err);
  }
}

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    try { _loadRaw(JSON.parse(reader.result)); }
    catch (err) {
      var m = document.getElementById('import-msg');
      m.className = 'err'; m.textContent = '\u2717 ' + err.message;
    }
  };
  reader.readAsText(file);
});

document.getElementById('paste-btn').addEventListener('click', function() {
  var wrap = document.getElementById('json-paste-wrap');
  wrap.style.display = wrap.style.display === 'flex' ? 'none' : 'flex';
});

document.getElementById('paste-load-btn').addEventListener('click', function() {
  try {
    _loadRaw(JSON.parse(document.getElementById('json-paste').value));
    document.getElementById('json-paste-wrap').style.display = 'none';
  } catch (err) {
    var m = document.getElementById('import-msg');
    m.className = 'err'; m.textContent = '\u2717 ' + err.message;
  }
});

// ===== JS TOOLTIP =====
(function() {
  var tip = document.getElementById('js-tip');
  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('[data-tip]');
    if (!el) { tip.style.display = 'none'; return; }
    tip.textContent = el.getAttribute('data-tip');
    tip.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e) {
    if (tip.style.display !== 'block') return;
    var x = e.clientX + 12, y = e.clientY + 12;
    if (x + tip.offsetWidth > window.innerWidth - 8) x = e.clientX - tip.offsetWidth - 8;
    if (y + tip.offsetHeight > window.innerHeight - 8) y = e.clientY - tip.offsetHeight - 8;
    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  });
  document.addEventListener('mouseout', function(e) {
    if (e.target.closest('[data-tip]')) tip.style.display = 'none';
  });
})();

// ===== HELPERS =====
function _nd() { return saveData.ninjaData || []; }
function _nkLvs() { return _nd()[103] || []; }
function _nkLv(idx) { return Number(_nkLvs()[idx]) || 0; }
function _mastery() { return Number(saveData.olaData?.[231]) || 0; }
function _masteryMax() { return Number(saveData.olaData?.[232]) || 0; }
function _flowers() { return saveData.spelunkData?.[15] || []; }
function _symLevels() { return saveData.spelunkData?.[14] || []; }
var SYM_COLORS = ['','#8B6914','#9a9a9a','#d4a017','#4a90d9','#b060d0','#c0c8d0','#3ddc84'];
function _symLvForLoadout(twinIdx, charmIdx) {
  // charmIdx: 0 or 1 (the two charm slots in the 4-slot equip grid, positions 2,3)
  var slotIdx = 14 + charmIdx + 4 * twinIdx;
  var lvid = (slotIdx - 14) - 2 * Math.floor((slotIdx - 14) / 4);
  return Number(_symLevels()[lvid]) || 0;
}
function _symLvForInv(invSlot) {
  var lvid = 24 + invSlot;
  return Number(_symLevels()[lvid]) || 0;
}
function _symDots(lv, color) {
  if (!lv) return '';
  var d = '<span class="sym-dots">';
  for (var i = 0; i < lv; i++) d += '<span class="sd" style="background:' + color + ';"></span>';
  d += '</span>';
  return d;
}
function _charName(idx) { return (saveData.charNames || [])[idx] || ('Twin ' + (idx + 1)); }

function _fmt(n) {
  if (n == null || isNaN(n)) return '0';
  var a = Math.abs(n);
  if (a >= 1e21) return n.toExponential(2);
  if (a >= 1e18) return (n / 1e18).toFixed(2) + 'Qi';
  if (a >= 1e15) return (n / 1e15).toFixed(2) + 'Q';
  if (a >= 1e12) return (n / 1e12).toFixed(2) + 'T';
  if (a >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (a >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (a >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  if (a >= 1) return Math.floor(n).toLocaleString();
  if (a > 0) return n.toPrecision(3);
  return '0';
}
function _pct(n) { if (n >= 0.99995) return '100%'; if (n >= 0.999) return (n * 100).toFixed(2) + '%'; return (n * 100).toFixed(1) + '%'; }
function _detClass(ch) { return ch <= 0.05 ? 'safe' : ch <= 0.30 ? 'warn' : 'danger'; }
function _detColor(ch) { var c = _detClass(ch); return c === 'safe' ? 'var(--green)' : c === 'warn' ? 'orange' : 'var(--red)'; }
function _card(title, val, sub) {
  return '<div class="card"><div class="card-title">' + title + '</div><div class="card-val">' + val + '</div>' + (sub ? '<div class="card-sub">' + sub + '</div>' : '') + '</div>';
}
function _timeStr(hours) {
  if (!hours || !isFinite(hours)) return '\u221e';
  if (hours < 1) return Math.round(hours * 60) + 'm';
  if (hours < 24) return hours.toFixed(1) + 'h';
  return (hours / 24).toFixed(1) + 'd';
}
function _detBar(det) {
  return '<div class="det-bar"><div class="det-fill ' + _detClass(det) + '" style="width:' + Math.max(2, det * 100) + '%;"></div></div>';
}
// Game-style multiplier format: >100 → comma + "x", >10 → 1dec + "x", else → 2dec + "x"
function _fmtMulti(mult) {
  if (mult >= 100) return _fmt(mult) + 'x';
  if (mult >= 10) return (Math.round(10 * mult) / 10) + 'x';
  return mult.toFixed(2) + 'x';
}

// ===== TWIN DATA =====
var TWIN_COUNT = 10; // only 0-9 are valid

function _getActiveTwins() {
  var nd = _nd();
  var twins = parseTwinData(nd);
  var result = [];
  for (var t = 0; t < TWIN_COUNT; t++) {
    if (!twins[t]) continue;
    var equip = parseTwinEquip(nd, t);
    var charms = [];
    for (var s = 0; s < 4; s++) {
      if (equip[s] && equip[s].name !== 'Blank') charms.push(equip[s]);
    }
    var dodgePct = 0, spdPct = 0, itemFindPct = 0, allyType8 = 0, allyType16 = 0, koPct = 0;
    for (var c = 0; c < charms.length; c++) {
      var bt = charmBonusType(charms[c].name);
      var sv = charmStat(charms[c].name, charms[c].level);
      if (bt === 0) dodgePct += sv;
      if (bt === 1) koPct += sv;
      if (bt === 2) spdPct += sv;
      if (bt === 5) itemFindPct += sv;
      if (bt === 7) spdPct += sv;
      if (bt === 8) allyType8 += sv;
      if (bt === 16) allyType16 += sv;
    }
    // Sneaking level from lv0AllData
    var lv0 = saveData.lv0AllData || [];
    var sneakLv = Number(lv0[t] && lv0[t][17]) || 0;
    result.push({
      idx: t,
      name: _charName(t),
      floor: twins[t].floor,
      sneakLv: sneakLv,
      equip: equip,
      charms: charms,
      dodgePct: dodgePct,
      spdPct: spdPct,
      itemFindPct: itemFindPct,
      allyType8: allyType8,
      allyType16: allyType16,
      koPct: koPct,

      h += '<td class="col-jade' + cc2 + '">' + _fmt(cd.totalJadeHr) + '</td>';
      h += '<td class="col-door' + cc2 + '">' + (cd.hp > 0 ? _fmt(cd.totalDoorDmgHr) + '/' + _fmt(cd.hp) : '-') + '</td>';
      h += '<td class="col-0pct' + cc2 + '">' + _fmt(thresh[5].stealth);
      h += '<span class="tt">';
      var ttSet = cd._set || defaultSet;
      for (var si2 = 0; si2 < thresh.length; si2++) {
        var fmNeeded = _funeralMultiForStealth(thresh[si2].stealth, ttSet);
        var fmStr = fmNeeded === Infinity || fmNeeded > 1e15 ? '-' : _fmtMulti(fmNeeded);
        h += thresh[si2].label + ': ' + _fmt(thresh[si2].stealth) + ' (🌸' + fmStr + ')' + (si2 < thresh.length - 1 ? '<br>' : '');
      }
      h += '</span></td>';

      // Rebuild time — how long to farm current flowers at this mastery's flower rate
      if (mIsCur[mi2]) {
        h += '<td class="' + cc2 + '" style="color:var(--text2);">—</td>';
      } else {
        var rebuildHrs = cd1.flCount > 0 && cd.totalFlHr > 0 ? cd1.flCount / cd.totalFlHr : 0;
        h += '<td class="' + cc2 + '" style="color:' + (rebuildHrs > 0 ? 'var(--gold)' : 'var(--text2)') + ';" title="Time to rebuild ' + _fmt(cd1.flCount) + ' flowers at ' + _fmt(cd.totalFlHr) + ' fl/hr">' + (rebuildHrs > 0 ? _timeStr(rebuildHrs) : '—') + '</td>';
      }
    }
    h += '</tr>';

    // Detail row (hidden) — colspan cells matching parent mastery column groups
    h += '<tr class="mg-detail" id="detail-' + rowId + '">';
    // Left column: twin names (shared across all mastery columns)
    var cd2_0 = cd1; // use current mastery twins for names
    var hasConfigLabel = curMode !== 'current' && cd1.configLabel;
    h += '<td colspan="2" style="vertical-align:top;padding:0;">';
    if (hasConfigLabel) h += '<div style="font-size:.68em;padding:2px 4px;">&nbsp;</div>';
    h += '<table class="data-table" style="margin-top:0;font-size:.82em;border:0;">';
    h += '<tr><th style="padding:2px 4px;">&nbsp;</th></tr>';
    for (var pn = 0; pn < cd2_0.perTwin.length; pn++) {
      var pnm = cd2_0.perTwin[pn];
      h += '<tr style="' + (pnm.onFloor ? 'background:rgba(77,208,225,.06);' : '') + '">';
      h += '<td style="font-size:.9em;white-space:nowrap;padding:1px 4px;">' + pnm.name + '</td></tr>';
    }
    h += '</table></td>';
    for (var mi3 = 0; mi3 < mCount; mi3++) {
      var cd2 = mIsCur[mi3] ? cd1 : _bestCellData(fl, masteryLevels[mi3]);
      h += '<td colspan="6" style="vertical-align:top;padding:0;">';
      // Show winning config label for optimizer modes
      if (curMode !== 'current' && cd2.configLabel) {
        h += '<div style="font-size:.68em;color:var(--cyan);font-weight:600;padding:2px 4px;">' + cd2.configLabel + '</div>';
      }
      h += '<table class="data-table" style="margin-top:0;font-size:.82em;">';
      h += '<tr>';
      if (curMode !== 'current') h += '<th>Loadout</th>';
      h += '<th class="num">Det</th><th class="num">Interval</th><th class="num">KO time</th><th class="num">Jade/hr</th><th class="num">×/hr</th><th class="num">Items/hr</th><th class="num">Door/hr</th></tr>';
      for (var pt = 0; pt < cd2.perTwin.length; pt++) {
        var p = cd2.perTwin[pt];
        var secPerAct = 3600 / p.spd;
        h += '<tr style="' + (p.onFloor ? 'background:rgba(77,208,225,.06);' : '') + '">';
        if (curMode !== 'current' && p.equip) {
          var eqParts = [];
          for (var ei = 1; ei < p.equip.length; ei++) {
            if (p.equip[ei] && p.equip[ei].name !== 'Blank') {
              var einfo = equipInfo(p.equip[ei].name, p.equip[ei].level);
              var fullN = einfo ? einfo.name : p.equip[ei].name;
              var abbr = fullN.replace(/^Gold /,'G.').replace(/Thundergloves/,'TG').replace(/Scroll of Power/,'SoP').replace(/Yellow Belt/,'YB').replace(/Lotus Flower/,'LF').replace(/Rosaries/,'R').replace(/Meteorite Belt/,'MB').replace(/Nunchaku/,'Nk');
              eqParts.push('<span title="' + fullN + '">' + abbr + '</span>');
            } else if (ei >= 2) {
              eqParts.push('<span title="Empty slot" style="opacity:.4;">∅</span>');
            }
          }
          h += '<td style="font-size:.7em;color:var(--text2);white-space:nowrap;">' + eqParts.join(', ') + '</td>';
        }
        h += '<td class="num" style="color:' + _detColor(p.det) + ';font-weight:600;">' + _pct(p.det) + '</td>';
        h += '<td class="num">' + secPerAct.toFixed(1) + 's</td>';
        h += '<td class="num" style="color:var(--red);">' + (p.koProb > 0 ? (p.koSec / p.spd).toFixed(1) + 's' : '-') + '</td>';
        h += '<td class="num" style="color:var(--gold);">' + _fmt(p.jHr) + '</td>';
        var pMultiHr = p.flHr * nk21 / 100;
        h += '<td class="num" style="color:var(--purple);" title="' + p.flHr.toFixed(1) + ' fl/hr">' + (pMultiHr >= 0.01 ? pMultiHr.toFixed(2) : pMultiHr.toFixed(4)) + '×</td>';
        h += '<td class="num" style="color:var(--text);">' + p.iHr.toFixed(2) + '</td>';
        h += '<td class="num">' + _fmt(p.dmgHr) + '</td>';
        h += '</tr>';
      }
      h += '</table>';
      // Drops table — show for ALL mastery columns with per-type max levels
      if (cd2.dropTable.length > 0) {
        var mLvThis = masteryLevels[mi3];
        h += '<div style="margin-top:3px;"><strong style="color:var(--cyan);font-size:.68em;">Drops</strong>';
        h += '<table class="data-table" style="margin-top:1px;font-size:.78em;">';
        h += '<tr><th>Item</th><th>Type</th><th class="num">Wt</th><th class="num">Max Lv</th></tr>';
        for (var di = 0; di < cd2.dropTable.length; di++) {
          var d = cd2.dropTable[di];
          var info2 = equipInfo(d.key, 0);
          var dn3 = info2 ? info2.name : d.key;
          var label3 = info2 ? info2.label : '?';
          var mxLv = maxDropLevel(d.key, nkLvs, mLvThis, nk11Extras);
          var lvStr = mxLv > 0 ? _fmt(Math.floor(mxLv)) : (info2 && info2.type === 0 ? '—' : '0');
          h += '<tr><td>' + dn3 + '</td><td style="color:var(--text2);">' + label3 + '</td>';
          h += '<td class="num">' + (d.chance * 100).toFixed(1) + '%</td>';
          h += '<td class="num" style="color:' + (mxLv > 0 ? 'var(--gold)' : 'var(--text2)') + ';">' + lvStr + '</td></tr>';
        }
        h += '</table></div>';
      }
      h += '</td>';
    }
    h += '</tr>';
  }

  h += '</tbody></table></div>';

  _gridCache[cacheKey] = h;
  gridEl.innerHTML = h;
}
</script>
</body>
</html>
