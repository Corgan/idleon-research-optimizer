<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleOn Drop Rate Calculator</title>
<link rel="stylesheet" href="css/breakdown.css">
<style>
/* Page-specific overrides */
.top-bar .btn-sm:hover { color: var(--red); border-color: var(--red); }
.dr-card { background: var(--bg2); border-radius: 10px; padding: 18px; margin-bottom: 18px; text-align: center; }
.dr-total { font-size: 2.6em; font-weight: 800; color: var(--gold); }
.dr-sub { color: var(--text2); font-size: .85em; margin-top: 4px; }
</style>
</head>
<body>
<h1>&#x1F3B2; IdleOn Drop Rate Calculator</h1>
<p class="subtitle">Auto-computes from save JSON. Select character &amp; map.</p>
<div class="container">

<!-- Import -->
<details class="import-box" open>
  <summary>&#x1F4CB; Import Save JSON</summary>
  <textarea id="json-in" placeholder="Paste your it.json or save.json contents here..."></textarea>
  <div class="top-bar">
    <button class="btn" onclick="doImport()">Load Save</button>
    <select id="char-sel" onchange="switchChar(+this.value)" disabled>
      <option value="-1">-- load save first --</option>
    </select>
    <select id="map-sel" onchange="switchMap(+this.value)" disabled>
      <option value="0">Map: Town (no AC)</option>
    </select>
  </div>
  <div id="import-msg" class="import-msg"></div>
</details>

<!-- Total DR -->
<div class="dr-card">
  <div class="dr-sub">Total Drop Rate Multiplier</div>
  <div class="dr-total" id="dr-total">1.00x</div>
  <div class="dr-sub" id="dr-sub"></div>
</div>

<!-- Breakdown tree -->
<div class="tree">
  <h2>Formula Breakdown</h2>
  <div id="tree"></div>
</div>

</div>
<div class="bt-tooltip" id="bt-tooltip"></div>
<script type="module">
'use strict';

// ======================= MODULE IMPORTS =======================
import { saveData } from './js/state.js';
import { buildTree, toRenderNode } from './js/stats/tree-builder.js';
import { getCatalog } from './js/stats/registry.js';
import drDesc from './js/stats/defs/drop-rate.js';
import { renderBreakdownTree } from './js/ui/dash-breakdowns.js';
import { MapDispName, MapAFKtarget } from './js/stats/data/game/customlists.js';
import { MONSTERS } from './js/stats/data/game/monsters.js';
import { doImport as _doImport } from './js/ui/save-import.js';

const catalog = getCatalog();

function _j(v) { return typeof v === 'string' ? JSON.parse(v) : v; }
function fN(n, d) {
  if (n == null || isNaN(n)) return '0';
  d = d ?? 2;
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e4) return (n / 1e3).toFixed(1) + 'K';
  return n.toFixed(d);
}

function _getLOG(x) { return Math.log(Math.max(x, 1)) / 2.30259; }
function _arcaneMulti(kills) {
  if (kills < 1) return 0;
  var lg = _getLOG(kills), lg2 = Math.log(Math.max(kills, 1)) / Math.log(2);
  return (2 * Math.max(0, lg - 3.5) + Math.max(0, lg2 - 12)) * (lg / 2.5)
    + Math.min(2, kills / 1000) + Math.max(5 * (lg - 5), 0);
}

function _mapLabel(idx, bonArr) {
  var name = (MapDispName[idx] || 'Map ' + idx).replace(/_/g, ' ');
  var mobId = MapAFKtarget[idx];
  var mob = mobId && MONSTERS[mobId] ? MONSTERS[mobId].Name.replace(/_/g, ' ') : '';
  var label = name;
  if (mob && mob !== 'Nothing') label += ' - ' + mob;
  if (bonArr) {
    var multi = _arcaneMulti(bonArr[0] || 0);
    if (multi > 0) label += ' (' + (1 + multi / 100).toFixed(2) + 'x)';
  }
  return label;
}

// ======================= STATE =======================
var SAVE_RAW = null;
var CHARS = [];
var CUR_CHAR = 0;
var CUR_MAP = 0;


// ======================= COMPUTE & RENDER =======================
function recalc() {
  if (!SAVE_RAW) return;

  var mapBon = null;
  if (SAVE_RAW && SAVE_RAW.data && SAVE_RAW.data.MapBon) {
    mapBon = _j(SAVE_RAW.data.MapBon);
  }

  var ctx = { charIdx: CUR_CHAR, mapIdx: CUR_MAP, saveData: saveData, mapBon: mapBon };
  var tree = buildTree(drDesc, catalog, ctx);

  document.getElementById('dr-total').textContent = tree.val.toFixed(2) + 'x';
  document.getElementById('dr-sub').textContent =
    'Character: ' + (CHARS[CUR_CHAR] || CUR_CHAR) + '  ·  Map: ' + (MapDispName[CUR_MAP] || CUR_MAP).replace(/_/g, ' ');

  var renderRoot = toRenderNode(tree);
  renderBreakdownTree(renderRoot, document.getElementById('tree'), { tooltipId: 'bt-tooltip' });
}

function populateMapSel(data, charIdx, curMap) {
  var mapSel = document.getElementById('map-sel');
  mapSel.innerHTML = '';
  var mb = data.MapBon ? _j(data.MapBon) : [];
  var added = new Set();

  // 1) Generic "Town" entry
  var oTown = document.createElement('option');
  oTown.value = 0;
  oTown.textContent = 'Town';
  mapSel.appendChild(oTown);
  added.add(0);

  // 2) All maps with arcane kills
  for (var i = 0; i < mb.length; i++) {
    if (added.has(i)) continue;
    if (!Array.isArray(mb[i]) || !mb[i][0]) continue;
    if (!MapDispName[i]) continue;
    var o = document.createElement('option');
    o.value = i;
    o.textContent = _mapLabel(i, mb[i]);
    mapSel.appendChild(o);
    added.add(i);
  }

  // 3) If current map isn't in the list, add it as a special entry
  if (curMap != null && !added.has(curMap)) {
    var name = MapDispName[curMap]
      ? MapDispName[curMap].replace(/_/g, ' ')
      : 'Map ' + curMap;
    var oC = document.createElement('option');
    oC.value = curMap;
    oC.textContent = name + ' (current)';
    mapSel.insertBefore(oC, mapSel.firstChild.nextSibling);
  }
}

// ======================= IMPORT =======================
function doImport() {
  _doImport({
    textareaId: 'json-in',
    charSelId: 'char-sel',
    msgId: 'import-msg',
    onLoaded: function(raw, chars) {
      SAVE_RAW = raw;
      CHARS = chars;
      CUR_CHAR = 0;

      var data = raw.data || raw;
      CUR_MAP = data['CurrentMap_' + CUR_CHAR] || 0;
      var mapSel = document.getElementById('map-sel');
      populateMapSel(data, CUR_CHAR, CUR_MAP);
      mapSel.disabled = false;
      mapSel.value = CUR_MAP;

      recalc();
    },
  });
}

function switchChar(idx) {
  CUR_CHAR = idx;
  var data = SAVE_RAW && (SAVE_RAW.data || SAVE_RAW);
  if (data) {
    CUR_MAP = data['CurrentMap_' + idx] || 0;
    populateMapSel(data, idx, CUR_MAP);
    var mapSel = document.getElementById('map-sel');
    mapSel.value = CUR_MAP;
  }
  recalc();
}
function switchMap(idx) { CUR_MAP = idx; recalc(); }

window.doImport = doImport;
window.switchChar = switchChar;
window.switchMap = switchMap;

// Init
recalc();
</script>
</body>
</html>
